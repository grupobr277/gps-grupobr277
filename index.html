<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTE - 15 Alertas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .alert-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 30px;
            border: 1px solid #00aaff;
        }

        .alert-card {
            background: #1f1f40;
            border-radius: 60px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 5px rgba(0,170,255,0.3);
        }

        .alert-card:hover {
            transform: scale(1.05);
            background: #2a2a60;
        }

        .alert-emoji {
            font-size: 40px;
        }

        .alert-name {
            font-size: 12px;
            color: white;
            margin-top: 8px;
            font-weight: bold;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00aaff;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📢 15 ALERTAS - TESTE</h1>
        <div class="alert-grid" id="alertGrid"></div>
    </div>

    <script>
        // ==================== 15 ALERTAS ====================
        const alertTypes = [
            { name: 'ACIDENTE', emoji: '💥', color: '#e53935' },
            { name: 'OBRAS', emoji: '🚧', color: '#ff9800' },
            { name: 'PANE MECÂNICA', emoji: '🔧', color: '#795548' },
            { name: 'ANIMAL NA PISTA', emoji: '🐂', color: '#9c27b0' },
            { name: 'VEÍCULO ENGUIÇADO', emoji: '🚗💨', color: '#ff5722' },
            { name: 'BARREIRA', emoji: '⛰️', color: '#8b4513' },
            { name: 'NEBLINA', emoji: '🌫️', color: '#00acc1' },
            { name: 'CONGESTIONAMENTO', emoji: '🔴', color: '#f44336' },
            { name: 'ALAGAMENTO', emoji: '💧', color: '#2196f3' },
            { name: 'BLOQUEIO TOTAL', emoji: '⛔', color: '#b71c1c' },
            { name: 'PERIGO', emoji: '⚠️', color: '#ff5722' },
            { name: 'DESVIO', emoji: '🔄', color: '#3f51b5' },
            { name: 'CARGA PERIGOSA', emoji: '📦', color: '#8bc34a' },
            { name: 'GRANIZO', emoji: '🧊', color: '#00bcd4' },
            { name: 'MANIFESTAÇÃO', emoji: '📢', color: '#ff4081' }
        ];

        function showToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function buildAlertGrid() {
            const grid = document.getElementById('alertGrid');
            grid.innerHTML = '';
            
            alertTypes.forEach(alert => {
                const card = document.createElement('div');
                card.className = 'alert-card';
                card.style.borderTop = `4px solid ${alert.color}`;
                card.innerHTML = `
                    <div class="alert-emoji">${alert.emoji}</div>
                    <div class="alert-name">${alert.name}</div>
                `;
                card.onclick = () => {
                    showToast(`✅ Alerta: ${alert.name} (simulação)`);
                };
                grid.appendChild(card);
            });
        }

        buildAlertGrid();
        console.log('✅ 15 alertas carregados com sucesso!');
    </script>
</body>
</html>
