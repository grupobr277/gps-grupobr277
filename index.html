<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL FINAL V1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; --radio-gold: #ffd700; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%); }

        /* CADASTRO INICIAL */
        #cadastro { position: fixed; inset: 0; background: var(--ws-green); z-index: 10000; display: flex; align-items: center; justify-content: center; color: white; }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-entrar { background: #25d366; color: white; border: none; padding: 15px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* LUPA E BUSCA */
        .leaflet-top.leaflet-center { left: 50%; transform: translateX(-50%); width: 90%; top: 15px; position: absolute; z-index: 1000; }
        .leaflet-control-geocoder { border: 3px solid var(--ws-green) !important; border-radius: 30px !important; background: white !important; height: 50px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4) !important; }
        .convite-lupa { position: absolute; top: 75px; left: 50%; transform: translateX(-50%); background: white; padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; color: var(--ws-green); border: 2px solid var(--ws-green); z-index: 1001; pointer-events: none; }

        /* ALERTAS LATERAIS */
        .lateral-alertas { position: absolute; top: 120px; left: 10px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
        .btn-al { padding: 10px; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; border: 1px solid white; width: 100px; text-align: center; cursor: pointer; }

        /* RÁDIO PX (O XODÓ) */
        #radio-px { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95px; height: 95px; background: #1a1a1a; border: 6px solid var(--radio-gold); border-radius: 50%; z-index: 9000; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--radio-gold); box-shadow: 0 0 30px rgba(0,0,0,0.6); touch-action: none; }
        .px-gravando { background: #d32f2f !important; border-color: white !important; transform: translateX(-50%) scale(0.9); }

        /* CHAT WHATSAPP */
        .chat-container { position: fixed; right: -100%; top: 0; width: 100%; max-width: 420px; height: 100%; background: #e5ddd5; z-index: 9500; transition: 0.4s; display: flex; flex-direction: column; }
        .chat-container.ativo { right: 0; }
        .chat-topo { background: var(--ws-green); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }
        .chat-corpo { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .balao-ws { padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); position: relative; }
        .balao-ws.meu { align-self: flex-end; background: var(--ws-light); }
        .balao-ws.outro { align-self: flex-start; background: white; }
        .hora-ws { font-size: 10px; color: #777; display: block; text-align: right; margin-top: 5px; }

        /* FLUTUANTES */
        .btn-float { position: fixed; z-index: 5000; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.4); touch-action: none; }
        #btn-recenter { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); z-index: 4000; background: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; border: none; display: none; color: var(--ws-green); }
        .gps-pulso { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 122, 255, 0.4); animation: sonar 2s infinite; z-index: -1; }
        @keyframes sonar { 0% { box-shadow: 0 0 0 0px rgba(0,122,255,0.7); } 100% { box-shadow: 0 0 0 25px rgba(0,122,255,0); } }
    </style>
</head>
<body>

<div id="cadastro">
    <div class="card">
        <h2 style="color:var(--ws-green)">BR-277 OPERACIONAL</h2>
        <p>Iniciando sala de comunicação limpa...</p>
        <input type="text" id="nome-id" placeholder="Seu Nome / Prefixo">
        <select id="veiculo-id">
            <option value="🚗">Carro</option>
            <option value="🚛">Caminhão</option>
            <option value="🚓">Polícia / PRF</option>
            <option value="🚑">SAMU / Resgate</option>
        </select>
        <button class="btn-entrar" onclick="ativarSistema()">ATIVAR TUDO 🚀</button>
    </div>
</div>

<div id="map"></div>
<div class="convite-lupa">📍 Pra onde vamos hoje, Danilo?</div>
<button id="btn-recenter" onclick="voltarAoCarro()">🧭 RECENTRALIZAR</button>

<div class="lateral-alertas">
    <div class="btn-al" style="background:#b00" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-al" style="background:#e60" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-al" style="background:#000" onclick="enviarAlerta('Polícia', '🚓')">🚓 POLÍCIA</div>
    <div class="btn-al" style="background:#444" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
</div>

<div id="radio-px">🎤</div>
<div id="btn-luz" class="btn-float" style="width:50px;height:50px;right:20px;top:160px;background:#fc0">💡</div>
<div id="btn-chat" class="btn-float" style="width:65px;height:65px;right:20px;bottom:150px;background:#25d366;color:white;font-size:30px">💬</div>

<div id="janela-chat" class="chat-container">
    <div class="chat-topo"><span>WHATSAPP BR-277</span> <span onclick="abrirChat()" style="cursor:pointer">✕</span></div>
    <div id="chat-lista" class="chat-corpo"></div>
    <div style="padding:10px; background:#eee; display:flex; gap:8px;">
        <input type="text" id="msg-input" placeholder="Mensagem...">
        <button onclick="postarMsg()" style="background:var(--ws-green); color:white; border:none; border-radius:50%; width:45px; height:45px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase - Sala Limpa V1
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = { nome: "", veiculo: "🚗" }, meuLatLng, meuMarcador, seguindo = true, rota;

// Cadastro e Memória
if(localStorage.getItem('br277_final_v1')) {
    user = JSON.parse(localStorage.getItem('br277_final_v1'));
    document.getElementById('cadastro').style.display = 'none';
}

function ativarSistema() {
    const n = document.getElementById('nome-id').value;
    if(!n) return alert("Por favor, digite seu nome!");
    user = { nome: n, veiculo: document.getElementById('veiculo-id').value };
    localStorage.setItem('br277_final_v1', JSON.stringify(user));
    document.getElementById('cadastro').style.display = 'none';
    new AudioContext(); // Ativa áudio no navegador
}

// Configuração do Mapa
const map = L.map('map', { zoomControl: false }).setView([-25.42, -49.27], 15);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

// Lupa de Busca Inteligente
const buscador = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "🔍 Pesquisar destino...",
    geocoder: L.Control.geocoder.nominatim({
        geocodingQueryParams: { countrycodes: 'br', viewbox: '-49.6,-25.6,-49.1,-25.3', bounded: 1 }
    })
}).on('markgeocode', e => {
    const destino = e.geocode.center;
    if(rota) map.removeControl(rota);
    rota = L.Routing.control({
        waypoints: [L.latLng(meuLatLng), destino],
        lineOptions: { styles: [{ color: '#007aff', weight: 8, opacity: 0.8 }] },
        createMarker: () => null
    }).addTo(map);
}).addTo(map);

// GPS em Tempo Real
navigator.geolocation.watchPosition(pos => {
    meuLatLng = [pos.coords.latitude, pos.coords.longitude];
    if(!meuMarcador) {
        meuMarcador = L.marker(meuLatLng, { icon: L.divIcon({ html: `<div class="gps-pulso"></div><div style="font-size:38px;">${user.veiculo}</div>`, className:'' }) }).addTo(map);
        map.setView(meuLatLng, 17);
    } else {
        meuMarcador.setLatLng(meuLatLng);
    }
    if(seguindo) map.panTo(meuLatLng);
    if(rota) rota.spliceWaypoints(0, 1, L.latLng(meuLatLng));
}, null, { enableHighAccuracy: true });

// Rádio PX Profissional
let gravador, pedacos = [];
const btnPx = document.getElementById('radio-px');

async function iniciarPx() {
    btnPx.classList.add('px-gravando');
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    gravador = new MediaRecorder(stream);
    gravador.ondataavailable = e => pedacos.push(e.data);
    gravador.onstop = () => {
        const blob = new Blob(pedacos, { type: 'audio/ogg; codecs=opus' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = () => {
            db.ref("px_final_v1").set({ audio: reader.result, nome: user.nome, tempo: Date.now() });
            pedacos = [];
        };
    };
    gravador.start();
}
function pararPx() { btnPx.classList.remove('px-gravando'); if(gravador) gravador.stop(); }

btnPx.onmousedown = iniciarPx; btnPx.onmouseup = pararPx;
btnPx.ontouchstart = e => { e.preventDefault(); iniciarPx(); };
btnPx.ontouchend = pararPx;

db.ref("px_final_v1").on("value", snap => {
    const d = snap.val();
    if(d && d.nome !== user.nome && (Date.now() - d.tempo < 4000)) {
        let som = new Audio(d.audio); som.play();
    }
});

// Chat Estilo WhatsApp
function abrirChat() { document.getElementById('janela-chat').classList.toggle('ativo'); }
document.getElementById('btn-chat').onclick = abrirChat;

function postarMsg() {
    const input = document.getElementById('msg-input'); if(!input.value) return;
    db.ref("chat_final_v1").push({
        n: user.nome, v: user.veiculo, m: input.value, 
        h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
    });
    input.value = "";
}

db.ref("chat_final_v1").limitToLast(20).on("value", snap => {
    const corpo = document.getElementById('chat-lista'); corpo.innerHTML = "";
    snap.forEach(msg => {
        const d = msg.val(); const isMe = d.n === user.nome;
        corpo.innerHTML += `<div class="balao-ws ${isMe?'meu':'outro'}"><b>${d.n}</b><br>${d.m}<span class="hora-ws">${d.h}</span></div>`;
    });
    corpo.scrollTop = corpo.scrollHeight;
});

// Alertas de Trânsito
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas_final_v1").push({ tipo, emoji, n: user.nome, lat: meuLatLng[0], lng: meuLatLng[1] });
}

db.ref("alertas_final_v1").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== meuMarcador) map.removeLayer(l); });
    snap.forEach(al => {
        const d = al.val();
        L.marker([d.lat, d.lng], { icon: L.divIcon({ html: `<div style="font-size:35px;">${d.emoji}</div>`, className:'' }) }).addTo(map).bindPopup(d.tipo);
    });
});

// Funções de Movimento e Luz
function arrastar(id) {
    const el = document.getElementById(id);
    el.ontouchmove = e => {
        const t = e.touches[0];
        el.style.left = (t.clientX - 25) + 'px'; el.style.top = (t.clientY - 25) + 'px';
        el.style.right = 'auto'; el.style.bottom = 'auto';
    };
}
arrastar('btn-luz'); arrastar('btn-chat');

document.getElementById('btn-luz').onclick = () => document.getElementById('map').classList.toggle('map-dark');
function voltarAoCarro() { seguindo = true; document.getElementById('btn-recenter').style.display = 'none'; map.flyTo(meuLatLng, 17); }
map.on('dragstart', () => { seguindo = false; document.getElementById('btn-recenter').style.display = 'block'; });

</script>
</body>
</html>
