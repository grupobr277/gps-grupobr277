<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL FINAL V21</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; --ws-teal: #128c7e; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* PAINEL 10 ICONES FIXOS */
        .painel-alertas { position: absolute; top: 70px; left: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 95px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; background: #1a1a1a; text-shadow: 1px 1px #000; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #333; }

        /* BOTÕES MÓVEIS */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; touch-action: none; background: white; }
        #chat-trigger { width: 65px; height: 65px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 30px; }
        #btn-luz { width: 50px; height: 50px; background: #ffcc00; right: 20px; top: 20px; font-size: 25px; }
        
        /* RECENTRALIZAR */
        #btn-rec { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 4001; background: white; border: 2px solid var(--ws-green); border-radius: 25px; padding: 10px 15px; font-weight: bold; color: var(--ws-green); display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* CHAT ESTILO WHATSAPP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .balao { padding: 10px; border-radius: 12px; max-width: 85%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); font-size: 14px; }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }
        .reply-v { font-size: 11px; background: rgba(0,0,0,0.05); padding: 5px; border-left: 3px solid var(--ws-green); margin-bottom: 5px; }

        /* POPUP CHAT ALERTA */
        .pop-whats { width: 240px; }
        .pop-scroll { max-height: 150px; overflow-y: auto; background: #ece5dd; padding: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; margin: 8px 0; }
        .pop-balao { padding: 6px; border-radius: 8px; font-size: 11px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }
    </style>
</head>
<body>

<div id="map"></div>
<div id="btn-rec" onclick="recentralizar()">🧭 RECENTRALIZAR</div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-luz" class="f-btn">💡</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between; align-items:center;">
        <b>BR-277 WHATSAPP</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:25px;">✕</span>
    </div>
    <div id="mensagens"></div>
    <div id="rep-area" style="display:none; padding:8px; background:#ddd; border-left:4px solid var(--ws-green);">
        <span id="rep-txt" style="font-size:11px;"></span> <span onclick="cancelRep()" style="float:right">✕</span>
    </div>
    <div style="padding:10px; background:#f0f0f0; display:flex; flex-direction:column; gap:5px;">
        <div style="font-size:20px; cursor:pointer;" id="emoji-bar">
            <span onclick="addEmoji('⚠️')">⚠️</span><span onclick="addEmoji('✅')">✅</span><span onclick="addEmoji('🚧')">🚧</span><span onclick="addEmoji('👍')">👍</span>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:20px; border:none;">
            <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:45px; height:45px; border:none;">➤</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);
L.Control.geocoder({ defaultMarkGeocode: true, placeholder: "Destino Curitiba..." }).addTo(map);

let user = { n: "Danilo", id: "u_danilo", c: "#075e54" };
let meuLatLng, meuMarker, follow = true, reply = null;

// RECENTRALIZAR
map.on('dragstart', () => { follow = false; document.getElementById('btn-rec').style.display = 'block'; });
function recentralizar() { follow = true; document.getElementById('btn-rec').style.display = 'none'; map.flyTo(meuLatLng, 17); }

// GPS
navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;">🚗</div>`, className: '', iconSize:[40,40] }) }).addTo(map);
        map.setView(meuLatLng, 16);
    } else { meuMarker.setLatLng(meuLatLng); }
    if(follow) map.panTo(meuLatLng);
});

// BOTÕES MÓVEIS
function mover(id) {
    const el = document.getElementById(id); let sX, sY, last = 0;
    el.addEventListener('touchstart', e => {
        const now = Date.now(); if(id === 'chat-trigger' && now - last < 300) document.getElementById('chat-box').classList.toggle('aberto');
        last = now; sX = e.touches[0].clientX - el.offsetLeft; sY = e.touches[0].clientY - el.offsetTop;
    });
    el.addEventListener('touchmove', e => {
        el.style.left = (e.touches[0].clientX - sX) + 'px'; el.style.top = (e.touches[0].clientY - sY) + 'px';
        el.style.right = 'auto'; el.style.bottom = 'auto';
    });
}
mover('chat-trigger'); mover('btn-luz');
document.getElementById('btn-luz').onclick = () => document.getElementById('map').classList.toggle('map-dark');

// CHAT PRINCIPAL
function addEmoji(e) { document.getElementById('chat-input').value += e; }
function setRep(u, m) { reply = {u, m}; document.getElementById('rep-area').style.display = 'block'; document.getElementById('rep-txt').innerText = u+": "+m; }
function cancelRep() { reply = null; document.getElementById('rep-area').style.display = 'none'; }

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: user.n, uid: user.id, m: i.value, c: user.c, t: Date.now(), r: reply });
    i.value = ""; cancelRep();
}

db.ref("chat").limitToLast(30).on("value", snap => {
    const box = document.getElementById('mensagens'); box.innerHTML = "";
    snap.forEach(s => {
        const d = s.val(); const eu = d.uid === user.id;
        box.innerHTML += `<div class="balao ${eu?'balao-eu':'balao-outro'}" onclick="setRep('${d.u}', '${d.m}')">
            ${d.r ? `<div class="reply-v"><b>${d.r.u}</b>: ${d.r.m}</div>` : ''}
            <b style="color:${d.c}; font-size:11px;">${d.u}</b>
            ${eu ? `<span onclick="db.ref('chat/${s.key}').remove()" style="color:red; float:right; margin-left:10px;">✕</span>` : ''}
            <br>${d.m}
        </div>`;
    });
    box.scrollTop = box.scrollHeight;
});

// ALERTAS COM CHAT FIXO E COLORIDO
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, u: user.n, t: Date.now() });
}

db.ref("alertas").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== meuMarker) map.removeLayer(l); });
    snap.forEach(s => {
        const a = s.val();
        const m = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px; filter:drop-shadow(2px 2px 2px #000)">${a.emoji}</div>`, className:'' }), zIndexOffset: 1000 }).addTo(map);
        m.bindPopup(`
            <div class="pop-whats">
                <b>${a.tipo}</b> <span style="font-size:9px">por ${a.u}</span>
                <div id="pop-${s.key}" class="pop-scroll"></div>
                <div style="display:flex; gap:3px;">
                    <input id="in-${s.key}" style="flex:1; font-size:11px;" placeholder="Responder...">
                    <button onclick="addPopMsg('${s.key}')" style="background:var(--ws-green); color:white; border:none; border-radius:4px;">➤</button>
                </div>
            </div>`);
        m.on('click', () => {
            db.ref(`alertas/${s.key}/msgs`).on('value', ms => {
                const b = document.getElementById(`pop-${s.key}`);
                if(b) { b.innerHTML = ""; ms.forEach(msg => {
                    const eu = msg.val().u === user.n;
                    b.innerHTML += `<div class="pop-balao" style="align-self:${eu?'flex-end':'flex-start'}; background:${eu? 'var(--ws-light)':'white'}">
                        <b style="color:var(--ws-teal)">${msg.val().u}:</b> ${msg.val().m}
                        ${eu ? `<span onclick="db.ref('alertas/${s.key}/msgs/${msg.key}').remove()" style="color:red; cursor:pointer; margin-left:5px">✕</span>` : ''}
                    </div>`;
                }); b.scrollTop = b.scrollHeight; }
            });
        });
    });
});

function addPopMsg(id) {
    const i = document.getElementById("in-"+id); if(!i.value) return;
    db.ref(`alertas/${id}/msgs`).push({ u: user.n, m: i.value }); i.value = "";
}
</script>
</body>
</html>
