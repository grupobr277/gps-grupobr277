<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS INTELIGENTE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        
        /* MODAL DE CADASTRO - VERSÃO SIMPLIFICADA */
        .cadastro-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cadastro-content {
            background: linear-gradient(135deg, #075e54, #128C7E);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 3px solid #ffd700;
        }
        
        .cadastro-content h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .cadastro-content input, .cadastro-content select {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 16px;
            outline: none;
        }
        
        .cadastro-content button {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        
        .cadastro-content button:hover {
            transform: scale(1.02);
        }
        
        .tipo-veiculo {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .tipo-veiculo div {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .tipo-veiculo div.selecionado {
            background: #ffd700;
            color: #075e54;
            border-color: white;
        }
        
        /* LUPA */
        .lupa-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            z-index: 10000;
            background: white;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 3px solid #ffd700;
            display: flex;
            overflow: hidden;
        }
        
        .lupa-container input {
            flex: 1;
            padding: 15px;
            border: none;
            font-size: 15px;
            outline: none;
        }
        
        .lupa-container button {
            background: #075e54;
            color: white;
            border: none;
            width: 55px;
            cursor: pointer;
            font-size: 18px;
        }
        
        /* BOTÕES */
        .f-btn { 
            position: fixed; 
            z-index: 9000; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            border: 2px solid white; 
            cursor: pointer; 
            width: 55px; 
            height: 55px; 
            font-size: 24px; 
        }
        
        #btn-chat { right: 15px; bottom: 120px; background: #075e54; color: white; }
        #btn-mute { right: 15px; bottom: 190px; background: white; }
        #btn-luz { right: 15px; top: 130px; background: #ffcc00; }
        
        #btn-px { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 80px; 
            height: 80px; 
            background: #333; 
            border: 5px solid #ffd700; 
            border-radius: 50%; 
            z-index: 9001; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 35px; 
            color: #ffd700; 
            cursor: pointer;
        }
        
        #btn-px.ativo { 
            background: #e53935; 
            color: white; 
            transform: translateX(-50%) scale(0.95);
        }
        
        .pulse-loc { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            animation: pulse-blue 1.5s infinite; 
            background: rgba(33, 150, 243, 0.3); 
            border: 3px solid #2196f3; 
        }
        
        @keyframes pulse-blue { 
            0% { transform: scale(0.8); opacity: 1; } 
            100% { transform: scale(2); opacity: 0; } 
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- BOTÕES -->
<div id="btn-luz" class="f-btn" onclick="toggleDark()">💡</div>
<div id="btn-mute" class="f-btn" onclick="toggleMute()">🔊</div>
<div id="btn-chat" class="f-btn" onclick="toggleChat()">💬</div>
<div id="btn-px">🎤</div>

<!-- MODAL DE CADASTRO - SIMPLIFICADO -->
<div class="cadastro-modal" id="cadastroModal">
    <div class="cadastro-content">
        <h1>🚛 BR-277</h1>
        <p>Bem-vindo ao GPS Inteligente</p>
        
        <input type="text" id="nomeCadastro" placeholder="Seu nome" value="Motorista">
        
        <div style="margin:15px 0; text-align:left;">
            <div style="margin-bottom:5px;">Tipo de veículo:</div>
            <div class="tipo-veiculo" id="tipoVeiculo">
                <div onclick="selecionarTipo('carro')" id="tipo-carro" class="selecionado">🚗 Carro</div>
                <div onclick="selecionarTipo('caminhao')" id="tipo-caminhao">🚛 Caminhão</div>
                <div onclick="selecionarTipo('moto')" id="tipo-moto">🏍️ Moto</div>
                <div onclick="selecionarTipo('van')" id="tipo-van">🚐 Van</div>
                <div onclick="selecionarTipo('onibus')" id="tipo-onibus">🚌 Ônibus</div>
                <div onclick="selecionarTipo('pickup')" id="tipo-pickup">🛻 Pickup</div>
            </div>
        </div>
        
        <input type="text" id="placaCadastro" placeholder="Placa (opcional)">
        
        <button onclick="salvarCadastro()">COMEÇAR</button>
    </div>
</div>

<!-- LUPA -->
<div class="lupa-container">
    <input type="text" id="buscaDestino" placeholder="Digite seu destino...">
    <button onclick="buscarDestino()"><i class="fas fa-search"></i></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE =====
try {
    const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    console.log("Firebase conectado!");
} catch(e) {
    console.log("Erro Firebase:", e);
}

// ===== VARIÁVEIS GLOBAIS =====
let user = null;
let tipoVeiculo = 'carro';
let meuLatLng = null;
let meuMarker = null;
let follow = true;
let isMuted = false;
let rotaAtual = null;

// ===== INICIALIZAÇÃO =====
document.addEventListener('DOMContentLoaded', function() {
    console.log("Página carregada!");
    
    // Verifica se já tem usuário salvo
    const userSalvo = localStorage.getItem('br277_user');
    const tipoSalvo = localStorage.getItem('br277_veiculo');
    
    if (userSalvo) {
        user = userSalvo;
        if (tipoSalvo) tipoVeiculo = tipoSalvo;
        document.getElementById('cadastroModal').style.display = 'none';
        iniciarGPS();
        iniciarMapa();
    } else {
        document.getElementById('cadastroModal').style.display = 'flex';
    }
});

function selecionarTipo(tipo) {
    tipoVeiculo = tipo;
    
    // Remove seleção anterior
    document.querySelectorAll('.tipo-veiculo div').forEach(el => {
        el.classList.remove('selecionado');
    });
    
    // Adiciona seleção no atual
    document.getElementById(`tipo-${tipo}`).classList.add('selecionado');
}

function salvarCadastro() {
    console.log("Salvando cadastro...");
    
    const nome = document.getElementById('nomeCadastro').value.trim();
    if (!nome) {
        alert('Por favor, digite seu nome!');
        return;
    }
    
    const placa = document.getElementById('placaCadastro').value.trim();
    
    // Salva dados
    user = nome;
    localStorage.setItem('br277_user', nome);
    localStorage.setItem('br277_veiculo', tipoVeiculo);
    if (placa) localStorage.setItem('br277_placa', placa);
    
    console.log("Usuário:", user, "Veículo:", tipoVeiculo);
    
    // Fecha modal
    document.getElementById('cadastroModal').style.display = 'none';
    
    // Inicia mapa e GPS
    iniciarMapa();
    iniciarGPS();
    
    // Registra no Firebase
    try {
        db.ref('usuarios/' + Date.now()).set({
            nome: nome,
            veiculo: tipoVeiculo,
            placa: placa || '',
            data: new Date().toISOString()
        });
    } catch(e) {
        console.log("Erro ao salvar no Firebase:", e);
    }
}

function iniciarMapa() {
    console.log("Iniciando mapa...");
    
    // Cria mapa
    window.map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);
    
    // Evento para botão de recentralizar
    map.on('dragstart', () => { 
        follow = false; 
        const btn = document.getElementById('btn-rec');
        if (!btn) {
            const novoBtn = document.createElement('div');
            novoBtn.id = 'btn-rec';
            novoBtn.innerHTML = '📍 MINHA LOCALIZAÇÃO';
            novoBtn.style.cssText = 'position:fixed; bottom:120px; left:50%; transform:translateX(-50%); z-index:9000; background:white; border:2px solid #075e54; border-radius:30px; padding:8px 20px; cursor:pointer;';
            novoBtn.onclick = recentralizar;
            document.body.appendChild(novoBtn);
        } else {
            btn.style.display = 'block';
        }
    });
}

function iniciarGPS() {
    console.log("Iniciando GPS...");
    
    if (!navigator.geolocation) {
        alert("Seu navegador não suporta GPS!");
        return;
    }
    
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        
        if(!meuMarker) {
            // Ícone baseado no tipo de veículo
            const icones = {
                carro: '🚗',
                caminhao: '🚛',
                moto: '🏍️',
                van: '🚐',
                onibus: '🚌',
                pickup: '🛻'
            };
            
            meuMarker = L.marker(meuLatLng, { 
                icon: L.divIcon({ 
                    html: `<div class="pulse-loc"></div><div style="font-size:35px; margin-top:-15px;">${icones[tipoVeiculo] || '🚗'}</div>`, 
                    iconSize:[1,1]
                }) 
            }).addTo(map);
            
            map.setView(meuLatLng, 17);
        } else { 
            meuMarker.setLatLng(meuLatLng); 
        }
        
        if(follow) map.panTo(meuLatLng);
        
    }, error => {
        console.log("Erro GPS:", error);
    }, { 
        enableHighAccuracy: true,
        timeout: 10000
    });
}

// ===== LUPA =====
function buscarDestino() {
    const destino = document.getElementById('buscaDestino').value;
    if (!destino || destino.length < 3) {
        alert('Digite um destino válido');
        return;
    }
    
    if (!meuLatLng) {
        alert('Aguardando localização GPS...');
        return;
    }
    
    // Busca local
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)}, Brasil&limit=5`)
        .then(response => response.json())
        .then(data => {
            if (data.length === 0) {
                alert('Local não encontrado');
                return;
            }
            
            const lugar = data[0];
            const destinoLatLng = L.latLng(parseFloat(lugar.lat), parseFloat(lugar.lon));
            
            // Remove rota anterior
            if (rotaAtual) map.removeControl(rotaAtual);
            
            // Cria nova rota
            rotaAtual = L.Routing.control({
                waypoints: [meuLatLng, destinoLatLng],
                lineOptions: { styles: [{ color: '#2196F3', weight: 6 }] },
                createMarker: () => null,
                show: false,
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1'
                })
            }).addTo(map);
            
            // Zoom na rota
            map.flyToBounds(L.latLngBounds([meuLatLng, destinoLatLng]), { padding: [50, 50] });
        })
        .catch(error => {
            console.log("Erro na busca:", error);
            alert('Erro ao buscar local');
        });
}

// ===== RÁDIO PX =====
let mediaRecorder;
let chunks = [];
const pxBtn = document.getElementById('btn-px');

pxBtn.addEventListener('mousedown', iniciarGravacao);
pxBtn.addEventListener('mouseup', pararGravacao);
pxBtn.addEventListener('mouseleave', pararGravacao);
pxBtn.addEventListener('touchstart', (e) => { e.preventDefault(); iniciarGravacao(); });
pxBtn.addEventListener('touchend', (e) => { e.preventDefault(); pararGravacao(); });

async function iniciarGravacao() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
            if(e.data.size > 0) chunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            if(chunks.length > 0) {
                const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    try {
                        db.ref("radio").push({ 
                            audio: reader.result, 
                            user: user, 
                            time: Date.now() 
                        });
                    } catch(e) {
                        console.log("Erro ao enviar áudio:", e);
                    }
                };
                reader.readAsDataURL(audioBlob);
            }
            chunks = [];
            stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        pxBtn.classList.add('ativo');
    } catch(e) {
        alert("Permita acesso ao microfone!");
    }
}

function pararGravacao() {
    if(mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        pxBtn.classList.remove('ativo');
    }
}

// Recebe áudio
try {
    db.ref("radio").limitToLast(1).on("child_added", snap => {
        const d = snap.val();
        if(d && d.user !== user && !isMuted && (Date.now() - d.time < 5000)) {
            new Audio(d.audio).play().catch(() => {});
        }
    });
} catch(e) {
    console.log("Erro ao ouvir rádio:", e);
}

// ===== FUNÇÕES =====
function toggleDark() { 
    document.getElementById('map').classList.toggle('map-dark'); 
}

function toggleMute() { 
    isMuted = !isMuted; 
    document.getElementById('btn-mute').innerHTML = isMuted ? "🔇" : "🔊";
}

function toggleChat() { 
    alert('Chat em desenvolvimento');
}

function recentralizar() { 
    follow = true; 
    document.getElementById('btn-rec').style.display = 'none'; 
    if(meuLatLng) map.flyTo(meuLatLng, 17);
}

// Enter na busca
document.getElementById('buscaDestino').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') buscarDestino();
});
</script>
</body>
</html>
