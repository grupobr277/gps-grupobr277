        /* BOTÕES FLUTUANTES */

<div class="waze-credit">🚗 Dados de trânsito: Waze [citation:1]</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster-src.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== CONFIGURAÇÃO FIREBASE =====
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== VARIÁVEIS GLOBAIS =====
let user = "Motorista_" + Math.floor(Math.random()*999);
let meuLatLng = null;
let meuMarker = null;
let follow = true;
let rotaControle = null;
let isMuted = false;
let alertaAtual = null;
const RAIO_MAXIMO = 300; // 300km

// ===== CONFIGURAÇÃO DO MAPA =====
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 12);

// Camada do Google com trânsito
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

// Cluster para agrupar alertas próximos
const alertasCluster = L.markerClusterGroup({
    maxClusterRadius: 60,
    iconCreateFunction: function(cluster) {
        const count = cluster.getChildCount();
        let cor = count > 10 ? '#e53935' : count > 5 ? '#ff9800' : '#075e54';
        return L.divIcon({
            html: `<div style="background:${cor}; color:white; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; border:3px solid white; font-weight:bold;">${count}</div>`,
            className: '',
            iconSize: [40, 40]
        });
    }
});
map.addLayer(alertasCluster);

// ===== GPS DO USUÁRIO =====
navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { 
            icon: L.divIcon({ 
                html: `<div class="pulse-loc"></div><div style="font-size:28px; margin-top:-8px;">🚚</div>`, 
                iconSize:[35,35] 
            }) 
        }).addTo(map);
        map.setView(meuLatLng, 12);
        
        // Inicia buscas após ter localização
        buscarAlertasWaze();
        setInterval(buscarAlertasWaze, 120000); // A cada 2 minutos (igual Waze [citation:1])
    } else { 
        meuMarker.setLatLng(meuLatLng); 
    }
    
    if(follow) map.panTo(meuLatLng);
    
}, null, { enableHighAccuracy: true });

// ===== INTEGRAÇÃO COM FEED DO WAZE =====
// NOTA: Para usar o feed oficial, você precisa ser parceiro Waze [citation:1]
// Este é um proxy público para demonstração - em produção, use seu próprio feed
const WAZE_PROXY_URL = 'https://waze-data-proxy.vercel.app/api/incidents?bottom=-26.5&left=-50.5&top=-24.5&right=-48.5';

async function buscarAlertasWaze() {
    if (!meuLatLng) return;
    
    try {
        // Simulação de dados Waze (já que precisa de parceria oficial)
        // Em produção, substitua pela URL do seu feed oficial [citation:1]
        const alertasSimulados = gerarAlertasSimulados();
        processarAlertasWaze(alertasSimulados);
        
        /* Código para quando tiver o feed oficial:
        const response = await fetch(WAZE_PROXY_URL);
        const data = await response.json();
        processarAlertasWaze(data.incidents);
        */
        
    } catch (error) {
        console.log('Erro ao buscar Waze:', error);
    }
}

function gerarAlertasSimulados() {
    // Simula alertas nos principais pontos da BR-277
    const alertas = [];
    const tipos = ['ACCIDENT', 'HAZARD', 'JAM', 'ROAD_CLOSED'];
    const subtipos = {
        'ACCIDENT': ['ACCIDENT_MINOR', 'ACCIDENT_MAJOR'],
        'HAZARD': ['HAZARD_ON_ROAD_OBJECT', 'HAZARD_ON_ROAD_CONSTRUCTION', 'HAZARD_ON_SHOULDER_CAR_STOPPED'],
        'JAM': ['JAM_HEAVY_TRAFFIC', 'JAM_STAND_STILL_TRAFFIC'],
        'ROAD_CLOSED': ['ROAD_CLOSED_CONSTRUCTION']
    };
    
    // Pontos críticos da BR-277 [citação sua]
    const pontosCriticos = [
        { lat: -25.4284, lng: -49.2733, nome: 'BR-277 km 120' }, // Curitiba
        { lat: -25.4384, lng: -49.2833, nome: 'BR-277 km 125' },
        { lat: -25.4184, lng: -49.2633, nome: 'BR-277 km 115' },
        { lat: -25.4484, lng: -49.2933, nome: 'BR-277 km 130' },
        { lat: -25.4084, lng: -49.2533, nome: 'BR-277 km 110' },
        { lat: -25.4584, lng: -49.3033, nome: 'BR-277 km 135' },
        { lat: -25.3984, lng: -49.2433, nome: 'BR-277 km 105' },
        { lat: -25.3884, lng: -49.2333, nome: 'BR-277 km 100' }
    ];
    
    pontosCriticos.forEach((ponto, index) => {
        if (Math.random() > 0.5) { // 50% de chance de ter alerta
            const tipo = tipos[Math.floor(Math.random() * tipos.length)];
            const subtipo = subtipos[tipo][Math.floor(Math.random() * subtipos[tipo].length)];
            
            alertas.push({
                id: `waze_${Date.now()}_${index}`,
                type: tipo,
                subtype: subtipo,
                description: `${subtipo.replace(/_/g, ' ')} em ${ponto.nome}`,
                street: ponto.nome,
                location: { lat: ponto.lat, lng: ponto.lng },
                reliability: Math.floor(Math.random() * 5) + 5, // 5-10
                confidence: Math.floor(Math.random() * 5) + 5,
                starttime: new Date().toISOString()
            });
        }
    });
    
    return alertas;
}

function processarAlertasWaze(alertas) {
    if (!meuLatLng) return;
    
    // Limpa alertas antigos
    alertasCluster.clearLayers();
    document.getElementById('alertasLista').innerHTML = '';
    
    // Filtra por raio de 300km
    const alertasProximos = alertas.filter(alerta => {
        if (!alerta.location) return false;
        const distancia = calcularDistancia(
            meuLatLng.lat, meuLatLng.lng,
            alerta.location.lat, alerta.location.lng
        );
        return distancia <= RAIO_MAXIMO;
    });
    
    // Ordena por distância
    alertasProximos.sort((a, b) => {
        const distA = calcularDistancia(meuLatLng.lat, meuLatLng.lng, a.location.lat, a.location.lng);
        const distB = calcularDistancia(meuLatLng.lat, meuLatLng.lng, b.location.lat, b.location.lng);
        return distA - distB;
    });
    
    // Adiciona ao mapa e painel
    alertasProximos.forEach(alerta => {
        adicionarAlertaWazeMapa(alerta);
        adicionarAlertaPainel(alerta);
    });
}

function adicionarAlertaWazeMapa(alerta) {
    const icones = {
        'ACCIDENT': '💥',
        'HAZARD': '⚠️',
        'JAM': '🚦',
        'ROAD_CLOSED': '🚧'
    };
    
    const cores = {
        'ACCIDENT': '#e53935',
        'HAZARD': '#ff9800',
        'JAM': '#f44336',
        'ROAD_CLOSED': '#000000'
    };
    
    const marker = L.marker([alerta.location.lat, alerta.location.lng], {
        icon: L.divIcon({
            html: `<div style="background:${cores[alerta.type]}; color:white; padding:5px 10px; border-radius:20px; border:2px solid white; font-size:12px; white-space:nowrap; box-shadow:0 2px 5px rgba(0,0,0,0.3);">
                ${icones[alerta.type] || '⚠️'} ${alerta.type} ${alerta.reliability ? '🔹'+alerta.reliability : ''}
            </div>`,
            className: '',
            iconSize: [100, 30]
        })
    });
    
    marker.on('click', () => {
        abrirChatAlerta({
            id: alerta.id,
            tipo: alerta.type,
            desc: alerta.description || alerta.type,
            local: alerta.street
        });
    });
    
    alertasCluster.addLayer(marker);
}

function adicionarAlertaPainel(alerta) {
    const distancia = calcularDistancia(
        meuLatLng.lat, meuLatLng.lng,
        alerta.location.lat, alerta.location.lng
    );
    
    const div = document.createElement('div');
    div.className = `alerta-item alerta-${alerta.type}`;
    
    const iconeTipo = {
        'ACCIDENT': 'car-crash',
        'HAZARD': 'exclamation-triangle',
        'JAM': 'traffic-light',
        'ROAD_CLOSED': 'ban'
    };
    
    div.innerHTML = `
        <div class="icone"><i class="fas fa-${iconeTipo[alerta.type] || 'exclamation'}"></i></div>
        <div class="info">
            <div class="titulo">${alerta.type} - ${alerta.subtype ? alerta.subtype.replace(/_/g, ' ') : ''}</div>
            <div class="desc">${alerta.description || alerta.street}</div>
            <div class="distancia">📍 ${distancia} km</div>
            <div><span class="confiabilidade">🔹 Conf: ${alerta.reliability || '?'}/10</span></div>
        </div>
    `;
    
    div.onclick = () => {
        map.flyTo([alerta.location.lat, alerta.location.lng], 14);
        abrirChatAlerta({
            id: alerta.id,
            tipo: alerta.type,
            desc: alerta.description || alerta.type
        });
    };
    
    document.getElementById('alertasLista').appendChild(div);
}

// ===== FUNÇÃO PARA CALCULAR DISTÂNCIA =====
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return (R * c).toFixed(1);
}

// ===== CHAT DO ALERTA =====
function abrirChatAlerta(alerta) {
    alertaAtual = alerta;
    document.getElementById('chatAlertaTitulo').innerHTML = `${alerta.tipo} - ${alerta.desc.substring(0, 30)}...`;
    document.getElementById('chatAlerta').style.display = 'flex';
    
    // Carrega mensagens do Firebase
    const chatId = `alerta_${alerta.id}`;
    db.ref(`chats/${chatId}/mensagens`).limitToLast(20).on('child_added', snap => {
        const msg = snap.val();
        const div = document.createElement('div');
        div.style.margin = '5px 0';
        div.style.padding = '5px 10px';
        div.style.background = msg.user === user ? '#dcf8c6' : 'white';
        div.style.borderRadius = '10px';
        div.style.alignSelf = msg.user === user ? 'flex-end' : 'flex-start';
        div.style.maxWidth = '80%';
        div.innerHTML = `<small><b>${msg.user}</b></small><br>${msg.text}<br><small style="font-size:9px">${msg.time}</small>`;
        document.getElementById('chatAlertaMsgs').appendChild(div);
        document.getElementById('chatAlertaMsgs').scrollTop = document.getElementById('chatAlertaMsgs').scrollHeight;
    });
}

function enviarMsgAlerta() {
    const input = document.getElementById('chatAlertaInput');
    if(!input.value.trim() || !alertaAtual) return;
    
    const chatId = `alerta_${alertaAtual.id}`;
    db.ref(`chats/${chatId}/mensagens`).push({
        user: user,
        text: input.value,
        time: new Date().toLocaleTimeString()
    });
    
    input.value = "";
}

function fecharChatAlerta() {
    document.getElementById('chatAlerta').style.display = 'none';
    document.getElementById('chatAlertaMsgs').innerHTML = '';
}

// ===== RÁDIO PX =====
let mediaRecorder;
let chunks = [];
const pxBtn = document.getElementById('btn-px');

pxBtn.addEventListener('mousedown', iniciarGravacao);
pxBtn.addEventListener('mouseup', pararGravacao);
pxBtn.addEventListener('mouseleave', pararGravacao);
pxBtn.addEventListener('touchstart', (e) => { e.preventDefault(); iniciarGravacao(); });
pxBtn.addEventListener('touchend', (e) => { e.preventDefault(); pararGravacao(); });

async function iniciarGravacao() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
            if(e.data.size > 0) chunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            if(chunks.length > 0) {
                const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    db.ref("radio").set({ 
                        audio: reader.result, 
                        user: user, 
                        time: Date.now() 
                    });
                };
                reader.readAsDataURL(audioBlob);
            }
            chunks = [];
        };
        
        mediaRecorder.start();
        pxBtn.classList.add('ativo');
    } catch(e) {
        alert("Permita acesso ao microfone!");
    }
}

function pararGravacao() {
    if(mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        pxBtn.classList.remove('ativo');
    }
}

// Receber áudio
db.ref("radio").on("value", snap => {
    const d = snap.val();
    if(d && d.user !== user && !isMuted && (Date.now() - d.time < 5000)) {
        new Audio(d.audio).play().catch(() => {});
    }
});

// ===== ROTA =====
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    if(!destino || !meuLatLng) return;
    
    L.Control.Geocoder.nominatim().geocode(destino, (results) => {
        if(results && results.length > 0) {
            const dest = results[0].center;
            
            if(rotaControle) map.removeControl(rotaControle);
            
            rotaControle = L.Routing.control({
                waypoints: [meuLatLng, dest],
                lineOptions: { styles: [{ color: '#007aff', weight: 6 }] },
                createMarker: () => null,
                show: false
            }).addTo(map);
        } else {
            alert("Local não encontrado!");
        }
    });
}

// ===== FUNÇÕES BÁSICAS =====
function toggleDark() { 
    document.getElementById('map').classList.toggle('map-dark'); 
}

function toggleMute() { 
    isMuted = !isMuted; 
    document.getElementById('btn-mute').innerHTML = isMuted ? "🔇" : "🔊";
}

function toggleChat() { 
    const c = document.getElementById('chat-global');
    c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
}

function enviarMsg() {
    const input = document.getElementById('msg-input');
    if(!input.value.trim()) return;
    
    const div = document.createElement('div');
    div.style.background = '#dcf8c6';
    div.style.padding = '10px';
    div.style.borderRadius = '10px';
    div.style.margin = '5px 0';
    div.style.alignSelf = 'flex-end';
    div.style.maxWidth = '80%';
    div.innerHTML = `<b>${user}</b><br>${input.value}<br><small>${new Date().toLocaleTimeString()}</small>`;
    document.getElementById('chat-msgs').appendChild(div);
    input.value = "";
}

function recentralizar() { 
    follow = true; 
    document.getElementById('btn-rec').style.display = 'none'; 
    if(meuLatLng) map.flyTo(meuLatLng, 12);
}

map.on('dragstart', () => { 
    follow = false; 
    document.getElementById('btn-rec').style.display = 'block'; 
});

function minimizarAlertas() {
    const lista = document.getElementById('alertasLista');
    const seta = document.getElementById('setaAlertas');
    if (lista.style.display === 'none') {
        lista.style.display = 'flex';
        seta.style.transform = 'rotate(0deg)';
    } else {
        lista.style.display = 'none';
        seta.style.transform = 'rotate(180deg)';
    }
}
</script>
