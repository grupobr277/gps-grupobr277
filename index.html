<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS BR277</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.menu{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:1000;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.menu button{
display:block;
width:180px;
margin:5px 0;
padding:8px;
cursor:pointer;
}

.car{
width:40px;
height:40px;
transform-origin:center;
}

</style>

</head>

<body>

<div class="menu">

<b>GPS BR-277</b>

<button onclick="registrar('🚨 Acidente')">🚨 Acidente</button>
<button onclick="registrar('🚧 Obra')">🚧 Obra</button>
<button onclick="registrar('🚓 Polícia')">🚓 Polícia</button>
<button onclick="registrar('🐄 Animal')">🐄 Animal</button>

</div>

<div id="map"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCjJLUgRZowkeTmpua6-uXhzOM5hqn6chI",
authDomain: "gps-br277.firebaseapp.com",
databaseURL: "https://gps-br277-default-rtdb.firebaseio.com",
projectId: "gps-br277",
storageBucket: "gps-br277.firebasestorage.app",
messagingSenderId: "459366791706",
appId: "1:459366791706:web:a8771a8981acf5d3c8afa3"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var usuariosRef = db.ref("usuarios");
var ocorrenciasRef = db.ref("ocorrencias");

var map = L.map('map').setView([-25.42,-49.27],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var minhaPosicao;
var meuMarcador;

var marcadores={};
var ocorrencias=[];

var userId = localStorage.getItem("userId");

if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("userId",userId);
}

function criarIcone(angulo){

return L.divIcon({

className:'',
html:'<img class="car" style="transform:rotate('+angulo+'deg)" src="https://cdn-icons-png.flaticon.com/512/744/744465.png">',
iconSize:[40,40],
iconAnchor:[20,20]

});

}

var ultimoLat;
var ultimoLng;

navigator.geolocation.watchPosition(function(pos){

var lat = pos.coords.latitude;
var lng = pos.coords.longitude;

minhaPosicao=[lat,lng];

var angulo=0;

if(ultimoLat){

var dy=lat-ultimoLat;
var dx=lng-ultimoLng;

angulo=Math.atan2(dy,dx)*180/Math.PI;

}

ultimoLat=lat;
ultimoLng=lng;

usuariosRef.child(userId).set({

lat:lat,
lng:lng,
angulo:angulo,
tempo:Date.now()

});

if(!meuMarcador){

meuMarcador=L.marker([lat,lng],{
icon:criarIcone(angulo)
}).addTo(map);

map.setView([lat,lng],15);

}else{

meuMarcador.setLatLng([lat,lng]);
meuMarcador.setIcon(criarIcone(angulo));

}

verificarAlertas();

});

usuariosRef.on("value",function(snapshot){

var dados=snapshot.val();

for(var id in dados){

if(id===userId) continue;

var u=dados[id];

if(!marcadores[id]){

marcadores[id]=L.marker([u.lat,u.lng],{
icon:criarIcone(u.angulo)
}).addTo(map);

}else{

marcadores[id].setLatLng([u.lat,u.lng]);
marcadores[id].setIcon(criarIcone(u.angulo));

}

}

});

function registrar(tipo){

if(!minhaPosicao){
alert("Aguardando GPS");
return;
}

ocorrenciasRef.push({

tipo:tipo,
lat:minhaPosicao[0],
lng:minhaPosicao[1],
data:Date.now()

});

}

ocorrenciasRef.on("child_added",function(snapshot){

var d=snapshot.val();

ocorrencias.push(d);

L.marker([d.lat,d.lng]).addTo(map)
.bindPopup(d.tipo);

});

function distancia(lat1,lon1,lat2,lon2){

var R=6371;

var dLat=(lat2-lat1)*Math.PI/180;
var dLon=(lon2-lon1)*Math.PI/180;

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function verificarAlertas(){

if(!minhaPosicao) return;

for(var i=0;i<ocorrencias.length;i++){

var o=ocorrencias[i];

var d=distancia(
minhaPosicao[0],
minhaPosicao[1],
o.lat,
o.lng
);

if(d<0.5){

alert("⚠️ Atenção: "+o.tipo+" próximo!");

}

}

}

</script>

</body>
</html>
