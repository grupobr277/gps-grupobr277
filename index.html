<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS COMUNIDADE PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #007bff; --dark: #2c3e50; }
        
        /* Garantia de que a tela não ficará branca */
        html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #eee; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100%; width: 100%; z-index: 1; }

        /* Ícone Pulsante (Você) */
        .meu-gps {
            width: 20px; height: 20px; background: var(--blue);
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,123,255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,123,255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,123,255, 0); }
        }

        /* Menu de Alertas */
        .menu-alertas {
            position: absolute; top: 70px; left: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .btn-alerta {
            background: white; border: none; padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 75px; cursor: pointer;
            text-align: center; font-size: 10px; font-weight: bold;
        }

        /* Chat Lateral Dinâmico */
        #chat-lateral {
            position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; 
            height: 100dvh; background: white; z-index: 2000; transition: 0.4s;
            display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.2);
        }
        #chat-lateral.aberto { right: 0; }
        .chat-header { padding: 15px; background: var(--dark); color: white; font-weight: bold; display: flex; justify-content: space-between; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .balao-ia { background: #e7f3ff; border-left: 4px solid var(--blue); padding: 10px; border-radius: 8px; font-size: 13px; }
        .balao-user { background: #eee; padding: 10px; border-radius: 8px; font-size: 13px; align-self: flex-end; }
        .entrada-chat { padding: 10px; border-top: 1px solid #ddd; display: flex; background: white; padding-bottom: env(safe-area-inset-bottom); }
        .entrada-chat input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }

        /* Ajustes de Rota e Busca */
        .leaflet-control-geocoder { margin-top: 10px !important; border-radius: 20px !important; }
        .leaflet-routing-container { max-height: 150px; overflow-y: auto; font-size: 12px; }
    </style>
</head>
<body>

<div id="map"></div>

<button onclick="toggleChat()" style="position:fixed; bottom:25px; right:20px; z-index:1001; width:60px; height:60px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:25px; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4)">💬</button>

<div class="menu-alertas">
    <button class="btn-alerta" onclick="registrar('Acidente', '⚠️')">⚠️<br>ACIDENTE</button>
    <button class="btn-alerta" onclick="registrar('Obras', '🚧')">🚧<br>OBRAS</button>
    <button class="btn-alerta" onclick="registrar('Pane', '🚛')">🚛<br>PANE</button>
    <button class="btn-alerta" onclick="registrar('Bloqueio', '🚫')">🚫<br>BLOQUEIO</button>
</div>

<div id="chat-lateral">
    <div class="chat-header"><span>ASSISTENTE BR-277</span><span onclick="toggleChat()" style="cursor:pointer">FECHAR</span></div>
    <div id="mensagens"></div>
    <div class="entrada-chat">
        <input type="text" id="input-chat" placeholder="Pergunte sobre a pista...">
        <button onclick="enviarChat()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:8px; cursor:pointer">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURAÇÃO FIREBASE ---
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- MAPA ---
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const iconeCarro = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
    iconSize: [28, 28], iconAnchor: [14, 14]
});

let meuLatLng, meuMarker, routingControl, listaAlertas = [];
let motoristasAtivos = {}, meuID = "Drive_" + Math.random().toString(36).substr(2, 5).toUpperCase();

// --- BUSCA E ROTAS ALTERNATIVAS ---
const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Para onde vamos?"
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
        waypoints: [meuLatLng, dest],
        router: L.Routing.osrmv1({
            serviceUrl: 'https://router.project-osrm.org/route/v1',
            alternatives: true // ATIVA ROTAS ALTERNATIVAS
        }),
        lineOptions: {
            styles: [
                {color: '#007bff', opacity: 0.8, weight: 8}, // Principal
                {color: '#6c757d', opacity: 0.5, weight: 6}  // Alternativa
            ]
        },
        showAlternatives: true,
        createMarker: () => null
    }).addTo(map);

    map.flyTo(dest, 14);
}).addTo(map);

// --- GPS EM TEMPO REAL ---
function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
            map.setView(meuLatLng, 15);
        } else {
            meuMarker.setLatLng(meuLatLng);
        }
        // Envia posição para o Firebase
        db.ref("usuarios/" + meuID).set({ lat: meuLatLng.lat, lon: meuLatLng.lng, time: Date.now() });
        db.ref("usuarios/" + meuID).onDisconnect().remove();
    }, null, { enableHighAccuracy: true });
}

// Visualizar outros motoristas andando
db.ref("usuarios").on("value", snap => {
    const usuarios = snap.val() || {};
    for (let id in usuarios) {
        if (id === meuID) continue;
        const u = usuarios[id];
        if (motoristasAtivos[id]) {
            motoristasAtivos[id].setLatLng([u.lat, u.lon]);
        } else {
            motoristasAtivos[id] = L.marker([u.lat, u.lon], { icon: iconeCarro }).addTo(map);
        }
    }
});

// --- ALERTAS ---
function registrar(tipo, emoji) {
    if (!meuLatLng) return;
    db.ref("ocorrencias").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, hora: Date.now() });
}

db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    listaAlertas.push(o);
    const iconHTML = `<div style="text-align:center"><span style="font-size:26px">${o.emoji}</span><br><b style="background:white;padding:2px 4px;font-size:10px;border:1px solid #000;border-radius:4px">${o.tipo.toUpperCase()}</b></div>`;
    L.marker([o.lat, o.lng], { icon: L.divIcon({ html: iconHTML, iconSize: [60, 50], className: '' }) }).addTo(map);
});

// --- CHAT COM IA E VOZ ---
function toggleChat() { 
    document.getElementById('chat-lateral').classList.toggle('aberto'); 
}

function enviarChat() {
    const input = document.getElementById('input-chat');
    const msg = input.value.trim();
    if (!msg) return;

    addBalao(msg, 'balao-user');
    input.value = "";

    setTimeout(() => {
        let resp = "Monitorando a pista. ";
        if (listaAlertas.length > 0) {
            const resumo = listaAlertas.map(a => a.tipo).join(", ");
            resp += `Fique alerta: temos registros de ${resumo}.`;
        } else {
            resp += "A BR-277 está com fluxo normal em nosso sistema.";
        }
        addBalao(resp, 'balao-ia');
        
        const falar = new SpeechSynthesisUtterance(resp);
        falar.lang = 'pt-BR';
        window.speechSynthesis.speak(falar);
    }, 800);
}

function addBalao(texto, classe) {
    const box = document.getElementById('mensagens');
    const div = document.createElement('div');
    div.className = classe; div.innerHTML = texto;
    box.appendChild(div); box.scrollTop = box.scrollHeight;
}

iniciarGPS();
</script>
</body>
</html>
