<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | TRÂNSITO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        
        /* PAINEL DE ALERTAS */
        .alertas-panel {
            position: fixed;
            top: 70px;
            left: 8px;
            width: 45px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 9000;
            border: 2px solid #075e54;
            overflow: hidden;
        }
        
        .alertas-header {
            background: #075e54;
            color: white;
            padding: 8px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .alertas-lista {
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .alerta-icone {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .alerta-icone:hover {
            transform: scale(1.1);
        }
        
        .acidente { background: #e53935; }
        .obras { background: #ff9800; }
        .pane { background: #795548; }
        .animal { background: #9c27b0; }
        .radar { background: #607d8b; }
        .barreira { background: #8b4513; }
        .neblina { background: #00acc1; }
        .congestionamento { background: #f44336; }
        .alagamento { background: #2196f3; }
        .desvio { background: #4caf50; }
        
        /* BOTÕES */
        .btn-flutuante {
            position: fixed;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            border: 2px solid #075e54;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9000;
            font-size: 20px;
            color: #075e54;
        }
        
        #btn-chat {
            right: 15px;
            bottom: 120px;
            background: #075e54;
            color: white;
        }
        
        #btn-luz {
            right: 15px;
            top: 130px;
            background: #ffcc00;
            color: #333;
        }
        
        #btn-px { 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 70px; 
            height: 70px; 
            background: #333; 
            border: 4px solid #ffd700; 
            color: #ffd700; 
            font-size: 30px;
            position: fixed;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9001;
        }
        
        #btn-px.ativo { 
            background: #e53935; 
            color: white; 
        }
        
        /* LUPA */
        .lupa-container {
            position: fixed;
            top: 15px;
            left: 60px;
            right: 60px;
            max-width: 300px;
            margin: 0 auto;
            z-index: 10000;
            background: white;
            border-radius: 40px;
            border: 3px solid #ffd700;
            display: flex;
            overflow: hidden;
        }
        
        .lupa-container input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            font-size: 14px;
            outline: none;
        }
        
        .lupa-container button {
            background: #075e54;
            color: white;
            border: none;
            width: 45px;
            cursor: pointer;
        }
        
        /* BOTÃO RECENTRALIZAR */
        .btn-recentrar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 2px solid #075e54;
            border-radius: 40px;
            padding: 8px 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 9000;
            display: none;
            font-weight: bold;
            color: #075e54;
        }
        
        .mapa-noturno {
            filter: invert(100%) hue-rotate(180deg) brightness(95%);
        }
        
        .pulse-loc { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
            background: rgba(33, 150, 243, 0.3); 
            border: 3px solid #2196f3; 
        }
        
        @keyframes pulse { 
            0% { transform: scale(0.8); opacity: 1; } 
            100% { transform: scale(2); opacity: 0; } 
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- PAINEL DE ALERTAS -->
<div class="alertas-panel">
    <div class="alertas-header">🚨</div>
    <div class="alertas-lista" id="alertasLista"></div>
</div>

<!-- LUPA -->
<div class="lupa-container">
    <input type="text" id="buscaDestino" placeholder="Digite seu destino...">
    <button onclick="buscarRota()"><i class="fas fa-search"></i></button>
</div>

<!-- BOTÃO RECENTRALIZAR -->
<div class="btn-recentrar" id="btnRecenter" onclick="recentralizar()">
    <i class="fas fa-location-arrow"></i> RECENTRALIZAR
</div>

<!-- BOTÕES -->
<div class="btn-flutuante" id="btn-chat" onclick="toggleChat()">
    <i class="fas fa-comment"></i>
</div>

<div class="btn-flutuante" id="btn-luz" onclick="toggleModoNoturno()">
    💡
</div>

<div id="btn-px">🎤</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE =====
try {
    firebase.initializeApp({
        databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
    });
    console.log("✅ Firebase OK");
} catch(e) {
    console.log("❌ Firebase erro:", e);
}
const db = firebase.database();

// ===== VARIÁVEIS =====
let usuario = "Motorista_" + Math.floor(Math.random() * 1000);
let minhaLocalizacao = null;
let meuMarcador = null;
let seguirLocalizacao = true;
let rotaAtual = null;
let modoNoturno = false;
let mapa = null;

// ===== 10 ALERTAS =====
const alertas = [
    { id: 1, tipo: 'acidente', icone: '💥' },
    { id: 2, tipo: 'obras', icone: '🚧' },
    { id: 3, tipo: 'pane', icone: '🔧' },
    { id: 4, tipo: 'animal', icone: '🐂' },
    { id: 5, tipo: 'radar', icone: '📷' },
    { id: 6, tipo: 'barreira', icone: '⛰️' },
    { id: 7, tipo: 'neblina', icone: '🌫️' },
    { id: 8, tipo: 'congestionamento', icone: '⚫' },
    { id: 9, tipo: 'alagamento', icone: '💧' },
    { id: 10, tipo: 'desvio', icone: '↩️' }
];

// ===== INICIALIZAÇÃO =====
document.addEventListener('DOMContentLoaded', function() {
    console.log("Iniciando app...");
    criarBotoesAlertas();
    iniciarMapa();
    iniciarGPS();
});

function criarBotoesAlertas() {
    const lista = document.getElementById('alertasLista');
    lista.innerHTML = '';
    
    alertas.forEach(alerta => {
        const div = document.createElement('div');
        div.className = `alerta-icone ${alerta.tipo}`;
        div.innerHTML = alerta.icone;
        div.onclick = () => ativarAlerta(alerta);
        lista.appendChild(div);
    });
}

function ativarAlerta(alerta) {
    if (!minhaLocalizacao) {
        alert('Aguardando localização GPS...');
        return;
    }
    
    alert(`✅ Alerta ${alerta.tipo} ativado na sua localização!`);
    
    // Cria marcador no mapa
    L.marker(minhaLocalizacao, {
        icon: L.divIcon({
            html: `<div style="background:${getCorAlerta(alerta.tipo)}; color:white; padding:5px 10px; border-radius:20px; border:2px solid white;">${alerta.icone}</div>`,
            className: '',
            iconSize: [50, 30]
        })
    }).addTo(mapa);
}

function getCorAlerta(tipo) {
    const cores = {
        acidente: '#e53935', obras: '#ff9800', pane: '#795548',
        animal: '#9c27b0', radar: '#607d8b', barreira: '#8b4513',
        neblina: '#00acc1', congestionamento: '#f44336',
        alagamento: '#2196f3', desvio: '#4caf50'
    };
    return cores[tipo] || '#075e54';
}

// ===== MAPA =====
function iniciarMapa() {
    mapa = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
        maxZoom: 20
    }).addTo(mapa);
    
    mapa.on('dragstart', () => {
        seguirLocalizacao = false;
        document.getElementById('btnRecenter').style.display = 'block';
    });
}

// ===== GPS =====
function iniciarGPS() {
    if (!navigator.geolocation) {
        alert("GPS não suportado!");
        return;
    }
    
    navigator.geolocation.watchPosition(pos => {
        minhaLocalizacao = L.latLng(pos.coords.latitude, pos.coords.longitude);
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, {
                icon: L.divIcon({
                    html: `<div class="pulse-loc"></div><div style="font-size:35px; margin-top:-15px;">🚗</div>`,
                    iconSize: [1, 1]
                })
            }).addTo(mapa);
            
            mapa.setView(minhaLocalizacao, 17);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
        }
        
        if (seguirLocalizacao) {
            mapa.panTo(minhaLocalizacao);
        }
        
    }, erro => {
        console.log("Erro GPS:", erro);
    }, {
        enableHighAccuracy: true,
        timeout: 10000
    });
}

// ===== ROTA =====
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    
    if (!destino) {
        alert('Digite um destino');
        return;
    }
    
    if (!minhaLocalizacao) {
        alert('Aguardando GPS...');
        return;
    }
    
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)}, Brasil&limit=1`)
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) {
                alert('Local não encontrado');
                return;
            }
            
            const lugar = data[0];
            const destinoLatLng = L.latLng(parseFloat(lugar.lat), parseFloat(lugar.lon));
            
            if (rotaAtual) {
                mapa.removeControl(rotaAtual);
            }
            
            rotaAtual = L.Routing.control({
                waypoints: [minhaLocalizacao, destinoLatLng],
                lineOptions: { styles: [{ color: '#2196F3', weight: 6 }] },
                createMarker: () => null,
                show: false
            }).addTo(mapa);
            
            mapa.flyToBounds(L.latLngBounds([minhaLocalizacao, destinoLatLng]), {
                padding: [50, 50]
            });
        })
        .catch(erro => {
            console.log("Erro na busca:", erro);
            alert('Erro ao buscar local');
        });
}

// ===== RÁDIO PX =====
let gravador = null;
let pedacosAudio = [];
let streamAudio = null;
const botaoPX = document.getElementById('btn-px');

botaoPX.addEventListener('mousedown', async function() {
    try {
        streamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
        gravador = new MediaRecorder(streamAudio);
        pedacosAudio = [];
        
        gravador.ondataavailable = function(e) {
            if (e.data.size > 0) pedacosAudio.push(e.data);
        };
        
        gravador.onstop = function() {
            if (pedacosAudio.length > 0) {
                const audioBlob = new Blob(pedacosAudio, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = function() {
                    try {
                        db.ref('radio').push({
                            audio: reader.result,
                            usuario: usuario,
                            timestamp: Date.now()
                        });
                    } catch(e) {}
                };
                reader.readAsDataURL(audioBlob);
            }
        };
        
        gravador.start();
        botaoPX.classList.add('ativo');
        
    } catch(e) {
        alert('Permita acesso ao microfone');
    }
});

botaoPX.addEventListener('mouseup', function() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        botaoPX.classList.remove('ativo');
        if (streamAudio) {
            streamAudio.getTracks().forEach(track => track.stop());
            streamAudio = null;
        }
    }
});

botaoPX.addEventListener('mouseleave', function() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        botaoPX.classList.remove('ativo');
        if (streamAudio) {
            streamAudio.getTracks().forEach(track => track.stop());
            streamAudio = null;
        }
    }
});

// Eventos touch
botaoPX.addEventListener('touchstart', function(e) {
    e.preventDefault();
    botaoPX.dispatchEvent(new Event('mousedown'));
});

botaoPX.addEventListener('touchend', function(e) {
    e.preventDefault();
    botaoPX.dispatchEvent(new Event('mouseup'));
});

// ===== FUNÇÕES =====
function toggleModoNoturno() {
    modoNoturno = !modoNoturno;
    const mapDiv = document.getElementById('map');
    mapDiv.classList.toggle('mapa-noturno');
}

function toggleChat() {
    alert('Chat em desenvolvimento');
}

function recentralizar() {
    seguirLocalizacao = true;
    document.getElementById('btnRecenter').style.display = 'none';
    if (minhaLocalizacao) {
        mapa.flyTo(minhaLocalizacao, 17);
    }
}

// Enter na busca
document.getElementById('buscaDestino').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        buscarRota();
    }
});
</script>
</body>
</html>
