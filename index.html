<!DOCTYPE html>
<html>
<head>
<title>GPS BR 277</title>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
#map { height: 100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([-25.4284, -49.2733], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Mapa OpenStreetMap'
}).addTo(map);

</script>

</body>
</html>
<script>

var map = L.map('map').setView([-25.4284, -49.2733], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Mapa OpenStreetMap'
}).addTo(map);

// clicar no mapa e criar ocorrência
map.on('click', function(e){

var tipo = prompt("Tipo de ocorrência: acidente, obra, animal, veículo quebrado");

if(tipo){

var marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);

marker.bindPopup("Ocorrência: " + tipo).openPopup();

}

});

</script>
