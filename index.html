<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS PROFISSIONAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f0f0f0; }
        
        /* Efeito 3D no Mapa */
        .leaflet-container {
            perspective: 1000px;
        }
        .leaflet-map-pane {
            transform: rotateX(20deg); /* Inclinação para efeito 3D */
        }

        /* Seta de Navegação GPS */
        .seta-gps {
            width: 0; height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 25px solid #1a73e8;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Estilos de Alerta e Painéis (Mantidos) */
        .painel-alertas { position: absolute; top: 100px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .btn-alerta { background: white; border: none; padding: 8px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 85px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .btn-alerta b { font-size: 8px; text-transform: uppercase; margin-top: 3px; color: #333; }
        
        #contador { position: absolute; bottom: 20px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        /* Chat Lateral (Mantido com o X) */
        #chat-box { position: fixed; right: -100%; top: 0; width: 85%; max-width: 350px; height: 100%; background: #e5ddd5; z-index: 2000; transition: 0.4s; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        #chat-box.aberto { right: 0; }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; margin-bottom: 5px; max-width: 80%; }
        .msg-eu { background: #dcf8c6; align-self: flex-end; }
        .msg-outro { background: white; align-self: flex-start; }

        /* Popup de Comentários no Alerta */
        .popup-alerta { text-align: center; min-width: 150px; }
        .popup-alerta input { width: 100%; margin-top: 10px; padding: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .popup-alerta button { background: #075e54; color: white; border: none; padding: 5px 10px; margin-top: 5px; border-radius: 5px; cursor: pointer; }

        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

<div id="contador">🚗 <span id="online">1</span> Online</div>
<div id="map"></div>

<div class="painel-alertas">
    <button class="btn-alerta" onclick="enviarFirebase('Acidente', '⚠️')"><span>⚠️</span><b>Acidente</b></button>
    <button class="btn-alerta" onclick="enviarFirebase('Obras', '🚧')"><span>🚧</span><b>Obras</b></button>
    <button class="btn-alerta" onclick="enviarFirebase('Lentidão', '🚗')"><span>🚗</span><b>Lentidão</b></button>
    <button class="btn-alerta" onclick="enviarFirebase('Animal', '🐕')"><span>🐕</span><b>Animal</b></button>
    <button class="btn-alerta" onclick="enviarFirebase('Bloqueio', '🚫')"><span>🚫</span><b>Bloqueio</b></button>
    <button class="btn-alerta" onclick="enviarFirebase('Buraco', '🕳️')"><span>🕳️</span><b>Buraco</b></button>
</div>

<button onclick="document.getElementById('chat-box').classList.toggle('aberto')" style="position:fixed; bottom:20px; right:20px; z-index:2001; width:60px; height:60px; border-radius:50%; background:#25d366; color:white; border:none; font-size:30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">💬</button>

<div id="chat-box">
    <div style="padding:15px; background:#075e54; color:white; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
        <span>GRUPO BR-277</span>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:22px; padding:0 10px;">✕</span>
    </div>
    <div id="mensagens" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex;">
        <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:20px; border:none;" placeholder="Conversar...">
        <button onclick="mandarChat()" style="background:#075e54; color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:5px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

let meuLatLng, meuMarker, rMachine;
const meuID = "M_" + Math.random().toString(36).substr(2, 4).toUpperCase();

// LUPA DE PESQUISA
const searchControl = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Pra onde vamos motorista?",
    collapsed: false
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (rMachine) map.removeControl(rMachine);
    rMachine = L.Routing.control({
        waypoints: [meuLatLng, dest],
        lineOptions: { styles: [{ color: '#1a73e8', opacity: 0.9, weight: 12 }] }
    }).addTo(map);
    map.fitBounds(L.latLngBounds([meuLatLng, dest]), { padding: [80, 80] });
}).addTo(map);

// GPS 3D COM SETA
function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        const heading = pos.coords.heading || 0; // Direção do movimento

        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { 
                icon: L.divIcon({ className: 'seta-gps', html: `<div style="transform: rotate(${heading}deg)"></div>` }) 
            }).addTo(map);
            map.setView(meuLatLng, 17); // Zoom de aproximação real
        } else {
            meuMarker.setLatLng(meuLatLng);
            // Atualiza a rotação da seta conforme a direção
            meuMarker.getElement().style.transform += ` rotate(${heading}deg)`;
        }
        
        // Mantém o mapa seguindo o motorista (Auto-Center)
        map.panTo(meuLatLng);

        db.ref("vivos/" + meuID).set({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        db.ref("vivos/" + meuID).onDisconnect().remove();
    }, null, { enableHighAccuracy: true });
}

// ALERTAS COM COMENTÁRIOS
function enviarFirebase(tipo, emoji) {
    if (!meuLatLng) return;
    const novoAlerta = db.ref("alertas").push();
    novoAlerta.set({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, status: "Ativo" });
}

db.ref("alertas").on("child_added", snap => {
    const a = snap.val();
    const key = snap.key;
    
    const popupContent = `
        <div class="popup-alerta">
            <b>${a.tipo} ${a.emoji}</b><br>
            <div id="status-${key}" style="font-size:10px; color:gray;">Relate a situação abaixo:</div>
            <input type="text" id="input-${key}" placeholder="Pergunta ou resposta...">
            <button onclick="responderAlerta('${key}')">Enviar</button>
            <div id="respostas-${key}" style="text-align:left; font-size:11px; margin-top:5px; max-height:60px; overflow-y:auto;"></div>
        </div>
    `;

    L.marker([a.lat, a.lng], {
        icon: L.divIcon({ html: `<span style="font-size:25px">${a.emoji}</span>`, className: '' })
    }).addTo(map).bindPopup(popupContent);

    // Escutar respostas desse alerta específico
    db.ref("alertas/" + key + "/comentarios").on("child_added", cSnap => {
        const c = cSnap.val();
        const div = document.getElementById("respostas-" + key);
        if(div) div.innerHTML += `<div>• ${c.msg}</div>`;
    });
});

function responderAlerta(key) {
    const input = document.getElementById("input-" + key);
    if (!input.value) return;
    db.ref("alertas/" + key + "/comentarios").push({ msg: input.value, t: Date.now() });
    input.value = "";
}

// CHAT GERAL
function mandarChat() {
    const inp = document.getElementById('chat-input');
    if (!inp.value) return;
    db.ref("chat").push({ u: meuID, m: inp.value });
    inp.value = "";
}

db.ref("chat").limitToLast(20).on("child_added", snap => {
    const c = snap.val();
    const b = document.getElementById('mensagens');
    const classe = c.u === meuID ? "msg-eu" : "msg-outro";
    b.innerHTML += `<div class="msg ${classe}"><small>${c.u}</small><br>${c.m}</div>`;
    b.scrollTop = b.scrollHeight;
});

db.ref("vivos").on("value", snap => {
    document.getElementById("online").innerText = snap.val() ? Object.keys(snap.val()).length : 1;
});

iniciarGPS();
</script>
</body>
</html>
