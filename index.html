<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>GPS BR-277 | Comunidade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .painel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 200px;
        }

        .btn-alerta {
            width: 100%; padding: 10px; margin-bottom: 8px;
            border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-acidente { background: #d9534f; }
        .btn-radar { background: #f0ad4e; }
        .btn-gps { background: #0275d8; }

        .status { font-size: 12px; color: #555; margin-top: 10px; border-top: 1px solid #ddd; pt: 5px; }
        #online-count { font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="painel">
    <button class="btn-alerta btn-acidente" onclick="registrarOcorrencia('Acidente')">⚠️ Acidente</button>
    <button class="btn-alerta btn-radar" onclick="registrarOcorrencia('Radar')">📸 Radar</button>
    <button class="btn-alerta btn-gps" onclick="centralizar()">📍 Minha Posição</button>
    
    <div class="status">
        Motoristas na 277: <span id="online-count">1</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURAÇÃO FIREBASE ---
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    databaseURL: "https://SEU_PROJETO.firebaseio.com",
    projectId: "SEU_PROJETO",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- INICIALIZAÇÃO DO MAPA ---
let map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Ícones
const carroIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/743/743922.png",
    iconSize: [35, 35],
    iconAnchor: [17, 17]
});

const alertaIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
    iconSize: [30, 30]
});

// Variáveis de Controle
let meuID = "user_" + Math.random().toString(36).substr(2, 9);
let meuMarker;
let outrosMotoristas = {};
let listaOcorrencias = [];
let ultimaAtualizacaoDB = 0;

// --- FUNÇÕES DE POSICIONAMENTO ---

function iniciarGPS() {
    if (!navigator.geolocation) return alert("GPS não suportado");

    navigator.geolocation.watchPosition((pos) => {
        const { latitude, longitude, heading } = pos.coords;
        const latlng = [latitude, longitude];
        const direcao = heading || 0;

        // 1. Atualiza meu marcador no mapa local
        if (!meuMarker) {
            meuMarker = L.marker(latlng, { icon: carroIcon, rotationAngle: direcao }).addTo(map);
            map.setView(latlng, 16);
        } else {
            meuMarker.setLatLng(latlng);
            meuMarker.setRotationAngle(direcao);
        }

        // 2. Envia para o Firebase (Throttling: apenas a cada 3 segundos para economizar)
        let agora = Date.now();
        if (agora - ultimaAtualizacaoDB > 3000) {
            const userRef = db.ref("usuarios/" + meuID);
            userRef.set({ lat: latitude, lon: longitude, dir: direcao, lastSeen: agora });
            
            // CORREÇÃO 1: Remover do mapa ao desconectar
            userRef.onDisconnect().remove();
            ultimaAtualizacaoDB = agora;
        }

        // 3. Checar proximidade de perigos
        verificarAlertasProximos(latitude, longitude);

    }, (err) => console.error(err), { enableHighAccuracy: true });
}

// --- SINCRONIZAÇÃO EM TEMPO REAL ---

// Escutar outros motoristas
db.ref("usuarios").on("value", (snapshot) => {
    const dados = snapshot.val() || {};
    let contagem = 0;

    for (let id in dados) {
        contagem++;
        if (id === meuID) continue;

        const { lat, lon, dir } = dados[id];
        if (outrosMotoristas[id]) {
            outrosMotoristas[id].setLatLng([lat, lon]);
            outrosMotoristas[id].setRotationAngle(dir);
        } else {
            outrosMotoristas[id] = L.marker([lat, lon], { icon: carroIcon, rotationAngle: dir }).addTo(map);
        }
    }

    // Limpar quem saiu
    for (let id in outrosMotoristas) {
        if (!dados[id]) {
            map.removeLayer(outrosMotoristas[id]);
            delete outrosMotoristas[id];
        }
    }
    document.getElementById("online-count").innerText = contagem;
});

// Escutar Ocorrências
db.ref("ocorrencias").on("child_added", (snap) => {
    const o = snap.val();
    const m = L.marker([o.lat, o.lon], { icon: alertaIcon }).addTo(map);
    m.bindPopup(`<b>${o.tipo}</b><br>Registrado agora`);
    
    // Guardar na lista para checagem de proximidade
    listaOcorrencias.push({ id: snap.key, ...o });
});

// --- SISTEMA DE ALERTAS ---

function registrarOcorrencia(tipo) {
    if (!meuMarker) return alert("Aguardando sinal de GPS...");
    const pos = meuMarker.getLatLng();

    db.ref("ocorrencias").push({
        tipo: tipo,
        lat: pos.lat,
        lon: pos.lng,
        timestamp: Date.now()
    });
}

function verificarAlertasProximos(minhaLat, minhaLon) {
    listaOcorrencias.forEach(o => {
        // Cálculo de distância simples usando o Leaflet
        const dist = map.distance([minhaLat, minhaLon], [o.lat, o.lon]);
        
        // Se estiver a menos de 1km e for um alerta novo/relevante
        if (dist < 1000 && !o.alertado) {
            window.navigator.vibrate([200, 100, 200]); // Vibra o celular
            console.log("ALERTA: " + o.tipo + " a " + Math.round(dist) + "m");
            o.alertado = true; // Evita repetir o alerta o tempo todo
        }
    });
}

function centralizar() {
    if (meuMarker) map.panTo(meuMarker.getLatLng());
}

// Iniciar
iniciarGPS();

</script>
</body>
</html>
