<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS COMUNIDADE PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #007bff; --dark: #2c3e50; }
        html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #f0f0f0; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100%; width: 100%; z-index: 1; }

        /* Marcador de posição atual */
        .meu-gps { width: 22px; height: 22px; background: var(--blue); border-radius: 50%; border: 3px solid white; box-shadow: 0 0 12px rgba(0,0,0,0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,123,255, 0.7); } 70% { box-shadow: 0 0 0 18px rgba(0,123,255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0,123,255, 0); } }

        /* Menu de Alertas */
        .menu-alertas { position: absolute; top: 85px; left: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .btn-alerta { background: white; border: none; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 80px; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; transition: 0.2s; }
        .btn-alerta:active { transform: scale(0.9); }

        /* Chat Lateral */
        #chat-lateral { position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; height: 100dvh; background: white; z-index: 2000; transition: 0.4s; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        #chat-lateral.aberto { right: 0; }
        .chat-header { padding: 18px; background: var(--dark); color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .balao-ia { background: #e7f3ff; border-left: 5px solid var(--blue); padding: 12px; border-radius: 8px; font-size: 13.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .balao-user { background: #eee; padding: 12px; border-radius: 8px; font-size: 13.5px; align-self: flex-end; }
        .entrada-chat { padding: 12px; border-top: 1px solid #ddd; display: flex; background: white; }
        .entrada-chat input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }

        /* Ajustes UI Rota */
        .leaflet-control-geocoder { margin-top: 15px !important; border-radius: 25px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important; }
        .leaflet-routing-container { background: white; max-height: 180px; width: 280px; overflow-y: auto; font-size: 11px; border-radius: 12px; margin-top: 10px !important; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="map"></div>

<button onclick="toggleChat()" style="position:fixed; bottom:25px; right:20px; z-index:1001; width:65px; height:65px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:28px; cursor:pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.3)">💬</button>

<div class="menu-alertas">
    <button class="btn-alerta" onclick="registrar('Acidente', '⚠️')">⚠️<br>ACIDENTE</button>
    <button class="btn-alerta" onclick="registrar('Obras', '🚧')">🚧<br>OBRAS</button>
    <button class="btn-alerta" onclick="registrar('Polícia', '🚔')">🚔<br>POLÍCIA</button>
    <button class="btn-alerta" onclick="registrar('Perigo', '🛑')">🛑<br>PERIGO</button>
</div>

<div id="chat-lateral">
    <div class="chat-header"><span>ASSISTENTE BR-277</span><span onclick="toggleChat()" style="cursor:pointer; font-size:20px">✕</span></div>
    <div id="mensagens"></div>
    <div class="entrada-chat">
        <input type="text" id="input-chat" placeholder="Diga algo...">
        <button onclick="enviarChat()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:45px; height:45px; margin-left:10px; cursor:pointer">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- INICIAR MAPA ---
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const iconeCarro = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [30, 30], iconAnchor: [15, 15] });

let meuLatLng, meuMarker, routingControl;
let listaAlertas = [];
let motoristasAtivos = {};
let meuID = "Drive_" + Math.random().toString(36).substr(2, 5).toUpperCase();

// --- ROTA AJUSTADA (LINHA AZUL COMPLETA) ---
const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Para onde você vai?"
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    
    if (routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
        waypoints: [meuLatLng, dest],
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', alternatives: true, language: 'pt' }),
        formatter: new L.Routing.Formatter({ language: 'pt', units: 'metric' }),
        lineOptions: { 
            styles: [
                {color: '#007bff', opacity: 0.9, weight: 8}, // Linha azul nítida
                {color: '#555', opacity: 0.3, weight: 6}    // Alternativa cinza
            ],
            extendToWaypoints: true,
            missingRouteTolerance: 0
        },
        fitSelectedRoutes: true, // Garante que a rota inteira apareça no zoom
        show: true,
        addWaypoints: false,
        createMarker: (i, wp) => {
            // Cria um marcador azul no destino final
            if (i === 1) return L.marker(wp.latLng, { title: "Destino" });
            return null;
        }
    }).addTo(map);
}).addTo(map);

// --- GPS REALTIME ---
function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        
        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
            map.setView(meuLatLng, 15);
        } else {
            meuMarker.setLatLng(meuLatLng);
        }
        
        // Salva sua posição para outros te verem andando
        db.ref("usuarios/" + meuID).set({ lat: meuLatLng.lat, lon: meuLatLng.lng, time: Date.now() });
        db.ref("usuarios/" + meuID).onDisconnect().remove();
    }, null, { enableHighAccuracy: true });
}

// Ver outros carros
db.ref("usuarios").on("value", snap => {
    const users = snap.val() || {};
    for (let id in users) {
        if (id === meuID) continue;
        const u = users[id];
        if (motoristasAtivos[id]) motoristasAtivos[id].setLatLng([u.lat, u.lon]);
        else motoristasAtivos[id] = L.marker([u.lat, u.lon], { icon: iconeCarro }).addTo(map);
    }
});

// --- OCORRÊNCIAS (PERSISTÊNCIA) ---
function registrar(tipo, emoji) {
    if (!meuLatLng) { alert("Sinal de GPS não encontrado."); return; }
    
    const dados = {
        tipo: tipo,
        emoji: emoji,
        lat: meuLatLng.lat,
        lng: meuLatLng.lng,
        timestamp: Date.now()
    };

    // Salva no banco "ocorrencias"
    db.ref("ocorrencias").push(dados).then(() => {
        console.log("Ocorrência salva!");
    });
}

// ESTA FUNÇÃO BUSCA OS DADOS SEMPRE QUE A PÁGINA É ABERTA
db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    listaAlertas.push(o);
    
    const iconHTML = `
        <div style="text-align:center">
            <span style="font-size:28px">${o.emoji}</span><br>
            <b style="background:white; padding:2px 5px; border-radius:5px; border:1px solid black; font-size:10px">${o.tipo.toUpperCase()}</b>
        </div>
    `;
    
    L.marker([o.lat, o.lng], { 
        icon: L.divIcon({ html: iconHTML, iconSize: [60, 50], className: '' }) 
    }).addTo(map);
});

// --- CHAT IA ---
function toggleChat() { document.getElementById('chat-lateral').classList.toggle('aberto'); }

function enviarChat() {
    const input = document.getElementById('input-chat');
    const msg = input.value.trim();
    if (!msg) return;

    addBalao(msg, 'balao-user');
    input.value = "";

    setTimeout(() => {
        let resp = "Tudo calmo na BR-277.";
        if (listaAlertas.length > 0) {
            const ultimos = listaAlertas.slice(-1)[0];
            resp = `O último registro foi um(a) ${ultimos.tipo} reportado recentemente. Dirija com cuidado.`;
        }
        addBalao(resp, 'balao-ia');
        const falar = new SpeechSynthesisUtterance(resp);
        falar.lang = 'pt-BR';
        window.speechSynthesis.speak(falar);
    }, 800);
}

function addBalao(txt, cls) {
    const box = document.getElementById('mensagens');
    const div = document.createElement('div');
    div.className = cls; div.innerHTML = txt;
    box.appendChild(div); box.scrollTop = box.scrollHeight;
}

iniciarGPS();
</script>
</body>
</html>
