<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | NAVEGAÇÃO PRO V20</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* BÚSSOLA RECENTRALIZAR */
        #btn-bussola { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 4001; 
            background: white; border: 2px solid var(--ws-green); border-radius: 30px; padding: 10px 20px;
            font-weight: bold; color: var(--ws-green); box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; display: none; }

        /* ROTA E "X" FIXO NO QUADRADO */
        .leaflet-routing-container { bottom: 20px !important; right: 10px !important; top: auto !important; width: 260px !important; border-radius: 12px !important; }
        .btn-fechar-rota { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; width: 100%; }

        /* PAINEL ALERTAS (MANTIDO 10 ICONES) */
        .painel-alertas { position: absolute; top: 70px; left: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 92px; color: white; font-weight: bold; font-size: 10px; background: #1a1a1a; text-align: center; }

        /* CARRO PULSANTE */
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }

        /* LUZ E CHAT MÓVEIS */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; background: white; }
        #chat-trigger { width: 60px; height: 60px; background: #25d366; right: 20px; bottom: 20px; color: white; font-size: 30px; }
        #btn-luz { width: 45px; height: 45px; background: #ffcc00; right: 20px; top: 20px; font-size: 20px; }

        /* CHAT WHATSAPP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 10px; border-radius: 12px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="btn-bussola">🧭 RECENTRALIZAR</div>

<div class="painel-alertas">
    <div class="btn-a" style="background:#b00020" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a" style="background:#ff6d00" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    </div>

<div id="btn-luz" class="f-btn">💡</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between;">
        <b>BR-277 WHATSAPP</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer">✕</span>
    </div>
    <div id="mensagens"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="chat-input" style="flex:1; padding:12px; border-radius:20px; border:none;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:45px; height:45px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

let meuLatLng, meuMarker, controleRota, destinoFinal;
let seguindoCarro = true;

// LUPA E ROTA AZUL QUE APAGA
const geocoder = L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Destino Curitiba..." })
.on('markgeocode', function(e) {
    destinoFinal = e.geocode.center;
    if (controleRota) map.removeControl(controleRota);
    
    controleRota = L.Routing.control({
        waypoints: [meuLatLng, destinoFinal],
        lineOptions: { styles: [{ color: '#007aff', weight: 8, opacity: 0.8 }] },
        createMarker: () => null,
        addWaypoints: false
    }).addTo(map);

    setTimeout(() => {
        const c = document.querySelector('.leaflet-routing-container');
        c.innerHTML += `<button class="btn-fechar-rota" onclick="limparRota()">ENCERRAR ROTA</button>`;
    }, 600);
}).addTo(map);

function limparRota() { if(controleRota) { map.removeControl(controleRota); controleRota = null; destinoFinal = null; } }

// GPS COM AUTO-ZOOM E AUTO-ERASE ROTA
navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude, speed } = pos.coords;
    meuLatLng = L.latLng(latitude, longitude);
    
    // 1. Atualiza Marcador
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;">🚗</div>`, className: '', iconSize:[40,40] }) }).addTo(map);
    } else {
        meuMarker.setLatLng(meuLatLng);
    }

    // 2. Auto-Zoom Dinâmico (Velocidade em m/s)
    if(seguindoCarro) {
        let zoomDinamico = 17; // Padrão parado
        if(speed > 5) zoomDinamico = 15; // Devagar
        if(speed > 15) zoomDinamico = 13; // Rápido (Rodovia)
        map.flyTo(meuLatLng, zoomDinamico, { animate: true, duration: 1 });
    }

    // 3. Auto-Erase (Apaga rota que já passou)
    if(controleRota && destinoFinal) {
        controleRota.setWaypoints([meuLatLng, destinoFinal]);
    }
}, null, { enableHighAccuracy: true });

// CONTROLE DE "RECENTRALIZAR"
map.on('dragstart', () => { 
    seguindoCarro = false; 
    document.getElementById('btn-bussola').style.display = 'block'; 
});
document.getElementById('btn-bussola').onclick = () => { 
    seguindoCarro = true; 
    document.getElementById('btn-bussola').style.display = 'none';
    map.flyTo(meuLatLng, 17);
};

// BOTÕES MÓVEIS (CHAT E LUZ)
function mover(id) {
    const el = document.getElementById(id); let sX, sY, last = 0;
    el.addEventListener('touchstart', e => {
        const now = Date.now();
        if(id === 'chat-trigger' && now - last < 300) document.getElementById('chat-box').classList.toggle('aberto');
        last = now;
        sX = e.touches[0].clientX - el.offsetLeft; sY = e.touches[0].clientY - el.offsetTop;
    });
    el.addEventListener('touchmove', e => {
        el.style.left = (e.touches[0].clientX - sX) + 'px'; el.style.top = (e.touches[0].clientY - sY) + 'px';
        el.style.right = 'auto'; el.style.bottom = 'auto';
    });
}
mover('chat-trigger'); mover('btn-luz');

document.getElementById('btn-luz').onclick = () => document.getElementById('map').classList.toggle('map-dark');

// CHAT FIREBASE
function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: "Danilo", m: i.value, t: Date.now() }); i.value = "";
}
db.ref("chat").limitToLast(20).on("value", snap => {
    const box = document.getElementById('mensagens'); box.innerHTML = "";
    snap.forEach(s => {
        const d = s.val();
        box.innerHTML += `<div class="balao ${d.u==='Danilo'?'balao-eu':'balao-outro'}"><b>${d.u}:</b> ${d.m}</div>`;
    });
    box.scrollTop = box.scrollHeight;
});

// ALERTAS (MANTIDO)
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, t: Date.now() });
}
db.ref("alertas").on("value", snap => {
    snap.forEach(s => {
        const a = s.val();
        L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px; filter:drop-shadow(2px 2px 2px #000)">${a.emoji}</div>`, className:'' }), zIndexOffset: 1000 }).addTo(map)
        .bindPopup(`<b>${a.tipo}</b>`);
    });
});
</script>
</body>
</html>
