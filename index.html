<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | MONITORAMENTO ELITE V2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* LOGIN E VEÍCULO */
        #login-screen { position: fixed; inset: 0; background: #075e54; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 4px solid #d4af37; }
        .veiculos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .veiculo-opt { font-size: 24px; padding: 8px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .veiculo-opt.selected { border-color: #075e54; background: #e8f5e9; transform: scale(1.1); }

        /* PAINEL ALERTAS (ESQUERDA) */
        .painel-alertas { position: absolute; top: 70px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 4px; }
        .btn-alerta { border: 2px solid #d4af37; padding: 5px; border-radius: 8px; width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; text-shadow: 1px 1px 1px #000; }
        .btn-vermelho { background: #b00020; }
        .btn-laranja { background: #ff6d00; }
        .btn-preto { background: #1a1a1a; }
        .btn-alerta b { font-size: 8px; text-transform: uppercase; margin-top: 2px; }

        /* BOTÃO CHAT FLUTUANTE (ARRASTÁVEL) */
        #chat-trigger { 
            position: fixed; bottom: 20px; right: 20px; z-index: 4001; 
            width: 65px; height: 65px; border-radius: 50%; background: #25d366; 
            color: white; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            touch-action: none; cursor: move;
        }

        /* EFEITO PULSANTE */
        .pulse-blue { background: rgba(0, 123, 255, 0.6); border-radius: 50%; width: 20px; height: 20px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); animation: pulse 2s infinite; pointer-events: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(0, 123, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 123, 255, 0); } }

        /* CHAT ESTILO WHATSAPP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 90%; max-width: 380px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.4s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        .header-chat { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; }
        
        /* RESPOSTAS RÁPIDAS */
        .quick-replies { display: flex; gap: 5px; padding: 10px; background: #f0f0f0; overflow-x: auto; white-space: nowrap; }
        .btn-quick { background: white; border: 1px solid #ccc; padding: 5px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; }

        .balao { padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 85%; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .balao-eu { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .balao-outro { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        .admin-badge { background: #d4af37; color: black; font-size: 9px; padding: 2px 5px; border-radius: 5px; margin-left: 5px; font-weight: bold; }

        /* BOTÃO SAIR/BÚSSOLA */
        #btn-bussola { position: fixed; bottom: 20px; left: 15px; z-index: 1000; background: white; border: 2px solid #d4af37; width: 55px; height: 55px; border-radius: 50%; font-size: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #btn-offline { position: fixed; bottom: 85px; left: 15px; z-index: 1000; background: #ff3b30; color: white; border: 2px solid white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3 style="margin:0">BR-277 MONITOR</h3>
        <input type="text" id="user-name" style="width:90%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:8px;" placeholder="Seu Nome">
        <div class="veiculos-grid" id="v-grid">
            <div class="veiculo-opt" onclick="selV(this, '🚛')">🚛</div>
            <div class="veiculo-opt" onclick="selV(this, '🏍️')">🏍️</div>
            <div class="veiculo-opt" onclick="selV(this, '🚗')">🚗</div>
            <div class="veiculo-opt" onclick="selV(this, '🚐')">🚐</div>
            <div class="veiculo-opt" onclick="selV(this, '🚌')">🚌</div>
            <div class="veiculo-opt" onclick="selV(this, '🚑')">🚑</div>
            <div class="veiculo-opt" onclick="selV(this, '🚕')">🚕</div>
        </div>
        <button onclick="salvarAcesso()" style="width:100%; padding:12px; background:#075e54; color:white; border:none; border-radius:10px; font-weight:bold;">ENTRAR NO GRUPO</button>
    </div>
</div>

<div id="map"></div>
<button id="btn-bussola" onclick="recentralizar()">🧭</button>
<button id="btn-offline" onclick="ficarOffline()" title="Sair do Mapa">📴</button>
<div id="chat-trigger">💬</div>

<div class="painel-alertas">
    <button class="btn-alerta btn-vermelho" onclick="enviarAlerta('Acidente', '⚠️')"><span>⚠️</span><b>Acidente</b></button>
    <button class="btn-alerta btn-laranja" onclick="enviarAlerta('Obra', '🚧')"><span>🚧</span><b>Obra</b></button>
    <button class="btn-alerta btn-vermelho" onclick="enviarAlerta('Bloqueio', '🚫')"><span>🚫</span><b>Bloqueio</b></button>
    <button class="btn-alerta btn-laranja" onclick="enviarAlerta('Animal', '🐕')"><span>🐕</span><b>Animal</b></button>
    <button class="btn-alerta btn-preto" onclick="enviarAlerta('Pane', '🛠️')"><span>🛠️</span><b>Pane</b></button>
    <button class="btn-alerta btn-preto" onclick="enviarAlerta('Carga', '📦')"><span>📦</span><b>Carga</b></button>
</div>

<div id="chat-box">
    <div class="header-chat">
        <b>BR-277 | OPERACIONAL</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:25px;">✕</span>
    </div>
    <div class="quick-replies">
        <button class="btn-quick" onclick="mandarChat('QAP - Na escuta')">📡 QAP</button>
        <button class="btn-quick" onclick="mandarChat('TKS - Obrigado')">👍 TKS</button>
        <button class="btn-quick" onclick="mandarChat('Estou passando pelo local agora')">🚔 No Local</button>
        <button class="btn-quick" onclick="mandarChat('Trânsito Parado!')">🛑 Parado</button>
    </div>
    <div id="mensagens" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; background:#eee; display:flex; gap:5px;">
        <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;" placeholder="Mensagem...">
        <button onclick="mandarChat()" style="background:#075e54; color:white; border-radius:50%; width:40px; height:40px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

let meuLatLng, meuMarker, vSel = "";
let meuNome = localStorage.getItem('br277_nome') || "";
let iconAtivo = localStorage.getItem('br277_veiculo') || "🚗";
let isAdmin = (meuNome.toLowerCase().includes("danilo")); // Trava Admin

if(meuNome) { document.getElementById('login-screen').style.display = 'none'; iniciarApp(); }

function selV(el, emoji) {
    document.querySelectorAll('.veiculo-opt').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    vSel = emoji;
}

function salvarAcesso() {
    const n = document.getElementById('user-name').value.trim();
    if(n.length < 2 || !vSel) return alert("Nome e Veículo obrigatórios!");
    localStorage.setItem('br277_nome', n);
    localStorage.setItem('br277_veiculo', vSel);
    location.reload();
}

function iniciarApp() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        const htmlIcon = `<div class="pulse-blue"></div><div style="font-size:28px; position:relative;">${iconAtivo}</div>`;
        if(!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: htmlIcon, className: '', iconSize:[30,30] }) }).addTo(map);
            map.setView(meuLatLng, 17);
        } else { meuMarker.setLatLng(meuLatLng); }
        db.ref("vivos/" + meuNome).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, veiculo: iconAtivo, t: Date.now() });
    });
    carregarAlertas();
}

function ficarOffline() {
    if(confirm("Deseja sair do mapa? Sua posição será ocultada.")) {
        db.ref("vivos/" + meuNome).remove();
        alert("Você está Offline.");
    }
}

// LOGICA DO BOTÃO ARRASTÁVEL COM CLIQUE
const dragger = document.getElementById('chat-trigger');
let isDragging = false, startX, startY;

dragger.addEventListener('touchstart', (e) => {
    isDragging = false;
    startX = e.touches[0].clientX - dragger.offsetLeft;
    startY = e.touches[0].clientY - dragger.offsetTop;
}, {passive: true});

dragger.addEventListener('touchmove', (e) => {
    isDragging = true;
    dragger.style.left = (e.touches[0].clientX - startX) + 'px';
    dragger.style.top = (e.touches[0].clientY - startY) + 'px';
    dragger.style.right = 'auto'; dragger.style.bottom = 'auto';
}, {passive: true});

dragger.addEventListener('touchend', (e) => {
    if (!isDragging) document.getElementById('chat-box').classList.toggle('aberto');
});

function enviarAlerta(tipo, emoji) {
    if (!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, autor: meuNome, t: Date.now() });
}

function carregarAlertas() {
    db.ref("alertas").on("child_added", snap => {
        const a = snap.val(); const key = snap.key;
        const marker = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<span style="font-size:30px">${a.emoji}</span>`, className: '' }) }).addTo(map);
        
        marker.on('click', () => {
            const delMap = isAdmin ? `<button onclick="db.ref('alertas/${key}').remove(); location.reload();" style="background:red;color:white;border:none;border-radius:5px;width:100%;margin-top:5px;">ENCERRAR ALERTA</button>` : "";
            const popupHtml = `<div style="width:200px"><div style="background:#075e54;color:white;padding:5px;text-align:center;font-weight:bold">${a.tipo}</div><div id="pop-${key}" style="max-height:100px;overflow-y:auto;background:#eee;padding:5px;font-size:12px">Carregando...</div><div style="display:flex;padding:5px"><input id="in-${key}" style="flex:1"><button onclick="mandarPop('${key}')">➤</button></div>${delMap}</div>`;
            marker.bindPopup(popupHtml).openPopup();
            db.ref("alertas/"+key+"/conversa").on("value", s => {
                const d = document.getElementById("pop-"+key);
                if(d){ d.innerHTML = ""; const v = s.val(); if(v) Object.values(v).forEach(m => d.innerHTML+=`<div><b>${m.u}</b>: ${m.m}</div>`); d.scrollTop=d.scrollHeight; }
            });
        });
    });
}

function mandarPop(k) { const i=document.getElementById("in-"+k); if(i.value) db.ref("alertas/"+k+"/conversa").push({u:meuNome, m:i.value}); i.value=""; }

function mandarChat(textoRapido) {
    const inp = document.getElementById('chat-input');
    const msg = textoRapido || inp.value;
    if (!msg) return;
    db.ref("chat").push({ u: meuNome, m: msg, t: Date.now(), isAdmin: isAdmin });
    inp.value = "";
}

db.ref("chat").limitToLast(30).on("value", snap => {
    const b = document.getElementById('mensagens');
    b.innerHTML = "";
    const dados = snap.val();
    if(dados) Object.entries(dados).forEach(([key, c]) => {
        const selo = c.isAdmin ? `<span class="admin-badge">ADMIN</span>` : "";
        const podeApagar = (c.u === meuNome || isAdmin) ? `<span onclick="db.ref('chat/${key}').remove()" style="color:red;font-size:10px;font-weight:bold;cursor:pointer">✕ APAGAR</span>` : "";
        
        b.innerHTML += `
            <div class="balao ${c.u === meuNome ? 'balao-eu' : 'balao-outro'}">
                <b style="font-size:11px;color:#075e54">${c.u} ${selo}</b><br>${c.m.replace(/(@[A-Za-z]+)/g, '<span style="color:blue">$1</span>')}
                <div style="display:flex;justify-content:space-between;margin-top:5px;">${podeApagar} <span style="font-size:9px;color:#666">${new Date(c.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>
            </div>`;
    });
    b.scrollTop = b.scrollHeight;
});

function recentralizar() { if (meuLatLng) map.flyTo(meuLatLng, 17); }
</script>
</body>
</html>
