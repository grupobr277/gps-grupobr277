<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | TECNOLOGIA INTELIGENTE V5</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
        
        /* TELAS */
        .overlay { position: fixed; inset: 0; background: var(--ws-green); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 4px solid #d4af37; }
        .box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .v-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .v-opt { font-size: 30px; padding: 8px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: #f9f9f9; }
        .v-opt.selected { border-color: var(--ws-green); background: #e8f5e9; transform: scale(1.1); }

        /* ALERTAS */
        .p-alertas { position: absolute; top: 120px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        .btn-a { border: 2px solid #d4af37; padding: 8px; border-radius: 10px; width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; text-shadow: 1px 1px #000; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #1a1a1a; }

        /* BOTÕES MÓVEIS */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; border: 2px solid white; user-select: none; touch-action: none; }
        #chat-trigger { width: 65px; height: 65px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 30px; }
        #btn-perfil { width: 50px; height: 50px; background: #333; color: white; right: 25px; top: 130px; font-size: 25px; }
        #btn-bussola { width: 55px; height: 55px; background: white; border: 2px solid #d4af37; left: 20px; bottom: 20px; font-size: 30px; }

        /* CHAT */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.4s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        .balao { padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 85%; font-size: 14px; position: relative; }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }
        
        /* ROTA */
        #p-rota { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 4000; background: #000; padding: 10px 20px; border-radius: 30px; border: 2px solid #d4af37; color: white; display: none; align-items: center; gap: 10px; }
        
        /* LUPA AJUSTE */
        .leaflet-control-geocoder { margin-top: 15px !important; margin-left: 15px !important; width: 250px !important; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div class="box">
        <h2 style="margin:0">BR-277 ELITE</h2>
        <p style="font-size:11px; color:#666">TECNOLOGIA DE NAVEGAÇÃO PARANÁ</p>
        <input type="text" id="u-nome" placeholder="Nome Completo">
        <input type="text" id="u-tel" value="+55 ">
        <input type="text" id="u-cidade" placeholder="Cidade de Atuação">
        <div class="v-grid" id="v-grid-login"></div>
        <button onclick="salvarCadastro()" style="width:100%; padding:15px; background:var(--ws-green); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="map"></div>

<div id="btn-perfil" class="f-btn">⚙️</div>
<div id="btn-bussola" class="f-btn">🧭</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="p-rota">
    <span>ROTA INTELIGENTE ATIVA</span>
    <b onclick="limparRota()" style="color:red; cursor:pointer; font-size:22px;">✕</b>
</div>

<div class="p-alertas">
    <button class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')"><span>⚠️</span><b>Acidente</b></button>
    <button class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')"><span>🚫</span><b>Bloqueio</b></button>
    <button class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')"><span>🚧</span><b>Obra</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')"><span>🐕</span><b>Animal</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')"><span>🛠️</span><b>Pane</b></button>
</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between; align-items:center;">
        <b>GRUPO BR-277</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:25px;">✕</span>
    </div>
    <div id="mensagens" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:40px; height:40px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

let meuLatLng, meuMarker, rMachine, vSel = "🚗";
let user = JSON.parse(localStorage.getItem('br277_v5')) || null;

// LUPA INTELIGENTE (Prioridade Paraná)
const geocoder = L.Control.geocoder({ 
    defaultMarkGeocode: false, 
    collapsed: false, 
    placeholder: "Cidade ou Local...",
    geocoder: L.Control.Geocoder.nominatim({
        geocodingQueryParams: {
            countrycodes: 'br',
            viewbox: '-54.6,-26.7,-48.0,-22.5', // Foca no Paraná
            bounded: 1
        }
    })
}).on('markgeocode', e => {
    const d = e.geocode.center;
    if (rMachine) map.removeControl(rMachine);
    rMachine = L.Routing.control({ 
        waypoints: [meuLatLng, d], 
        lineOptions: { styles: [{ color: '#1a73e8', weight: 8 }] },
        createMarker: () => null 
    }).addTo(map);
    document.getElementById('p-rota').style.display = 'flex';
    map.fitBounds(L.latLngBounds([meuLatLng, d]));
}).addTo(map);

function limparRota() { if(rMachine) map.removeControl(rMachine); document.getElementById('p-rota').style.display = 'none'; }

const veiculos = ['🚛','🏍️','🚗','🚐','🚌','🚑','🚕','🚔'];
function renderV() {
    const g = document.getElementById('v-grid-login'); g.innerHTML = "";
    veiculos.forEach(v => {
        const d = document.createElement('div'); d.className = 'v-opt' + (v === vSel ? ' selected' : '');
        d.innerText = v; d.onclick = () => { vSel = v; renderV(); }; g.appendChild(d);
    });
}
renderV();

if(user) { document.getElementById('login-screen').style.display = 'none'; vSel = user.v; iniciarApp(); }

function salvarCadastro() {
    const n = document.getElementById('u-nome').value.trim();
    const t = document.getElementById('u-tel').value.trim();
    const c = document.getElementById('u-cidade').value.trim();
    if(!n || t === "+55 " || !c) return alert("Preencha tudo!");
    user = { n, t, c, v: vSel, adm: n.toLowerCase().includes("danilo") };
    localStorage.setItem('br277_v5', JSON.stringify(user));
    location.reload();
}

function iniciarApp() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        const icon = `<div style="font-size:35px; filter: drop-shadow(0 0 5px white);">${user.v}</div>`;
        if(!meuMarker) { meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: icon, className: '', iconSize:[40,40] }) }).addTo(map); map.setView(meuLatLng, 16); }
        else { meuMarker.setLatLng(meuLatLng); }
        db.ref("vivos/" + user.n).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, v: user.v, t: Date.now() });
    });
    carregarAlertas();
}

// LOGICA TOUCH + CLICK (CORRIGIDA)
function ligarBotao(id, acao) {
    const el = document.getElementById(id);
    let movido = false, startX, startY, distX, distY;

    const onStart = (e) => {
        movido = false;
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        distX = startX - el.offsetLeft;
        distY = startY - el.offsetTop;
        document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', onMove, {passive: false});
        document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', onEnd);
    };

    const onMove = (e) => {
        const curX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const curY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        if (Math.abs(curX - startX) > 5 || Math.abs(curY - startY) > 5) {
            movido = true;
            el.style.left = (curX - distX) + 'px';
            el.style.top = (curY - distY) + 'px';
            el.style.right = 'auto'; el.style.bottom = 'auto';
        }
    };

    const onEnd = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        if (!movido) acao();
    };

    el.addEventListener('mousedown', onStart);
    el.addEventListener('touchstart', onStart, {passive: true});
}

ligarBotao('chat-trigger', () => document.getElementById('chat-box').classList.toggle('aberto'));
ligarBotao('btn-bussola', () => { if(meuLatLng) map.flyTo(meuLatLng, 17); });
ligarBotao('btn-perfil', () => {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('u-nome').value = user.n;
    document.getElementById('u-tel').value = user.t;
    document.getElementById('u-cidade').value = user.c;
    renderV();
});

function enviarAlerta(tipo, emoji) { if(meuLatLng) db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, autor: user.n, t: Date.now() }); }

function carregarAlertas() {
    db.ref("alertas").on("child_added", snap => {
        const a = snap.val(), k = snap.key;
        const m = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px;">${a.emoji}</div>`, className: '' }) }).addTo(map);
        m.on('click', () => {
            const html = `<div style="width:200px;text-align:center;"><b>${a.tipo}</b><br><small>Por: ${a.autor}</small></div>`;
            m.bindPopup(html).openPopup();
        });
    });
}

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: user.n, m: i.value, t: Date.now(), adm: user.adm }); i.value = "";
}

db.ref("chat").limitToLast(40).on("value", snap => {
    const b = document.getElementById('mensagens'); b.innerHTML = "";
    const d = snap.val();
    if(d) Object.entries(d).forEach(([k, c]) => {
        const eu = (c.u === user.n);
        b.innerHTML += `
            <div class="balao ${eu?'balao-eu':'balao-outro'}">
                <b style="font-size:11px;color:${eu? '#075e54':'#1a73e8'}">${c.u}</b><br>${c.m}
                <div style="text-align:right; font-size:9px; color:#999; margin-top:3px;">${new Date(c.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
            </div>`;
    }); b.scrollTop = b.scrollHeight;
});
</script>
</body>
</html>
