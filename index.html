<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRUPO BR 277</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            z-index: 1000;
            border: 1px solid #00BFFF;
        }
        
        .btn {
            background: #252542;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-alerta {
            background: #e53935;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal.visible { display: flex; }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }
        
        .alertas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .alerta-item {
            background: #252542;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        
        .alerta-emoji { font-size: 30px; }
        .alerta-nome { font-size: 10px; color: white; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="bottom-bar">
    <button class="btn" onclick="abrirAlertas()">⚠️ REPORTE</button>
</div>

<div class="modal" id="modalAlertas">
    <div class="modal-content">
        <h3 style="color:white;">REPORTAR OCORRÊNCIA</h3>
        <div class="alertas-grid" id="alertasGrid"></div>
        <button onclick="fecharAlertas()" style="margin-top:15px; padding:8px; background:#e53935; border:none; border-radius:20px; color:white;">FECHAR</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// FIREBASE
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ALERTAS
const alertas = [
    { nome: 'ACIDENTE', emoji: '💥' }, { nome: 'OBRAS', emoji: '🚧' },
    { nome: 'PANE', emoji: '🔧' }, { nome: 'ANIMAL', emoji: '🐂' },
    { nome: 'RADAR', emoji: '📷' }, { nome: 'BARREIRA', emoji: '⛰️' },
    { nome: 'NEBLINA', emoji: '🌫️' }, { nome: 'CONGEST', emoji: '🔴' },
    { nome: 'ALAGAM', emoji: '💧' }, { nome: 'BLOQ', emoji: '⛔' },
    { nome: 'PERIGO', emoji: '⚠️' }, { nome: 'DESVIO', emoji: '🔄' },
    { nome: 'CARGA', emoji: '📦' }, { nome: 'GRANIZO', emoji: '🧊' },
    { nome: 'MANIFEST', emoji: '📢' }
];

let usuario = localStorage.getItem('user');
if (!usuario) {
    usuario = prompt("Digite seu nome:", "Motorista");
    localStorage.setItem('user', usuario);
}

let mapa = null;
let userLocation = null;
let userMarker = null;

// MAPA
function initMap() {
    mapa = L.map('map').setView([-25.4284, -49.2733], 12);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);
    
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            userLocation = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.marker(userLocation, { icon: L.divIcon({ html: '🚗', iconSize: [30,30], className: '' }) }).addTo(mapa);
                mapa.setView(userLocation, 13);
            } else {
                userMarker.setLatLng(userLocation);
            }
        });
    }
    
    carregarAlertas();
}

function carregarAlertas() {
    db.ref('alertas').on('child_added', (snap) => {
        const a = snap.val();
        L.marker([a.lat, a.lng], {
            icon: L.divIcon({ html: `<div style="background:red; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">${a.emoji}</div>`, iconSize: [30,30] })
        }).addTo(mapa).bindPopup(`<b>${a.emoji} ${a.nome}</b><br>${new Date(a.timestamp).toLocaleTimeString()}`);
    });
}

function criarAlertasGrid() {
    const grid = document.getElementById('alertasGrid');
    grid.innerHTML = '';
    alertas.forEach(a => {
        const div = document.createElement('div');
        div.className = 'alerta-item';
        div.innerHTML = `<div class="alerta-emoji">${a.emoji}</div><div class="alerta-nome">${a.nome}</div>`;
        div.onclick = () => criarAlerta(a);
        grid.appendChild(div);
    });
}

async function criarAlerta(alerta) {
    if (!userLocation) { alert("Aguardando localização..."); return; }
    await db.ref(`alertas/${Date.now()}`).set({
        ...alerta,
        lat: userLocation[0],
        lng: userLocation[1],
        timestamp: Date.now(),
        criador: usuario
    });
    alert("✅ Alerta enviado!");
    fecharAlertas();
}

function abrirAlertas() { document.getElementById('modalAlertas').classList.add('visible'); }
function fecharAlertas() { document.getElementById('modalAlertas').classList.remove('visible'); }

initMap();
criarAlertasGrid();
</script>
</body>
</html>
