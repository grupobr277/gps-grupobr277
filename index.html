<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS COMUNIDADE PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #007bff; --dark: #2c3e50; }
        
        /* CORREÇÃO DA TELA BRANCA: Altura absoluta */
        html, body { 
            margin: 0; padding: 0; 
            height: 100vh; width: 100vw; 
            overflow: hidden; background: #222; 
        }
        
        #map { 
            position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            height: 100%; width: 100%; z-index: 1; 
        }

        /* GPS Pulsante */
        .meu-gps {
            width: 18px; height: 18px; background: var(--blue);
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,123,255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,123,255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,123,255, 0); }
        }

        /* Menu Alertas */
        .menu-alertas {
            position: absolute; top: 70px; left: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .btn-alerta {
            background: white; border: none; padding: 8px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 70px; cursor: pointer;
            text-align: center; font-size: 9px; font-weight: bold;
        }

        /* Chat Lateral */
        #chat-lateral {
            position: fixed; right: -100%; top: 0; 
            width: 85%; max-width: 320px; height: 100dvh;
            background: white; z-index: 2000; transition: 0.3s ease; 
            display: flex; flex-direction: column;
        }
        #chat-lateral.aberto { right: 0; }
        .chat-header { padding: 15px; background: var(--dark); color: white; font-weight: bold; display: flex; justify-content: space-between; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f4f4f4; }
        .balao-ia { background: #e7f3ff; border-left: 4px solid var(--blue); padding: 8px; border-radius: 8px; font-size: 13px; }
        .balao-user { background: #ddd; padding: 8px; border-radius: 8px; font-size: 13px; align-self: flex-end; }
        .entrada-chat { padding: 10px; border-top: 1px solid #ccc; display: flex; background: white; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .entrada-chat input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; }

        /* Busca */
        .leaflet-control-geocoder { margin-top: 10px !important; }
    </style>
</head>
<body>

<div id="map"></div>

<button onclick="toggleChat()" style="position:fixed; bottom:20px; right:20px; z-index:1001; width:55px; height:55px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:22px; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5)">💬</button>

<div class="menu-alertas">
    <button class="btn-alerta" onclick="registrar('Acidente', '⚠️')">⚠️<br>ACIDENTE</button>
    <button class="btn-alerta" onclick="registrar('Obras', '🚧')">🚧<br>OBRAS</button>
    <button class="btn-alerta" onclick="registrar('Pane', '🚛')">🚛<br>PANE</button>
    <button class="btn-alerta" onclick="registrar('Bloqueio', '🚫')">🚫<br>BLOQUEIO</button>
</div>

<div id="chat-lateral">
    <div class="chat-header"><span>IA ASSISTENTE</span><span onclick="toggleChat()">FECHAR</span></div>
    <div id="mensagens"></div>
    <div class="entrada-chat">
        <input type="text" id="input-chat" placeholder="Pergunte...">
        <button onclick="enviarChat()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:5px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- INICIALIZAR MAPA ---
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const iconeOutrosCarros = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
    iconSize: [26, 26]
});

let meuLatLng, meuMarker, routingControl, listaAlertas = [];
let motoristasAtivos = {}, meuID = "Drive_" + Math.random().toString(36).substr(2, 5).toUpperCase();

// BUSCA E ROTA
const geocoder = L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Destino..." }).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (routingControl) map.removeControl(routingControl);
    routingControl = L.Routing.control({
        waypoints: [meuLatLng, dest],
        lineOptions: { styles: [{ color: '#007bff', weight: 6 }] },
        createMarker: () => null 
    }).addTo(map);
    map.flyTo(dest, 14);
}).addTo(map);

// GPS
function iniciarApp() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
            map.setView(meuLatLng, 15);
        } else { meuMarker.setLatLng(meuLatLng); }
        db.ref("usuarios/" + meuID).set({ lat: meuLatLng.lat, lon: meuLatLng.lng, time: Date.now() });
    }, null, { enableHighAccuracy: true });
}

// OUTROS MOTORISTAS
db.ref("usuarios").on("value", snap => {
    const usuarios = snap.val() || {};
    for (let id in usuarios) {
        if (id === meuID) continue;
        const u = usuarios[id];
        if (motoristasAtivos[id]) { motoristasAtivos[id].setLatLng([u.lat, u.lon]); }
        else { motoristasAtivos[id] = L.marker([u.lat, u.lon], { icon: iconeOutrosCarros }).addTo(map); }
    }
});

// ALERTAS
function registrar(tipo, emoji) {
    if (!meuLatLng) return;
    db.ref("ocorrencias").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng });
}
db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    listaAlertas.push(o);
    const iconHTML = `<div style="text-align:center"><span style="font-size:24px">${o.emoji}</span><br><b style="background:white;padding:2px;font-size:9px;border:1px solid #000">${o.tipo}</b></div>`;
    L.marker([o.lat, o.lng], { icon: L.divIcon({ html: iconHTML, iconSize: [50, 40], className: '' }) }).addTo(map);
});

// CHAT
function toggleChat() { document.getElementById('chat-lateral').classList.toggle('aberto'); }
function enviarChat() {
    const input = document.getElementById('input-chat');
    if (!input.value) return;
    addBalao(input.value, 'balao-user');
    
    setTimeout(() => {
        let resp = listaAlertas.length > 0 ? `Atenção: Temos registros de ${listaAlertas.map(a => a.tipo).join(", ")}.` : "Pista limpa em nosso sistema!";
        addBalao(resp, 'balao-ia');
        const falar = new SpeechSynthesisUtterance(resp);
        falar.lang = 'pt-BR';
        window.speechSynthesis.speak(falar);
    }, 800);
    input.value = "";
}
function addBalao(msg, classe) {
    const box = document.getElementById('mensagens');
    const div = document.createElement('div');
    div.className = classe; div.innerHTML = msg;
    box.appendChild(div); box.scrollTop = box.scrollHeight;
}

iniciarApp();
</script>
</body>
</html>
