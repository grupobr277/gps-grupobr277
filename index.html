<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | Monitoramento Real-Time</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; overflow: hidden; background: #222; }
        #map { height: 100vh; width: 100vw; }
        
        /* Interface Superior */
        .painel-alertas {
            position: absolute; top: 10px; left: 10px; z-index: 1001;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px;
        }
        .btn {
            border: none; border-radius: 6px; padding: 10px; color: white;
            font-weight: bold; cursor: pointer; font-size: 12px;
        }
        .btn-acidente { background: #ff4444; }
        .btn-radar { background: #33b5e5; }
        .btn-animal { background: #ffbb33; }
        .btn-obras { background: #888; }

        /* Chat Lateral */
        #chat-window {
            position: absolute; right: -320px; top: 0; width: 300px; height: 100vh;
            background: white; z-index: 1005; transition: 0.4s;
            display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }
        #chat-window.open { right: 0; }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; }
        .msg { margin-bottom: 12px; padding: 8px; border-radius: 8px; background: #eee; font-size: 13px; }
        .msg-bot { background: #e3f2fd; border-left: 4px solid #2196f3; }
        .chat-input-box { padding: 10px; display: flex; border-top: 1px solid #ddd; }
        
        /* Botão flutuante do Chat */
        .fab-chat {
            position: absolute; bottom: 20px; right: 20px; z-index: 1001;
            width: 60px; height: 60px; background: #28a745; border-radius: 50%;
            border: none; color: white; font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="painel-alertas">
    <button class="btn btn-acidente" onclick="alerta('⚠️ Acidente')">ACIDENTE</button>
    <button class="btn btn-radar" onclick="alerta('📸 Radar Fixo')">RADAR</button>
    <button class="btn btn-animal" onclick="alerta('🦌 Animal')">ANIMAL</button>
    <button class="btn btn-obras" onclick="alerta('🚧 Obras')">OBRAS</button>
</div>

<button class="fab-chat" onclick="document.getElementById('chat-window').classList.toggle('open')">💬</button>

<div id="chat-window">
    <div style="padding: 15px; background: #28a745; color: white; font-weight: bold;">GRUPO BR-277</div>
    <div id="msg-container"></div>
    <div class="chat-input-box">
        <input type="text" id="chat-in" placeholder="Escreva aqui..." style="flex:1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <button onclick="enviarChat()" style="margin-left:5px; background:#28a745; color:white; border:none; border-radius:4px; padding: 0 10px;">></button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- INICIALIZAÇÃO FIREBASE ---
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    databaseURL: "https://SEU-PROJETO.firebaseio.com",
    projectId: "SEU-PROJETO"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- CONFIG MAPA ---
let map = L.map('map', {zoomControl: false}).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const carroIcon = L.icon({
    iconUrl: "https://i.imgur.com/39N246L.png", // Ícone de carro visto de cima
    iconSize: [40, 40], iconAnchor: [20, 20]
});

let meuID = "User_" + Math.random().toString(36).substr(2, 4).toUpperCase();
let meuMarker;
let motoristas = {};

// --- GEOLOCALIZAÇÃO ---
function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, heading } = pos.coords;
        const latlng = [latitude, longitude];
        const direcao = heading || 0;

        if (!meuMarker) {
            meuMarker = L.marker(latlng, {icon: carroIcon, rotationAngle: direcao}).addTo(map);
            map.panTo(latlng);
        } else {
            meuMarker.setLatLng(latlng);
            meuMarker.setRotationAngle(direcao);
        }

        // Envia para o Firebase e limpa ao sair
        db.ref("usuarios/" + meuID).set({ lat: latitude, lon: longitude, dir: direcao });
        db.ref("usuarios/" + meuID).onDisconnect().remove();
    }, null, { enableHighAccuracy: true });
}

// Sincronizar motoristas
db.ref("usuarios").on("value", snap => {
    const data = snap.val() || {};
    for (let id in data) {
        if (id === meuID) continue;
        const u = data[id];
        if (motoristas[id]) {
            motoristas[id].setLatLng([u.lat, u.lon]);
            motoristas[id].setRotationAngle(u.dir);
        } else {
            motoristas[id] = L.marker([u.lat, u.lon], {icon: carroIcon, rotationAngle: u.dir}).addTo(map);
        }
    }
    // Remover quem saiu
    for (let id in motoristas) {
        if (!data[id]) { map.removeLayer(motoristas[id]); delete motoristas[id]; }
    }
});

// --- ALERTAS ---
function alerta(tipo) {
    if (!meuMarker) return alert("GPS desligado");
    const p = meuMarker.getLatLng();
    db.ref("ocorrencias").push({ tipo, lat: p.lat, lon: p.lng, time: Date.now() });
}

db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    const markerOcorrencia = L.marker([o.lat, o.lon]).addTo(map).bindPopup(o.tipo).openPopup();
    // Auto-remover do mapa após 1 hora (limpeza visual)
    setTimeout(() => map.removeLayer(markerOcorrencia), 3600000);
});

// --- CHAT COM IA BÁSICA ---
function enviarChat() {
    const el = document.getElementById("chat-in");
    const texto = el.value.trim();
    if (!texto) return;

    db.ref("chat").push({ user: meuID, msg: texto, time: Date.now() });
    
    // Simulação de IA (Inteligência Simples de Estrada)
    if (texto.toLowerCase().includes("condição") || texto.toLowerCase().includes("serra")) {
        setTimeout(() => {
            db.ref("chat").push({ 
                user: "🤖 ASSISTENTE BR-277", 
                msg: "Motorista, verifique os alertas no mapa. Neblina intensa na serra é comum agora!", 
                time: Date.now() 
            });
        }, 1500);
    }
    el.value = "";
}

db.ref("chat").limitToLast(15).on("child_added", snap => {
    const c = snap.val();
    const box = document.getElementById("msg-container");
    const div = document.createElement("div");
    div.className = "msg" + (c.user.includes("🤖") ? " msg-bot" : "");
    div.innerHTML = `<strong>${c.user}:</strong> ${c.msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
});

iniciarGPS();
</script>
</body>
</html>
