<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS COMUNIDADE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #007bff; --dark: #2c3e50; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #e5e3df; }

        /* Bolinha Pulsante (Você no Mapa) */
        .meu-gps {
            width: 16px; height: 16px; background: var(--blue);
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,123,255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,123,255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,123,255, 0); }
        }

        /* Menu de Alertas Lateral */
        .menu-alertas {
            position: absolute; top: 100px; left: 15px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .btn-alerta {
            background: white; border: none; padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 75px; cursor: pointer;
            text-align: center; font-size: 10px; font-weight: bold;
        }

        /* Chat Lateral Inteligente */
        #chat-lateral {
            position: absolute; right: -310px; top: 0; width: 300px; height: 100vh;
            background: white; z-index: 2000; transition: 0.4s; display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        #chat-lateral.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; background: #fdfdfd; }
        .balao-ia { background: #e7f3ff; border-left: 4px solid var(--blue); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
        .balao-user { background: #f1f1f1; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; align-self: flex-end; }
        
        .entrada-chat { padding: 10px; border-top: 1px solid #eee; display: flex; }
        .entrada-chat input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }

        /* Barra de Busca Customizada */
        .leaflet-control-geocoder { border-radius: 20px !important; margin-top: 20px !important; }
    </style>
</head>
<body>

<div id="map"></div>

<button onclick="toggleChat()" style="position:absolute; bottom:20px; right:20px; z-index:1001; width:60px; height:60px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:25px; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3)">💬</button>

<div class="menu-alertas">
    <button class="btn-alerta" onclick="registrar('Acidente', '⚠️')"><span style="font-size:20px">⚠️</span><br>ACIDENTE</button>
    <button class="btn-alerta" onclick="registrar('Obras', '🚧')"><span style="font-size:20px">🚧</span><br>OBRAS</button>
    <button class="btn-alerta" onclick="registrar('Pane', '🚛')"><span style="font-size:20px">🚛</span><br>PANE</button>
    <button class="btn-alerta" onclick="registrar('Animal', '🦌')"><span style="font-size:20px">🦌</span><br>ANIMAL</button>
</div>

<div id="chat-lateral">
    <div style="padding:20px; background:var(--dark); color:white; font-weight:bold">IA ASSISTENTE BR-277</div>
    <div id="mensagens"></div>
    <div class="entrada-chat">
        <input type="text" id="input-chat" placeholder="Pergunte sobre a rodovia...">
        <button onclick="enviarChat()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:40px; margin-left:5px; cursor:pointer">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// INICIAR MAPA
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 1. BUSCA E ROTA (GRATUITO)
const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Pesquisar destino...",
    errorMessage: "Endereço não encontrado."
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (routingControl) map.removeControl(routingControl);
    routingControl = L.Routing.control({
        waypoints: [meuLatLng, dest],
        lineOptions: { styles: [{ color: '#007bff', weight: 7 }] },
        createMarker: () => null // Deixa a linha limpa
    }).addTo(map);
}).addTo(map);

let routingControl, meuLatLng, meuMarker;
let listaAlertas = [];

// 2. GPS EM TEMPO REAL
navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if (!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
        map.setView(meuLatLng, 15);
    } else {
        meuMarker.setLatLng(meuLatLng);
    }
}, null, { enableHighAccuracy: true });

// 3. REGISTRAR OCORRÊNCIA COM LEGENDA FIXA
function registrar(tipo, emoji) {
    if (!meuLatLng) return;
    db.ref("ocorrencias").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, hora: Date.now() });
}

db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    listaAlertas.push(o); // Guarda para a IA ler
    const iconHTML = `<div style="text-align:center">
                        <span style="font-size:30px">${o.emoji}</span><br>
                        <b style="background:white; padding:2px 5px; border-radius:5px; border:1px solid #000; font-size:10px">${o.tipo.toUpperCase()}</b>
                      </div>`;
    L.marker([o.lat, o.lng], { icon: L.divIcon({ html: iconHTML, iconSize: [60, 50], className: '' }) }).addTo(map);
});

// 4. IA INTELIGENTE (Lê o mapa e responde)
function toggleChat() { document.getElementById('chat-lateral').classList.toggle('aberto'); }

function enviarChat() {
    const input = document.getElementById('input-chat');
    const texto = input.value.trim();
    if (!texto) return;

    addBalao(texto, 'balao-user');
    input.value = "";

    setTimeout(() => {
        let resposta = "";
        const pergunta = texto.toLowerCase();

        if (pergunta.includes("como está") || pergunta.includes("trânsito") || pergunta.includes("curitiba")) {
            if (listaAlertas.length === 0) {
                resposta = "A BR-277 parece tranquila agora. Não temos alertas registrados no sistema.";
            } else {
                const resumo = listaAlertas.map(a => a.tipo).join(", ");
                resposta = `No momento, o grupo reportou: ${resumo}. Dirija com atenção redobrada!`;
            }
        } else {
            resposta = "Olá! Eu monitoro a BR-277 em tempo real. Você pode me perguntar sobre as condições da pista ou registrar um alerta pelos botões.";
        }
        
        addBalao(resposta, 'balao-ia');
        // Voz da IA
        const falar = new SpeechSynthesisUtterance(resposta);
        falar.lang = 'pt-BR';
        window.speechSynthesis.speak(falar);
    }, 800);
}

function addBalao(msg, classe) {
    const box = document.getElementById('mensagens');
    const div = document.createElement('div');
    div.className = classe;
    div.innerHTML = msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
