<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÁDIO BR-277 | Mapa + Alertas com Foto + Chat</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a15;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            background: #0f0f23;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* CABEÇALHO DO RÁDIO */
        .radio-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 12px 16px;
            border-bottom: 3px solid #00BFFF;
        }

        .radio-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .radio-top h1 {
            font-size: 18px;
            color: #ffd700;
        }

        .radio-top h1 i {
            color: #00BFFF;
            margin-right: 5px;
        }

        .freq-badge {
            background: #0a0a15;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .freq-badge span {
            color: #00ff88;
            font-family: monospace;
            font-size: 11px;
        }

        /* SCROLL DE CIDADES */
        .cities-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding: 8px 0;
        }

        .cities-list {
            display: inline-flex;
            gap: 8px;
            padding: 0 5px;
        }

        .city-chip {
            background: #1f1f35;
            border: 1px solid #3a3a5a;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            color: #ccc;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .city-chip.active {
            background: linear-gradient(145deg, #00BFFF, #0066cc);
            color: white;
            border-color: #ffd700;
        }

        .city-count {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 2px 6px;
            font-size: 9px;
        }

        .city-chip.active .city-count {
            background: #ffd700;
            color: #1a1a2e;
        }

        /* ESTAÇÃO ATUAL */
        .current-station {
            background: #0f0f23;
            margin: 10px 16px;
            padding: 10px 16px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00BFFF;
        }

        .current-name {
            font-size: 15px;
            font-weight: bold;
            color: white;
        }

        .current-online {
            background: #00BFFF;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
        }

        /* MAPA */
        .map-area {
            flex: 1;
            position: relative;
            margin: 8px 16px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
            min-height: 200px;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* BARRA INFERIOR */
        .action-bar {
            display: flex;
            gap: 10px;
            padding: 10px 16px;
            background: #0f0f23;
            border-top: 1px solid #2a2a4a;
        }

        .ptt-btn {
            flex: 2;
            background: radial-gradient(circle at 30% 30%, #e53935, #8b0000);
            border: 2px solid #ffd700;
            border-radius: 50px;
            padding: 12px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ptt-btn:active { transform: scale(0.97); }
        .ptt-btn.recording { animation: pulse-red 0.6s infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 #e53935; }
            70% { box-shadow: 0 0 0 12px rgba(229,57,53,0); }
        }

        .action-btn {
            flex: 1;
            background: #1f1f35;
            border: 1px solid #3a3a5a;
            border-radius: 50px;
            padding: 12px;
            color: #ccc;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn i { color: #00BFFF; }

        /* MODAL ALERTAS (15 itens) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.visible { display: flex; }

        .modal-card {
            background: #1a1a2e;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            max-height: 80vh;
            overflow: hidden;
            border: 2px solid #00BFFF;
        }

        .modal-header {
            background: #00BFFF;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
        }

        .alertas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 16px;
        }

        .alerta-item {
            background: #252542;
            border-radius: 14px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a5a;
        }

        .alerta-item:hover { transform: scale(1.05); border-color: #ffd700; }
        .alerta-icon { font-size: 28px; }
        .alerta-nome { font-size: 9px; color: white; margin-top: 4px; font-weight: 600; }

        /* POPUP DO ALERTA (COM FOTO E CHAT) */
        .popup-alerta {
            background: #1a1a2e;
            border-radius: 16px;
            max-width: 280px;
            overflow: hidden;
            border: 2px solid #00BFFF;
        }
        .popup-alerta-img { width: 100%; height: 120px; object-fit: cover; }
        .popup-header { padding: 8px 12px; background: #00BFFF; color: white; display: flex; justify-content: space-between; }
        .popup-chat { padding: 10px; max-height: 150px; overflow-y: auto; background: #0f0f23; }
        .popup-chat-msg { margin: 5px 0; padding: 6px 10px; border-radius: 12px; font-size: 11px; }
        .popup-chat-msg.me { background: #00BFFF; margin-left: auto; text-align: right; }
        .popup-chat-msg.other { background: #252542; }
        .popup-input { display: flex; padding: 8px; gap: 5px; border-top: 1px solid #2a2a4a; }
        .popup-input input { flex: 1; padding: 8px; border-radius: 20px; border: none; background: #252542; color: white; }
        .popup-input button { background: #00BFFF; border: none; width: 32px; border-radius: 50%; cursor: pointer; }

        /* MODAL CHAT GERAL */
        .chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a15;
            z-index: 11000;
            display: none;
            flex-direction: column;
        }
        .chat-modal.visible { display: flex; }
        .chat-header { background: #075e54; padding: 12px; color: white; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; background: #e5ddd5; }
        .chat-input-area { display: flex; padding: 8px; background: #f0f0f0; gap: 8px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 25px; border: none; }
        .chat-input-area button { background: #075e54; border: none; width: 42px; border-radius: 50%; color: white; cursor: pointer; }
        .msg { margin: 6px 0; padding: 8px 12px; border-radius: 18px; max-width: 80%; font-size: 12px; }
        .msg.me { background: #dcf8c6; margin-left: auto; }
        .msg.other { background: white; }

        /* NOTIFICAÇÃO */
        .toast-audio {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00BFFF;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 12000;
            display: none;
            font-weight: bold;
            border: 2px solid gold;
            font-size: 12px;
        }

        .cities-scroll::-webkit-scrollbar { height: 3px; }
        .cities-scroll::-webkit-scrollbar-track { background: #1a1a2e; }
        .cities-scroll::-webkit-scrollbar-thumb { background: #00BFFF; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app">
    <!-- RÁDIO HEADER -->
    <div class="radio-header">
        <div class="radio-top">
            <h1><i class="fas fa-broadcast-tower"></i> RÁDIO BR-277</h1>
            <div class="freq-badge"><span>27.7 MHz</span> <i class="fas fa-circle" style="color:#00ff88; font-size:8px;"></i></div>
        </div>
        <div class="cities-scroll">
            <div class="cities-list" id="citiesList"></div>
        </div>
    </div>

    <!-- ESTAÇÃO ATUAL -->
    <div class="current-station">
        <div class="current-name" id="currentStationName">Curitiba</div>
        <div class="current-online" id="currentStationCount">0 online</div>
    </div>

    <!-- MAPA -->
    <div class="map-area">
        <div id="map"></div>
    </div>

    <!-- AÇÕES -->
    <div class="action-bar">
        <button class="ptt-btn" id="pttBtn"><i class="fas fa-microphone-alt"></i> FALAR <span id="timerText" style="font-size:11px;"></span></button>
        <div class="action-btn" onclick="openAlertasModal()"><i class="fas fa-exclamation-triangle"></i> REPORTE</div>
        <div class="action-btn" onclick="openChatModal()"><i class="fas fa-comment-dots"></i> CHAT</div>
    </div>
</div>

<!-- MODAL ALERTAS (15 itens) -->
<div class="modal-overlay" id="alertasModal">
    <div class="modal-card">
        <div class="modal-header">
            <span><i class="fas fa-exclamation-triangle"></i> REPORTAR OCORRÊNCIA</span>
            <span onclick="closeAlertasModal()" style="cursor:pointer;">✕</span>
        </div>
        <div class="alertas-grid" id="alertasGrid"></div>
    </div>
</div>

<!-- MODAL CHAT GERAL -->
<div class="chat-modal" id="chatModal">
    <div class="chat-header">
        <span><i class="fas fa-comments"></i> GRUPO BR-277</span>
        <span onclick="closeChatModal()" style="cursor:pointer; font-size:22px;">✕</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
        <button onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- NOTIFICAÇÃO ÁUDIO -->
<div class="toast-audio" id="audioToast">🎙️ ÁUDIO RECEBIDO</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==================== 21 CIDADES ====================
const cities = [
    "Guarapuava", "Palmeira", "Porto Amazonas", "Ponta Grossa", "São Luiz",
    "Campo Largo", "Curitiba", "Alm. Tamandaré", "Fazenda Rio Grande", "Tijucas do Sul",
    "Guaratuba", "Morretes", "Paranaguá", "São José", "Colombo",
    "Araucária", "Piraquara", "Campina Grande", "Quatro Barras", "Barra do Turvo", "Cajati"
];

// ==================== 15 ALERTAS (COM CORES) ====================
const alertasLista = [
    { nome: 'ACIDENTE', icone: '💥', cor: '#e53935', bg: 'linear-gradient(145deg, #e53935, #b71c1c)' },
    { nome: 'OBRAS', icone: '🚧', cor: '#ff9800', bg: 'linear-gradient(145deg, #ff9800, #f57c00)' },
    { nome: 'PANE', icone: '🔧', cor: '#795548', bg: 'linear-gradient(145deg, #795548, #5d4037)' },
    { nome: 'ANIMAL', icone: '🐂', cor: '#9c27b0', bg: 'linear-gradient(145deg, #9c27b0, #7b1fa2)' },
    { nome: 'RADAR', icone: '📷', cor: '#607d8b', bg: 'linear-gradient(145deg, #607d8b, #455a64)' },
    { nome: 'BARREIRA', icone: '⛰️', cor: '#8b4513', bg: 'linear-gradient(145deg, #8b4513, #5d3a1a)' },
    { nome: 'NEBLINA', icone: '🌫️', cor: '#00acc1', bg: 'linear-gradient(145deg, #00acc1, #0097a7)' },
    { nome: 'CONGEST', icone: '🔴', cor: '#f44336', bg: 'linear-gradient(145deg, #f44336, #d32f2f)' },
    { nome: 'ALAGAMENTO', icone: '💧', cor: '#2196f3', bg: 'linear-gradient(145deg, #2196f3, #1976d2)' },
    { nome: 'BLOQUEIO', icone: '⛔', cor: '#b71c1c', bg: 'linear-gradient(145deg, #b71c1c, #8B0000)' },
    { nome: 'PERIGO', icone: '⚠️', cor: '#ff5722', bg: 'linear-gradient(145deg, #ff5722, #e64a19)' },
    { nome: 'DESVIO', icone: '🔄', cor: '#3f51b5', bg: 'linear-gradient(145deg, #3f51b5, #303f9f)' },
    { nome: 'CARGA', icone: '📦', cor: '#8bc34a', bg: 'linear-gradient(145deg, #8bc34a, #689f38)' },
    { nome: 'GRANIZO', icone: '🧊', cor: '#00bcd4', bg: 'linear-gradient(145deg, #00bcd4, #0097a7)' },
    { nome: 'MANIFEST', icone: '📢', cor: '#ff4081', bg: 'linear-gradient(145deg, #ff4081, #f50057)' }
];

// ==================== VARIÁVEIS ====================
let usuario = localStorage.getItem('radio_user');
if (!usuario) {
    usuario = prompt("🎙️ Digite seu nome:", "Motorista");
    if (!usuario) usuario = "Motorista";
    localStorage.setItem('radio_user', usuario);
}

let estacaoAtual = localStorage.getItem('current_station') || 'curitiba';
let mediaRecorder = null;
let recording = false;
let audioChunks = [];
let timerInterval = null;
let secondsLeft = 20;
let mapa = null;
let userLocation = null;
let userMarker = null;
let alertasMapa = {};
let audioListenerRef = null;

// ==================== CRIAR BOTÕES DAS CIDADES ====================
function criarBotoesCidades() {
    const container = document.getElementById('citiesList');
    container.innerHTML = '';
    
    cities.forEach(cidade => {
        const id = cidade.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c').replace(/á/g, 'a').replace(/â/g, 'a').replace(/ã/g, 'a');
        const chip = document.createElement('div');
        chip.className = 'city-chip';
        if (id === estacaoAtual) chip.classList.add('active');
        chip.innerHTML = `${cidade} <span class="city-count" id="count-${id}">0</span>`;
        chip.onclick = () => trocarEstacao(id, cidade);
        container.appendChild(chip);
    });
}

// ==================== TROCAR ESTAÇÃO ====================
function trocarEstacao(id, nome) {
    estacaoAtual = id;
    localStorage.setItem('current_station', id);
    
    document.querySelectorAll('.city-chip').forEach(chip => chip.classList.remove('active'));
    event.target.closest('.city-chip').classList.add('active');
    document.getElementById('currentStationName').innerText = nome;
    
    db.ref(`estacoes/${id}/users/${usuario}`).set({ nome: usuario, timestamp: Date.now() });
    
    cities.forEach(c => {
        const outroId = c.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
        if (outroId !== id) db.ref(`estacoes/${outroId}/users/${usuario}`).remove();
    });
    
    setupAudioListener();
    showToast(`📻 Você entrou em ${nome}`);
}

// ==================== CONTAGEM DE USUÁRIOS ====================
function carregarContagens() {
    cities.forEach(cidade => {
        const id = cidade.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
        db.ref(`estacoes/${id}/users`).on('value', (snap) => {
            const users = snap.val();
            const count = users ? Object.keys(users).length : 0;
            const el = document.getElementById(`count-${id}`);
            if (el) el.innerText = count;
            if (id === estacaoAtual) document.getElementById('currentStationCount').innerText = `${count} online`;
        });
    });
}

// ==================== ÁUDIO ====================
function setupAudioListener() {
    if (audioListenerRef) db.ref(`estacoes/${estacaoAtual}/audios`).off('child_added', audioListenerRef);
    
    audioListenerRef = db.ref(`estacoes/${estacaoAtual}/audios`).on('child_added', (snap) => {
        const data = snap.val();
        if (data && data.sender !== usuario) {
            const audio = new Audio(data.audio);
            audio.play().catch(e => console.log);
            const toast = document.getElementById('audioToast');
            toast.style.display = 'block';
            toast.innerHTML = `🎙️ ${data.sender} falou em ${data.station}`;
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    });
}

const pttBtn = document.getElementById('pttBtn');
const timerText = document.getElementById('timerText');

async function startRecording() {
    if (recording) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        secondsLeft = 20;
        
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            if (audioChunks.length) {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const cidadeNome = cities.find(c => {
                        const id = c.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
                        return id === estacaoAtual;
                    });
                    await db.ref(`estacoes/${estacaoAtual}/audios`).push({
                        sender: usuario,
                        station: cidadeNome,
                        audio: reader.result,
                        timestamp: Date.now()
                    });
                    const snap = await db.ref(`estacoes/${estacaoAtual}/audios`).once('value');
                    const audios = snap.val();
                    if (audios) {
                        const keys = Object.keys(audios);
                        if (keys.length > 30) keys.slice(0, keys.length - 30).forEach(k => db.ref(`estacoes/${estacaoAtual}/audios/${k}`).remove());
                    }
                };
                reader.readAsDataURL(blob);
            }
            stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start(100);
        recording = true;
        pttBtn.classList.add('recording');
        timerText.innerText = '20s';
        
        timerInterval = setInterval(() => {
            secondsLeft--;
            timerText.innerText = `${secondsLeft}s`;
            if (secondsLeft <= 0) stopRecording();
        }, 1000);
        
        setTimeout(() => { if (recording) stopRecording(); }, 20000);
    } catch(e) { alert("🎤 Permita o acesso ao microfone!"); }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    if (timerInterval) clearInterval(timerInterval);
    recording = false;
    pttBtn.classList.remove('recording');
    timerText.innerText = '';
}

pttBtn.addEventListener('mousedown', startRecording);
pttBtn.addEventListener('mouseup', stopRecording);
pttBtn.addEventListener('mouseleave', stopRecording);
pttBtn.addEventListener('touchstart', startRecording);
pttBtn.addEventListener('touchend', stopRecording);

// ==================== MAPA ====================
function initMap() {
    mapa = L.map('map').setView([-25.4284, -49.2733], 12);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);
    
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            userLocation = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.marker(userLocation, {
                    icon: L.divIcon({ html: '<div style="font-size:28px;">🚗</div>', iconSize: [28, 28], iconAnchor: [14, 14], className: '' })
                }).addTo(mapa);
                mapa.setView(userLocation, 13);
            } else {
                userMarker.setLatLng(userLocation);
            }
            db.ref(`localizacoes/${usuario}`).set({ lat: userLocation[0], lng: userLocation[1], estacao: estacaoAtual, timestamp: Date.now() });
        });
    }
    
    carregarAlertasMapa();
}

function carregarAlertasMapa() {
    db.ref('alertas').on('child_added', (snap) => {
        const a = snap.val();
        const id = snap.key;
        if (alertasMapa[id] || !mapa) return;
        
        const marker = L.marker([a.lat, a.lng], {
            icon: L.divIcon({
                html: `<div style="background:${a.cor}; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid white;">${a.icone}</div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            })
        }).addTo(mapa);
        
        // Criar popup com foto e chat
        let imgHtml = '';
        if (a.imagem) imgHtml = `<img src="${a.imagem}" class="popup-alerta-img">`;
        
        const popupDiv = document.createElement('div');
        popupDiv.className = 'popup-alerta';
        popupDiv.innerHTML = `
            ${imgHtml}
            <div class="popup-header">
                <span>${a.icone} ${a.nome}</span>
                <span>👍 ${a.confirmacoes || 0}</span>
            </div>
            <div class="popup-chat" id="chat-${id}"></div>
            <div class="popup-input">
                <input type="text" id="input-${id}" placeholder="Comentar...">
                <button onclick="sendMsgAlerta('${id}')">➔</button>
            </div>
        `;
        
        marker.bindPopup(popupDiv);
        marker.on('popupopen', () => carregarChatAlerta(id));
        alertasMapa[id] = marker;
    });
}

function carregarChatAlerta(id) {
    db.ref(`chats/alerta_${id}`).on('value', (snap) => {
        const chatDiv = document.getElementById(`chat-${id}`);
        if (!chatDiv) return;
        const msgs = snap.val();
        if (!msgs) { chatDiv.innerHTML = '<div style="text-align:center; color:#888;">Nenhum comentário</div>'; return; }
        
        let html = '';
        Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const isMe = msg.usuario === usuario;
            html += `<div class="popup-chat-msg ${isMe ? 'me' : 'other'}"><strong>${msg.usuario}</strong><br>${msg.texto}<br><small>${new Date(msg.timestamp).toLocaleTimeString()}</small></div>`;
        });
        chatDiv.innerHTML = html;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}

function sendMsgAlerta(id) {
    const input = document.getElementById(`input-${id}`);
    if (!input.value.trim()) return;
    db.ref(`chats/alerta_${id}`).push({ usuario: usuario, texto: input.value.trim(), timestamp: Date.now() });
    input.value = '';
}

// ==================== ALERTAS COM FOTO ====================
function criarAlertasGrid() {
    const grid = document.getElementById('alertasGrid');
    grid.innerHTML = '';
    alertasLista.forEach(alerta => {
        const div = document.createElement('div');
        div.className = 'alerta-item';
        div.style.background = alerta.bg;
        div.innerHTML = `<div class="alerta-icon">${alerta.icone}</div><div class="alerta-nome">${alerta.nome}</div>`;
        div.onclick = () => abrirCameraParaAlerta(alerta);
        grid.appendChild(div);
    });
}

async function abrirCameraParaAlerta(alerta) {
    if (!userLocation) { showToast("📍 Aguardando localização..."); return; }
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:20000; display:flex; flex-direction:column; align-items:center; justify-content:center;';
        
        const video = document.createElement('video');
        video.style.cssText = 'width:90%; max-width:350px; border-radius:20px;';
        video.autoplay = true;
        video.srcObject = stream;
        
        const btnFoto = document.createElement('button');
        btnFoto.style.cssText = 'margin:15px; padding:12px 25px; background:#ffd700; border:none; border-radius:40px; font-size:16px; font-weight:700; cursor:pointer;';
        btnFoto.innerHTML = '📷 TIRAR FOTO';
        
        const btnPular = document.createElement('button');
        btnPular.style.cssText = 'margin:15px; padding:12px 25px; background:#444; border:none; border-radius:40px; font-size:16px; font-weight:700; cursor:pointer; color:white;';
        btnPular.innerHTML = '⏭️ PULAR';
        
        const btnFechar = document.createElement('button');
        btnFechar.style.cssText = 'position:absolute; top:15px; right:15px; width:40px; height:40px; background:#e53935; border:none; border-radius:50%; color:white; font-size:18px; cursor:pointer;';
        btnFechar.innerHTML = '✕';
        
        overlay.appendChild(video);
        overlay.appendChild(btnFoto);
        overlay.appendChild(btnPular);
        overlay.appendChild(btnFechar);
        document.body.appendChild(overlay);
        
        btnFoto.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const id = Date.now();
                    await db.ref(`alertas/${id}`).set({
                        ...alerta,
                        lat: userLocation[0],
                        lng: userLocation[1],
                        timestamp: id,
                        criador: usuario,
                        confirmacoes: 1,
                        imagem: reader.result
                    });
                    stream.getTracks().forEach(t => t.stop());
                    document.body.removeChild(overlay);
                    showToast('✅ Alerta com foto enviado!');
                    closeAlertasModal();
                };
                reader.readAsDataURL(blob);
            }, 'image/jpeg', 0.6);
        };
        
        btnPular.onclick = async () => {
            const id = Date.now();
            await db.ref(`alertas/${id}`).set({
                ...alerta,
                lat: userLocation[0],
                lng: userLocation[1],
                timestamp: id,
                criador: usuario,
                confirmacoes: 1
            });
            stream.getTracks().forEach(t => t.stop());
            document.body.removeChild(overlay);
            showToast(`⚠️ ${alerta.nome} reportado!`);
            closeAlertasModal();
        };
        
        btnFechar.onclick = () => {
            stream.getTracks().forEach(t => t.stop());
            document.body.removeChild(overlay);
        };
        
    } catch(e) {
        const id = Date.now();
        await db.ref(`alertas/${id}`).set({
            ...alerta,
            lat: userLocation[0],
            lng: userLocation[1],
            timestamp: id,
            criador: usuario,
            confirmacoes: 1
        });
        showToast(`⚠️ ${alerta.nome} reportado!`);
        closeAlertasModal();
    }
}

function openAlertasModal() { document.getElementById('alertasModal').classList.add('visible'); }
function closeAlertasModal() { document.getElementById('alertasModal').classList.remove('visible'); }

// ==================== CHAT GERAL ====================
function openChatModal() { document.getElementById('chatModal').classList.add('visible'); carregarChatGeral(); }
function closeChatModal() { document.getElementById('chatModal').classList.remove('visible'); }

function carregarChatGeral() {
    db.ref('chat_geral').on('value', (snap) => {
        const msgs = snap.val();
        const container = document.getElementById('chatMessages');
        if (!msgs) { container.innerHTML = ''; return; }
        let html = '';
        Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const isMe = msg.usuario === usuario;
            html += `<div class="msg ${isMe ? 'me' : 'other'}"><strong>${msg.usuario}</strong><br>${msg.texto}<br><small>${new Date(msg.timestamp).toLocaleTimeString()}</small></div>`;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    });
}

function sendChatMessage() {
    const input = document.getElementById('chatInput');
    if (!input.value.trim()) return;
    db.ref('chat_geral').push({ usuario: usuario, texto: input.value.trim(), timestamp: Date.now() });
    input.value = '';
}

// ==================== UTILIDADES ====================
function showToast(msg) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#00BFFF; color:white; padding:8px 20px; border-radius:40px; z-index:13000; font-weight:bold; border:2px solid gold; font-size:12px; white-space:nowrap;';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// ==================== LIMPAR AO SAIR ====================
window.addEventListener('beforeunload', () => {
    if (usuario) db.ref(`estacoes/${estacaoAtual}/users/${usuario}`).remove();
});

// ==================== INICIAR ====================
function init() {
    criarBotoesCidades();
    carregarContagens();
    setupAudioListener();
    initMap();
    criarAlertasGrid();
    carregarChatGeral();
    showToast(`🎙️ Bem-vindo, ${usuario}!`);
}

init();
</script>
