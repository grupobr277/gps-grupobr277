<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TESTE - Botões Favoritos</title>
    <style>
        body { background: #1a1a1a; font-family: Arial; padding: 20px; color: white; }
        .station-selector {
            background: #333;
            border: 1px solid #00aaff;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .quick-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .quick-btn {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #00aaff;
            border-radius: 30px;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
        }
        .quick-btn.saved { background: #00aaff; color: white; }
        .station-dropdown {
            background: #333;
            border-radius: 16px;
            margin-top: 5px;
            display: none;
        }
        .station-dropdown.open { display: block; }
        .station-option {
            padding: 10px;
            border-bottom: 1px solid #555;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>TESTE - 5 Botões de Favoritos</h2>

<div class="station-selector" id="selectorTrigger">
    <span id="selectedCityName">Curitiba</span>
    <span>▼</span>
</div>
<div class="station-dropdown" id="stationDropdown">
    <div class="station-option" data-city="Curitiba">Curitiba</div>
    <div class="station-option" data-city="Ponta Grossa">Ponta Grossa</div>
    <div class="station-option" data-city="Guarapuava">Guarapuava</div>
    <div class="station-option" data-city="Paranaguá">Paranaguá</div>
    <div class="station-option" data-city="Maringá">Maringá</div>
</div>

<div class="quick-buttons" id="quickButtons"></div>

<script>
    // Cidades disponíveis
    const cities = ["Curitiba", "Ponta Grossa", "Guarapuava", "Paranaguá", "Maringá", "Londrina", "Cascavel"];
    let currentCity = "Curitiba";
    let quickStations = JSON.parse(localStorage.getItem('quickStations') || '[]');

    function renderQuickButtons() {
        const container = document.getElementById('quickButtons');
        container.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const btn = document.createElement('div');
            btn.className = 'quick-btn';
            if (quickStations[i]) {
                btn.textContent = quickStations[i].name;
                btn.classList.add('saved');
                btn.onclick = () => {
                    currentCity = quickStations[i].name;
                    document.getElementById('selectedCityName').textContent = currentCity;
                    alert(`Estação alterada para: ${currentCity}`);
                };
                btn.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (confirm(`Remover ${quickStations[i].name} dos favoritos?`)) {
                        quickStations.splice(i, 1);
                        localStorage.setItem('quickStations', JSON.stringify(quickStations));
                        renderQuickButtons();
                    }
                };
            } else {
                btn.textContent = `+ ${i + 1}`;
                btn.onclick = () => {
                    if (quickStations.length >= 5) {
                        alert("Limite de 5 favoritos atingido! Clique com botão direito em um para remover.");
                        return;
                    }
                    if (quickStations.some(s => s.id === currentCity)) {
                        alert(`${currentCity} já está nos favoritos!`);
                        return;
                    }
                    quickStations.push({ id: currentCity, name: currentCity });
                    localStorage.setItem('quickStations', JSON.stringify(quickStations));
                    renderQuickButtons();
                };
            }
            container.appendChild(btn);
        }
    }

    // Dropdown
    const trigger = document.getElementById('selectorTrigger');
    const dropdown = document.getElementById('stationDropdown');
    trigger.onclick = () => dropdown.classList.toggle('open');
    document.querySelectorAll('.station-option').forEach(opt => {
        opt.onclick = () => {
            currentCity = opt.dataset.city;
            document.getElementById('selectedCityName').textContent = currentCity;
            dropdown.classList.remove('open');
        };
    });
    document.addEventListener('click', (e) => {
        if (!trigger.contains(e.target)) dropdown.classList.remove('open');
    });

    renderQuickButtons();
    console.log("Teste carregado. Botões:", quickStations.length);
</script>
</body>
</html>
