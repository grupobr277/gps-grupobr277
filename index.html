<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS BR277</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  var userId = localStorage.getItem("userId");

if(!userId){
userId = "user_" + Math.random().toString(36).substr(2,9);
localStorage.setItem("userId", userId);
}

var usuariosRef = firebase.database().ref("usuarios");
var marcadores = {};

<style>
body{margin:0;font-family:Arial}
#map{height:100vh}

.menu{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:1000;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.menu button{
display:block;
width:160px;
margin:5px 0;
padding:8px;
}
</style>

</head>

<body>

<div class="menu">

<b>Registrar ocorrência</b>

<button onclick="registrar('🚨 Acidente')">🚨 Acidente</button>
<button onclick="registrar('🚧 Obra')">🚧 Obra</button>
<button onclick="registrar('🚓 Polícia')">🚓 Polícia</button>
<button onclick="registrar('🐄 Animal')">🐄 Animal</button>

</div>

<div id="map"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCjJLUgRZowkeTmpua6-uXhzOM5hqn6chI",
authDomain: "gps-br277.firebaseapp.com",
databaseURL: "https://gps-br277-default-rtdb.firebaseio.com",
projectId: "gps-br277",
storageBucket: "gps-br277.firebasestorage.app",
messagingSenderId: "459366791706",
appId: "1:459366791706:web:a8771a8981acf5d3c8afa3"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var map = L.map('map').setView([-25.42,-49.27],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var minhaPosicao;

var primeiraLocalizacao = true;

navigator.geolocation.watchPosition(function(pos){

var lat = pos.coords.latitude;
var lng = pos.coords.longitude;
var velocidade = pos.coords.speed || 0;

minhaPosicao=[lat,lng];

usuariosRef.child(userId).set({

lat:lat,
lng:lng,
velocidade:velocidade,
tempo:Date.now()

});

});
  usuariosRef.on("value",function(snapshot){

var dados = snapshot.val();

for(var id in dados){

var u = dados[id];

if(!marcadores[id]){

marcadores[id] = L.marker([u.lat,u.lng]).addTo(map);

}else{

marcadores[id].setLatLng([u.lat,u.lng]);

}

}

});
var lat = pos.coords.latitude;
var lng = pos.coords.longitude;

minhaPosicao=[lat,lng];

map.setView([lat,lng],12);

L.marker([lat,lng]).addTo(map)
.bindPopup("Você está aqui");

});

function registrar(tipo){

if(!minhaPosicao){
alert("Aguardando GPS");
return;
}

firebase.database().ref("ocorrencias").push({

tipo:tipo,
lat:minhaPosicao[0],
lng:minhaPosicao[1],
data:Date.now()

});

}

firebase.database().ref("ocorrencias").on("child_added",function(snapshot){

var d=snapshot.val();

L.marker([d.lat,d.lng]).addTo(map)
.bindPopup(d.tipo);

});

</script>

</body>
</html>
