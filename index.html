<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | MONITORAMENTO ELITE V13</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* PAINEL ALERTAS FIXO */
        .painel-alertas { position: absolute; top: 100px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 7px; border-radius: 8px; width: 85px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-shadow: 1px 1px #000; background: #1a1a1a; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #333; }

        /* CARRO PULSANTE */
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }

        /* BOTÕES FLUTUANTES */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; border: 2px solid white; background: white; touch-action: none; }
        #chat-trigger { width: 65px; height: 65px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 30px; }
        #btn-luz { width: 45px; height: 45px; background: #ffcc00; right: 25px; top: 160px; font-size: 22px; }
        #btn-bussola { width: 50px; height: 50px; left: 20px; bottom: 40px; font-size: 25px; border: 2px solid #d4af37; color: #333; }
        #user-count { position: fixed; left: 20px; bottom: 15px; color: white; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 10px; font-size: 12px; z-index: 4000; border: 1px solid #25d366; }

        /* CHAT WHATSAPP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .balao { padding: 10px; border-radius: 12px; max-width: 85%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }
        .reply-box { font-size: 11px; background: rgba(0,0,0,0.05); padding: 5px; border-left: 3px solid var(--ws-green); margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="user-count">👥 Online: 1</div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️', 4)">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫', 4)">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧', 3)">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗', 2)">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕', 1)">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️', 2)">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️', 1)">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️', 3)">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️', 1)">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦', 2)">📦 CARGA</div>
</div>

<div id="btn-luz" class="f-btn">💡</div>
<div id="btn-bussola" class="f-btn">🧭</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between;">
        <b>BR-277 OPERACIONAL</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:20px;">✕</span>
    </div>
    <div id="mensagens"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:5px;">
        <input type="text" id="chat-input" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:20px; border:1px solid #ccc;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:45px; height:45px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
const googleTraffic = L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

let isNight = false;
document.getElementById('btn-luz').onclick = () => {
    isNight = !isNight;
    document.getElementById('map').classList.toggle('map-dark', isNight);
};

let meuLatLng, meuMarker, user = { n: "Danilo", id: "u_danilo", v: "🚗" };

// BUSSOLA E LOCALIZAÇÃO PULSANTE
document.getElementById('btn-bussola').onclick = () => { if(meuLatLng) map.flyTo(meuLatLng, 17); };

navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    const html = `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;filter:drop-shadow(2px 2px 2px #000);">${user.v}</div>`;
    if(!meuMarker) { 
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html, className: '', iconSize:[40,40] }) }).addTo(map); 
        map.setView(meuLatLng, 16); 
    } else { 
        meuMarker.setLatLng(meuLatLng); 
    }
    db.ref("vivos/" + user.id).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, t: Date.now() });
});

// CONTADOR DE USUÁRIOS
db.ref("vivos").on("value", snap => {
    const count = snap.numChildren();
    document.getElementById('user-count').innerText = `👥 Online: ${count}`;
});

// CHAT DUPLO CLIQUE E ARRASTE
function bindChat(id) {
    const el = document.getElementById(id); let last = 0, sX, sY;
    el.addEventListener('touchstart', (e) => {
        const now = Date.now(); if(now - last < 300) document.getElementById('chat-box').classList.toggle('aberto');
        last = now; sX = e.touches[0].clientX - el.offsetLeft; sY = e.touches[0].clientY - el.offsetTop;
    });
    el.addEventListener('touchmove', (e) => {
        el.style.left = (e.touches[0].clientX - sX) + 'px'; el.style.top = (e.touches[0].clientY - sY) + 'px';
        el.style.right='auto'; el.style.bottom='auto';
    });
}
bindChat('chat-trigger');

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ uid: user.id, u: user.n, m: i.value, t: Date.now() });
    i.value = "";
}

db.ref("chat").limitToLast(40).on("value", snap => {
    const b = document.getElementById('mensagens'); b.innerHTML = "";
    snap.forEach(s => {
        const m = s.val(); const eu = m.uid === user.id;
        b.innerHTML += `<div class="balao ${eu?'balao-eu':'balao-outro'}">
            <b style="font-size:11px;">${m.u}</b> ${eu?`<span onclick="db.ref('chat/${s.key}').remove()" style="color:red;float:right;cursor:pointer">✕</span>`:''}
            <br>${m.m}
        </div>`;
    }); b.scrollTop = b.scrollHeight;
});

// ALERTAS COM COMENTÁRIO SALVANDO
function enviarAlerta(tipo, emoji, horas) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, u: user.n, exp: Date.now() + (horas * 3600000) });
}

db.ref("alertas").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== meuMarker) map.removeLayer(l); });
    snap.forEach(s => {
        const a = s.val(); if(Date.now() > a.exp) { db.ref("alertas/"+s.key).remove(); return; }
        const m = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px;">${a.emoji}</div>`, className:'' }) }).addTo(map);
        m.bindPopup(`<b>${a.tipo}</b><div id="coms-${s.key}" style="max-height:80px;overflow:auto;font-size:10px;"></div><input id="in-${s.key}" style="width:70%"><button onclick="addC('${s.key}')">➤</button>`);
        m.on('click', () => {
            db.ref(`alertas/${s.key}/coms`).on('value', cs => {
                const box = document.getElementById(`coms-${s.key}`);
                if(box) { box.innerHTML = ""; cs.forEach(c => box.innerHTML += `<p><b>${c.val().u}:</b> ${c.val().m}</p>`); }
            });
        });
    });
});

function addC(id) { const i = document.getElementById("in-"+id); db.ref(`alertas/${id}/coms`).push({u:user.n, m:i.value}); i.value=""; }
</script>
</body>
</html>
