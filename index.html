<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RÁDIO BR-277</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .radio {
            max-width: 500px;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            color: #00BFFF;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; }
        .stations {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .station {
            background: #0f0f23;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #3a3a5a;
            transition: all 0.2s;
        }
        .station.active {
            background: #00BFFF;
            border-color: gold;
        }
        .station-name { color: white; font-size: 11px; font-weight: bold; }
        .station-count { font-size: 9px; color: #aaa; }
        .station.active .station-name { color: #1a1a2e; }
        .station.active .station-count { color: #1a1a2e; background: gold; padding: 2px 6px; border-radius: 20px; }
        
        .current {
            background: #0f0f23;
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00BFFF;
        }
        .current-name { color: white; font-size: 16px; font-weight: bold; }
        .current-online { background: #00BFFF; border-radius: 30px; padding: 4px 12px; font-size: 12px; }
        
        .ptt {
            text-align: center;
            margin: 20px 0;
        }
        .ptt-btn {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: radial-gradient(circle at 30% 30%, #e53935, #8b0000);
            border: 4px solid gold;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .ptt-btn:active { transform: scale(0.95); }
        .ptt-btn.recording { animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 #e53935; }
            70% { box-shadow: 0 0 0 15px rgba(229,57,53,0); }
        }
        .timer {
            margin-top: 10px;
            color: gold;
            font-size: 20px;
            font-weight: bold;
        }
        .menu {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .menu-btn {
            flex: 1;
            background: #0f0f23;
            border: 1px solid #3a3a5a;
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            color: white;
            cursor: pointer;
        }
        .notif {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00BFFF;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            display: none;
            font-weight: bold;
            border: 2px solid gold;
            z-index: 1000;
        }
        .chat-modal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            max-height: 400px;
            border: 1px solid #00BFFF;
            z-index: 2000;
        }
        .chat-modal.visible { display: flex; }
        .chat-header { background: #00BFFF; padding: 10px; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 10px; max-height: 300px; }
        .chat-input { display: flex; padding: 10px; gap: 5px; border-top: 1px solid #333; }
        .chat-input input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #0f0f23; color: white; }
        .chat-input button { background: #00BFFF; border: none; width: 40px; border-radius: 50%; cursor: pointer; }
        .msg { margin: 5px 0; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .msg.me { background: #00BFFF; margin-left: auto; color: white; }
        .msg.other { background: #333; color: white; }
    </style>
</head>
<body>

<div class="radio">
    <div class="header">
        <h1><i class="fas fa-radio"></i> RÁDIO BR-277</h1>
        <small style="color:#888;">27.7 MHz</small>
    </div>

    <div class="stations" id="stations"></div>

    <div class="current">
        <div class="current-name" id="currentName">Curitiba</div>
        <div class="current-online" id="currentOnline">0 online</div>
    </div>

    <div class="ptt">
        <button class="ptt-btn" id="pttBtn">🎤<br>FALAR</button>
        <div class="timer" id="timer" style="display: none;">20s</div>
    </div>

    <div class="menu">
        <div class="menu-btn" onclick="abrirChat()"><i class="fas fa-comment"></i> CHAT</div>
        <div class="menu-btn" onclick="mudarNome()"><i class="fas fa-user"></i> PERFIL</div>
    </div>
</div>

<div class="notif" id="notif">🎙️ ÁUDIO RECEBIDO</div>

<div class="chat-modal" id="chatModal">
    <div class="chat-header">
        <span>💬 CHAT GERAL</span>
        <span onclick="fecharChat()" style="cursor:pointer;">✕</span>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Digite...">
        <button onclick="enviarMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ========== FIREBASE ==========
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ========== DADOS ==========
const cidades = [
    "Guarapuava", "Palmeira", "Porto Amazonas", "Ponta Grossa", "São Luiz",
    "Campo Largo", "Curitiba", "Almirante Tamandaré", "Fazenda Rio Grande", "Tijucas do Sul",
    "Guaratuba", "Morretes", "Paranaguá", "São José", "Colombo",
    "Araucária", "Piraquara", "Campina Grande", "Quatro Barras", "Barra do Turvo", "Cajati"
];

let usuario = localStorage.getItem('nome');
if (!usuario) {
    usuario = prompt("Digite seu nome:", "Motorista");
    if (usuario) localStorage.setItem('nome', usuario);
    else usuario = "Motorista";
}

let estacaoAtual = localStorage.getItem('estacao') || 'curitiba';
let gravando = false;
let mediaRecorder = null;
let audioChunks = [];
let timerInterval = null;

// ========== CRIAR BOTÕES ==========
function criarBotoes() {
    const container = document.getElementById('stations');
    container.innerHTML = '';
    cidades.forEach(cidade => {
        const id = cidade.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
        const btn = document.createElement('div');
        btn.className = 'station';
        if (id === estacaoAtual) btn.classList.add('active');
        btn.innerHTML = `
            <div class="station-name">${cidade}</div>
            <div class="station-count" id="count-${id}">0</div>
        `;
        btn.onclick = () => trocarEstacao(id, cidade);
        container.appendChild(btn);
    });
}

// ========== TROCAR ESTAÇÃO ==========
function trocarEstacao(id, nome) {
    estacaoAtual = id;
    localStorage.setItem('estacao', id);
    
    document.querySelectorAll('.station').forEach(btn => btn.classList.remove('active'));
    event.target.closest('.station').classList.add('active');
    
    document.getElementById('currentName').innerHTML = nome;
    
    // Registrar no Firebase
    db.ref(`estacoes/${id}/usuarios/${usuario}`).set({ nome: usuario, timestamp: Date.now() });
    
    // Remover de outras
    cidades.forEach(c => {
        const outroId = c.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
        if (outroId !== id) {
            db.ref(`estacoes/${outroId}/usuarios/${usuario}`).remove();
        }
    });
    
    // Recarregar listener de áudio
    carregarAudio();
    
    mostrarNotif(`📻 Você entrou em ${nome}`);
}

// ========== CONTAGEM DE USUÁRIOS ==========
function carregarContagens() {
    cidades.forEach(cidade => {
        const id = cidade.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
        db.ref(`estacoes/${id}/usuarios`).on('value', (snap) => {
            const users = snap.val();
            const count = users ? Object.keys(users).length : 0;
            const el = document.getElementById(`count-${id}`);
            if (el) el.innerHTML = count;
            if (id === estacaoAtual) {
                document.getElementById('currentOnline').innerHTML = `${count} online`;
            }
        });
    });
}

// ========== ÁUDIO: OUVIR ==========
let audioListener = null;

function carregarAudio() {
    if (audioListener) {
        db.ref(`estacoes/${estacaoAtual}/audios`).off('child_added', audioListener);
    }
    
    audioListener = db.ref(`estacoes/${estacaoAtual}/audios`).on('child_added', (snap) => {
        const data = snap.val();
        if (data && data.usuario !== usuario) {
            // Tocar áudio
            const audio = new Audio(data.audio);
            audio.play().catch(e => console.log('Erro:', e));
            
            // Mostrar notificação
            const notif = document.getElementById('notif');
            notif.style.display = 'block';
            notif.innerHTML = `🎙️ ${data.usuario} falou em ${data.estacao}`;
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    });
}

// ========== ÁUDIO: GRAVAR ==========
const pttBtn = document.getElementById('pttBtn');
const timerDiv = document.getElementById('timer');

async function comecarGravacao() {
    if (gravando) return;
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        let segundos = 20;
        
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = async () => {
            if (audioChunks.length > 0) {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const cidadeNome = cidades.find(c => {
                        const id = c.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
                        return id === estacaoAtual;
                    });
                    
                    await db.ref(`estacoes/${estacaoAtual}/audios`).push({
                        usuario: usuario,
                        estacao: cidadeNome,
                        audio: reader.result,
                        timestamp: Date.now()
                    });
                    
                    // Limpar áudios antigos (manter últimos 30)
                    const snapshot = await db.ref(`estacoes/${estacaoAtual}/audios`).once('value');
                    const audios = snapshot.val();
                    if (audios) {
                        const keys = Object.keys(audios);
                        if (keys.length > 30) {
                            keys.slice(0, keys.length - 30).forEach(k => {
                                db.ref(`estacoes/${estacaoAtual}/audios/${k}`).remove();
                            });
                        }
                    }
                };
                reader.readAsDataURL(blob);
            }
            stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start(100);
        gravando = true;
        pttBtn.classList.add('recording');
        timerDiv.style.display = 'block';
        timerDiv.innerHTML = '20s';
        
        timerInterval = setInterval(() => {
            segundos--;
            timerDiv.innerHTML = `${segundos}s`;
            if (segundos <= 0) {
                pararGravacao();
            }
        }, 1000);
        
        setTimeout(() => {
            if (gravando) pararGravacao();
        }, 20000);
        
    } catch(e) {
        alert("🎤 Para falar, permita o acesso ao microfone!");
    }
}

function pararGravacao() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
    }
    if (timerInterval) clearInterval(timerInterval);
    gravando = false;
    pttBtn.classList.remove('recording');
    timerDiv.style.display = 'none';
}

pttBtn.addEventListener('mousedown', comecarGravacao);
pttBtn.addEventListener('mouseup', pararGravacao);
pttBtn.addEventListener('mouseleave', pararGravacao);
pttBtn.addEventListener('touchstart', comecarGravacao);
pttBtn.addEventListener('touchend', pararGravacao);

// ========== CHAT ==========
function abrirChat() {
    document.getElementById('chatModal').classList.add('visible');
}
function fecharChat() {
    document.getElementById('chatModal').classList.remove('visible');
}

function carregarChat() {
    db.ref('chat_geral').on('value', (snap) => {
        const msgs = snap.val();
        const container = document.getElementById('chatMsgs');
        if (!msgs) { container.innerHTML = '<div style="text-align:center;color:#666;">Nenhuma mensagem</div>'; return; }
        
        let html = '';
        Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const isMe = msg.usuario === usuario;
            html += `
                <div class="msg ${isMe ? 'me' : 'other'}">
                    <strong>${msg.usuario}</strong><br>${msg.texto}<br>
                    <small style="font-size:9px;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                </div>
            `;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    });
}

function enviarMsg() {
    const input = document.getElementById('chatInput');
    if (!input.value.trim()) return;
    db.ref('chat_geral').push({
        usuario: usuario,
        texto: input.value.trim(),
        timestamp: Date.now()
    });
    input.value = '';
}

// ========== PERFIL ==========
function mudarNome() {
    const novo = prompt("Digite seu novo nome:", usuario);
    if (novo && novo.trim()) {
        usuario = novo.trim();
        localStorage.setItem('nome', usuario);
        mostrarNotif(`✅ Nome alterado para ${usuario}`);
    }
}

// ========== NOTIFICAÇÃO ==========
function mostrarNotif(msg) {
    const n = document.createElement('div');
    n.style.cssText = 'position:fixed; bottom:200px; left:50%; transform:translateX(-50%); background:#00BFFF; color:white; padding:8px 20px; border-radius:40px; z-index:3000; font-weight:bold; border:2px solid gold;';
    n.innerHTML = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 2000);
}

// ========== LIMPAR AO SAIR ==========
window.addEventListener('beforeunload', () => {
    if (usuario) {
        db.ref(`estacoes/${estacaoAtual}/usuarios/${usuario}`).remove();
    }
});

// ========== INICIAR ==========
criarBotoes();
carregarContagens();
carregarAudio();
carregarChat();
mostrarNotif(`🎙️ Bem-vindo, ${usuario}!`);
</script>
</body>
</html>
