<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL V22 PREMIUM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; --ws-teal: #128c7e; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* TELA DE BOAS VINDAS */
        #boas-vindas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075e54; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 30px; }
        #boas-vindas input { padding: 15px; border-radius: 30px; border: none; width: 80%; max-width: 300px; margin: 20px 0; font-size: 16px; text-align: center; }
        #boas-vindas button { padding: 15px 50px; border-radius: 30px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* PAINEL 10 ICONES */
        .painel-alertas { position: absolute; top: 70px; left: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 95px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; background: #1a1a1a; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #333; }

        /* ROTA E ENCERRAMENTO */
        .leaflet-routing-container { bottom: 20px !important; right: 10px !important; top: auto !important; width: 250px !important; background: white; border-radius: 12px; border: 2px solid #007aff; }
        .btn-x-rota { position: absolute; top: -10px; right: -10px; background: #ff5252; color: white; border-radius: 50%; width: 25px; height: 25px; border: 2px solid white; cursor: pointer; font-weight: bold; }

        /* BOTAO RECENTRALIZAR */
        #btn-rec { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); z-index: 4001; background: white; border: 2px solid var(--ws-green); border-radius: 25px; padding: 10px 20px; font-weight: bold; color: var(--ws-green); display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        /* CHAT WHATSAPP PREMIUM */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .balao { padding: 10px; border-radius: 12px; max-width: 80%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }
        #emoji-bar { display: none; padding: 10px; background: #eee; font-size: 22px; justify-content: space-around; cursor: pointer; border-top: 1px solid #ccc; }

        /* GPS E PULSANTE */
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; background: white; touch-action: none; }
    </style>
</head>
<body>

<div id="boas-vindas">
    <h2>SISTEMA BR-277 ELITE</h2>
    <p>Tecnologia de ponta por geolocalização.<br>Evite perfis fake: Você está sendo monitorado.</p>
    <input type="text" id="user-name" placeholder="Nome ou Viatura">
    <button onclick="iniciar()">ACESSAR MAPA</button>
</div>

<div id="map"></div>
<div id="btn-rec" onclick="recentralizar()">🧭 RECENTRALIZAR</div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-luz" class="f-btn" style="width:50px;height:50px;right:20px;top:20px;background:#ffcc00">💡</div>
<div id="chat-trigger" class="f-btn" style="width:65px;height:65px;right:20px;bottom:20px;background:#25d366;color:white;font-size:30px">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between;">
        <b>OPERACIONAL BR-277</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer;font-size:20px">✕</span>
    </div>
    <div id="mensagens"></div>
    <div id="emoji-bar">
        <span onclick="addEmoji('⚠️')">⚠️</span><span onclick="addEmoji('🚧')">🚧</span><span onclick="addEmoji('✅')">✅</span><span onclick="addEmoji('👍')">👍</span><span onclick="addEmoji('🚨')">🚨</span>
    </div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:8px;">
        <button onclick="toggleEmoji()" style="border:none;background:none;font-size:20px">😊</button>
        <input type="text" id="chat-input" placeholder="Mensagem..." style="flex:1; border-radius:20px; border:none; padding:10px;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:40px; height:40px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 14);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

let user = { n: "", id: "", c: "#"+Math.floor(Math.random()*16777215).toString(16) };
let meuLatLng, meuMarker, follow = true, rotaControle;

function iniciar() {
    const n = document.getElementById('user-name').value;
    if(n.length < 2) return alert("Identifique-se!");
    user.n = n; user.id = "u_"+Date.now();
    document.getElementById('boas-vindas').style.display = 'none';
}

// LUPA COM ROTA AZUL AUTOMÁTICA
const geocoder = L.Control.geocoder({ 
    defaultMarkGeocode: false, 
    placeholder: "Para onde em Curitiba?" 
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if(rotaControle) map.removeControl(rotaControle);
    rotaControle = L.Routing.control({
        waypoints: [meuLatLng, dest],
        lineOptions: { styles: [{ color: '#007aff', weight: 8, opacity: 0.8 }] },
        createMarker: () => null
    }).addTo(map);
    
    setTimeout(() => {
        const container = document.querySelector('.leaflet-routing-container');
        if(container) container.innerHTML += `<button class="btn-x-rota" onclick="map.removeControl(rotaControle)">X</button>`;
    }, 500);
}).addTo(map);

// GPS E RECENTRALIZAR
function recentralizar() { follow = true; document.getElementById('btn-rec').style.display = 'none'; map.flyTo(meuLatLng, 17); }
map.on('dragstart', () => { follow = false; document.getElementById('btn-rec').style.display = 'block'; });

navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    const iconHtml = `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;filter:drop-shadow(2px 2px 2px #000)">🚗</div>`;
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: iconHtml, className: '', iconSize:[40,40] }) }).addTo(map);
        map.setView(meuLatLng, 16);
    } else { meuMarker.setLatLng(meuLatLng); }
    if(follow) map.panTo(meuLatLng);
});

// CHAT WHATSAPP
document.getElementById('chat-trigger').onclick = () => document.getElementById('chat-box').classList.toggle('aberto');
function toggleEmoji() { const b = document.getElementById('emoji-bar'); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; }
function addEmoji(e) { document.getElementById('chat-input').value += e; toggleEmoji(); }

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: user.n, uid: user.id, m: i.value, c: user.c, t: Date.now() });
    i.value = "";
}

db.ref("chat").limitToLast(30).on("value", snap => {
    const box = document.getElementById('mensagens'); box.innerHTML = "";
    snap.forEach(s => {
        const d = s.val(); const eu = d.uid === user.id;
        box.innerHTML += `<div class="balao ${eu?'balao-eu':'balao-outro'}">
            <b style="color:${d.c}; font-size:11px;">${d.u}</b>
            ${eu ? `<span onclick="db.ref('chat/${s.key}').remove()" style="color:red; float:right; cursor:pointer">✕</span>` : ''}
            <br>${d.m}
        </div>`;
    });
    box.scrollTop = box.scrollHeight;
});

// ALERTAS
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, u: user.n, t: Date.now() });
}

db.ref("alertas").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== meuMarker) map.removeLayer(l); });
    snap.forEach(s => {
        const a = s.val();
        L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px;filter:drop-shadow(2px 2px 2px #000)">${a.emoji}</div>`, className:'' }), zIndexOffset: 1000 }).addTo(map)
        .bindPopup(`<b>${a.tipo}</b><br><small>Por: ${a.u}</small>`);
    });
});

// MOVER LUZ E CHAT
function mover(id) {
    const el = document.getElementById(id); let sX, sY;
    el.addEventListener('touchstart', e => { sX = e.touches[0].clientX - el.offsetLeft; sY = e.touches[0].clientY - el.offsetTop; });
    el.addEventListener('touchmove', e => { 
        el.style.left = (e.touches[0].clientX - sX) + 'px'; el.style.top = (e.touches[0].clientY - sY) + 'px';
        el.style.right = 'auto'; el.style.bottom = 'auto';
    });
}
mover('btn-luz'); mover('chat-trigger');
document.getElementById('btn-luz').onclick = () => document.getElementById('map').classList.toggle('map-dark');
</script>
</body>
</html>
