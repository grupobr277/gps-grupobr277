<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | TRÂNSITO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* MODAL DE BOAS-VINDAS */
        .welcome-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999999; display: flex; align-items: center; justify-content: center; }
        .welcome-content { background: linear-gradient(135deg, #1a1a1a, #2d2d2d); padding: 40px; border-radius: 40px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.3); }
        .welcome-content h2 { color: #ffd700; margin-bottom: 10px; font-size: 32px; }
        .welcome-content input { width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 2px solid #ffd700; border-radius: 30px; margin: 10px 0; font-size: 16px; outline: none; color: white; }
        
        /* BOTÃO REPORTE */
        .reporte-container { position: fixed; bottom: 90px; left: 10px; z-index: 9000; display: flex; flex-direction: column; align-items: flex-start; }
        .reporte-toggle { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); color: white; border: 2px solid #ffd700; border-radius: 40px; padding: 8px 20px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.3s ease; position: relative; overflow: hidden; letter-spacing: 1px; text-transform: uppercase; }
        .reporte-toggle .led { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 15px #4caf50; animation: pulse-led 2s infinite; }
        
        /* PAINEL DE ALERTAS */
        .alertas-panel { background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border: 2px solid #ffd700; border-radius: 16px; padding: 10px; display: none; width: 240px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: slideUp 0.3s ease; position: relative; }
        .alertas-panel.visivel { display: block; }
        .alertas-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-fechar-painel { position: absolute; right: -20px; top: 240px; width: 40px; height: 40px; background: #e53935; border: 2px solid #ffd700; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; font-weight: bold; z-index: 10; }
        
        /* CORES DOS ALERTAS (Simplificado para o exemplo) */
        .alerta-item { width: 100%; aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); background: #333; }
        .alerta-acidente { background: linear-gradient(135deg, #e53935, #b71c1c); }

        /* VELOCÍMETRO */
        .velocimetro-container { position: fixed; bottom: 20px; left: 10px; z-index: 9000; }
        .velocimetro-redondo { width: 70px; height: 70px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 3px solid #ffd700; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .velocimetro-valor { font-size: 22px; color: #ffd700; font-weight: bold; }

        /* LUPA E INTERFACE */
        .lupa-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 250px; z-index: 10000; background: white; border-radius: 40px; border: 3px solid #ffd700; display: flex; height: 45px; overflow: hidden; }
        .lupa-container input { flex: 1; padding: 10px; border: none; outline: none; }
        .lupa-container button { background: #075e54; color: white; border: none; width: 45px; cursor: pointer; }

        .botoes-direita { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9000; }
        .btn-padrao { width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 2px solid #ffd700; color: #ffd700; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }

        #btn-px { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: #333; border: 4px solid #ffd700; color: #ffd700; font-size: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9001; }
        #btn-px.ativo { background: #e53935; color: white; }

        /* ESTILO DO CARRO (AQUI ESTÁ O SEGREDO) */
        .carro-waze { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); transition: all 0.2s ease-out; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="welcome-modal" id="welcomeModal">
    <div class="welcome-content">
        <h2>🚛 BR-277</h2>
        <input type="text" id="nomeUsuario" placeholder="Seu nome" value="Motorista">
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin: 20px 0;">
            <div onclick="selecionarVeiculo('carro')" style="cursor:pointer; background:#444; padding:10px; border-radius:10px;">🚗</div>
            <div onclick="selecionarVeiculo('caminhao')" style="cursor:pointer; background:#444; padding:10px; border-radius:10px;">🚛</div>
            <div onclick="selecionarVeiculo('moto')" style="cursor:pointer; background:#444; padding:10px; border-radius:10px;">🏍️</div>
        </div>
        <button onclick="salvarCadastro()" style="width:100%; padding:15px; background:#ffd700; border-radius:30px; font-weight:bold; border:none;">ENTRAR</button>
    </div>
</div>

<div class="velocimetro-container">
    <div class="velocimetro-redondo">
        <div class="velocimetro-valor" id="velocidadeRedonda">0</div>
        <div style="font-size:9px;">km/h</div>
    </div>
</div>

<div class="lupa-container">
    <input type="text" id="buscaDestino" placeholder="Para onde vamos?">
    <button><i class="fas fa-search"></i></button>
</div>

<div id="btn-px">🎤</div>

<div class="botoes-direita">
    <div class="btn-padrao" id="btn-chat"> <i class="fas fa-comment"></i> </div>
    <div class="btn-padrao" onclick="toggleModoNoturno()"> 💡 </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. INICIALIZAÇÃO DO MAPA
    const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. CONFIGURAÇÃO DO ÍCONE (O QUE VOCÊ PRECISA)
    // Usando uma imagem que simula o estilo Waze/Uber de cima
    const iconeCarro = L.icon({
        iconUrl: 'https://i.ibb.co/9q7S8yG/car-top-view.png', 
        iconSize: [50, 50],       // Tamanho visível
        iconAnchor: [25, 25],     // CENTRALIZAÇÃO TOTAL (Metade do tamanho)
        popupAnchor: [0, -20],
        className: 'carro-waze'   // Classe para efeitos de sombra no CSS
    });

    let meuMarker = null;
    let modoNoturno = false;

    // 3. FUNÇÃO DE GPS (SEM MEXER NAS SUAS LÓGICAS)
    navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const meuLatLng = L.latLng(lat, lng);
        const velocidade = Math.round(pos.coords.speed * 3.6) || 0;

        document.getElementById('velocidadeRedonda').innerText = velocidade;

        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: iconeCarro }).addTo(map);
            map.setView(meuLatLng, 17);
        } else {
            meuMarker.setLatLng(meuLatLng);
        }
    }, err => console.log(err), { enableHighAccuracy: true });

    // 4. MANUTENÇÃO DAS SUAS FUNÇÕES ORIGINAIS
    function salvarCadastro() {
        document.getElementById('welcomeModal').style.display = 'none';
        alert("Bem-vindo ao Sistema BR-277!");
    }

    function selecionarVeiculo(tipo) {
        console.log("Veículo selecionado:", tipo);
        // Aqui você pode mudar o iconUrl do iconeCarro se quiser imagens diferentes para caminhão
    }

    function toggleModoNoturno() {
        modoNoturno = !modoNoturno;
        const mapEl = document.getElementById('map');
        if(modoNoturno) {
            mapEl.style.filter = "invert(100%) hue-rotate(180deg) brightness(95%)";
        } else {
            mapEl.style.filter = "none";
        }
    }

    // Lógica do Botão PX (Simples)
    const btnPx = document.getElementById('btn-px');
    btnPx.addEventListener('touchstart', () => btnPx.classList.add('ativo'));
    btnPx.addEventListener('touchend', () => btnPx.classList.remove('ativo'));

</script>
</body>
</html>
