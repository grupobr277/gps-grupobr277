<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÁDIO BR-277 - Comunicação dos Motoristas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .radio-container {
            max-width: 550px;
            width: 100%;
            background: rgba(18, 18, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 20px 16px;
            border: 1px solid rgba(0, 191, 255, 0.3);
        }

        .radio-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .radio-header h1 {
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .radio-header h1 i {
            color: #00BFFF;
            font-size: 24px;
        }

        .freq {
            background: #0a0a15;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-top: 8px;
        }

        .freq span {
            color: #00ff88;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-height: 340px;
            overflow-y: auto;
            padding: 6px 4px;
            margin-bottom: 20px;
        }

        .station-btn {
            background: linear-gradient(145deg, #23233a, #181830);
            border-radius: 16px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #3a3a5a;
        }

        .station-btn.active {
            background: linear-gradient(145deg, #00BFFF, #0066cc);
            border-color: #ffd700;
            box-shadow: 0 0 16px rgba(0, 191, 255, 0.5);
        }

        .station-btn.active .city-name {
            color: white;
        }

        .city-name {
            font-size: 11px;
            font-weight: 600;
            color: #ddd;
            display: block;
            line-height: 1.3;
        }

        .city-count {
            font-size: 9px;
            background: rgba(0, 191, 255, 0.2);
            border-radius: 20px;
            padding: 2px 6px;
            margin-top: 6px;
            display: inline-block;
            color: #aaa;
        }

        .station-btn.active .city-count {
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
        }

        .current-station-card {
            background: linear-gradient(135deg, #0f0f23, #16162f);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #00BFFF;
        }

        .station-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .station-info i {
            font-size: 24px;
            color: #00BFFF;
        }

        .station-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .station-people {
            background: #00BFFF;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            color: #0f0f23;
        }

        .ptt-area {
            text-align: center;
            margin: 20px 0;
        }

        .ptt-button {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: radial-gradient(circle at 35% 35%, #e53935, #8b0000);
            border: 4px solid #ffd700;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .ptt-button:active {
            transform: scale(0.94);
        }

        .ptt-button.recording {
            animation: recording-pulse 0.7s infinite;
            background: radial-gradient(circle at 35% 35%, #ff4444, #ff0000);
        }

        @keyframes recording-pulse {
            0% { box-shadow: 0 0 0 0 #e53935; }
            70% { box-shadow: 0 0 0 18px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        .record-timer {
            margin-top: 12px;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            background: #0a0a15;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
            font-family: monospace;
        }

        .bottom-menu {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }

        .menu-item {
            flex: 1;
            background: #1f1f35;
            border-radius: 40px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #3a3a5a;
        }

        .menu-item i {
            margin-right: 6px;
            color: #00BFFF;
        }

        .menu-item:hover {
            background: #2a2a45;
            border-color: #00BFFF;
        }

        .modal-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 20000;
            display: none;
            flex-direction: column;
        }

        .modal-full.visible {
            display: flex;
        }

        .modal-header {
            background: #0f0f23;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid #00BFFF;
        }

        .close-modal {
            background: #e53935;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .map-container {
            flex: 1;
        }

        #full-map {
            height: 100%;
            width: 100%;
        }

        .chat-modal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #111128;
            border-radius: 28px;
            z-index: 20001;
            display: none;
            flex-direction: column;
            max-height: 460px;
            border: 1px solid #00BFFF;
        }

        .chat-modal.visible {
            display: flex;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            max-height: 340px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid #2a2a4a;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            background: #1f1f35;
            border: none;
            color: white;
        }

        .chat-input-area button {
            background: #00BFFF;
            border: none;
            width: 46px;
            border-radius: 50%;
            cursor: pointer;
        }

        .message-bubble {
            margin: 8px 0;
            padding: 8px 14px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 13px;
        }

        .message-bubble.me {
            background: #00BFFF;
            color: white;
            margin-left: auto;
        }

        .message-bubble.other {
            background: #23233a;
            color: #ddd;
        }

        .audio-toast {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: #00BFFF;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            z-index: 20002;
            display: none;
            font-weight: bold;
            border: 2px solid gold;
            white-space: nowrap;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 500px) {
            .stations-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .city-name {
                font-size: 10px;
            }
            .ptt-button {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 380px) {
            .stations-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .stations-grid::-webkit-scrollbar {
            width: 3px;
        }
        .stations-grid::-webkit-scrollbar-track {
            background: #1a1a30;
        }
        .stations-grid::-webkit-scrollbar-thumb {
            background: #00BFFF;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="radio-container">
    <div class="radio-header">
        <h1><i class="fas fa-satellite-dish"></i> RÁDIO BR-277 <i class="fas fa-microphone-alt"></i></h1>
        <div class="freq">
            <span>📡 27.7 MHz</span>
            <span class="online-dot"></span>
        </div>
    </div>

    <div class="stations-grid" id="stationsGrid"></div>

    <div class="current-station-card">
        <div class="station-info">
            <i class="fas fa-broadcast-tower"></i>
            <span class="station-name" id="currentStationName">Curitiba</span>
        </div>
        <div class="station-people" id="currentStationPeople">0 online</div>
    </div>

    <div class="ptt-area">
        <button class="ptt-button" id="pttButton">
            🎤<br>FALAR
        </button>
        <div class="record-timer" id="recordTimer" style="display: none;">20s</div>
    </div>

    <div class="bottom-menu">
        <div class="menu-item" onclick="openMap()"><i class="fas fa-map-marked-alt"></i> MAPA</div>
        <div class="menu-item" onclick="openChat()"><i class="fas fa-comment-dots"></i> CHAT</div>
        <div class="menu-item" onclick="changeProfile()"><i class="fas fa-user-astronaut"></i> PERFIL</div>
    </div>
</div>

<div class="modal-full" id="mapModal">
    <div class="modal-header">
        <span><i class="fas fa-map"></i> MAPA BR-277 - TRÂNSITO</span>
        <button class="close-modal" onclick="closeMap()">✕</button>
    </div>
    <div class="map-container">
        <div id="full-map"></div>
    </div>
</div>

<div class="chat-modal" id="chatModal">
    <div class="modal-header" style="border-radius: 28px 28px 0 0;">
        <span><i class="fas fa-comments"></i> CHAT GERAL</span>
        <button class="close-modal" style="width:32px; height:32px;" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Mensagem...">
        <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="audio-toast" id="audioToast">🎙️ NOVO ÁUDIO RECEBIDO</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ==================== FIREBASE ====================
    const firebaseConfig = {
        databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==================== LISTA DE CIDADES ====================
    const cities = [
        "Guarapuava", "Palmeira", "Porto Amazonas", "Ponta Grossa", "São Luiz do Purunã",
        "Campo Largo", "Curitiba", "Almirante Tamandaré", "Fazenda Rio Grande", "Tijucas do Sul",
        "Guaratuba", "Morretes", "Paranaguá", "São José dos Pinhais", "Colombo",
        "Araucária", "Piraquara", "Campina Grande do Sul", "Quatro Barras", "Barra do Turvo",
        "Cajati"
    ];

    const stations = cities.map((name, idx) => ({
        id: name.toLowerCase().replace(/ /g, '_').replace(/ç/g, 'c').replace(/ã/g, 'a').replace(/á/g, 'a').replace(/â/g, 'a'),
        nome: name,
        lat: -25.4 + (idx * 0.05),
        lng: -49.2 + (idx * 0.03)
    }));

    // ==================== VARIÁVEIS ====================
    let userName = localStorage.getItem('radio_user');
    let currentStationId = localStorage.getItem('current_station') || 'curitiba';
    let mediaRecorder = null;
    let recording = false;
    let countdownInterval = null;
    let secondsLeft = 20;
    let audioChunks = [];
    let map = null;
    let userMarker = null;
    let currentStream = null;

    // ==================== PEDIR NOME DO USUÁRIO ====================
    if (!userName) {
        userName = prompt("🎙️ Digite seu nome para entrar no Rádio BR-277:", "Motorista");
        if (!userName) userName = "Motorista";
        localStorage.setItem('radio_user', userName);
    }

    // ==================== CRIAR BOTÕES DAS CIDADES ====================
    function buildStationButtons() {
        const grid = document.getElementById('stationsGrid');
        grid.innerHTML = '';
        stations.forEach(st => {
            const btn = document.createElement('div');
            btn.className = 'station-btn';
            if (st.id === currentStationId) btn.classList.add('active');
            btn.dataset.id = st.id;
            btn.innerHTML = `
                <span class="city-name">${st.nome}</span>
                <span class="city-count" id="count-${st.id}">0</span>
            `;
            btn.onclick = () => selectStation(st.id);
            grid.appendChild(btn);
        });
    }

    // ==================== SELECIONAR ESTAÇÃO ====================
    function selectStation(stationId) {
        currentStationId = stationId;
        localStorage.setItem('current_station', stationId);

        document.querySelectorAll('.station-btn').forEach(btn => {
            if (btn.dataset.id === stationId) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        const station = stations.find(s => s.id === stationId);
        document.getElementById('currentStationName').innerText = station.nome;

        // Registrar presença na nova estação
        db.ref(`stations/${stationId}/users/${userName}`).set({
            name: userName,
            timestamp: Date.now()
        });

        // Remover de outras estações
        stations.forEach(s => {
            if (s.id !== stationId) {
                db.ref(`stations/${s.id}/users/${userName}`).remove();
            }
        });

        // Resetar listener de áudio para nova estação
        setupAudioListener();
        
        showNotification(`📻 Você entrou em ${station.nome}`, '#00BFFF');
    }

    // ==================== CONTAGEM DE USUÁRIOS ====================
    function listenStationUsers() {
        stations.forEach(st => {
            db.ref(`stations/${st.id}/users`).on('value', (snap) => {
                const users = snap.val();
                const count = users ? Object.keys(users).length : 0;
                const countSpan = document.getElementById(`count-${st.id}`);
                if (countSpan) countSpan.innerText = count;
                if (st.id === currentStationId) {
                    document.getElementById('currentStationPeople').innerText = `${count} online`;
                }
            });
        });
    }

    // ==================== OUVIR ÁUDIO DA ESTAÇÃO ====================
    let audioListenerRef = null;

    function setupAudioListener() {
        // Remover listener anterior se existir
        if (audioListenerRef) {
            db.ref(`stations/${currentStationId}/audios`).off('child_added', audioListenerRef);
        }
        
        // Criar novo listener
        audioListenerRef = db.ref(`stations/${currentStationId}/audios`).on('child_added', (snap) => {
            const audioData = snap.val();
            if (audioData && audioData.sender !== userName) {
                // Tocar áudio
                const audio = new Audio(audioData.base64);
                audio.play().catch(e => console.log('Erro ao tocar áudio:', e));
                
                // Mostrar notificação
                const toast = document.getElementById('audioToast');
                toast.style.display = 'block';
                toast.innerHTML = `🎙️ ${audioData.sender} falou em ${audioData.station}`;
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 3000);
            }
        });
    }

    // ==================== GRAVAR ÁUDIO (PTT) ====================
    const pttBtn = document.getElementById('pttButton');
    const timerDiv = document.getElementById('recordTimer');

    async function startRecording() {
        if (recording) return;
        
        try {
            // Pedir permissão do microfone
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentStream = stream;
            
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            secondsLeft = 20;

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = async () => {
                if (audioChunks.length > 0) {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    
                    reader.onloadend = async () => {
                        const stationObj = stations.find(s => s.id === currentStationId);
                        const audioData = {
                            sender: userName,
                            station: stationObj.nome,
                            base64: reader.result,
                            timestamp: Date.now()
                        };
                        
                        // Enviar para o Firebase
                        await db.ref(`stations/${currentStationId}/audios`).push(audioData);
                        
                        // Limpar áudios antigos (manter últimos 40)
                        const allAudios = await db.ref(`stations/${currentStationId}/audios`).once('value');
                        const audioList = allAudios.val();
                        if (audioList) {
                            const keys = Object.keys(audioList);
                            if (keys.length > 40) {
                                const toRemove = keys.slice(0, keys.length - 40);
                                for (const key of toRemove) {
                                    await db.ref(`stations/${currentStationId}/audios/${key}`).remove();
                                }
                            }
                        }
                        
                        showNotification(`✅ Áudio enviado para ${stationObj.nome}`, '#4caf50');
                    };
                    
                    reader.readAsDataURL(audioBlob);
                }
                
                // Parar todas as tracks
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
            };

            mediaRecorder.start(100);
            recording = true;
            pttBtn.classList.add('recording');
            timerDiv.style.display = 'inline-block';
            timerDiv.innerText = '20s';

            // Contagem regressiva
            countdownInterval = setInterval(() => {
                secondsLeft--;
                timerDiv.innerText = `${secondsLeft}s`;
                if (secondsLeft <= 0) {
                    stopRecording();
                }
            }, 1000);

            // Timeout de segurança
            setTimeout(() => {
                if (recording) stopRecording();
            }, 20000);

        } catch (error) {
            console.error('Erro ao acessar microfone:', error);
            alert("🎤 Para usar o rádio, permita o acesso ao microfone!\n\nClique em 'Permitir' quando o navegador solicitar.");
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
        recording = false;
        pttBtn.classList.remove('recording');
        timerDiv.style.display = 'none';
    }

    // Eventos do botão PTT
    pttBtn.addEventListener('mousedown', startRecording);
    pttBtn.addEventListener('mouseup', stopRecording);
    pttBtn.addEventListener('mouseleave', stopRecording);
    pttBtn.addEventListener('touchstart', startRecording);
    pttBtn.addEventListener('touchend', stopRecording);

    // ==================== CHAT ====================
    function initChat() {
        db.ref('global_chat').on('value', (snap) => {
            const messages = snap.val();
            const container = document.getElementById('chatMessages');
            if (!messages) { 
                container.innerHTML = '<div style="text-align:center;color:#666;">Nenhuma mensagem</div>'; 
                return; 
            }
            let html = '';
            const sorted = Object.values(messages).sort((a,b) => a.timestamp - b.timestamp);
            sorted.forEach(msg => {
                const isMe = msg.sender === userName;
                html += `
                    <div class="message-bubble ${isMe ? 'me' : 'other'}">
                        <strong>${msg.sender}</strong><br>${msg.text}<br>
                        <small style="font-size:9px; opacity:0.7;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        db.ref('global_chat').push({
            sender: userName,
            text: input.value.trim(),
            timestamp: Date.now()
        });
        input.value = '';
    }

    function openChat() {
        document.getElementById('chatModal').classList.add('visible');
    }
    
    function closeChat() {
        document.getElementById('chatModal').classList.remove('visible');
    }

    // ==================== MAPA ====================
    function initGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(pos => {
            const userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!map) return;
            if (!userMarker) {
                userMarker = L.marker(userPos, {
                    icon: L.divIcon({ 
                        html: '<div style="font-size:32px;">🚗</div>', 
                        iconSize: [32,32], 
                        className: '',
                        iconAnchor: [16,16]
                    })
                }).addTo(map);
                map.setView(userPos, 12);
            } else {
                userMarker.setLatLng(userPos);
            }
        }, (error) => {
            console.log('Erro de GPS:', error);
        });
    }

    function openMap() {
        const modal = document.getElementById('mapModal');
        modal.classList.add('visible');
        setTimeout(() => {
            if (!map) {
                map = L.map('full-map').setView([-25.4284, -49.2733], 11);
                L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);
                stations.forEach(s => {
                    L.marker([s.lat, s.lng], {
                        icon: L.divIcon({ 
                            html: `<div style="background:#00BFFF; width:8px; height:8px; border-radius:50%; border:2px solid white;"></div>`, 
                            iconSize: [8,8] 
                        })
                    }).addTo(map).bindPopup(`<b>${s.nome}</b>`);
                });
            } else {
                map.invalidateSize();
            }
        }, 100);
    }
    
    function closeMap() {
        document.getElementById('mapModal').classList.remove('visible');
    }

    // ==================== PERFIL ====================
    function changeProfile() {
        const newName = prompt("✏️ Alterar seu nome:", userName);
        if (newName && newName.trim()) {
            userName = newName.trim();
            localStorage.setItem('radio_user', userName);
            showNotification(`✅ Nome alterado para ${userName}`, '#4caf50');
        }
    }

    // ==================== NOTIFICAÇÃO ====================
    function showNotification(msg, color) {
        const notif = document.createElement('div');
        notif.style.cssText = `position:fixed; bottom:200px; left:50%; transform:translateX(-50%); background:${color || '#00BFFF'}; color:white; padding:10px 24px; border-radius:40px; z-index:20003; font-size:13px; font-weight:bold; border:2px solid #ffd700; white-space:nowrap;`;
        notif.textContent = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    // ==================== LIMPAR AO SAIR ====================
    window.addEventListener('beforeunload', () => {
        if (userName) {
            db.ref(`stations/${currentStationId}/users/${userName}`).remove();
        }
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
    });

    // ==================== INICIALIZAR TUDO ====================
    function init() {
        buildStationButtons();
        selectStation(currentStationId);
        listenStationUsers();
        setupAudioListener();
        initChat();
        initGPS();
        showNotification(`🎙️ Bem-vindo, ${userName}!`, '#00BFFF');
    }

    init();
</script>
</body>
</html>
