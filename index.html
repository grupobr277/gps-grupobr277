<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL V25 SUPREME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; --radio-gold: #ffd700; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* LUPA AMPLIADA E ORGANIZADA */
        .leaflet-control-geocoder { top: 10px !important; left: 50% !important; transform: translateX(-50%); width: 90% !important; max-width: 500px; border: 3px solid var(--ws-green) !important; border-radius: 25px !important; background: white !important; height: 45px; display: flex; align-items: center; }
        .leaflet-control-geocoder-icon { margin-left: 10px; }

        /* PAINEL 10 ICONES */
        .painel-alertas { position: absolute; top: 75px; left: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 95px; text-align: center; color: white; font-weight: bold; font-size: 10px; background: #1a1a1a; cursor: pointer; }

        /* RÁDIO PX SENSÍVEL */
        #btn-px { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90px; height: 90px; background: #333; border: 5px solid var(--radio-gold); border-radius: 50%; z-index: 5001; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--radio-gold); box-shadow: 0 0 25px rgba(0,0,0,0.7); touch-action: none; -webkit-user-select: none; }
        #btn-px.ativo { background: #ff5252; border-color: white; transform: translateX(-50%) scale(0.9); }

        /* CHAT WHATSAPP NOS ICONES */
        .pop-whats { width: 260px; }
        .pop-msg-box { max-height: 200px; overflow-y: auto; background: #e5ddd5; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 6px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .balao-pop { padding: 8px; border-radius: 8px; font-size: 12px; max-width: 85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .b-eu { background: var(--ws-light); align-self: flex-end; }
        .b-outro { background: white; align-self: flex-start; }

        /* ROTA E "X" */
        .leaflet-routing-container { bottom: 20px !important; right: 10px !important; top: auto !important; width: 240px !important; border-radius: 10px !important; }
        .btn-encerrar { background: #ff5252; color: white; border: none; width: 100%; padding: 8px; border-radius: 5px; font-weight: bold; margin-top: 5px; cursor: pointer; }

        /* RECENTRALIZAR */
        #btn-rec { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); z-index: 4001; background: white; border: 2px solid var(--ws-green); border-radius: 20px; padding: 10px 20px; font-weight: bold; color: var(--ws-green); display: none; }
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }
        
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; touch-action: none; background: white; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="btn-rec" onclick="recentralizar()">🧭 RECENTRALIZAR</div>

<div class="painel-alertas">
    <div class="btn-a" style="background:#b00020" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a" style="background:#b00020" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a" style="background:#ff6d00" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a" style="background:#ff6d00" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a" style="background:#333" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-px">🎤</div>
<div id="btn-luz" class="f-btn" style="width:50px;height:50px;right:20px;top:140px;background:#ffcc00">💡</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

let user = localStorage.getItem('user_br277') || "Danilo";
let meuLatLng, meuMarker, follow = true, rotaControle;

// --- RÁDIO PX SENSÍVEL AO TOQUE ---
let mediaRecorder, chunks = [];
const pxBtn = document.getElementById('btn-px');

async function ligarRadio(e) {
    e.preventDefault();
    pxBtn.classList.add('ativo');
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
    mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = () => {
            db.ref("radio_v25").set({ audio: reader.result, u: user, t: Date.now() });
            chunks = [];
        };
    };
    mediaRecorder.start();
}

function desligarRadio() {
    pxBtn.classList.remove('ativo');
    if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
}

pxBtn.addEventListener('touchstart', ligarRadio);
pxBtn.addEventListener('touchend', desligarRadio);

db.ref("radio_v25").on("value", snap => {
    const d = snap.val();
    if(d && d.u !== user && (Date.now() - d.t < 5000)) {
        new Audio(d.audio).play();
    }
});

// --- LUPA COM PREVIA E ROTA ---
const geocoder = L.Control.geocoder({ 
    defaultMarkGeocode: false, 
    placeholder: "📍 Pra onde vamos, motorista?" 
}).on('markgeocode', e => {
    const dest = e.geocode.center;
    if(rotaControle) map.removeControl(rotaControle);
    rotaControle = L.Routing.control({
        waypoints: [meuLatLng, dest],
        lineOptions: { styles: [{ color: '#007aff', weight: 8, opacity: 0.8 }] },
        createMarker: () => null
    }).addTo(map);
    setTimeout(() => {
        const p = document.querySelector('.leaflet-routing-container');
        if(p) p.innerHTML += `<button class="btn-encerrar" onclick="map.removeControl(rotaControle)">ENCERRAR ROTA X</button>`;
    }, 500);
}).addTo(map);

// --- GPS E PULSANTE ---
navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;">🚗</div>`, className: '', iconSize:[40,40] }) }).addTo(map);
        map.setView(meuLatLng, 17);
    } else { meuMarker.setLatLng(meuLatLng); }
    if(follow) map.panTo(meuLatLng);
    if(rotaControle) rotaControle.spliceWaypoints(0, 1, meuLatLng);
});

map.on('dragstart', () => { follow = false; document.getElementById('btn-rec').style.display = 'block'; });
function recentralizar() { follow = true; document.getElementById('btn-rec').style.display = 'none'; map.flyTo(meuLatLng, 17); }

// --- ALERTAS COM CHAT WHATSAPP ---
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas_v25").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng
