<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | COCKPIT RACING</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', 'Helvetica Neue', 'Courier New', monospace; }
        
        /* ===== MODAL DE BOAS-VINDAS RACING ===== */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a0a12, #010104);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }
        
        .welcome-content {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 0 2px #ffd700, 0 0 30px #ffd700;
            border: 1px solid rgba(255,215,0,0.5);
        }
        
        .welcome-content h2 {
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 36px;
            font-weight: 800;
            text-shadow: 0 0 20px #ffd700;
            letter-spacing: 3px;
        }
        
        .welcome-content input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid #ffd700;
            border-radius: 50px;
            margin: 12px 0;
            font-size: 16px;
            outline: none;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        /* ===== HEADER SUPERIOR RACING ===== */
        .header-racing {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .contador-racing {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: #ffd700;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            letter-spacing: 1px;
        }
        
        .logo-racing {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: #ffd700;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #ffd700;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
        }
        
        .logo-racing:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.02);
        }
        
        /* ===== LUPA RACING ===== */
        .lupa-racing {
            position: fixed;
            top: 15px;
            left: 200px;
            width: 260px;
            z-index: 9000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 2px solid #ffd700;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .lupa-racing input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            font-size: 14px;
            background: transparent;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .lupa-racing input::placeholder {
            color: rgba(255,215,0,0.6);
            font-weight: 400;
        }
        
        .lupa-racing button {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            width: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 900;
            transition: all 0.3s;
        }
        
        .lupa-racing button:hover {
            background: #00BFFF;
            color: white;
        }
        
        /* ===== BARRA INFERIOR COCKPIT RACING ===== */
        .cockpit-bar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9500;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(5, 5, 10, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 25px;
            border-radius: 60px;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px #ffd700;
        }
        
        /* Velocímetro digital na barra */
        .velocimetro-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            padding: 8px 18px;
            border-radius: 40px;
            border: 2px solid #00BFFF;
            box-shadow: 0 0 20px #00BFFF;
        }
        
        .vel-numero {
            font-size: 28px;
            font-weight: 900;
            color: #00BFFF;
            text-shadow: 0 0 15px #00BFFF;
            font-family: 'Courier New', monospace;
            min-width: 60px;
            text-align: center;
        }
        
        .vel-unidade {
            font-size: 12px;
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        /* Botões da barra */
        .btn-cockpit {
            position: relative;
            width: 55px;
            height: 55px;
            border-radius: 40px;
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffd700;
            font-size: 22px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .btn-cockpit:hover {
            transform: translateY(-5px);
            border-color: #00BFFF;
            box-shadow: 0 0 30px #00BFFF;
        }
        
        .btn-cockpit.ativo {
            border-color: #00BFFF;
            background: linear-gradient(145deg, #00BFFF22, #00BFFF11);
            box-shadow: 0 0 30px #00BFFF;
        }
        
        .btn-cockpit.mudo {
            border-color: #e53935;
            box-shadow: 0 0 30px #e53935;
        }
        
        /* LED em cada botão */
        .btn-cockpit::before {
            content: '';
            position: absolute;
            top: -4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 15px #4caf50;
            animation: ledPulse 1.5s infinite;
        }
        
        .btn-cockpit:nth-child(2)::before { left: 15px; background: #00BFFF; box-shadow: 0 0 15px #00BFFF; }
        .btn-cockpit:nth-child(3)::before { right: 15px; background: #ffd700; box-shadow: 0 0 15px #ffd700; }
        .btn-cockpit:nth-child(4)::before { left: 15px; background: #00BFFF; box-shadow: 0 0 15px #00BFFF; }
        .btn-cockpit:nth-child(5)::before { right: 15px; background: #ffd700; box-shadow: 0 0 15px #ffd700; }
        
        @keyframes ledPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        
        /* ===== REPORTE RACING ===== */
        .reporte-racing {
            position: fixed;
            bottom: 110px;
            left: 20px;
            z-index: 9300;
        }
        
        .reporte-btn {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.3);
            transition: all 0.3s;
        }
        
        .reporte-btn:hover {
            transform: scale(1.05);
            border-color: #00BFFF;
            box-shadow: 0 0 40px #00BFFF;
        }
        
        .reporte-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 20px #4caf50;
            animation: ledPulse 1.5s infinite;
        }
        
        .reporte-texto {
            color: #ffd700;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .reporte-icon {
            color: #ffd700;
            font-size: 16px;
        }
        
        /* ===== PAINEL DE ALERTAS RACING ===== */
        .alertas-panel-racing {
            position: fixed;
            bottom: 180px;
            left: 20px;
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 18px;
            display: none;
            width: 250px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px #ffd700;
            z-index: 9400;
        }
        
        .alertas-panel-racing.visivel {
            display: block;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .alertas-grid-racing {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .alerta-item-racing {
            aspect-ratio: 1/1;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            font-weight: 800;
            position: relative;
            overflow: hidden;
        }
        
        .alerta-item-racing:hover {
            transform: translateY(-5px);
            border-color: white;
            box-shadow: 0 0 30px currentColor;
        }
        
        .alerta-icone-racing {
            font-size: 30px;
            filter: drop-shadow(0 0 10px currentColor);
        }
        
        .alerta-nome-racing {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
            text-shadow: 0 2px 5px black;
        }
        
        .btn-fechar-racing {
            width: 40px;
            height: 40px;
            background: #e53935;
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 0 20px #e53935;
        }
        
        .btn-fechar-racing:hover {
            transform: rotate(90deg) scale(1.1);
        }
        
        /* ===== LEGENDA RACING ===== */
        .legenda-racing {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 10, 0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #ffd700;
            border-radius: 50px;
            padding: 8px 25px;
            z-index: 9200;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.3);
        }
        
        .legenda-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legenda-cor {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
        }
        
        .legenda-verde { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .legenda-amarelo { background: #ffff00; box-shadow: 0 0 15px #ffff00; }
        .legenda-vermelho { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        
        .legenda-texto {
            color: white;
            font-size: 12px;
            font-weight: 700;
        }
        
        .legenda-fechar {
            width: 24px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffd700;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .legenda-fechar:hover {
            background: #e53935;
            color: white;
        }
        
        .legenda-icone {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5,5,10,0.9);
            backdrop-filter: blur(20px);
            border: 2px solid #ffd700;
            border-radius: 50px;
            padding: 10px 25px;
            z-index: 9200;
            display: none;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        /* ===== RECENTRALIZAR RACING ===== */
        .recentrar-racing {
            position: fixed;
            bottom: 110px;
            right: 20px;
            z-index: 9300;
            display: none;
        }
        
        .recentrar-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border: 3px solid #00BFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #00BFFF;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 30px #00BFFF;
            animation: pulseBlue 2s infinite;
        }
        
        @keyframes pulseBlue {
            0% { box-shadow: 0 0 0 0 rgba(0, 191, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 191, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 191, 255, 0); }
        }
        
        .recentrar-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background: #00BFFF;
            color: white;
        }
        
        /* ===== BOTÃO ENCERRAR ROTA ===== */
        .btn-encerrar-rota {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #e53935;
            color: white;
            border: 2px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9400;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 0 30px #e53935;
        }
        
        /* ===== PAINEL DE ROTA ===== */
        .rota-info-panel {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5,5,10,0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 30px;
            border-radius: 60px;
            display: none;
            align-items: center;
            gap: 30px;
            border: 2px solid #ffd700;
            z-index: 9400;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 0 30px #ffd700;
        }
        
        /* ===== CHAT WHATSAPP RACING ===== */
        .chat-racing {
            position: fixed;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 80%;
            background: #0a0a1a;
            z-index: 99999;
            border-radius: 30px;
            display: none;
            flex-direction: column;
            border: 3px solid #ffd700;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 50px #ffd700;
        }
        
        .chat-header-racing {
            background: linear-gradient(90deg, #075e54, #0a7e6e);
            color: white;
            padding: 18px 20px;
            border-radius: 27px 27px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ffd700;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .chat-mensagens-racing {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: #0f0f1f;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAABmJLR0QA/wD/AP+gvaeTAAAAbklEQVQ4jc2UOwrAIAxA38WpU8fq2F2K6GQp/VhLKm0LBYNbeA8egfgEAYCQUkpYXlSEjDHCOWf1QUTQWg8d+whKKUQE5xzGmGOpqqoYYwR3zpVS0FrHGCMAQERgjDnH0lpjjBEA4Jzz7u0fY0fB+u8LjwQAAAAASUVORK5CYII=');
        }
        
        .mensagem-wrapper {
            display: flex;
            flex-direction: column;
            margin: 8px 0;
            max-width: 80%;
        }
        
        .mensagem-wrapper.minha {
            align-self: flex-end;
        }
        
        .mensagem-wrapper.outra {
            align-self: flex-start;
        }
        
        .mensagem {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .mensagem.minha {
            background: #075e54;
            color: white;
            border-radius: 20px 20px 2px 20px;
        }
        
        .mensagem.outra {
            background: #2a2a3a;
            color: white;
            border-radius: 20px 20px 20px 2px;
            border: 1px solid #ffd700;
        }
        
        .mensagem-remetente {
            font-weight: 800;
            font-size: 12px;
            margin-bottom: 4px;
            color: #ffd700;
        }
        
        .mensagem-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }
        
        .data-divider {
            text-align: center;
            margin: 15px 0;
        }
        
        .data-divider span {
            background: #ffd700;
            color: #0a0a0a;
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
        }
        
        .chat-input-racing {
            padding: 18px;
            background: #0a0a1a;
            display: flex;
            gap: 12px;
            border-top: 2px solid #ffd700;
            border-radius: 0 0 27px 27px;
        }
        
        .chat-input-racing input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            background: #1a1a2a;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input-racing button {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: #ffd700;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .chat-input-racing button:hover {
            background: #00BFFF;
            color: white;
            transform: scale(1.1);
        }
        
        /* ===== POPUP DE ALERTA RACING ===== */
        .popup-racing {
            background: #0f0f1f;
            border: 3px solid #ffd700;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }
        
        .popup-header-racing {
            padding: 15px;
            color: white;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }
        
        .popup-imagem-racing {
            padding: 15px;
            background: #0a0a0a;
            text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        
        .popup-imagem-racing img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            cursor: pointer;
        }
        
        .popup-stats {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            background: #1a1a2a;
            border-bottom: 2px solid #ffd700;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 12px;
            font-weight: 700;
        }
        
        .stat-item i {
            color: #ffd700;
            font-size: 16px;
        }
        
        .stat-value {
            color: #00BFFF;
            font-weight: 900;
        }
        
        .popup-chat {
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            background: #0f0f1f;
        }
        
        .popup-input {
            display: flex;
            padding: 15px;
            gap: 8px;
            background: #0a0a1a;
            border-top: 2px solid #ffd700;
        }
        
        .popup-input input {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            background: #1a1a2a;
            color: white;
        }
        
        .popup-input button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #ffd700;
            color: #0a0a0a;
            cursor: pointer;
        }
        
        /* ===== CLUSTER RACING ===== */
        .cluster-racing {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            border: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            box-shadow: 0 0 40px #ffd700;
            animation: clusterPulse 2s infinite;
        }
        
        @keyframes clusterPulse {
            0% { box-shadow: 0 0 30px #ffd700; }

<script>
// ===== CONFIGURAÇÕES =====
const SCALABLE_CONFIG = {
    POSITION_UPDATE_INTERVAL: 15000,
    TILE_SIZE: 0.05,
    VEHICLE_TIMEOUT: 30000,
    CLUSTER_MAX_ZOOM: 16,
    MAX_ALERTAS_POR_HORA: 5
};

// ===== FIREBASE =====
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== VARIÁVEIS GLOBAIS =====
let usuario = null;
let telefone = '';
let veiculoUsuario = 'carro';
let minhaLocalizacao = null;
let meuMarcador = null;
let seguirLocalizacao = true;
let rotaAtual = null;
let mapa = null;
let mudo = false;
let mensagemRespondendo = null;
let ultimaAtualizacaoGPS = 0;
let zoomAtual = 13;
let alertasMapa = {};
let pulsantesAlertas = {};
let alertasConfirmados = {};
let confirmacoesStorage = JSON.parse(localStorage.getItem('br277_confirmacoes')) || {};
let ultimoAlertaExibido = {};
let popupTimeout = null;
let alertaAtual = null;
let ultimoHeading = 0;
let wakeLock = null;
let interfaceVisivel = true;
let permissoes = { localizacao: false, microfone: false, audio: true };
let clusterSystem = null;
let tileSystem = null;

alertasConfirmados = { ...confirmacoesStorage };

// ===== 10 ALERTAS RACING =====
const alertasRacing = [
    { tipo: 'acidente', nome: 'ACIDENTE', icone: '💥', cor: '#e53935', bg: 'linear-gradient(145deg, #e53935, #b71c1c)' },
    { tipo: 'obras', nome: 'OBRAS', icone: '🚧', cor: '#ff9800', bg: 'linear-gradient(145deg, #ff9800, #f57c00)' },
    { tipo: 'pane', nome: 'PANE', icone: '🔧', cor: '#795548', bg: 'linear-gradient(145deg, #795548, #5d4037)' },
    { tipo: 'animal', nome: 'ANIMAL', icone: '🐂', cor: '#9c27b0', bg: 'linear-gradient(145deg, #9c27b0, #7b1fa2)' },
    { tipo: 'radar', nome: 'RADAR', icone: '📷', cor: '#607d8b', bg: 'linear-gradient(145deg, #607d8b, #455a64)' },
    { tipo: 'barreira', nome: 'BARREIRA', icone: '⛰️', cor: '#8b4513', bg: 'linear-gradient(145deg, #8b4513, #5d3a1a)' },
    { tipo: 'neblina', nome: 'NEBLINA', icone: '🌫️', cor: '#00acc1', bg: 'linear-gradient(145deg, #00acc1, #0097a7)' },
    { tipo: 'congestionamento', nome: 'CONGEST', icone: '🔴', cor: '#f44336', bg: 'linear-gradient(145deg, #f44336, #d32f2f)' },
    { tipo: 'alagamento', nome: 'ALAGAMENTO', icone: '💧', cor: '#2196f3', bg: 'linear-gradient(145deg, #2196f3, #1976d2)' },
    { tipo: 'bloqueio', nome: 'BLOQUEIO', icone: '⛔', cor: '#b71c1c', bg: 'linear-gradient(145deg, #b71c1c, #8B0000)' }
];

// ===== SISTEMA DE TILES =====
class TileSystem {
    constructor() {
        this.veiculosPorTile = new Map();
    }
    
    getTileId(lat, lng) {
        const tileX = Math.floor(lat / SCALABLE_CONFIG.TILE_SIZE);
        const tileY = Math.floor(lng / SCALABLE_CONFIG.TILE_SIZE);
        return `${tileX}_${tileY}`;
    }
    
    adicionarVeiculo(id, lat, lng, dados) {
        const tileId = this.getTileId(lat, lng);
        if (!this.veiculosPorTile.has(tileId)) {
            this.veiculosPorTile.set(tileId, new Map());
        }
        this.veiculosPorTile.get(tileId).set(id, { ...dados, lat, lng, timestamp: Date.now() });
        return tileId;
    }
    
    limparVeiculosAntigos() {
        const agora = Date.now();
        this.veiculosPorTile.forEach((veiculos, tileId) => {
            veiculos.forEach((dados, id) => {
                if (agora - dados.timestamp > SCALABLE_CONFIG.VEHICLE_TIMEOUT) {
                    veiculos.delete(id);
                }
            });
            if (veiculos.size === 0) this.veiculosPorTile.delete(tileId);
        });
    }
}

// ===== SISTEMA DE CLUSTER RACING =====
class ClusterSystemRacing {
    constructor(mapa) {
        this.mapa = mapa;
        this.marcadores = new Map();
        this.clusterGroup = L.markerClusterGroup({
            maxClusterRadius: 70,
            iconCreateFunction: this.criarIconeCluster,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            disableClusteringAtZoom: SCALABLE_CONFIG.CLUSTER_MAX_ZOOM
        });
        this.mapa.addLayer(this.clusterGroup);
    }
    
    criarIconeCluster(cluster) {
        const count = cluster.getChildCount();
        let cor = '#ffd700';
        let tamanho = 50;
        if (count > 50) { cor = '#e53935'; tamanho = 60; }
        else if (count > 20) { cor = '#ff9800'; tamanho = 55; }
        return L.divIcon({
            html: `<div class="cluster-racing" style="background:${cor}; width:${tamanho}px; height:${tamanho}px;">${count}</div>`,
            className: '',
            iconSize: [tamanho, tamanho]
        });
    }
    
    adicionarMarcador(id, lat, lng, dados) {
        if (this.marcadores.has(id)) this.clusterGroup.removeLayer(this.marcadores.get(id));
        const marcador = L.marker([lat, lng], {
            icon: this.criarIconeVeiculo(dados),
            zIndexOffset: dados.ehMeu ? 1000 : 0
        });
        if (!dados.ehMeu) marcador.bindPopup(this.criarPopupVeiculo(dados));
        this.clusterGroup.addLayer(marcador);
        this.marcadores.set(id, marcador);
    }
    
    criarIconeVeiculo(dados) {
        if (dados.ehMeu) {
            return L.divIcon({
                html: `<div style="position:relative; width:44px; height:44px;"><div class="pulsante-azul"></div><div style="font-size:36px; position:absolute; left:4px; top:2px; transform:rotate(${dados.direcao||0}deg); filter:drop-shadow(0 0 15px #00BFFF);">${this.getIcone(dados.veiculo)}</div></div>`,
                className: '',
                iconSize: [44, 44],
                iconAnchor: [22, 22]
            });
        } else {
            return L.divIcon({
                html: `<div style="font-size:28px; transform:rotate(${dados.direcao||0}deg); filter:drop-shadow(0 0 10px #ffd700);">${this.getIcone(dados.veiculo)}</div>`,
                className: '',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }
    }
    
    getIcone(tipo) {
        const icones = { carro:'🚗', caminhao:'🚛', moto:'🏍️', onibus:'🚌', van:'🚐', pickup:'🛻' };
        return icones[tipo] || '🚗';
    }
    
    criarPopupVeiculo(dados) {
        return `
            <div style="background:#1a1a2a; border:2px solid #ffd700; border-radius:15px; padding:10px; color:white;">
                <div style="font-weight:900; color:#ffd700;">${dados.usuario}</div>
                <div style="margin-top:5px;">${this.getIcone(dados.veiculo)} ${dados.veiculo.toUpperCase()}</div>
                <div style="color:#00BFFF;">⚡ ${dados.velocidade||0} KM/H</div>
            </div>
        `;
    }
    
    removerMarcador(id) {
        if (this.marcadores.has(id)) {
            this.clusterGroup.removeLayer(this.marcadores.get(id));
            this.marcadores.delete(id);
        }
    }
    
    limpar() {
        this.clusterGroup.clearLayers();
        this.marcadores.clear();
    }
}

// ===== FUNÇÕES DO MODAL =====
function selecionarVeiculo(tipo) {
    veiculoUsuario = tipo;
    document.querySelectorAll('[id^="veiculo-"]').forEach(el => el.style.borderColor = 'transparent');
    document.getElementById(`veiculo-${tipo}`).style.borderColor = '#ffd700';
    document.getElementById(`veiculo-${tipo}`).style.boxShadow = '0 0 30px #ffd700';
}

async function solicitarPermissoes() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            () => { permissoes.localizacao = true; atualizarStatusPermissoes(); },
            () => alert('❌ PERMISSÃO DE LOCALIZAÇÃO NEGADA!')
        );
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        permissoes.microfone = true;
        stream.getTracks().forEach(t => t.stop());
        atualizarStatusPermissoes();
    } catch(e) {
        alert('❌ PERMISSÃO DE MICROFONE NEGADA!');
    }
}

function atualizarStatusPermissoes() {
    const btnEntrar = document.getElementById('btnEntrar');
    const aceite = document.getElementById('aceitePrivacidade').checked;
    if (permissoes.localizacao && permissoes.microfone && aceite) {
        btnEntrar.disabled = false;
        btnEntrar.style.background = '#ffd700';
        btnEntrar.style.color = '#0a0a0a';
        btnEntrar.style.cursor = 'pointer';
        btnEntrar.textContent = '🏁 ENTRAR NO COCKPIT';
    }
}

document.getElementById('aceitePrivacidade').addEventListener('change', atualizarStatusPermissoes);

// ===== SALVAR CADASTRO =====
function salvarCadastro() {
    const nome = document.getElementById('nomeUsuario').value.trim();
    if (!nome) { alert('DIGITE SEU NOME!'); return; }
    usuario = nome;
    telefone = document.getElementById('telefoneUsuario').value.trim();

function iniciarMapaRacing() {
    mapa = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);

    mapa.on('dragstart', () => { 
        seguirLocalizacao = false;

    });
    mapa.on('zoomend', () => { zoomAtual = mapa.getZoom(); atualizarIconeCarroRacing(); });
}

// ===== GPS RACING =====
function iniciarGPSRacing() {
    if (!navigator.geolocation) return;
    let ultimoEnvio = 0;
    
    navigator.geolocation.watchPosition(pos => {
        const agora = Date.now();
        if (agora - ultimoEnvio < SCALABLE_CONFIG.POSITION_UPDATE_INTERVAL) return;
        ultimoEnvio = agora;
        
        minhaLocalizacao = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (pos.coords.heading !== null) ultimoHeading = pos.coords.heading;
        
        if (pos.coords.speed !== null) {
            const velocidadeKmh = Math.round(pos.coords.speed * 3.6);
            document.getElementById('velocimetroDisplay').textContent = velocidadeKmh;
        }
        
        const dadosVeiculo = {
            lat: minhaLocalizacao.lat,
            lng: minhaLocalizacao.lng,
            velocidade: Math.round((pos.coords.speed || 0) * 3.6),
            direcao: pos.coords.heading || 0,
            veiculo: veiculoUsuario,
            timestamp: Date.now()
        };
        
        db.ref('usuarios_ativos/' + usuario).set(dadosVeiculo);
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, { 
                icon: criarIconeCarroRacing(true, ultimoHeading), 
                zIndexOffset: 1000 
            }).addTo(mapa);
            mapa.setView(minhaLocalizacao, 17);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
            meuMarcador.setIcon(criarIconeCarroRacing(true, ultimoHeading));
        }
        
        if (seguirLocalizacao) mapa.panTo(minhaLocalizacao);
        verificarProximidadeAlertasRacing();
        
    }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    
    window.addEventListener('beforeunload', () => db.ref('usuarios_ativos/' + usuario).remove());
    setTimeout(() => ativarWakeLock(), 3000);
}

function criarIconeCarroRacing(ehMeu, direcao) {
    if (ehMeu) {
        return L.divIcon({
            html: `<div style="position:relative; width:44px; height:44px;"><div class="pulsante-azul"></div><div style="font-size:36px; position:absolute; left:4px; top:2px; transform:rotate(${direcao}deg); filter:drop-shadow(0 0 15px #00BFFF);">🚗</div></div>`,
            className: '',
            iconSize: [44, 44],
            iconAnchor: [22, 22]
        });
    }
    return L.divIcon({
        html: `<div style="font-size:28px; transform:rotate(${direcao}deg); filter:drop-shadow(0 0 10px #ffd700);">🚗</div>`,
        className: '',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
    });
}

function atualizarIconeCarroRacing() {
    if (!meuMarcador || !minhaLocalizacao) return;
    mapa.removeLayer(meuMarcador);

// ===== CARREGAR USUÁRIOS ATIVOS =====
function carregarUsuariosAtivosRacing() {
    db.ref('usuarios_ativos').on('value', snap => {
        const usuarios = snap.val();
        if (!usuarios) { document.getElementById('numUsuarios').textContent = '0'; return; }
        
        const agora = Date.now();
        const limite = agora - SCALABLE_CONFIG.VEHICLE_TIMEOUT;
        const usuariosValidos = Object.entries(usuarios).filter(([id, d]) => d && d.timestamp && d.timestamp > limite);
        
        document.getElementById('numUsuarios').textContent = usuariosValidos.length;
        
        if (clusterSystem) clusterSystem.limpar();
        
        usuariosValidos.forEach(([id, dados]) => {
            if (id === usuario) return;
            tileSystem.adicionarVeiculo(id, dados.lat, dados.lng, dados);
            clusterSystem.adicionarMarcador(id, dados.lat, dados.lng, {
                usuario: id,
                veiculo: dados.veiculo,
                velocidade: dados.velocidade,
                direcao: dados.direcao,
                ehMeu: false
            });
        });
    });
}

// ===== FUNÇÃO PARA COMPRIMIR IMAGEM =====
function comprimirImagemParaBase64(blob, maxWidth) {
    return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(blob);
        img.src = url;
        
        img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
                height *= maxWidth / width;
                width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.6);
            URL.revokeObjectURL(url);
            resolve(base64);
        };
        
        img.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(null);
        };
    });
}

function carregarMensagensAlerta(id) {
    db.ref(`chats/alerta_${id}`).orderByChild('timestamp').on('value', snap => {
        const chatDiv = document.getElementById(`chatAlerta-${id}`);
        if (!chatDiv) return;

        texto: texto,

async function ativarAlertaRacing(alerta) {
    if (!minhaLocalizacao) return;
    
    const id = Date.now();
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100000; display:flex; flex-direction:column; align-items:center; justify-content:center;';
        
        const video = document.createElement('video');
        video.style.cssText = 'width:90%; max-width:400px; border-radius:30px; border:4px solid #ffd700; box-shadow:0 0 50px #ffd700;';
        video.autoplay = true;
        video.playsInline = true;
        video.srcObject = stream;
        
        const btnContainer = document.createElement('div');
        btnContainer.style.cssText = 'display:flex; gap:15px; margin-top:25px;';
        
        const btnFoto = document.createElement('button');
        btnFoto.style.cssText = 'padding:15px 30px; background:#ffd700; border:none; border-radius:50px; font-size:16px; font-weight:900; cursor:pointer;';
        btnFoto.innerHTML = '📷 TIRAR FOTO';
        
        const btnPular = document.createElement('button');

        btnPular.innerHTML = '⏭️ PULAR';
        
        btnContainer.appendChild(btnFoto);
        btnContainer.appendChild(btnPular);
        overlay.appendChild(video);
        overlay.appendChild(btnContainer);
        document.body.appendChild(overlay);
        
        btnFoto.onclick = async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                stream.getTracks().forEach(t => t.stop());
                document.body.removeChild(overlay);
                
                mostrarNotificacao('📤 PROCESSANDO...', '#ffd700');
                const thumbnailBase64 = await comprimirImagemParaBase64(blob, 400);
                
                if (thumbnailBase64) {
                    const alertaData = { 
                        ...alerta, 
                        lat: minhaLocalizacao.lat, 
                        lng: minhaLocalizacao.lng, 
                        timestamp: id, 
                        criador: usuario, 
                        confirmacoes: 0,
                        imagem: { thumbnail: thumbnailBase64 }
                    };
                    
                    alertasMapa[id] = alertaData;
                    await db.ref('alertas_fixos/' + id).set(alertaData);
                    
                    mostrarNotificacao('✅ ALERTA CRIADO!', '#4caf50');
                }
            }, 'image/jpeg', 0.6);
        };
        
        btnPular.onclick = () => {
            stream.getTracks().forEach(t => t.stop());
            document.body.removeChild(overlay);
            
            const alertaData = { 
                ...alerta, 
                lat: minhaLocalizacao.lat, 
                lng: minhaLocalizacao.lng, 
                timestamp: id, 
                criador: usuario, 
                confirmacoes: 0
            };
            
            alertasMapa[id] = alertaData;
            db.ref('alertas_fixos/' + id).set(alertaData);
            
            mostrarNotificacao('ALERTA SEM FOTO');
        };
        
    } catch(e) {
        console.log('Erro na câmera:', e);
        mostrarNotificacao('📷 CÂMERA INDISPONÍVEL', '#e53935');
        
        const alertaData = { 
            ...alerta, 
            lat: minhaLocalizacao.lat, 
            lng: minhaLocalizacao.lng, 
            timestamp: id, 
            criador: usuario, 
            confirmacoes: 0
        };
        
        alertasMapa[id] = alertaData;
        db.ref('alertas_fixos/' + id).set(alertaData);
    }
}

// ===== VERIFICAÇÃO DE ALERTAS PRÓXIMOS =====
function verificarProximidadeAlertasRacing() {
    if (!minhaLocalizacao) return;
    Object.keys(alertasMapa).forEach(id => {
        const alerta = alertasMapa[id];
        if (!alerta || alerta.criador === usuario) return;
        const chave = `${usuario}_${id}`;
        if (alertasConfirmados[chave]) return;
        if (alerta.confirmacoes && alerta.confirmacoes > 0) { 
            alertasConfirmados[chave] = true; 
            localStorage.setItem('br277_confirmacoes', JSON.stringify(alertasConfirmados)); 
            return; 
        }
        
        const dist = calcularDistancia(minhaLocalizacao.lat, minhaLocalizacao.lng, alerta.lat, alerta.lng);
        if (dist < 0.3) {
            const agora = Date.now();
            if (ultimoAlertaExibido[chave] && agora - ultimoAlertaExibido[chave] < 300000) return;
            ultimoAlertaExibido[chave] = agora;
            alertaAtual = { id, ...alerta };
            mostrarPopupConfirmacao(alerta);
        }
    });
}

function mostrarPopupConfirmacao(alerta) {
    const popup = document.getElementById('confirmacaoPopup');
    document.getElementById('confirmacaoTexto').innerHTML = `${alerta.nome} A 300 METROS?`;
    document.getElementById('confirmacaoSubtexto').innerHTML = 'CONFIRME SE AINDA ESTÁ ATIVO';

    if (popupTimeout) clearTimeout(popupTimeout);

}

function confirmarAlerta() {
    if (!alertaAtual) return;
    const chave = `${usuario}_${alertaAtual.id}`;
    alertasConfirmados[chave] = true;
    localStorage.setItem('br277_confirmacoes', JSON.stringify(alertasConfirmados));
    db.ref('alertas_fixos/' + alertaAtual.id + '/confirmacoes').transaction(c => (c||0)+1);
    document.getElementById('confirmacaoPopup').style.display = 'none';
    if (popupTimeout) clearTimeout(popupTimeout);
    alertaAtual = null;
    tocarBip();
}

function negarAlerta() {
    if (!alertaAtual) return;
    const chave = `${usuario}_${alertaAtual.id}`;
    alertasConfirmados[chave] = true;
    localStorage.setItem('br277_confirmacoes', JSON.stringify(alertasConfirmados));
    document.getElementById('confirmacaoPopup').style.display = 'none';
    if (popupTimeout) clearTimeout(popupTimeout);
    alertaAtual = null;
}

function tocarBip() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);
    } catch(e) {}
}

function carregarAlertasFixosRacing() {
    db.ref('alertas_fixos').on('child_added', snap => {
        const alerta = snap.val();
        const id = snap.key;
        alertasMapa[id] = alerta;
        
        const marcador = criarPulsanteRacing(alerta, id);
        if (clusterSystem) {
            clusterSystem.clusterGroup.addLayer(marcador);
        } else {
            marcador.addTo(mapa);
        }
        pulsantesAlertas[id] = marcador;
    });
    
    db.ref('alertas_fixos').on('child_removed', snap => {
        const id = snap.key;
        if (pulsantesAlertas[id]) {
            if (clusterSystem) {
                clusterSystem.clusterGroup.removeLayer(pulsantesAlertas[id]);
            } else {
                mapa.removeLayer(pulsantesAlertas[id]);
            }
            delete pulsantesAlertas[id];
        }
        delete alertasMapa[id];
    });
}

            const isMinha = msg.usuario === usuario;
            html += `
                <div class="mensagem-wrapper ${isMinha ? 'minha' : 'outra'}">
                    <div class="mensagem ${isMinha ? 'minha' : 'outra'}">
                        <div class="mensagem-remetente">${msg.usuario}</div>
                        ${msg.tipo === 'imagem' 
                            ? `<img src="${msg.imagem}" style="max-width:180px; border-radius:10px; border:2px solid #ffd700; cursor:pointer;" onclick="window.open('${msg.imagem}')">` 
                            : `<div>${msg.texto}</div>`
                        }
                        <div class="mensagem-info">
                            <span>${msg.hora}</span>
                            ${msg.telefone ? `<span>📱${msg.telefone}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        
        chatDiv.innerHTML = html;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}

function enviarMsgGeral() {
    const input = document.getElementById('chatInputRacing');
    const texto = input.value.trim();
    if (!texto) return;
    
    db.ref('chat_geral').push({
        tipo: 'texto',
        usuario: usuario,
        telefone: telefone,
        texto: texto,
        hora: new Date().toLocaleTimeString(),
        timestamp: Date.now()
    });
    
    input.value = '';
}

// ===== RÁDIO PX RACING =====
let gravador, pedacosAudio, streamAudio, timerInterval, tempoRestante = 20;
document.getElementById('btn-px-racing').addEventListener('click', async function() {
    if (gravador && gravador.state === 'recording') { pararGravacao(); return; }
    try {
        streamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
        gravador = new MediaRecorder(streamAudio);
        pedacosAudio = [];
        tempoRestante = 20;
        
        gravador.ondataavailable = e => e.data.size > 0 && pedacosAudio.push(e.data);
        gravador.onstop = () => {
            if (pedacosAudio.length > 0) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    db.ref('radio').push({ audio: reader.result, usuario, timestamp: Date.now() });
                    setTimeout(() => db.ref('radio').orderByChild('timestamp').endAt(Date.now()-20000).once('value', snap => snap.forEach(c => c.ref.remove())), 20000);
                };
                reader.readAsDataURL(new Blob(pedacosAudio, { type: 'audio/webm' }));
            }
            streamAudio.getTracks().forEach(t => t.stop());
            document.getElementById('gravandoIndicator').style.display = 'none';
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('btn-px-racing').classList.remove('ativo');
        };
        
        gravador.start();
        document.getElementById('btn-px-racing').classList.add('ativo');
        document.getElementById('gravandoIndicator').style.display = 'flex';
        const timer = document.getElementById('gravandoTimer');
        
        timerInterval = setInterval(() => {
            tempoRestante--;
            timer.textContent = tempoRestante + 's';
            if (tempoRestante <= 1) pararGravacao();
        }, 1000);
        
        setTimeout(() => pararGravacao(), 19500);
        
    } catch(e) { alert('❌ PERMITA ACESSO AO MICROFONE'); }
});

function pararGravacao() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        document.getElementById('btn-px-racing').classList.remove('ativo');
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('gravandoIndicator').style.display = 'none';
    }
}

db.ref('radio').orderByChild('timestamp').limitToLast(1).on('child_added', snap => {
    const d = snap.val();
    if (d && d.usuario !== usuario && !mudo && Date.now() - d.timestamp < 5000) {
        new Audio(d.audio).play().catch(() => {});
        document.getElementById('audioNotification').style.display = 'flex';
        setTimeout(() => document.getElementById('audioNotification').style.display = 'none', 2000);
    }
});

// ===== ROTA =====
let marcadorDestino = null;
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    if (!destino || !minhaLocalizacao) return;
    
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)},Brasil&limit=1`)
        .then(r => r.json())
        .then(data => {
            if (!data.length) { alert('❌ CIDADE NÃO ENCONTRADA'); return; }
            const dest = L.latLng(data[0].lat, data[0].lon);
            
            if (marcadorDestino) mapa.removeLayer(marcadorDestino);
            marcadorDestino = L.marker(dest, { 
                icon: L.divIcon({
                    html: `<div class="alfinete-racing" style="position:relative; width:50px; height:50px;"><i class="fas fa-map-pin" style="color:#000; font-size:50px; -webkit-text-stroke:3px #00ff00;"></i><div class="led-verde"></div></div>`,
                    className: '', iconSize: [50,50], iconAnchor: [25,50]
                })
            }).addTo(mapa);
            
            if (rotaAtual) mapa.removeControl(rotaAtual);
            rotaAtual = L.Routing.control({
                waypoints: [minhaLocalizacao, dest],
                lineOptions: { styles: [{ color: '#4169E1', weight: 6, opacity: 0.7 }] },
                createMarker: () => null,
                show: false
            }).addTo(mapa);
            
            mapa.flyToBounds(L.latLngBounds([minhaLocalizacao, dest]));
            document.getElementById('rotaInfoPanel').style.display = 'flex';
            document.getElementById('btnEncerrarRota').style.display = 'flex';
            
            const dist = calcularDistancia(minhaLocalizacao.lat, minhaLocalizacao.lng, dest.lat, dest.lng);
            document.getElementById('rotaTempo').textContent = Math.round(dist * 1.2) + 'min';
            document.getElementById('rotaDistancia').textContent = dist + ' km';
            document.getElementById('rotaAtraso').textContent = '+' + Math.round(dist * 0.24) + 'min';
        });
}

function encerrarRota() {
    if (rotaAtual) { mapa.removeControl(rotaAtual); rotaAtual = null; }
    if (marcadorDestino) { mapa.removeLayer(marcadorDestino); marcadorDestino = null; }
    document.getElementById('rotaInfoPanel').style.display = 'none';
    document.getElementById('btnEncerrarRota').style.display = 'none';
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

// ===== WAKE LOCK =====
async function ativarWakeLock() {
    if ('wakeLock' in navigator) {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { if (document.visibilityState === 'visible') ativarWakeLock(); });
        } catch(e) {}
    }
}

document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && !wakeLock) ativarWakeLock(); });
