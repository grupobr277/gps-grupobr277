<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | MONITORAMENTO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --primary: #075e54; --accent: #25d366; --blue-maps: #1a73e8; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* Contador de Motoristas - Topo Direito */
        #status-bar { position: absolute; top: 15px; right: 15px; z-index: 1002; background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; pointer-events: none; }

        /* Barra de Pesquisa Centralizada */
        .leaflet-top.leaflet-center { 
            left: 50%; transform: translateX(-50%); top: 10px; width: 85%; max-width: 400px;
        }
        .leaflet-control-geocoder { 
            margin: 0 !important; width: 100% !important; border-radius: 30px !important; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important; border: none !important;
        }

        /* Botões de Alerta Laterais */
        .grid-alertas { 
            position: absolute; top: 80px; left: 10px; z-index: 1000; 
            display: flex; flex-direction: column; gap: 8px; 
            max-height: 70vh; overflow-y: auto;
        }
        .btn-acao { 
            background: white; border: none; padding: 10px 5px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 85px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-acao span { font-size: 22px; }
        .btn-acao b { font-size: 8px; color: #333; text-transform: uppercase; margin-top: 3px; }

        /* Chat Lateral */
        #chat-app { position: fixed; right: -100%; top: 0; width: 85%; max-width: 350px; height: 100%; background: #e5ddd5; z-index: 2001; transition: 0.4s; display: flex; flex-direction: column; }
        #chat-app.aberto { right: 0; }
        .header-chat { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; }
        #area-mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-outro { background: white; align-self: flex-start; }
        .msg-eu { background: #dcf8c6; align-self: flex-end; }

        /* Estilo do Mapa */
        .meu-gps { width: 18px; height: 18px; background: var(--blue-maps); border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

<div id="status-bar">🚗 <span id="online-count">1</span> Motoristas Online</div>
<div id="map"></div>

<div class="grid-alertas">
    <button class="btn-acao" onclick="enviarAlerta('Acidente', '⚠️')"><span>⚠️</span><b>Acidente</b></button>
    <button class="btn-acao" onclick="enviarAlerta('Obras', '🚧')"><span>🚧</span><b>Obras</b></button>
    <button class="btn-acao" onclick="enviarAlerta('Lentidão', '🚗')"><span>🚗</span><b>Lentidão</b></button>
    <button class="btn-acao" onclick="enviarAlerta('Neblina', '☁️')"><span>☁️</span><b>Neblina</b></button>
    <button class="btn-acao" onclick="enviarAlerta('Animal', '🐕')"><span>🐕</span><b>Animal</b></button>
    <button class="btn-acao" onclick="enviarAlerta('Bloqueio', '🚫')"><span>🚫</span><b>Bloqueio</b></button>
    <button class="btn-acao" onclick="enviarAlerta('Buraco', '🕳️')"><span>🕳️</span><b>Buraco</b></button>
</div>

<button onclick="document.getElementById('chat-app').classList.toggle('aberto')" style="position:fixed; bottom:20px; right:20px; z-index:1001; width:65px; height:65px; border-radius:50%; background:var(--accent); color:white; border:none; font-size:30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3)">💬</button>

<div id="chat-app">
    <div class="header-chat"><span>COMUNIDADE BR-277</span><span onclick="document.getElementById('chat-app').classList.remove('aberto')" style="cursor:pointer">✕</span></div>
    <div id="area-mensagens"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex;">
        <input type="text" id="msg-input" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;" placeholder="Digite aqui...">
        <button onclick="enviarMensagem()" style="background:var(--primary); color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:5px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- MAPA ---
// Criando uma posição personalizada para a busca no topo centro
L.Control.Center = L.Control.extend({ onAdd: function(map) { return L.DomUtil.create('div', 'leaflet-center'); } });
L.control.center = function(opts) { return new L.Control.Center(opts); };

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 12);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);
L.control.center({ position: 'topleft' }).addTo(map); // Container para a busca

let meuLatLng, meuMarker, rControl;
const meuID = "Drive_" + Math.random().toString(36).substr(2, 4).toUpperCase();

// --- GPS ---
function carregarGPS() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
            map.setView(meuLatLng, 15);
        } else { meuMarker.setLatLng(meuLatLng); }
        db.ref("vivos/" + meuID).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, t: Date.now() });
        db.ref("vivos/" + meuID).onDisconnect().remove();
    }, null, { enableHighAccuracy: true });
}

// --- BUSCA CENTRALIZADA E ROTA WAZE ---
const buscador = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Pra onde vamos motorista?",
    collapsed: false
}).on('markgeocode', function(e) {
    const destino = e.geocode.center;
    if (rControl) map.removeControl(rControl);

    rControl = L.Routing.control({
        waypoints: [meuLatLng, destino],
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', language: 'pt' }),
        lineOptions: { styles: [{ color: '#1a73e8', opacity: 0.8, weight: 9 }], extendToWaypoints: true },
        createMarker: (i, wp) => i === 1 ? L.marker(wp.latLng).bindPopup("Chegada") : null,
        addWaypoints: false
    }).addTo(map);
    
    // Zoom para mostrar a rota completa (Waze style)
    const bounds = L.latLngBounds([meuLatLng, destino]);
    map.fitBounds(bounds, { padding: [80, 80] });
}).addTo(document.querySelector('.leaflet-center'));

// --- SALVAR ALERTAS (FIX DEFINITIVO) ---
function enviarAlerta(tipo, emoji) {
    if (!meuLatLng) return alert("GPS não detectado!");
    const id = "A_" + Date.now();
    const dados = { id, tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, t: Date.now() };

    db.ref("alertas/" + id).set(dados)
        .then(() => alert(tipo + " reportado!"))
        .catch(e => console.error(e));
}

// Mostrar alertas para todos na entrada
db.ref("alertas").on("child_added", snap => {
    const a = snap.val();
    const htmlIcon = `<div style="text-align:center"><span style="font-size:26px">${a.emoji}</span></div>`;
    L.marker([a.lat, a.lng], { icon: L.divIcon({ html: htmlIcon, iconSize: [40, 40], className: '' }) })
    .addTo(map).bindPopup("<b>" + a.tipo + "</b>");
});

// --- MOTORISTAS ONLINE ---
db.ref("vivos").on("value", snap => {
    const d = snap.val() || {};
    document.getElementById("online-count").innerText = Object.keys(d).length;
});

// --- CHAT ---
function enviarMensagem() {
    const input = document.getElementById('msg-input');
    if (!input.value) return;
    db.ref("chat").push({ u: meuID, m: input.value, t: Date.now() });
    input.value = "";
}

db.ref("chat").limitToLast(20).on("child_added", snap => {
    const v = snap.val();
    const area = document.getElementById('area-mensagens');
    const lado = v.u === meuID ? "msg-eu" : "msg-outro";
    area.innerHTML += `<div class="msg ${lado}"><small>${v.u}</small><br>${v.m}</div>`;
    area.scrollTop = area.scrollHeight;
});

carregarGPS();
</script>
</body>
</html>
