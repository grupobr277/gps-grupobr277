<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RÁDIO PX 277 | CB Radio</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.18.3/dist/index.css"/>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.18.3/dist/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #2a2a2a;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .radio {
            width: 100%;
            max-width: 500px;
            background: #4a4a4a;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #666;
        }

        .header {
            background: #3a3a3a;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        .header h1 { font-size: 22px; color: #ffd700; }
        .header h1 i { color: #e53935; }

        .display {
            background: #0a0a0a;
            margin: 15px;
            border-radius: 15px;
            padding: 12px;
            border: 1px solid #ffd700;
        }
        .freq {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            color: #00ff88;
            text-align: center;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .live {
            background: #e53935;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: white;
        }
        .online {
            background: #ffd700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: #1a1a1a;
        }
        .station-name {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #ffd700;
            background: #000;
            padding: 5px;
            border-radius: 10px;
        }

        .smeter { margin-top: 10px; }
        .meter-bars { display: flex; gap: 3px; height: 25px; }
        .bar { flex: 1; background: #1a1a1a; border-radius: 3px; }
        .bar.active { background: #00ff88; }
        .bar.warning { background: #ffaa00; }
        .bar.danger { background: #ff4444; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 10px 15px;
            padding: 10px;
            background: #3a3a3a;
            border-radius: 40px;
        }
        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2a2a2a;
            padding: 6px 18px;
            border-radius: 30px;
        }
        .control-label { font-size: 12px; color: #ffd700; font-weight: bold; }
        .switch {
            width: 45px;
            height: 24px;
            background: #555;
            border-radius: 30px;
            cursor: pointer;
            position: relative;
        }
        .switch::after {
            content: '';
            width: 20px;
            height: 20px;
            background: #aaa;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .switch.active { background: #00aaff; }
        .switch.active::after { left: 22px; background: white; }
        .switch.mute-active { background: #e53935; }
        .control-value { font-size: 10px; color: white; min-width: 30px; }

        .station-selector {
            background: #2a2a2a;
            border: 1px solid #ffd700;
            border-radius: 40px;
            padding: 10px 15px;
            margin: 10px 15px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            color: #ffd700;
        }
        .station-dropdown {
            background: #2a2a2a;
            border: 1px solid #ffd700;
            border-radius: 15px;
            margin: 0 15px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .station-dropdown.open { display: block; }
        .station-option {
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            border-bottom: 1px solid #444;
        }
        .station-option:hover { background: #ffd700; color: #000; }

        .presets {
            display: flex;
            gap: 10px;
            margin: 10px 15px;
        }
        .preset-btn {
            flex: 1;
            background: #3a3a3a;
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        .preset-btn .led {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #555;
            border-radius: 50%;
        }
        .preset-btn.active .led { background: #00ff88; animation: pulse 1s infinite; }
        .preset-num { font-size: 16px; font-weight: bold; color: #ccc; }
        .preset-city { font-size: 9px; color: white; margin-top: 3px; }
        .preset-btn.active { background: #2a4a6a; border-color: #00aaff; }
        .preset-btn.active .preset-num { color: #ffd700; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .actions {
            display: flex;
            gap: 12px;
            margin: 10px 15px;
        }
        .action {
            flex: 1;
            background: #3a3a3a;
            border: 1px solid #ffd700;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .action i { color: #ffd700; margin-right: 5px; }

        .ptt-area {
            text-align: center;
            margin: 15px;
            padding: 15px;
            background: #3a3a3a;
            border-radius: 80px;
        }
        .ptt {
            width: 120px;
            height: 120px;
            background: radial-gradient(#5a5a5a, #3a3a3a);
            border: 3px solid #777;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .ptt i { font-size: 45px; color: #aaa; }
        .ptt span { font-size: 12px; color: #aaa; }
        .ptt.active {
            background: radial-gradient(#e53935, #8b0000);
            border-color: #ffd700;
            animation: pulse-red 1s infinite;
        }
        .ptt.active i, .ptt.active span { color: white; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 #e53935; }
            50% { box-shadow: 0 0 0 15px rgba(229,57,53,0.3); }
            100% { box-shadow: 0 0 0 0 rgba(229,57,53,0); }
        }
        .timer {
            font-size: 12px;
            color: #ffd700;
            background: #000;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .admin-gear {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #3a3a3a;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #ffd700;
        }
        .admin-gear i { color: #ffd700; }
        .admin-panel {
            position: absolute;
            top: 50px;
            right: 20px;
            background: #2a2a2a;
            border-radius: 10px;
            padding: 5px;
            display: none;
            flex-direction: column;
            border: 1px solid #ffd700;
        }
        .admin-panel.show { display: flex; }
        .admin-panel button {
            background: #3a3a3a;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            color: white;
            cursor: pointer;
        }

        .modal-full, .modal-alert, .modal-chat {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
        .modal-full.visible, .modal-alert.visible, .modal-chat.visible { display: flex; }
        .modal-header { background: #075E54; padding: 12px; display: flex; justify-content: space-between; color: white; }
        .modal-close { background: #e53935; border: none; width: 30px; border-radius: 50%; color: white; cursor: pointer; }
        .map-container { flex: 1; }
        #map { height: 100%; width: 100%; }
        .recenter-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #00aaff;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 15px;
            cursor: pointer;
            z-index: 1001;
        }
        .alert-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }
        .alert-card {
            background: #1f1f40;
            border-radius: 50px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
        }
        .alert-emoji { font-size: 28px; }
        .alert-name { font-size: 10px; color: white; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; background: #E5DDD5; }
        .chat-input-area { display: flex; padding: 8px; background: #F0F0F0; gap: 8px; }
        .chat-input-area input { flex: 1; padding: 8px; border-radius: 25px; border: none; }
        .chat-input-area button { background: #075E54; border: none; width: 35px; border-radius: 50%; color: white; cursor: pointer; }
        .msg { margin-bottom: 8px; display: flex; }
        .msg.me { justify-content: flex-end; }
        .msg.other { justify-content: flex-start; }
        .msg-content { max-width: 75%; padding: 8px 12px; border-radius: 18px; background: white; }
        .msg.me .msg-content { background: #DCF8C6; }
        .msg-sender { font-size: 10px; font-weight: bold; color: #075E54; }
        .msg-text { font-size: 12px; }
        .msg-time { font-size: 9px; color: #888; text-align: right; margin-top: 3px; }
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 10px;
            padding: 5px 0;
            display: none;
            z-index: 10000;
        }
        .context-menu.show { display: block; }
        .context-item { padding: 8px 15px; cursor: pointer; }
        .context-item:hover { background: #f0f0f0; }
        emoji-picker {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: none;
            width: 90%;
            max-width: 300px;
            height: 350px;
        }
        emoji-picker.show { display: block; }
        .audio-notify {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a3a3a;
            border: 1px solid #00aaff;
            border-radius: 50px;
            padding: 6px 16px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 2000;
        }
        .map-marker-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            animation: pulse-marker 1.5s infinite;
        }
        @keyframes pulse-marker { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="radio">
    <div class="header">
        <h1><i class="fas fa-microphone-alt"></i> PX 277 <i class="fas fa-broadcast-tower"></i></h1>
    </div>

    <div class="display">
        <div class="freq">27.7 MHz</div>
        <div class="info-row">
            <div class="live"><i class="fas fa-circle"></i> AO VIVO</div>
            <div class="online" id="onlineCount">0 online</div>
        </div>
        <div class="station-name" id="stationName">📻 CURITIBA</div>
        <div class="smeter">
            <div class="meter-bars" id="meterBars">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-item">
            <span class="control-label">MUDO</span>
            <div class="switch" id="muteSwitch"></div>
            <span class="control-value" id="muteStatus">DESL</span>
        </div>
        <div class="control-item">
            <span class="control-label">LED</span>
            <div class="switch active" id="ledSwitch"></div>
            <span class="control-value" id="ledStatus">LIG</span>
        </div>
    </div>

    <div class="station-selector" id="selectorTrigger">
        <span id="selectedCity">Curitiba</span>
        <i class="fas fa-chevron-down"></i>
    </div>
    <div class="station-dropdown" id="stationDropdown"></div>

    <div class="presets" id="presets"></div>

    <div class="actions">
        <div class="action" id="openMapBtn"><i class="fas fa-map-marked-alt"></i> MAPA</div>
        <div class="action" id="openAlertBtn"><i class="fas fa-exclamation-triangle"></i> ALERTA</div>
        <div class="action" id="openChatBtn"><i class="fas fa-comment-dots"></i> CHAT</div>
    </div>

    <div class="ptt-area">
        <div class="ptt off" id="pttBtn">
            <i class="fas fa-microphone-slash"></i>
            <span>PTT</span>
        </div>
        <div class="timer" id="timer" style="display:none;"></div>
    </div>

    <div class="admin-gear" id="adminGear"><i class="fas fa-cog"></i></div>
    <div class="admin-panel" id="adminPanel">
        <button id="adminMapBtn">ADMIN MAPA</button>
        <button id="adminChatBtn">ADMIN CHAT</button>
        <button id="exitAdminBtn">SAIR</button>
    </div>
</div>

<!-- MODAIS -->
<div class="modal-full" id="mapModal">
    <div class="modal-header"><span>MAPA BR-277</span><button class="modal-close" onclick="closeMapModal()">✕</button></div>
    <div class="map-container"><div id="map"></div><button class="recenter-btn" onclick="recenterMap()"><i class="fas fa-location-arrow"></i> Recentralizar</button></div>
</div>

<div class="modal-alert" id="alertModal">
    <div class="modal-header"><span>REPORTAR OCORRÊNCIA</span><button class="modal-close" onclick="closeAlertModal()">✕</button></div>
    <div class="alert-grid" id="alertGrid"></div>
</div>

<div class="modal-chat" id="chatModal">
    <div class="modal-header"><span>CHAT GERAL</span><button class="modal-close" onclick="closeChatModal()">✕</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <button id="chatEmojiBtn"><i class="fas fa-smile"></i></button>
        <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
        <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div class="context-item" id="replyMsg">Responder</div>
    <div class="context-item" id="deleteMsg">Apagar</div>
    <div class="context-item" id="emojiMsg">Emoji</div>
</div>

<emoji-picker id="emojiPicker"></emoji-picker>
<div class="audio-notify" id="audioNotify"><div style="background:#e53935; width:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-bullhorn"></i></div><div><span id="audioSender"></span><br><span id="audioStation"></span></div></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==================== CONFIG ====================
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const cities = ["Curitiba","Ponta Grossa","Guarapuava","Paranaguá","Campo Largo","São José","Maringá","Londrina","Cascavel","Foz do Iguaçu"];

const alertTypes = [
    { name: 'ACIDENTE', emoji: '💥', color: '#e53935' }, { name: 'OBRAS', emoji: '🚧', color: '#ff9800' },
    { name: 'PANE MECÂNICA', emoji: '🔧', color: '#795548' }, { name: 'ANIMAL NA PISTA', emoji: '🐂', color: '#9c27b0' },
    { name: 'VEÍCULO ENGUIÇADO', emoji: '🚗💨', color: '#ff5722' }, { name: 'BARREIRA', emoji: '⛰️', color: '#8b4513' },
    { name: 'NEBLINA', emoji: '🌫️', color: '#00acc1' }, { name: 'CONGESTIONAMENTO', emoji: '🔴', color: '#f44336' },
    { name: 'ALAGAMENTO', emoji: '💧', color: '#2196f3' }, { name: 'BLOQUEIO TOTAL', emoji: '⛔', color: '#b71c1c' },
    { name: 'PERIGO', emoji: '⚠️', color: '#ff5722' }, { name: 'DESVIO', emoji: '🔄', color: '#3f51b5' },
    { name: 'CARGA PERIGOSA', emoji: '📦', color: '#8bc34a' }, { name: 'GRANIZO', emoji: '🧊', color: '#00bcd4' },
    { name: 'MANIFESTAÇÃO', emoji: '📢', color: '#ff4081' }
];

let userName = localStorage.getItem('px_user') || prompt("Seu nome:", "Caminhoneiro");
localStorage.setItem('px_user', userName);
let currentStation = 'curitiba';
let isMuted = false, isLedActive = true;
let isAdminMap = false, isAdminChat = false;
let map, userMarker, userLocation, alertsOnMap = {};
let mediaRecorder, isTransmitting = false, audioStream, chunks = [], recordSec = 0, timerInterval;
let audioListener, currentAudio;
let quickStations = JSON.parse(localStorage.getItem('quickStations') || '[]');
let activePreset = null;
let selectedMsg = { id: null, type: null, text: null, user: null };
let currentReply = null;
let tempMarker = null, adminClickCount = 0, adminClickTimeout = null, adminFirstPos = null;

function normalizeId(str) { return str.toLowerCase().replace(/ /g, '_').normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function showToast(msg) { let t=document.createElement('div'); t.innerText=msg; t.style.cssText='position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:#00aaff; color:white; padding:5px 15px; border-radius:30px; z-index:13000; font-size:11px;'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

// ==================== SWITCHES ====================
document.getElementById('muteSwitch').onclick = function() {
    isMuted = !isMuted;
    if(isMuted) { this.classList.add('mute-active'); document.getElementById('muteStatus').innerText = 'LIG'; if(currentAudio) currentAudio.pause(); }
    else { this.classList.remove('mute-active'); document.getElementById('muteStatus').innerText = 'DESL'; }
};
document.getElementById('ledSwitch').onclick = function() {
    isLedActive = !isLedActive;
    if(isLedActive) { this.classList.add('active'); document.getElementById('ledStatus').innerText = 'LIG'; }
    else { this.classList.remove('active'); document.getElementById('ledStatus').innerText = 'DESL'; }
};

function animateSMeter() {
    if(!isLedActive) return;
    let bars = document.querySelectorAll('.bar');
    let val = isTransmitting ? 9 : Math.floor(Math.random() * 5);
    bars.forEach((b,i) => {
        b.classList.remove('active','warning','danger');
        if(i < val) {
            if(i>=7) b.classList.add('danger');
            else if(i>=5) b.classList.add('warning');
            else b.classList.add('active');
        }
    });
}
setInterval(animateSMeter, 800);

// ==================== ESTAÇÕES ====================
function buildDropdown() {
    let menu = document.getElementById('stationDropdown');
    menu.innerHTML = '';
    cities.forEach(city => {
        let opt = document.createElement('div');
        opt.className = 'station-option';
        opt.innerText = city;
        opt.onclick = () => {
            currentStation = normalizeId(city);
            document.getElementById('selectedCity').innerText = city;
            document.getElementById('stationName').innerHTML = `📻 ${city.toUpperCase()}`;
            localStorage.setItem('px_station', currentStation);
            menu.classList.remove('open');
            showToast(`📻 ${city}`);
            loadCounts();
        };
        menu.appendChild(opt);
    });
}
document.getElementById('selectorTrigger').onclick = () => {
    document.getElementById('stationDropdown').classList.toggle('open');
};
document.addEventListener('click', (e) => {
    if(!e.target.closest('.station-selector')) document.getElementById('stationDropdown').classList.remove('open');
});
buildDropdown();

function loadCounts() {
    db.ref(`stations/${currentStation}/users`).on('value', snap => {
        let count = snap.val() ? Object.keys(snap.val()).length : 0;
        document.getElementById('onlineCount').innerHTML = `${count} online <i class="fas fa-users"></i>`;
    });
}
loadCounts();

// ==================== BOTÕES FAVORITOS ====================
function renderPresets() {
    let container = document.getElementById('presets');
    container.innerHTML = '';
    for(let i=0; i<5; i++) {
        let btn = document.createElement('div');
        btn.className = 'preset-btn';
        if(quickStations[i]) {
            btn.innerHTML = `<div class="led"></div><div class="preset-num">${i+1}</div><div class="preset-city">${quickStations[i].name}</div>`;
            if(activePreset === i) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activePreset = i;
                document.getElementById('selectedCity').innerText = quickStations[i].name;
                document.getElementById('stationName').innerHTML = `📻 ${quickStations[i].name.toUpperCase()}`;
                currentStation = normalizeId(quickStations[i].name);
                showToast(`📻 ${quickStations[i].name}`);
                loadCounts();
            };
            btn.oncontextmenu = (e) => {
                e.preventDefault();
                if(confirm(`Remover ${quickStations[i].name}?`)) {
                    quickStations.splice(i,1);
                    if(activePreset === i) activePreset = null;
                    localStorage.setItem('quickStations', JSON.stringify(quickStations));
                    renderPresets();
                }
            };
        } else {
            btn.innerHTML = `<div class="led"></div><div class="preset-num">+${i+1}</div><div class="preset-city">vazio</div>`;
            btn.onclick = () => {
                let currentName = document.getElementById('selectedCity').innerText;
                if(quickStations.length >= 5) { showToast("Limite de 5 favoritos"); return; }
                if(quickStations.some(s => s.name === currentName)) { showToast("Já salvo"); return; }
                quickStations.push({ id: normalizeId(currentName), name: currentName });
                localStorage.setItem('quickStations', JSON.stringify(quickStations));
                renderPresets();
                showToast(`✅ ${currentName} salvo!`);
            };
        }
        container.appendChild(btn);
    }
}
renderPresets();

// ==================== ÁUDIO ====================
function setupAudio() {
    if(audioListener) db.ref(`stations/${currentStation}/audios`).off();
    audioListener = db.ref(`stations/${currentStation}/audios`).on('child_added', snap => {
        let data = snap.val();
        if(data && data.sender !== userName && !isMuted) {
            if(currentAudio) currentAudio.pause();
            currentAudio = new Audio(data.audio);
            currentAudio.play();
            document.getElementById('audioSender').innerHTML = data.sender;
            document.getElementById('audioStation').innerHTML = data.station;
            document.getElementById('audioNotify').style.display = 'flex';
            setTimeout(() => document.getElementById('audioNotify').style.display = 'none', 3000);
        }
    });
}
setupAudio();

async function startTx() {
    if(isTransmitting) return;
    try {
        let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = []; recordSec = 0;
        db.ref(`stations/${currentStation}/speaking`).set({ user: userName, timestamp: Date.now() });
        mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            if(chunks.length) {
                let blob = new Blob(chunks, { type: 'audio/webm' });
                let reader = new FileReader();
                reader.onloadend = async () => {
                    let cityName = document.getElementById('selectedCity').innerText;
                    let snap = await db.ref(`stations/${currentStation}/audios`).once('value');
                    if(snap.val()) Object.keys(snap.val()).forEach(k => db.ref(`stations/${currentStation}/audios/${k}`).remove());
                    await db.ref(`stations/${currentStation}/audios`).push({ sender: userName, station: cityName, audio: reader.result, timestamp: Date.now(), duration: recordSec });
                    setTimeout(() => db.ref(`stations/${currentStation}/speaking`).remove(), 1000);
                };
                reader.readAsDataURL(blob);
            }
            if(audioStream) audioStream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start(100);
        isTransmitting = true;
        document.getElementById('pttBtn').classList.add('active');
        document.getElementById('pttBtn').innerHTML = '<i class="fas fa-microphone"></i><span>PTT</span>';
        document.getElementById('timer').style.display = 'block';
        timerInterval = setInterval(() => { recordSec++; document.getElementById('timer').innerHTML = `⏱️ ${recordSec}s`; }, 1000);
    } catch(e) { alert("Permita microfone"); }
}
function stopTx() {
    if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    if(timerInterval) clearInterval(timerInterval);
    isTransmitting = false;
    db.ref(`stations/${currentStation}/speaking`).remove();
    document.getElementById('pttBtn').classList.remove('active');
    document.getElementById('pttBtn').innerHTML = '<i class="fas fa-microphone-slash"></i><span>PTT</span>';
    document.getElementById('timer').style.display = 'none';
}
document.getElementById('pttBtn').onclick = () => { if(isTransmitting) stopTx(); else startTx(); };

// ==================== MAPA ====================
function initMap() {
    map = L.map('map').setView([-25.4284, -49.2733], 12);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);
    if(navigator.geolocation) navigator.geolocation.watchPosition(pos => {
        userLocation = [pos.coords.latitude, pos.coords.longitude];
        if(!userMarker) userMarker = L.marker(userLocation, { icon: L.divIcon({ html: '<div style="font-size:28px;">🚛</div>', iconSize: [28,28], iconAnchor: [14,14] }) }).addTo(map);
        else userMarker.setLatLng(userLocation);
    });
    loadAlerts();
    setupAdminMap();
}
function recenterMap() { if(userLocation) map.setView(userLocation, 14); else showToast("Aguardando localização"); }

function loadAlerts() {
    db.ref('alerts').on('child_added', snap => {
        let a = snap.val(), id = snap.key;
        if(Date.now() - a.timestamp > 20*60*1000) { db.ref(`alerts/${id}`).remove(); return; }
        if(alertsOnMap[id] || !map) return;
        let iconHtml = `<div class="map-marker-icon" style="background:${a.color}; box-shadow:0 0 10px ${a.color};">${a.emoji}</div>`;
        let marker = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: iconHtml, iconSize: [40,40], iconAnchor: [20,20] }) }).addTo(map);
        marker.bindPopup(`
            ${a.image ? `<img src="${a.image}" style="width:100%; height:80px; object-fit:cover; border-radius:10px;" onclick="viewFullImage('${a.image}')">` : ''}
            <div style="background:#075E54; color:white; padding:8px; display:flex; justify-content:space-between;" onclick="confirmAlert('${id}')">
                <span>${a.emoji} ${a.name}</span><span>👍 <span id="confirm-${id}">${a.confirmations||1}</span></span>
                ${isAdminMap ? `<button onclick="event.stopPropagation(); deleteAlert('${id}')" style="background:red; border:none; border-radius:10px;">🗑️</button>` : ''}
            </div>
            <div id="chatAlert-${id}" style="background:#E5DDD5; max-height:120px; overflow-y:auto; padding:5px;"></div>
            <div style="display:flex; padding:5px;"><input id="inputAlert-${id}" placeholder="Comentar..." style="flex:1;"><button onclick="sendAlertComment('${id}')">➔</button></div>
        `);
        marker.on('popupopen', () => loadAlertChat(id));
        alertsOnMap[id] = marker;
    });
}
function viewFullImage(img) { let m=document.createElement('div'); m.style.cssText='position:fixed; top:0; left:0; right:0; bottom:0; background:black; display:flex; align-items:center; justify-content:center; z-index:20000;'; m.innerHTML=`<img src="${img}" style="max-width:90%;">`; m.onclick=()=>m.remove(); document.body.appendChild(m); }
function confirmAlert(id) { db.ref(`alerts/${id}/confirmations`).transaction(c=>(c||1)+1); showToast("👍 Confirmado"); }
function loadAlertChat(id) { db.ref(`chats/alert_${id}`).on('value', snap => { let div=document.getElementById(`chatAlert-${id}`); if(!div) return; let msgs=snap.val(); if(!msgs){div.innerHTML='';return;} let html=''; Object.entries(msgs).sort((a,b)=>a[1].timestamp-b[1].timestamp).forEach(([mid,msg])=>{ let isMe=msg.user===userName; html+=`<div style="margin:5px; padding:5px; border-radius:10px; background:${isMe?'#DCF8C6':'white'};"><strong>${msg.user}</strong><br>${msg.text}<br><small>${new Date(msg.timestamp).toLocaleTimeString()}</small></div>`; }); div.innerHTML=html; }); }
async function sendAlertComment(id) { let input=document.getElementById(`inputAlert-${id}`); if(!input.value.trim()) return; await db.ref(`chats/alert_${id}`).push({ user:userName, text:input.value, timestamp:Date.now() }); input.value=''; }
async function deleteAlert(id) { if(confirm("Apagar?")) { await db.ref(`alerts/${id}`).remove(); if(alertsOnMap[id]) map.removeLayer(alertsOnMap[id]); delete alertsOnMap[id]; showToast("Removido"); } }
function setupAdminMap() {
    if(!map) return;
    map.on('click', (e) => {
        if(!isAdminMap) return;
        adminClickCount++;
        if(adminClickCount === 1) {
            adminFirstPos = e.latlng;
            if(tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(adminFirstPos, { draggable: true, icon: L.divIcon({ html: '<div style="background:#ffd700; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">📍</div>', iconSize: [32,32], iconAnchor: [16,16] }) }).addTo(map);
            tempMarker.on('dragend', () => { adminFirstPos = tempMarker.getLatLng(); showToast("Posição ajustada"); });
            showToast("⚠️ Clique NOVAMENTE no alfinete");
            adminClickTimeout = setTimeout(() => { adminClickCount = 0; if(tempMarker) map.removeLayer(tempMarker); showToast("Cancelado"); }, 10000);
        } else if(adminClickCount === 2) {
            clearTimeout(adminClickTimeout);
            let markerPos = tempMarker ? tempMarker.getLatLng() : adminFirstPos;
            if(markerPos && Math.hypot(markerPos.lat - e.latlng.lat, markerPos.lng - e.latlng.lng) < 0.0005) showAdminAlertDropdown(markerPos.lat, markerPos.lng);
            else showToast("❌ Clique no alfinete");
            adminClickCount = 0;
        }
    });
}
function showAdminAlertDropdown(lat, lng) {
    let modal = document.createElement('div'); modal.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:20000; display:flex; align-items:center; justify-content:center;';
    let container = document.createElement('div'); container.style.cssText = 'background:#3a3a3a; border-radius:20px; width:90%; max-width:320px; max-height:75vh; overflow:auto; border:2px solid #ffd700; padding:12px;';
    container.innerHTML = `<h3 style="color:#ffd700; text-align:center;">📌 NOVO ALERTA ADMIN</h3><div id="adminAlertSelector" style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px;"></div><button id="cancelAdminAlert" style="margin-top:10px; width:100%; padding:8px; background:#e53935; border:none; border-radius:20px; color:white;">CANCELAR</button>`;
    modal.appendChild(container); document.body.appendChild(modal);
    let grid = container.querySelector('#adminAlertSelector');
    alertTypes.forEach(alert => {
        let card = document.createElement('div'); card.style.cssText = `background:#4a4a4a; border-radius:10px; padding:6px; text-align:center; cursor:pointer; border-top:2px solid ${alert.color}`;
        card.innerHTML = `<div style="font-size:20px;">${alert.emoji}</div><div style="color:white; font-size:8px;">${alert.name}</div>`;
        card.onclick = async () => {
            let id = Date.now();
            await db.ref(`alerts/${id}`).set({ ...alert, lat: lat, lng: lng, timestamp: id, creator: userName + " (ADMIN)", confirmations: 1 });
            showToast(`✅ Alerta ${alert.name} criado`);
            document.body.removeChild(modal);
            if(tempMarker) map.removeLayer(tempMarker);
            adminClickCount = 0;
            openMapModal();
        };
        grid.appendChild(card);
    });
    container.querySelector('#cancelAdminAlert').onclick = () => { if(tempMarker) map.removeLayer(tempMarker); document.body.removeChild(modal); adminClickCount = 0; };
}

function openMapModal() { document.getElementById('mapModal').classList.add('visible'); if(map) map.invalidateSize(); else initMap(); }
function closeMapModal() { document.getElementById('mapModal').classList.remove('visible'); }

// ==================== ALERTAS ====================
function buildAlertGrid() {
    let grid = document.getElementById('alertGrid');
    grid.innerHTML = '';
    alertTypes.forEach(alert => {
        let card = document.createElement('div');
        card.className = 'alert-card';
        card.style.borderTop = `3px solid ${alert.color}`;
        card.innerHTML = `<div class="alert-emoji">${alert.emoji}</div><div class="alert-name">${alert.name}</div>`;
        card.onclick = () => createAlert(alert);
        grid.appendChild(card);
    });
}
async function createAlert(alert) {
    if(!userLocation) { showToast("Aguardando localização..."); return; }
    closeAlertModal();
    showToast(`⚠️ Reportando: ${alert.name}...`);
    try {
        let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        let overlay = document.createElement('div'); overlay.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:#000; z-index:20000; display:flex; flex-direction:column; align-items:center; justify-content:center;';
        let video = document.createElement('video'); video.autoplay = true; video.srcObject = stream; video.style.width = '80%'; video.style.maxWidth = '260px'; video.style.borderRadius = '12px';
        let btnPhoto = document.createElement('button'); btnPhoto.innerText = '📷 TIRAR FOTO'; btnPhoto.style.cssText = 'margin:10px; padding:6px 16px; background:#ffd700; border:none; border-radius:30px;';
        let btnSkip = document.createElement('button'); btnSkip.innerText = '⏭️ PULAR'; btnSkip.style.cssText = 'margin:10px; padding:6px 16px; background:#444; color:white; border:none; border-radius:30px;';
        let btnClose = document.createElement('button'); btnClose.innerText = '✕'; btnClose.style.cssText = 'position:absolute; top:15px; right:15px; background:red; border:none; border-radius:50%; width:32px; height:32px; color:white;';
        overlay.appendChild(video); overlay.appendChild(btnPhoto); overlay.appendChild(btnSkip); overlay.appendChild(btnClose);
        document.body.appendChild(overlay);
        btnPhoto.onclick = () => {
            let canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(async blob => {
                let reader = new FileReader();
                reader.onloadend = async () => {
                    let id = Date.now();
                    await db.ref(`alerts/${id}`).set({ ...alert, lat: userLocation[0], lng: userLocation[1], timestamp: id, creator: userName, confirmations: 1, image: reader.result });
                    stream.getTracks().forEach(t => t.stop()); document.body.removeChild(overlay); showToast("✅ Alerta enviado!"); openMapModal(); setTimeout(() => { if(map && userLocation) map.setView(userLocation, 13); }, 500);
                };
                reader.readAsDataURL(blob);
            }, 'image/jpeg', 0.6);
        };
        btnSkip.onclick = async () => {
            let id = Date.now();
            await db.ref(`alerts/${id}`).set({ ...alert, lat: userLocation[0], lng: userLocation[1], timestamp: id, creator: userName, confirmations: 1 });
            stream.getTracks().forEach(t => t.stop()); document.body.removeChild(overlay); showToast(`⚠️ ${alert.name} reportado!`); openMapModal(); setTimeout(() => { if(map && userLocation) map.setView(userLocation, 13); }, 500);
        };
        btnClose.onclick = () => { stream.getTracks().forEach(t => t.stop()); document.body.removeChild(overlay); };
    } catch(e) {
        let id = Date.now();
        await db.ref(`alerts/${id}`).set({ ...alert, lat: userLocation[0], lng: userLocation[1], timestamp: id, creator: userName, confirmations: 1 });
        showToast(`⚠️ ${alert.name} reportado!`); openMapModal(); setTimeout(() => { if(map && userLocation) map.setView(userLocation, 13); }, 500);
    }
}
function openAlertModal() { document.getElementById('alertModal').classList.add('visible'); buildAlertGrid(); }
function closeAlertModal() { document.getElementById('alertModal').classList.remove('visible'); }

// ==================== CHAT ====================
function loadChatMessages() {
    db.ref('chat_global').off();
    db.ref('chat_global').on('value', snap => {
        let msgs = snap.val();
        let container = document.getElementById('chatMessages');
        if(!msgs) { container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhuma mensagem</div>'; return; }
        let html = '';
        Object.entries(msgs).sort((a,b)=>a[1].timestamp-b[1].timestamp).forEach(([id, msg]) => {
            let isMe = msg.user === userName;
            let time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            html += `<div class="msg ${isMe ? 'me' : 'other'}" data-id="${id}" data-user="${msg.user}" data-text="${msg.text.replace(/</g, '&lt;')}">
                        <div class="msg-content" onclick="selectMsg(this,'${id}','chat_global')">
                            <div class="msg-sender">${msg.user}</div>
                            <div class="msg-text">${msg.text.replace(/</g, '&lt;')}</div>
                            <div class="msg-time">${time}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    });
}
function selectMsg(el, id, type) {
    let wrapper = el.closest('.msg');
    selectedMsg = { id, type, user: wrapper.dataset.user, text: wrapper.dataset.text };
    let menu = document.getElementById('contextMenu');
    let rect = el.getBoundingClientRect();
    menu.style.left = rect.left + 'px';
    menu.style.top = rect.bottom + 'px';
    menu.classList.add('show');
}
function sendChatMsg() {
    let input = document.getElementById('chatInput');
    if(!input.value.trim()) return;
    let msg = { user: userName, text: input.value.trim(), timestamp: Date.now() };
    if(currentReply) { msg.replyTo = currentReply; currentReply = null; document.getElementById('replyPreview')?.classList.remove('show'); }
    db.ref('chat_global').push(msg);
    input.value = '';
    showToast("✓ Enviada");
}
document.getElementById('sendMsgBtn').addEventListener('click', sendChatMsg);
document.getElementById('chatInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChatMsg(); });

document.getElementById('replyMsg').addEventListener('click', () => {
    if(selectedMsg.user && selectedMsg.text) {
        currentReply = `${selectedMsg.user}: "${selectedMsg.text.substring(0,40)}${selectedMsg.text.length>40?'...':''}"`;
        document.getElementById('contextMenu').classList.remove('show');
        document.getElementById('chatInput').focus();
    }
});
document.getElementById('deleteMsg').addEventListener('click', async () => {
    if(!selectedMsg.id) return;
    let isAdmin = isAdminChat;
    let isOwner = selectedMsg.user === userName;
    if(isAdmin || isOwner) {
        if(confirm("Apagar mensagem?")) {
            await db.ref(`${selectedMsg.type}/${selectedMsg.id}`).remove();
            showToast("Mensagem apagada");
        }
    } else showToast("Você só pode apagar suas próprias mensagens");
    document.getElementById('contextMenu').classList.remove('show');
});
document.getElementById('emojiMsg').addEventListener('click', () => {
    document.getElementById('emojiPicker').classList.toggle('show');
    document.getElementById('contextMenu').classList.remove('show');
});

const emojiPicker = document.getElementById('emojiPicker');
document.getElementById('chatEmojiBtn').addEventListener('click', () => { emojiPicker.classList.toggle('show'); });
emojiPicker.addEventListener('emoji-click', (e) => { document.getElementById('chatInput').value += e.detail.unicode; emojiPicker.classList.remove('show'); });
document.addEventListener('click', (e) => { if(!emojiPicker.contains(e.target) && e.target.id !== 'chatEmojiBtn') emojiPicker.classList.remove('show'); });

function openChatModal() { document.getElementById('chatModal').classList.add('visible'); loadChatMessages(); }
function closeChatModal() { document.getElementById('chatModal').classList.remove('visible'); }

// ==================== ADMIN ====================
function enableAdminMap() { let pwd = prompt("Senha (277):"); if(pwd === '277'){ isAdminMap = true; showToast("ADMIN MAPA ATIVADO - Clique 2x no mapa"); } else showToast("Senha errada"); }
function enableAdminChat() { let pwd = prompt("Senha (277):"); if(pwd === '277'){ isAdminChat = true; showToast("ADMIN CHAT ATIVADO"); } else showToast("Senha errada"); }
function disableAdmin() { isAdminMap = false; isAdminChat = false; showToast("Admin desativado"); }
document.getElementById('adminGear').onclick = () => document.getElementById('adminPanel').classList.toggle('show');
document.getElementById('adminMapBtn').onclick = () => { enableAdminMap(); document.getElementById('adminPanel').classList.remove('show'); };
document.getElementById('adminChatBtn').onclick = () => { enableAdminChat(); document.getElementById('adminPanel').classList.remove('show'); };
document.getElementById('exitAdminBtn').onclick = () => { disableAdmin(); document.getElementById('adminPanel').classList.remove('show'); };

document.getElementById('openMapBtn').onclick = openMapModal;
document.getElementById('openAlertBtn').onclick = openAlertModal;
document.getElementById('openChatBtn').onclick = openChatModal;

loadCounts();
setupAudio();
buildAlertGrid();
initMap();
showToast(`🎙️ Bem-vindo, ${userName}`);
