<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 GPS Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #007bff; --danger: #ff4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }

        /* Estilo da Bolinha Pulsante (Você) */
        .pulse {
            width: 15px; height: 15px; background: var(--blue);
            border-radius: 50%; box-shadow: 0 0 0 rgba(0,123,255, 0.4);
            animation: pulse 2s infinite; border: 3px solid white;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,123,255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,123,255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,123,255, 0); }
        }

        /* Painel de Alertas Vertical */
        .alert-bar {
            position: absolute; top: 100px; left: 15px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .btn-alert {
            background: white; border: none; padding: 10px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: bold; font-size: 11px;
            display: flex; flex-direction: column; align-items: center; width: 65px; cursor: pointer;
        }

        /* Chat Lateral */
        #chat-panel {
            position: absolute; right: -300px; top: 0; width: 280px; height: 100vh;
            background: white; z-index: 2000; transition: 0.3s; display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
        }
        #chat-panel.open { right: 0; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; background: #f8f9fa; }
        .msg-bot { background: #e3f2fd; padding: 8px; border-radius: 8px; border-left: 4px solid var(--blue); margin-bottom: 10px; }

        /* Barra de Busca (Topo) */
        .leaflet-control-geocoder { margin-top: 15px !important; margin-left: 15px !important; width: 300px !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="alert-bar">
    <button class="btn-alert" onclick="postAlerta('Acidente', '⚠️')">⚠️<br>ACIDENTE</button>
    <button class="btn-alert" onclick="postAlerta('Obras', '🚧')">🚧<br>OBRAS</button>
    <button class="btn-alert" onclick="postAlerta('Bloqueio', '🚫')">🚫<br>BLOQUEIO</button>
    <button class="btn-alert" onclick="postAlerta('Pane', '🚛')">🚛<br>PANE</button>
</div>

<button onclick="toggleChat()" style="position:absolute; bottom:20px; right:20px; z-index:1001; padding:15px; border-radius:50%; background:var(--blue); color:white; border:none; cursor:pointer">💬 Chat IA</button>

<div id="chat-panel">
    <div style="padding:15px; background:var(--blue); color:white; font-weight:bold">Assistente BR-277</div>
    <div id="chat-msgs"></div>
    <div style="padding:10px; border-top:1px solid #ddd; display:flex">
        <input type="text" id="chat-input" placeholder="Pergunte à IA..." style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px">
        <button onclick="enviarChat()" style="margin-left:5px; background:var(--blue); color:white; border:none; padding:5px 10px; border-radius:4px">></button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// FIREBASE (Coloque suas chaves aqui)
const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://SEU-PROJETO.firebaseio.com", projectId: "SEU-PROJETO" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// INICIALIZAÇÃO DO MAPA
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 1. BUSCA DE TODAS AS RUAS E ROTA
const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Para onde vamos? (Rua, Cidade...)"
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    traçarRota(dest);
}).addTo(map);

let rotaControl;
function traçarRota(destino) {
    if (rotaControl) map.removeControl(rotaControl);
    
    rotaControl = L.Routing.control({
        waypoints: [ meuPos, destino ],
        lineOptions: { styles: [{ color: '#007bff', weight: 6 }] },
        createMarker: function() { return null; } // Remove marcadores extras da rota
    }).addTo(map);
}

// 2. BOLINHA PULSANTE (VOCÊ)
const pulseIcon = L.divIcon({ className: 'pulse', iconSize: [20, 20] });
let meuMarker, meuPos;

navigator.geolocation.watchPosition(pos => {
    meuPos = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if (!meuMarker) {
        meuMarker = L.marker(meuPos, { icon: pulseIcon }).addTo(map);
        map.setView(meuPos, 15);
    } else {
        meuMarker.setLatLng(meuPos);
    }
    // Sincroniza posição
    db.ref("usuarios/user1").set({ lat: meuPos.lat, lon: meuPos.lng });
}, null, { enableHighAccuracy: true });

// 3. ALERTAS COM ÍCONES FIXOS E TEXTO
function postAlerta(tipo, emoji) {
    if (!meuPos) return;
    db.ref("ocorrencias").push({ tipo, emoji, lat: meuPos.lat, lng: meuPos.lng, time: Date.now() });
}

db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    const iconHTML = `<div style="text-align:center; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))">
                        <div style="font-size:25px">${o.emoji}</div>
                        <div style="background:white; color:black; font-weight:bold; font-size:10px; padding:2px 5px; border-radius:5px; border:1px solid black">${o.tipo}</div>
                      </div>`;
    
    L.marker([o.lat, o.lng], {
        icon: L.divIcon({ html: iconHTML, className: '', iconSize: [60, 40] })
    }).addTo(map);
});

// 4. CHAT COM IA EM TEMPO REAL
function toggleChat() { document.getElementById('chat-panel').classList.toggle('open'); }

function enviarChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value;
    if (!msg) return;

    addMsg("Você", msg);
    
    // Simulação de IA Inteligente que lê o mapa
    setTimeout(() => {
        let resposta = "Estou monitorando a BR-277. ";
        if(msg.toLowerCase().includes("condição") || msg.toLowerCase().includes("ajuda")) {
            resposta += "Atualmente temos alertas de obras e neblina na região da Serra. Dirija com cuidado!";
        } else {
            resposta += "Posso te ajudar com rotas ou informações sobre bloqueios na pista.";
        }
        addMsg("🤖 IA Assistente", resposta, true);
    }, 1000);
    input.value = "";
}

function addMsg(user, text, isBot = false) {
    const box = document.getElementById('chat-msgs');
    const div = document.createElement('div');
    div.className = isBot ? "msg-bot" : "";
    div.innerHTML = `<b>${user}:</b> ${text}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
