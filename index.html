<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | NAVEGADOR INTELIGENTE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --ws-green: #075e54; 
            --ws-light: #dcf8c6; 
            --radio-gold: #ffd700; 
            --danger: #e53935;
            --warning: #ff9800;
            --admin-red: #c62828;
        }
        
        * { box-sizing: border-box; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* PAINEL DE ALERTAS ESQUERDO */
        .alertas-panel {
            position: fixed;
            top: 80px;
            left: 15px;
            width: 280px;
            max-height: 70vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 4000;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--ws-green);
            overflow: hidden;
        }
        
        .alertas-header {
            background: var(--ws-green);
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .alertas-lista {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 50vh;
        }
        
        .alerta-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 5px solid transparent;
        }
        
        .alerta-item .icone {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        
        /* CORES DOS ALERTAS */
        .alerta-acidente .icone { background: var(--danger); }
        .alerta-obras .icone { background: var(--warning); }
        .alerta-pane .icone { background: #795548; }
        .alerta-animal .icone { background: #9c27b0; }
        .alerta-radar .icone { background: #607d8b; }
        .alerta-barreira .icone { background: #8b4513; }
        .alerta-neblina .icone { background: #00acc1; }
        
        .btn-novo-alerta {
            background: var(--ws-green);
            color: white;
            border: none;
            padding: 12px;
            margin: 10px;
            border-radius: 25px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: 2px solid var(--radio-gold);
        }
        
        /* LUPA DESTAQUE */
        .lupa-destaque {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 4500;
            background: white;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid var(--radio-gold);
            overflow: hidden;
        }
        
        .lupa-destaque input {
            width: 100%;
            padding: 18px 25px;
            border: none;
            font-size: 18px;
            outline: none;
            background: transparent;
        }
        
        /* MODAL DE ALERTA */
        .modal-alerta {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal-conteudo {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
        }
        
        .modal-header {
            background: var(--ws-green);
            color: white;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .opcoes-alerta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .opcao-alerta {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
        }
        
        .opcao-alerta.selecionado {
            border-color: var(--ws-green);
            background: var(--ws-light);
        }
        
        .btn-enviar-alerta {
            width: 100%;
            padding: 15px;
            background: var(--ws-green);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* BOTÕES FLUTUANTES */
        .f-btn { 
            position: fixed; 
            z-index: 5000; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            border: 2px solid white; 
            cursor: pointer; 
            background: white; 
            width: 55px; 
            height: 55px; 
            font-size: 24px; 
        }
        #btn-chat { right: 20px; bottom: 120px; background: var(--ws-green); color: white; }
        #btn-mute { right: 20px; bottom: 190px; background: #fff; }
        #btn-luz { right: 20px; top: 140px; background: #ffcc00; }
        #btn-px { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90px; 
            height: 90px; 
            background: #333; 
            border: 5px solid var(--radio-gold); 
            border-radius: 50%; 
            z-index: 5001; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            color: var(--radio-gold); 
        }
        #btn-px.ativo { background: var(--danger); border-color: white; }
        
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        #btn-rec { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); z-index: 4001; background: white; border: 2px solid var(--ws-green); border-radius: 20px; padding: 10px 20px; font-weight: bold; color: var(--ws-green); display: none; cursor: pointer; }
        
        .pulse-loc { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            animation: pulse-blue 2s infinite; 
            background: rgba(0, 122, 255, 0.4); 
            border: 2px solid white; 
        }
        
        @keyframes pulse-blue { 
            0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 
            100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } 
        }

        /* CHAT GLOBAL */
        .chat-container { position: fixed; top: 10%; left: 5%; width: 90%; height: 80%; background: #e5ddd5; z-index: 6000; border-radius: 15px; display: none; flex-direction: column; border: 2px solid var(--ws-green); }
        .chat-header { background: var(--ws-green); color: white; padding: 15px; border-radius: 13px 13px 0 0; display: flex; justify-content: space-between; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; }
        .balao { padding: 10px 15px; border-radius: 15px; margin: 5px 0; max-width: 80%; }
        .b-eu { background: var(--ws-light); align-self: flex-end; }
        .b-outro { background: white; align-self: flex-start; }
        .chat-input { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="btn-rec" onclick="recentralizar()">🧭 RECENTRALIZAR</div>

<!-- BOTÕES FLUTUANTES -->
<div id="btn-luz" class="f-btn" onclick="toggleDark()">💡</div>
<div id="btn-mute" class="f-btn" onclick="toggleMute()">🔊</div>
<div id="btn-chat" class="f-btn" onclick="toggleChat()">💬</div>
<div id="btn-px">🎤</div>

<!-- CHAT GLOBAL -->
<div id="chat-global" class="chat-container">
    <div class="chat-header">
        <span>CHAT BR-277</span>
        <span onclick="toggleChat()" style="cursor:pointer">✖</span>
    </div>
    <div id="chat-msgs" class="chat-msgs"></div>
    <div class="chat-input">
        <input type="text" id="msg-input" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviarMsg()">
        <button onclick="enviarMsg()" style="border:none; background:var(--ws-green); color:white; border-radius:50%; width:40px; height:40px;">➔</button>
    </div>
</div>

<!-- PAINEL DE ALERTAS -->
<div class="alertas-panel">
    <div class="alertas-header" onclick="minimizarAlertas()">
        <span>🚨 ALERTAS</span>
        <i class="fas fa-chevron-down" id="setaAlertas"></i>
    </div>
    <div class="alertas-lista" id="alertasLista"></div>
    <button class="btn-novo-alerta" onclick="abrirModalAlerta()">
        <i class="fas fa-plus-circle"></i> NOVO ALERTA
    </button>
</div>

<!-- LUPA -->
<div class="lupa-destaque">
    <input type="text" id="buscaDestino" placeholder="🔍 Para onde vamos?" onkeypress="if(event.key==='Enter') buscarRota()">
    <i class="fas fa-search"></i>
</div>

<!-- MODAL ALERTA -->
<div class="modal-alerta" id="modalAlerta">
    <div class="modal-conteudo">
        <div class="modal-header">
            <span>NOVO ALERTA</span>
            <span onclick="fecharModalAlerta()" style="cursor:pointer">✖</span>
        </div>
        <div class="modal-body">
            <div class="opcoes-alerta" id="opcoesAlerta">
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('acidente')" data-tipo="acidente"><i class="fas fa-car-crash"></i> Acidente</div>
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('obras')" data-tipo="obras"><i class="fas fa-hard-hat"></i> Obras</div>
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('pane')" data-tipo="pane"><i class="fas fa-tools"></i> Pane</div>
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('animal')" data-tipo="animal"><i class="fas fa-horse"></i> Animal</div>
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('radar')" data-tipo="radar"><i class="fas fa-camera"></i> Radar</div>
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('barreira')" data-tipo="barreira"><i class="fas fa-mountain"></i> Barreira</div>
                <div class="opcao-alerta" onclick="selecionarTipoAlerta('neblina')" data-tipo="neblina"><i class="fas fa-smog"></i> Neblina</div>
            </div>
            <textarea id="descAlerta" placeholder="Descrição" rows="3"></textarea>
            <button class="btn-enviar-alerta" onclick="enviarAlerta()">ENVIAR</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = { 
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// VARIÁVEIS GLOBAIS - SIMPLIFICADO
let user = "Motorista_" + Math.floor(Math.random()*999);
let meuLatLng = null;
let meuMarker = null;
let follow = true;
let rotaControle = null;
let isMuted = false;
let alertaSelecionado = "";

// INICIALIZAÇÃO DO MAPA
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

// ===== GPS =====
function iniciarGPS() {
    if (!navigator.geolocation) {
        alert("Seu navegador não suporta GPS!");
        return;
    }
    
    navigator.geolocation.watchPosition(pos => {
        const novaPos = L.latLng(pos.coords.latitude, pos.coords.longitude);
        meuLatLng = novaPos;
        
        if(!meuMarker) {
            meuMarker = L.marker(meuLatLng, { 
                icon: L.divIcon({ 
                    html: `<div class="pulse-loc" style="width:40px;height:40px;"></div><div style="font-size:32px; margin-top:-10px;">🚚</div>`, 
                    className: '', 
                    iconSize:[40,40] 
                }) 
            }).addTo(map);
            map.setView(meuLatLng, 17);
        } else { 
            meuMarker.setLatLng(meuLatLng); 
        }
        
        if(follow) map.panTo(meuLatLng);
    }, null, { enableHighAccuracy: true });
}

// INICIA GPS AUTOMATICAMENTE
iniciarGPS();

// ===== FUNÇÕES BÁSICAS =====
function toggleDark() { 
    document.getElementById('map').classList.toggle('map-dark'); 
}

function toggleMute() { 
    isMuted = !isMuted; 
    document.getElementById('btn-mute').innerHTML = isMuted ? "🔇" : "🔊";
}

function toggleChat() { 
    const c = document.getElementById('chat-global');
    c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
}

function recentralizar() { 
    follow = true; 
    document.getElementById('btn-rec').style.display = 'none'; 
    if(meuLatLng) map.flyTo(meuLatLng, 17);
}

map.on('dragstart', () => { 
    follow = false; 
    document.getElementById('btn-rec').style.display = 'block'; 
});

// ===== ALERTAS =====
function minimizarAlertas() {
    const lista = document.getElementById('alertasLista');
    const seta = document.getElementById('setaAlertas');
    lista.style.display = lista.style.display === 'none' ? 'flex' : 'none';
    seta.style.transform = lista.style.display === 'none' ? 'rotate(180deg)' : 'rotate(0deg)';
}

function abrirModalAlerta() {
    document.getElementById('modalAlerta').style.display = 'flex';
}

function fecharModalAlerta() {
    document.getElementById('modalAlerta').style.display = 'none';
    document.querySelectorAll('.opcao-alerta').forEach(el => el.classList.remove('selecionado'));
}

function selecionarTipoAlerta(tipo) {
    document.querySelectorAll('.opcao-alerta').forEach(el => {
        el.classList.remove('selecionado');
        if(el.dataset.tipo === tipo) el.classList.add('selecionado');
    });
    alertaSelecionado = tipo;
}

function enviarAlerta() {
    if(!alertaSelecionado || !meuLatLng) {
        alert("Selecione um tipo de alerta e aguarde o GPS!");
        return;
    }
    
    const alerta = {
        id: Date.now(),
        tipo: alertaSelecionado,
        desc: document.getElementById('descAlerta').value,
        lat: meuLatLng.lat,
        lng: meuLatLng.lng,
        user: user,
        time: new Date().toLocaleTimeString()
    };
    
    // Adiciona no painel
    const alertaDiv = document.createElement('div');
    alertaDiv.className = `alerta-item alerta-${alerta.tipo}`;
    alertaDiv.innerHTML = `
        <div class="icone"><i class="fas fa-${alerta.tipo === 'acidente' ? 'car-crash' : 'exclamation-triangle'}"></i></div>
        <div class="info">
            <div class="titulo">${alerta.tipo.toUpperCase()}</div>
            <div class="desc">${alerta.desc || 'Alerta na pista'} • ${alerta.time}</div>
        </div>
    `;
    document.getElementById('alertasLista').appendChild(alertaDiv);
    
    // Adiciona marcador no mapa
    L.marker([alerta.lat, alerta.lng], {
        icon: L.divIcon({
            html: `<div style="background:${alerta.tipo === 'acidente' ? '#e53935' : '#ff9800'}; color:white; padding:5px 10px; border-radius:20px; border:2px solid white;">⚠️ ${alerta.tipo}</div>`,
            className: ''
        })
    }).addTo(map);
    
    fecharModalAlerta();
}

// ===== CHAT =====
function enviarMsg() {
    const input = document.getElementById('msg-input');
    if(!input.value.trim()) return;
    
    const msgDiv = document.createElement('div');
    msgDiv.className = 'balao b-eu';
    msgDiv.innerHTML = `<b>${user}</b><br>${input.value}<br><small>${new Date().toLocaleTimeString()}</small>`;
    document.getElementById('chat-msgs').appendChild(msgDiv);
    input.value = "";
}

// ===== ROTA =====
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    if(!destino || !meuLatLng) return;
    
    // Usando geocoder do Leaflet
    L.Control.Geocoder.nominatim().geocode(destino, (results) => {
        if(results && results.length > 0) {
            const destLatLng = results[0].center;
            
            if(rotaControle) map.removeControl(rotaControle);
            
            rotaControle = L.Routing.control({
                waypoints: [meuLatLng, destLatLng],
                lineOptions: { styles: [{ color: '#007aff', weight: 7 }] },
                createMarker: () => null,
                show: false
            }).addTo(map);
        }
    });
}

// ===== RÁDIO PX =====
let mediaRecorder;
const pxBtn = document.getElementById('btn-px');

pxBtn.addEventListener('mousedown', async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        pxBtn.classList.add('ativo');
    } catch(e) {
        alert("Permita acesso ao microfone!");
    }
});

pxBtn.addEventListener('mouseup', () => {
    if(mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        pxBtn.classList.remove('ativo');
    }
});

// Eventos touch para mobile
pxBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    pxBtn.dispatchEvent(new Event('mousedown'));
});
pxBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    pxBtn.dispatchEvent(new Event('mouseup'));
});
</script>
</body>
</html>
