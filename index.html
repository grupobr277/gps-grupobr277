<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÁDIO BR-277 - Comunicação dos Motoristas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ===== ESTILO VINTAGE ===== */
        body {
            background: #2c1e0f;
            font-family: 'Courier New', 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        /* RÁDIO VINTAGE */
        .radio-vintage {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #5D4037 0%, #3E2723 100%);
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 15px;
            position: relative;
            border: 1px solid #8B6914;
        }
        
        /* Mostrador do rádio */
        .mostrador {
            background: linear-gradient(145deg, #F9A825, #F57F17);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3), 0 2px 5px rgba(255,255,255,0.2);
            border: 2px solid #8B6914;
        }
        
        .mostrador-header {
            text-align: center;
            border-bottom: 2px solid #5D4037;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        
        .mostrador-header h1 {
            font-size: 18px;
            color: #1a1a1a;
            letter-spacing: 2px;
        }
        
        .mostrador-header p {
            font-size: 10px;
            color: #2c2c2c;
        }
        
        .frequencia {
            text-align: center;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 8px;
            margin: 10px 0;
        }
        
        .frequencia span {
            color: #00ff00;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }
        
        .luz-ligado {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
            animation: piscar 2s infinite;
        }
        
        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* GRADE DE ESTAÇÕES */
        .estacoes-grade {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .estacao-btn {
            background: #2c2c2c;
            border: 2px solid #8B6914;
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
        }
        
        .estacao-btn.ativa {
            background: linear-gradient(145deg, #00BFFF, #0066cc);
            border-color: #ffd700;
            color: white;
            box-shadow: 0 0 10px #00BFFF;
        }
        
        .estacao-btn:hover {
            transform: scale(1.02);
            border-color: #ffd700;
        }
        
        .estacao-nome {
            font-size: 9px;
            font-weight: bold;
            display: block;
        }
        
        .estacao-km {
            font-size: 7px;
            color: #aaa;
        }
        
        .estacao-online {
            font-size: 10px;
            font-weight: bold;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 2px 5px;
            margin-top: 4px;
            display: inline-block;
        }
        
        .estacao-btn.ativa .estacao-online {
            background: #ffd700;
            color: #1a1a1a;
        }
        
        /* ESTAÇÃO ATUAL */
        .estacao-atual {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 8px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #8B6914;
        }
        
        .estacao-atual-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .estacao-atual-nome {
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
        }
        
        .estacao-atual-pessoas {
            background: #00BFFF;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            color: white;
        }
        
        /* PUSH TO TALK */
        .ptt-container {
            text-align: center;
            margin: 15px 0;
        }
        
        .btn-ptt-vintage {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e53935, #8B0000);
            border: 4px solid #ffd700;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            font-family: monospace;
        }
        
        .btn-ptt-vintage:active {
            transform: scale(0.95);
            background: radial-gradient(circle at 30% 30%, #ff0000, #e53935);
        }
        
        .btn-ptt-vintage.gravando {
            animation: pulse-ptt 0.5s infinite;
            background: radial-gradient(circle at 30% 30%, #ff0000, #ff4444);
        }
        
        @keyframes pulse-ptt {
            0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
            50% { box-shadow: 0 0 0 15px rgba(229,57,53,0); }
        }
        
        .timer-gravacao {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            font-family: monospace;
        }
        
        /* CONTROLES */
        .controles {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            gap: 8px;
        }
        
        .btn-controle {
            flex: 1;
            background: #2c2c2c;
            border: 1px solid #8B6914;
            border-radius: 25px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            color: #ccc;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .btn-controle:hover {
            background: #3c3c3c;
            border-color: #ffd700;
        }
        
        /* MAPA (POPUP) */
        .mapa-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            display: none;
            flex-direction: column;
        }
        
        .mapa-overlay.visivel {
            display: flex;
        }
        
        .mapa-header {
            background: #2c1e0f;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .mapa-container {
            flex: 1;
            position: relative;
        }
        
        #mapa-completo {
            height: 100%;
            width: 100%;
        }
        
        .fechar-mapa {
            background: #e53935;
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        /* CHAT */
        .chat-overlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            border-radius: 20px;
            z-index: 20001;
            display: none;
            flex-direction: column;
            max-height: 400px;
            border: 2px solid #8B6914;
        }
        
        .chat-overlay.visivel {
            display: flex;
        }
        
        .chat-header {
            background: #2c1e0f;
            padding: 10px;
            border-radius: 18px 18px 0 0;
            display: flex;
            justify-content: space-between;
            color: white;
        }
        
        .chat-mensagens {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            max-height: 300px;
        }
        
        .chat-input-area {
            display: flex;
            padding: 8px;
            gap: 5px;
            border-top: 1px solid #8B6914;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: none;
            background: #2c2c2c;
            color: white;
        }
        
        .chat-input-area button {
            background: #00BFFF;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
        }
        
        .mensagem-chat {
            margin: 5px 0;
            padding: 5px 10px;
            border-radius: 15px;
            max-width: 80%;
        }
        
        .mensagem-chat.minha {
            background: #00BFFF;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        
        .mensagem-chat.outra {
            background: #2c2c2c;
            color: #ccc;
        }
        
        /* NOTIFICAÇÃO */
        .notificacao-audio {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: #00BFFF;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 20002;
            display: none;
            font-size: 12px;
            border: 2px solid #ffd700;
        }
        
        /* RESPONSIVO */
        @media (max-width: 500px) {
            .estacoes-grade {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
            }
            .estacao-nome {
                font-size: 8px;
            }
            .btn-ptt-vintage {
                width: 100px;
                height: 100px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="radio-vintage">
    <!-- MOSTRADOR -->
    <div class="mostrador">
        <div class="mostrador-header">
            <h1>📻 RÁDIO BR-277</h1>
            <p>COMUNICAÇÃO DOS MOTORISTAS</p>
        </div>
        <div class="frequencia">
            <span>27.7 MHz</span>
            <span class="luz-ligado"></span>
        </div>
    </div>
    
    <!-- GRADE DE ESTAÇÕES (16) -->
    <div class="estacoes-grade" id="estacoesGrade"></div>
    
    <!-- ESTAÇÃO ATUAL -->
    <div class="estacao-atual" id="estacaoAtual">
        <div class="estacao-atual-info">
            <i class="fas fa-broadcast-tower" style="color:#ffd700;"></i>
            <span class="estacao-atual-nome" id="estacaoAtualNome">Carregando...</span>
        </div>
        <div class="estacao-atual-pessoas" id="estacaoAtualPessoas">0 online</div>
    </div>
    
    <!-- PUSH TO TALK -->
    <div class="ptt-container">
        <button class="btn-ptt-vintage" id="btnPttVintage">
            🎤<br>PTT
        </button>
        <div class="timer-gravacao" id="timerGravacao" style="display: none;">20s</div>
    </div>
    
    <!-- CONTROLES -->
    <div class="controles">
        <div class="btn-controle" onclick="abrirMapa()">
            <i class="fas fa-map"></i> MAPA
        </div>
        <div class="btn-controle" onclick="abrirChat()">
            <i class="fas fa-comments"></i> CHAT
        </div>
        <div class="btn-controle" onclick="abrirConfig()">
            <i class="fas fa-user"></i> PERFIL
        </div>
    </div>
</div>

<!-- MAPA OVERLAY -->
<div class="mapa-overlay" id="mapaOverlay">
    <div class="mapa-header">
        <span>🗺️ MAPA BR-277 - TRÂNSITO EM TEMPO REAL</span>
        <button class="fechar-mapa" onclick="fecharMapa()">✕</button>
    </div>
    <div class="mapa-container">
        <div id="mapa-completo"></div>
    </div>
</div>

<!-- CHAT OVERLAY -->
<div class="chat-overlay" id="chatOverlay">
    <div class="chat-header">
        <span><i class="fas fa-comments"></i> CHAT GERAL BR-277</span>
        <button style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" onclick="fecharChat()">✕</button>
    </div>
    <div class="chat-mensagens" id="chatMensagens"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagemChat()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- NOTIFICAÇÃO -->
<div class="notificacao-audio" id="notificacaoAudio">
    🎙️ NOVA MENSAGEM DE ÁUDIO
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== LISTA DAS 16 ESTAÇÕES =====
const estacoes = [
    { id: 'guarapuava', nome: 'GUARAPUAVA', km: 'KM 0', lat: -25.3951, lng: -51.4620 },
    { id: 'palmeira', nome: 'PALMEIRA', km: 'KM 80', lat: -25.4290, lng: -50.0000 },
    { id: 'porto_amazonas', nome: 'PORTO AMAZONAS', km: 'KM 110', lat: -25.5400, lng: -49.8900 },
    { id: 'ponta_grossa', nome: 'PONTA GROSSA', km: 'KM 150', lat: -25.0950, lng: -50.1619 },
    { id: 'sao_luiz_puruna', nome: 'SÃO LUIZ', km: 'KM 180', lat: -25.4000, lng: -49.9000 },
    { id: 'campo_largo', nome: 'CAMPO LARGO', km: 'KM 220', lat: -25.4591, lng: -49.5290 },
    { id: 'curitiba', nome: 'CURITIBA', km: 'KM 250', lat: -25.4284, lng: -49.2733 },
    { id: 'almirante_tamandare', nome: 'ALMIRANTE', km: 'KM 265', lat: -25.3180, lng: -49.3100 },
    { id: 'fazenda_rio_grande', nome: 'FAZENDA R.G.', km: 'KM 280', lat: -25.6620, lng: -49.3070 },
    { id: 'tijucas_sul', nome: 'TIJUCAS SUL', km: 'KM 310', lat: -25.9310, lng: -49.1950 },
    { id: 'guaratuba', nome: 'GUARATUBA', km: 'KM 340', lat: -25.8820, lng: -48.5750 },
    { id: 'morretes', nome: 'MORRETES', km: 'KM 370', lat: -25.4770, lng: -48.8330 },
    { id: 'paranagua', nome: 'PARANAGUÁ', km: 'KM 400', lat: -25.5160, lng: -48.5250 },
    { id: 'sao_jose_pinhais', nome: 'SÃO JOSÉ', km: 'KM 260', lat: -25.5350, lng: -49.2060 },
    { id: 'colombo', nome: 'COLOMBO', km: 'KM 275', lat: -25.2920, lng: -49.2240 },
    { id: 'araucaria', nome: 'ARAUCÁRIA', km: 'KM 290', lat: -25.5930, lng: -49.4100 }
];

// ===== VARIÁVEIS GLOBAIS =====
let usuario = null;
let estacaoAtual = localStorage.getItem('estacao_radio') || 'curitiba';
let gravador = null;
let gravando = false;
let tempoRestante = 20;
let timerInterval = null;
let mapa = null;
let minhaLocalizacao = null;
let meuMarcador = null;

// ===== INICIALIZAR =====
function iniciar() {
    // Perguntar nome do usuário
    usuario = localStorage.getItem('usuario_radio');
    if (!usuario) {
        usuario = prompt('Digite seu nome para entrar no Rádio BR-277:', 'Motorista');
        if (usuario) localStorage.setItem('usuario_radio', usuario);
        else usuario = 'Motorista';
    }
    
    // Criar botões das estações
    criarBotoesEstacoes();
    
    // Selecionar estação atual
    selecionarEstacao(estacaoAtual);
    
    // Iniciar listeners
    iniciarListenersAudio();
    
    // Iniciar contagem de usuários por estação
    iniciarContagemUsuarios();
    
    // Iniciar chat
    iniciarChat();
    
    // Iniciar GPS para mapa
    iniciarGPS();
}

// ===== CRIAR BOTÕES DAS 16 ESTAÇÕES =====
function criarBotoesEstacoes() {
    const container = document.getElementById('estacoesGrade');
    container.innerHTML = '';
    
    estacoes.forEach(est => {
        const btn = document.createElement('div');
        btn.className = 'estacao-btn';
        btn.dataset.id = est.id;
        btn.innerHTML = `
            <span class="estacao-nome">${est.nome}</span>
            <span class="estacao-km">${est.km}</span>
            <span class="estacao-online" id="online-${est.id}">0</span>
        `;
        btn.onclick = () => selecionarEstacao(est.id);
        container.appendChild(btn);
    });
}

// ===== SELECIONAR ESTAÇÃO =====
function selecionarEstacao(id) {
    estacaoAtual = id;
    localStorage.setItem('estacao_radio', id);
    
    // Atualizar visual dos botões
    document.querySelectorAll('.estacao-btn').forEach(btn => {
        if (btn.dataset.id === id) {
            btn.classList.add('ativa');
        } else {
            btn.classList.remove('ativa');
        }
    });
    
    // Atualizar nome da estação atual
    const estacao = estacoes.find(e => e.id === id);
    document.getElementById('estacaoAtualNome').innerHTML = `${estacao.nome} ${estacao.km}`;
    
    // Registrar presença na nova estação
    db.ref(`estacoes/${id}/usuarios/${usuario}`).set({
        nome: usuario,
        timestamp: Date.now()
    });
    
    // Remover de outras estações
    estacoes.forEach(est => {
        if (est.id !== id) {
            db.ref(`estacoes/${est.id}/usuarios/${usuario}`).remove();
        }
    });
    
    mostrarNotificacao(`📻 Você sintonizou ${estacao.nome} - ${estacao.km}`, '#4caf50');
}

// ===== INICIAR LISTENERS DE ÁUDIO =====
function iniciarListenersAudio() {
    // Escutar áudio da estação atual
    db.ref(`estacoes/${estacaoAtual}/audio`).on('child_added', (snap) => {
        const audio = snap.val();
        if (audio.usuario !== usuario) {
            const audioElement = new Audio(audio.data);
            audioElement.play().catch(e => console.log('Erro ao tocar áudio'));
            
            const notif = document.getElementById('notificacaoAudio');
            notif.style.display = 'flex';
            notif.innerHTML = `🎙️ ${audio.usuario} falou em ${audio.estacao}`;
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    });
}

// ===== CONTAGEM DE USUÁRIOS POR ESTAÇÃO =====
function iniciarContagemUsuarios() {
    estacoes.forEach(est => {
        db.ref(`estacoes/${est.id}/usuarios`).on('value', (snap) => {
            const usuarios = snap.val();
            const count = usuarios ? Object.keys(usuarios).length : 0;
            const span = document.getElementById(`online-${est.id}`);
            if (span) span.textContent = count;
            
            // Atualizar contagem da estação atual
            if (est.id === estacaoAtual) {
                document.getElementById('estacaoAtualPessoas').innerHTML = `${count} online`;
            }
        });
    });
}

// ===== PTT - GRAVAR ÁUDIO =====
const btnPtt = document.getElementById('btnPttVintage');
const timerDiv = document.getElementById('timerGravacao');

btnPtt.addEventListener('mousedown', iniciarGravacao);
btnPtt.addEventListener('mouseup', pararGravacao);
btnPtt.addEventListener('mouseleave', pararGravacao);
btnPtt.addEventListener('touchstart', iniciarGravacao);
btnPtt.addEventListener('touchend', pararGravacao);

async function iniciarGravacao() {
    if (gravando) return;
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        gravador = new MediaRecorder(stream);
        const chunks = [];
        tempoRestante = 20;
        
        gravador.ondataavailable = e => chunks.push(e.data);
        
        gravador.onstop = async () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = async () => {
                const estacao = estacoes.find(e => e.id === estacaoAtual);
                await db.ref(`estacoes/${estacaoAtual}/audio`).push({
                    usuario: usuario,
                    estacao: estacao.nome,
                    data: reader.result,
                    timestamp: Date.now()
                });
                
                // Limpar áudios antigos (últimos 50)
                const snapshot = await db.ref(`estacoes/${estacaoAtual}/audio`).once('value');
                const audios = snapshot.val();
                if (audios) {
                    const keys = Object.keys(audios);
                    if (keys.length > 50) {
                        const toRemove = keys.slice(0, keys.length - 50);
                        toRemove.forEach(key => {
                            db.ref(`estacoes/${estacaoAtual}/audio/${key}`).remove();
                        });
                    }
                }
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
        };
        
        gravador.start();
        gravando = true;
        btnPtt.classList.add('gravando');
        timerDiv.style.display = 'block';
        
        timerInterval = setInterval(() => {
            tempoRestante--;
            timerDiv.textContent = `${tempoRestante}s`;
            if (tempoRestante <= 0) {
                pararGravacao();
            }
        }, 1000);
        
    } catch(e) {
        alert('Permita acesso ao microfone para usar o PTT');
    }
}

function pararGravacao() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
    }
    if (timerInterval) clearInterval(timerInterval);
    gravando = false;
    btnPtt.classList.remove('gravando');
    timerDiv.style.display = 'none';
}

// ===== CHAT GERAL =====
function iniciarChat() {
    db.ref('chat_geral').on('value', (snap) => {
        const msgs = snap.val();
        const container = document.getElementById('chatMensagens');
        if (!msgs) {
            container.innerHTML = '';
            return;
        }
        
        let html = '';
        Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const isMinha = msg.usuario === usuario;
            html += `
                <div class="mensagem-chat ${isMinha ? 'minha' : 'outra'}" style="max-width:80%; ${isMinha ? 'margin-left:auto;' : ''}">
                    <strong>${msg.usuario}</strong><br>
                    ${msg.texto}<br>
                    <small style="font-size:9px;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                </div>
            `;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    });
}

function enviarMensagemChat() {
    const input = document.getElementById('chatInput');
    if (!input.value.trim()) return;
    
    db.ref('chat_geral').push({
        usuario: usuario,
        texto: input.value.trim(),
        timestamp: Date.now()
    });
    input.value = '';
}

function abrirChat() {
    document.getElementById('chatOverlay').classList.add('visivel');
}

function fecharChat() {
    document.getElementById('chatOverlay').classList.remove('visivel');
}

// ===== MAPA =====
function iniciarGPS() {
    if (!navigator.geolocation) return;
    
    navigator.geolocation.watchPosition(pos => {
        minhaLocalizacao = [pos.coords.latitude, pos.coords.longitude];
        
        if (!mapa) return;
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, {
                icon: L.divIcon({
                    html: `<div style="font-size:30px;">🚗</div>`,
                    className: '',
                    iconSize: [30,30],
                    iconAnchor: [15,15]
                })
            }).addTo(mapa);
            mapa.setView(minhaLocalizacao, 13);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
        }
        
        // Atualizar localização no Firebase
        db.ref('usuarios_localizacao/' + usuario).set({
            lat: minhaLocalizacao[0],
            lng: minhaLocalizacao[1],
            estacao: estacaoAtual,
            timestamp: Date.now()
        });
    });
}

function abrirMapa() {
    const overlay = document.getElementById('mapaOverlay');
    overlay.classList.add('visivel');
    
    setTimeout(() => {
        if (!mapa) {
            mapa = L.map('mapa-completo').setView([-25.4284, -49.2733], 13);
            L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);
            
            // Adicionar marcadores das estações
            estacoes.forEach(est => {
                L.marker([est.lat, est.lng], {
                    icon: L.divIcon({
                        html: `<div style="background:#ffd700; width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>`,
                        className: '',
                        iconSize: [12,12]
                    })
                }).addTo(mapa).bindPopup(`<b>${est.nome}</b><br>${est.km}`);
            });
            
            if (minhaLocalizacao) {
                mapa.setView(minhaLocalizacao, 13);
            }
        } else {
            mapa.invalidateSize();
            if (minhaLocalizacao) mapa.setView(minhaLocalizacao, 13);
        }
    }, 100);
}

function fecharMapa() {
    document.getElementById('mapaOverlay').classList.remove('visivel');
}

// ===== CONFIGURAÇÕES =====
function abrirConfig() {
    const novoNome = prompt('Digite seu nome:', usuario);
    if (novoNome && novoNome.trim()) {
        usuario = novoNome.trim();
        localStorage.setItem('usuario_radio', usuario);
        mostrarNotificacao(`✅ Nome alterado para ${usuario}`, '#4caf50');
    }
}

// ===== NOTIFICAÇÃO =====
function mostrarNotificacao(msg, cor) {
    const notif = document.createElement('div');
    notif.style.cssText = `position:fixed; bottom:200px; left:50%; transform:translateX(-50%); background:${cor || '#00BFFF'}; color:white; padding:8px 20px; border-radius:30px; z-index:20003; font-size:12px; border:2px solid #ffd700;`;
    notif.textContent = msg;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 2000);
}

// ===== LIMPAR PRESENÇA AO SAIR =====
window.addEventListener('beforeunload', () => {
    if (usuario) {
        db.ref(`estacoes/${estacaoAtual}/usuarios/${usuario}`).remove();
        db.ref('usuarios_localizacao/' + usuario).remove();
    }
});

// ===== INICIAR TUDO =====
iniciar();
</script>
