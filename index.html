<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÁDIO BR-277 - Comunicação dos Motoristas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* CONTAINER PRINCIPAL */
        .radio-container {
            max-width: 550px;
            width: 100%;
            background: rgba(18, 18, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 20px 16px;
            border: 1px solid rgba(0, 191, 255, 0.3);
        }

        /* CABEÇALHO */
        .radio-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .radio-header h1 {
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .radio-header h1 i {
            color: #00BFFF;
            font-size: 24px;
        }

        .freq {
            background: #0a0a15;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            margin-top: 8px;
        }

        .freq span {
            color: #00ff88;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* GRADE DE BOTÕES - 5 colunas */
        .stations-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-height: 340px;
            overflow-y: auto;
            padding: 6px 4px;
            margin-bottom: 20px;
        }

        /* BOTÃO DE CIDADE */
        .station-btn {
            background: linear-gradient(145deg, #23233a, #181830);
            border-radius: 16px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #3a3a5a;
            backdrop-filter: blur(4px);
        }

        .station-btn.active {
            background: linear-gradient(145deg, #00BFFF, #0066cc);
            border-color: #ffd700;
            box-shadow: 0 0 16px rgba(0, 191, 255, 0.5);
            transform: scale(0.98);
        }

        .station-btn.active .city-name {
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }

        .city-name {
            font-size: 11px;
            font-weight: 600;
            color: #ddd;
            display: block;
            line-height: 1.3;
        }

        .city-count {
            font-size: 9px;
            background: rgba(0, 191, 255, 0.2);
            border-radius: 20px;
            padding: 2px 6px;
            margin-top: 6px;
            display: inline-block;
            color: #aaa;
        }

        .station-btn.active .city-count {
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
        }

        /* ESTAÇÃO ATIVA */
        .current-station-card {
            background: linear-gradient(135deg, #0f0f23, #16162f);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #00BFFF;
        }

        .station-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .station-info i {
            font-size: 24px;
            color: #00BFFF;
        }

        .station-name {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .station-people {
            background: #00BFFF;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            color: #0f0f23;
        }

        /* PTT */
        .ptt-area {
            text-align: center;
            margin: 20px 0;
        }

        .ptt-button {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: radial-gradient(circle at 35% 35%, #e53935, #8b0000);
            border: 4px solid #ffd700;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .ptt-button:active {
            transform: scale(0.94);
        }

        .ptt-button.recording {
            animation: recording-pulse 0.7s infinite;
            background: radial-gradient(circle at 35% 35%, #ff4444, #ff0000);
        }

        @keyframes recording-pulse {
            0% { box-shadow: 0 0 0 0 #e53935; }
            70% { box-shadow: 0 0 0 18px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        .record-timer {
            margin-top: 12px;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            background: #0a0a15;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
            font-family: monospace;
        }

        /* MENU */
        .bottom-menu {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }

        .menu-item {
            flex: 1;
            background: #1f1f35;
            border-radius: 40px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #3a3a5a;
        }

        .menu-item i {
            margin-right: 6px;
            color: #00BFFF;
        }

        .menu-item:hover {
            background: #2a2a45;
            border-color: #00BFFF;
        }

        /* MODAIS */
        .modal-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 20000;
            display: none;
            flex-direction: column;
        }

        .modal-full.visible {
            display: flex;
        }

        .modal-header {
            background: #0f0f23;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid #00BFFF;
        }

        .close-modal {
            background: #e53935;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .map-container {
            flex: 1;
        }

        #full-map {
            height: 100%;
            width: 100%;
        }

        /* CHAT */
        .chat-modal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #111128;
            border-radius: 28px;
            z-index: 20001;
            display: none;
            flex-direction: column;
            max-height: 460px;
            border: 1px solid #00BFFF;
        }

        .chat-modal.visible {
            display: flex;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            max-height: 340px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid #2a2a4a;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            background: #1f1f35;
            border: none;
            color: white;
        }

        .chat-input-area button {
            background: #00BFFF;
            border: none;
            width: 46px;
            border-radius: 50%;
            cursor: pointer;
        }

        .message-bubble {
            margin: 8px 0;
            padding: 8px 14px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 13px;
        }

        .message-bubble.me {
            background: #00BFFF;
            color: white;
            margin-left: auto;
        }

        .message-bubble.other {
            background: #23233a;
            color: #ddd;
        }

        /* NOTIFICAÇÃO */
        .audio-toast {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: #00BFFF;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            z-index: 20002;
            display: none;
            font-weight: bold;
            border: 2px solid gold;
            white-space: nowrap;
        }

        /* RESPONSIVO */
        @media (max-width: 500px) {
            .stations-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .city-name {
                font-size: 10px;
            }
            .ptt-button {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 380px) {
            .stations-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* SCROLL */
        .stations-grid::-webkit-scrollbar {
            width: 3px;
        }
        .stations-grid::-webkit-scrollbar-track {
            background: #1a1a30;
        }
        .stations-grid::-webkit-scrollbar-thumb {
            background: #00BFFF;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="radio-container">
    <!-- CABEÇALHO -->
    <div class="radio-header">
        <h1><i class="fas fa-satellite-dish"></i> RÁDIO BR-277 <i class="fas fa-microphone-alt"></i></h1>
        <div class="freq">
            <span>📡 27.7 MHz</span>
            <span class="online-dot"></span>
        </div>
    </div>

    <!-- GRADE DE CIDADES -->
    <div class="stations-grid" id="stationsGrid"></div>

    <!-- ESTAÇÃO ATUAL -->
    <div class="current-station-card">
        <div class="station-info">
            <i class="fas fa-broadcast-tower"></i>
            <span class="station-name" id="currentStationName">Curitiba</span>
        </div>
        <div class="station-people" id="currentStationPeople">0 online</div>
    </div>

    <!-- PTT -->
    <div class="ptt-area">
        <button class="ptt-button" id="pttButton">
            🎤<br>FALAR
        </button>
        <div class="record-timer" id="recordTimer" style="display: none;">20s</div>
    </div>

    <!-- MENU -->
    <div class="bottom-menu">
        <div class="menu-item" onclick="openMap()"><i class="fas fa-map-marked-alt"></i> MAPA</div>
        <div class="menu-item" onclick="openChat()"><i class="fas fa-comment-dots"></i> CHAT</div>
        <div class="menu-item" onclick="changeProfile()"><i class="fas fa-user-astronaut"></i> PERFIL</div>
    </div>
</div>

<!-- MODAL MAPA -->
<div class="modal-full" id="mapModal">
    <div class="modal-header">
        <span><i class="fas fa-map"></i> MAPA BR-277 - TRÂNSITO</span>
        <button class="close-modal" onclick="closeMap()">✕</button>
    </div>
    <div class="map-container">
        <div id="full-map"></div>
    </div>
</div>

<!-- MODAL CHAT -->
<div class="chat-modal" id="chatModal">
    <div class="modal-header" style="border-radius: 28px 28px 0 0;">
        <span><i class="fas fa-comments"></i> CHAT GERAL</span>
        <button class="close-modal" style="width:32px; height:32px;" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Mensagem...">
        <button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- NOTIFICAÇÃO ÁUDIO -->
<div class="audio-toast" id="audioToast">🎙️ NOVO ÁUDIO RECEBIDO</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // FIREBASE
    const firebaseConfig = {
        databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 21 CIDADES
    const cities = [
        "Guarapuava", "Palmeira", "Porto Amazonas", "Ponta Grossa", "São Luiz do Purunã",
        "Campo Largo", "Curitiba", "Almirante Tamandaré", "Fazenda Rio Grande", "Tijucas do Sul",
        "Guaratuba", "Morretes", "Paranaguá", "São José dos Pinhais", "Colombo",
        "Araucária", "Piraquara", "Campina Grande do Sul", "Quatro Barras", "Barra do Turvo",
        "Cajati"
    ];

    const stations = cities.map((name, idx) => ({
        id: name.toLowerCase().replace(/ /g, '_').replace(/ç/g, 'c').replace(/ã/g, 'a'),
        nome: name,
        lat: -25.4 + (idx * 0.05),
        lng: -49.2 + (idx * 0.03)
    }));

    let userName = localStorage.getItem('radio_user') || 'Motorista';
    let currentStationId = localStorage.getItem('current_station') || stations.find(s => s.nome === "Curitiba").id;
    let mediaRecorder = null;
    let recording = false;
    let countdownInterval = null;
    let secondsLeft = 20;
    let map = null;
    let userMarker = null;

    // ========== INICIALIZAÇÃO ==========
    function init() {
        if (!localStorage.getItem('radio_user')) {
            let name = prompt("🎙️ SEU NOME PARA O RÁDIO:", "Motorista");
            if (name) {
                userName = name.trim();
                localStorage.setItem('radio_user', userName);
            }
        }
        buildStationButtons();
        selectStation(currentStationId);
        listenAudio();
        listenStationUsers();
        initChat();
        initGPS();
    }

    // BOTÕES DAS CIDADES
    function buildStationButtons() {
        const grid = document.getElementById('stationsGrid');
        grid.innerHTML = '';
        stations.forEach(st => {
            const btn = document.createElement('div');
            btn.className = 'station-btn';
            btn.dataset.id = st.id;
            btn.innerHTML = `
                <span class="city-name">${st.nome}</span>
                <span class="city-count" id="count-${st.id}">0</span>
            `;
            btn.onclick = () => selectStation(st.id);
            grid.appendChild(btn);
        });
    }

    // SELECIONAR ESTAÇÃO
    function selectStation(stationId) {
        currentStationId = stationId;
        localStorage.setItem('current_station', stationId);

        document.querySelectorAll('.station-btn').forEach(btn => {
            if (btn.dataset.id === stationId) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        const station = stations.find(s => s.id === stationId);
        document.getElementById('currentStationName').innerText = station.nome;

        db.ref(`stations/${stationId}/users/${userName}`).set({
            name: userName,
            timestamp: Date.now()
        });

        stations.forEach(s => {
            if (s.id !== stationId) db.ref(`stations/${s.id}/users/${userName}`).remove();
        });
    }

    // CONTAGEM DE USUÁRIOS
    function listenStationUsers() {
        stations.forEach(st => {
            db.ref(`stations/${st.id}/users`).on('value', (snap) => {
                const users = snap.val();
                const count = users ? Object.keys(users).length : 0;
                const countSpan = document.getElementById(`count-${st.id}`);
                if (countSpan) countSpan.innerText = count;
                if (st.id === currentStationId) {
                    document.getElementById('currentStationPeople').innerText = `${count} online`;
                }
            });
        });
    }

    // ÁUDIO: ESCUTAR
    function listenAudio() {
        db.ref(`stations/${currentStationId}/audios`).on('child_added', (snap) => {
            const audioData = snap.val();
            if (audioData.sender !== userName) {
                const audio = new Audio(audioData.base64);
                audio.play().catch(e => console.log);
                const toast = document.getElementById('audioToast');
                toast.style.display = 'block';
                toast.innerText = `🎙️ ${audioData.sender} falou em ${audioData.station}`;
                setTimeout(() => toast.style.display = 'none', 2800);
            }
        });
    }

    // PTT - GRAVAR
    const pttBtn = document.getElementById('pttButton');
    const timerDiv = document.getElementById('recordTimer');

    pttBtn.addEventListener('mousedown', startRecording);
    pttBtn.addEventListener('mouseup', stopRecording);
    pttBtn.addEventListener('mouseleave', stopRecording);
    pttBtn.addEventListener('touchstart', startRecording);
    pttBtn.addEventListener('touchend', stopRecording);

    async function startRecording() {
        if (recording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            secondsLeft = 20;

            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const stationObj = stations.find(s => s.id === currentStationId);
                    await db.ref(`stations/${currentStationId}/audios`).push({
                        sender: userName,
                        station: stationObj.nome,
                        base64: reader.result,
                        timestamp: Date.now()
                    });
                    const allAudios = await db.ref(`stations/${currentStationId}/audios`).once('value');
                    const audioList = allAudios.val();
                    if (audioList) {
                        const keys = Object.keys(audioList);
                        if (keys.length > 30) {
                            keys.slice(0, keys.length - 30).forEach(k => db.ref(`stations/${currentStationId}/audios/${k}`).remove());
                        }
                    }
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };

            mediaRecorder.start();
            recording = true;
            pttBtn.classList.add('recording');
            timerDiv.style.display = 'inline-block';
            timerDiv.innerText = '20s';

            countdownInterval = setInterval(() => {
                secondsLeft--;
                timerDiv.innerText = `${secondsLeft}s`;
                if (secondsLeft <= 0) stopRecording();
            }, 1000);

            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
            }, 19500);
        } catch(e) {
            alert("🎤 Permita o acesso ao microfone para usar o rádio.");
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        if (countdownInterval) clearInterval(countdownInterval);
        recording = false;
        pttBtn.classList.remove('recording');
        timerDiv.style.display = 'none';
    }

    // CHAT
    function initChat() {
        db.ref('global_chat').on('value', (snap) => {
            const messages = snap.val();
            const container = document.getElementById('chatMessages');
            if (!messages) { container.innerHTML = ''; return; }
            let html = '';
            Object.values(messages).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
                const isMe = msg.sender === userName;
                html += `
                    <div class="message-bubble ${isMe ? 'me' : 'other'}">
                        <strong>${msg.sender}</strong><br>${msg.text}<br>
                        <small style="font-size:9px;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        db.ref('global_chat').push({
            sender: userName,
            text: input.value.trim(),
            timestamp: Date.now()
        });
        input.value = '';
    }

    function openChat() {
        document.getElementById('chatModal').classList.add('visible');
    }
    function closeChat() {
        document.getElementById('chatModal').classList.remove('visible');
    }

    // MAPA
    function initGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(pos => {
            const userPos = [pos.coords.latitude, pos.coords.longitude];
            if (!map) return;
            if (!userMarker) {
                userMarker = L.marker(userPos, {
                    icon: L.divIcon({ html: '<div style="font-size:32px;">🚗</div>', iconSize: [32,32], className: '' })
                }).addTo(map);
                map.setView(userPos, 12);
            } else {
                userMarker.setLatLng(userPos);
            }
        });
    }

    function openMap() {
        const modal = document.getElementById('mapModal');
        modal.classList.add('visible');
        setTimeout(() => {
            if (!map) {
                map = L.map('full-map').setView([-25.4284, -49.2733], 11);
                L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);
                stations.forEach(s => {
                    L.marker([s.lat, s.lng], {
                        icon: L.divIcon({ html: `<div style="background:#00BFFF; width:8px; height:8px; border-radius:50%; border:2px solid white;"></div>`, iconSize: [8,8] })
                    }).addTo(map).bindPopup(`<b>${s.nome}</b>`);
                });
            } else {
                map.invalidateSize();
            }
        }, 120);
    }
    function closeMap() {
        document.getElementById('mapModal').classList.remove('visible');
    }

    // PERFIL
    function changeProfile() {
        const newName = prompt("✏️ Alterar nome:", userName);
        if (newName && newName.trim()) {
            userName = newName.trim();
            localStorage.setItem('radio_user', userName);
            alert(`✅ Nome alterado para ${userName}`);
        }
    }

    // SAIR
    window.addEventListener('beforeunload', () => {
        if (userName) {
            db.ref(`stations/${currentStationId}/users/${userName}`).remove();
        }
    });

    init();
</script>
</body>
</html>
