<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS COMUNIDADE PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #007bff; --dark: #2c3e50; --success: #28a745; }
        
        /* Ajuste para altura real em celulares */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Estilo do GPS Pulsante */
        .meu-gps {
            width: 18px; height: 18px; background: var(--blue);
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,123,255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,123,255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,123,255, 0); }
        }

        /* Menu de Alertas Lateral */
        .menu-alertas {
            position: absolute; top: 80px; left: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .btn-alerta {
            background: white; border: none; padding: 8px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); width: 70px; cursor: pointer;
            text-align: center; font-size: 9px; font-weight: bold;
        }

        /* CHAT LATERAL CORRIGIDO PARA CELULAR */
        #chat-lateral {
            position: absolute; right: -100%; top: 0; 
            width: 85%; max-width: 320px; 
            height: 100%; /* Fallback */
            height: 100dvh; /* Altura dinâmica para mobile */
            background: white; z-index: 2000; transition: 0.3s ease-in-out; 
            display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
        }
        #chat-lateral.aberto { right: 0; }

        .chat-header {
            padding: 15px; background: var(--dark); color: white; 
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }

        #mensagens { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background: #f8f9fa; display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch; /* Scroll suave iOS */
        }

        .balao-ia { background: #e7f3ff; border-left: 4px solid var(--blue); padding: 10px; border-radius: 8px; font-size: 13px; align-self: flex-start; }
        .balao-user { background: #e2e2e2; padding: 10px; border-radius: 8px; font-size: 13px; align-self: flex-end; }
        
        .entrada-chat { 
            padding: 10px; border-top: 1px solid #eee; 
            display: flex; background: white; 
            padding-bottom: env(safe-area-inset-bottom); /* Suporte para iPhones novos */
        }
        .entrada-chat input { 
            flex: 1; padding: 12px; border: 1px solid #ddd; 
            border-radius: 20px; outline: none; font-size: 14px;
        }

        .leaflet-control-geocoder { margin-top: 15px !important; width: 280px !important; max-width: 70vw; }
    </style>
</head>
<body>

<div id="map"></div>

<button onclick="toggleChat()" style="position:absolute; bottom:20px; right:20px; z-index:1001; width:55px; height:55px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:22px; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3)">💬</button>

<div class="menu-alertas">
    <button class="btn-alerta" onclick="registrar('Acidente', '⚠️')">⚠️<br>ACIDENTE</button>
    <button class="btn-alerta" onclick="registrar('Obras', '🚧')">🚧<br>OBRAS</button>
    <button class="btn-alerta" onclick="registrar('Pane', '🚛')">🚛<br>PANE</button>
    <button class="btn-alerta" onclick="registrar('Bloqueio', '🚫')">🚫<br>BLOQUEIO</button>
</div>

<div id="chat-lateral">
    <div class="chat-header">
        <span>ASSISTENTE BR-277</span>
        <span onclick="toggleChat()" style="padding: 5px 10px; background:rgba(255,255,255,0.1); border-radius:5px; cursor:pointer">FECHAR</span>
    </div>
    <div id="mensagens"></div>
    <div class="entrada-chat">
        <input type="text" id="input-chat" placeholder="Pergunte algo...">
        <button onclick="enviarChat()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:8px; cursor:pointer">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- CONFIGURAÇÃO FIREBASE ---
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const iconeOutrosCarros = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
    iconSize: [28, 28], iconAnchor: [14, 14]
});

let meuLatLng, meuMarker, routingControl;
let motoristasAtivos = {};
let listaAlertas = [];
let meuID = "Drive_" + Math.random().toString(36).substr(2, 5).toUpperCase();

// BUSCA E ROTA
const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Destino..."
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (routingControl) map.removeControl(routingControl);
    routingControl = L.Routing.control({
        waypoints: [meuLatLng, dest],
        lineOptions: { styles: [{ color: '#007bff', weight: 6 }] },
        createMarker: () => null 
    }).addTo(map);
    map.flyTo(dest, 14);
}).addTo(map);

// GPS E MOTORISTAS
function iniciarApp() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
            map.setView(meuLatLng, 15);
        } else { meuMarker.setLatLng(meuLatLng); }
        db.ref("usuarios/" + meuID).set({ lat: meuLatLng.lat, lon: meuLatLng.lng, time: Date.now() });
    }, null, { enableHighAccuracy: true });
}

db.
