<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | MONITORAMENTO ELITE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #075e54; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; border: 4px solid #d4af37; }

        /* ALERTAS ESQUERDA */
        .painel-alertas { position: absolute; top: 75px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        .btn-alerta { 
            background: #1a1a1a; border: 2px solid #d4af37; padding: 6px; border-radius: 10px; 
            width: 80px; display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }
        .btn-alerta span { font-size: 20px; }
        .btn-alerta b { font-size: 9px; color: white; text-transform: uppercase; margin-top: 2px; }

        /* BOTÕES FIXOS FUNCIONAIS */
        #btn-chat-flutuante { position: fixed; bottom: 20px; right: 20px; z-index: 4001; width: 65px; height: 65px; border-radius: 50%; background: #25d366; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; }
        #btn-bussola { position: fixed; bottom: 20px; left: 15px; z-index: 1000; background: white; border: 2px solid #d4af37; width: 55px; height: 55px; border-radius: 50%; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #notif-badge { position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; font-weight: bold; display: none; align-items: center; justify-content: center; border: 2px solid white; }

        /* CHAT WHATSAPP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 90%; max-width: 380px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.4s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        .balao { padding: 10px; border-radius: 15px; margin-bottom: 8px; max-width: 85%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .balao-eu { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .balao-outro { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        
        /* POPUP ALERTAS ESTILO WHATSAPP */
        .leaflet-popup-content-wrapper { padding: 0; border-radius: 12px; overflow: hidden; }
        .pop-head { background: #075e54; color: white; padding: 8px; font-weight: bold; text-align: center; font-size: 14px; }
        .pop-chat { background: #e5ddd5; max-height: 120px; overflow-y: auto; padding: 8px; font-size: 12px; }
        .pop-msg { background: white; padding: 4px 8px; border-radius: 8px; margin-bottom: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        #btn-fechar-rota { position: fixed; bottom: 90px; left: 15px; z-index: 3000; background: #000; color: #fff; border: 2px solid #d4af37; border-radius: 50%; width: 40px; height: 40px; display: none; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:#075e54; margin-top:0">BR-277 ELITE</h2>
        <input type="text" id="user-name" style="width:90%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;" placeholder="Nome Completo">
        <button onclick="salvarNome()" style="width:90%; padding:12px; background:#075e54; color:white; border:none; border-radius:8px; font-weight:bold;">ACESSAR MAPA</button>
    </div>
</div>

<div id="map"></div>
<button id="btn-bussola" onclick="recentralizar()">🧭</button>
<button id="btn-fechar-rota" onclick="limparRota()">✕</button>
<div id="btn-chat-flutuante" onclick="document.getElementById('chat-box').classList.toggle('aberto')">💬<div id="notif-badge">0</div></div>

<div class="painel-alertas">
    <button class="btn-alerta" onclick="enviarAlerta('Acidente', '⚠️')"><span>⚠️</span><b>Acidente</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Obra', '🚧')"><span>🚧</span><b>Obra</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Lentidão', '🚗')"><span>🚗</span><b>Lentidão</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Animal', '🐕')"><span>🐕</span><b>Animal</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Bloqueio', '🚫')"><span>🚫</span><b>Bloqueio</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Buraco', '🕳️')"><span>🕳️</span><b>Buraco</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Neblina', '🌫️')"><span>🌫️</span><b>Neblina</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Barreira', '⛰️')"><span>⛰️</span><b>Queda</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Pane', '🛠️')"><span>🛠️</span><b>Pane</b></button>
    <button class="btn-alerta" onclick="enviarAlerta('Carga', '📦')"><span>📦</span><b>Carga</b></button>
</div>

<div id="chat-box">
    <div style="padding:15px; background:#075e54; color:white; display:flex; justify-content:space-between; align-items:center;">
        <b>CHAT BR-277</b>
        <span onclick="fecharChat()" style="cursor:pointer; font-size:25px;">✕</span>
    </div>
    <div id="mensagens" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; background:#eee; display:flex; gap:5px;">
        <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;" placeholder="Mensagem...">
        <button onclick="mandarChat()" style="background:#075e54; color:white; border-radius:50%; width:40px; height:40px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

let meuLatLng, meuMarker, rMachine, notifCount = 0;
let meuNome = localStorage.getItem('br277_nome') || "";

if(meuNome) { document.getElementById('login-screen').style.display = 'none'; iniciarApp(); }

function salvarNome() {
    const n = document.getElementById('user-name').value.trim();
    if(n.length < 2) return;
    meuNome = n;
    localStorage.setItem('br277_nome', n);
    location.reload();
}

const geocoder = L.Control.geocoder({ 
    defaultMarkGeocode: false, collapsed: false, placeholder: "Para onde vamos?",
    geocoder: L.Control.Geocoder.nominatim({ geocodingQueryParams: { countrycodes: 'br', viewbox: '-54.6,-26.7,-48.0,-22.5', bounded: 1 } })
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (rMachine) map.removeControl(rMachine);
    rMachine = L.Routing.control({ waypoints: [meuLatLng, dest], lineOptions: { styles: [{ color: '#1a73e8', weight: 8 }] }, createMarker: () => null }).addTo(map);
    document.getElementById('btn-fechar-rota').style.display = 'flex';
}).addTo(map);

function limparRota() { if(rMachine) map.removeControl(rMachine); document.getElementById('btn-fechar-rota').style.display = 'none'; }

function iniciarApp() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if(!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: `🚗`, className: '', iconSize:[25,25] }) }).addTo(map);
            map.setView(meuLatLng, 17);
        } else { meuMarker.setLatLng(meuLatLng); }
    });
    carregarAlertas();
}

function enviarAlerta(tipo, emoji) {
    if (!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, autor: meuNome, t: Date.now() });
}

function carregarAlertas() {
    db.ref("alertas").on("child_added", snap => {
        const a = snap.val(); const key = snap.key;
        const marker = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<span style="font-size:30px">${a.emoji}</span>`, className: '' }) }).addTo(map);
        
        marker.on('click', () => {
            const popupHtml = `
                <div style="width:200px">
                    <div class="pop-head">${a.tipo}</div>
                    <div id="chat-pop-${key}" class="pop-chat">Carregando...</div>
                    <div style="display:flex; padding:5px; background:#eee">
                        <input type="text" id="in-pop-${key}" style="flex:1; border:1px solid #ccc; border-radius:5px;">
                        <button onclick="mandarMsgPop('${key}')" style="background:#075e54; color:white; border:none; border-radius:5px; margin-left:3px;">➤</button>
                    </div>
                </div>`;
            marker.bindPopup(popupHtml).openPopup();
            db.ref("alertas/"+key+"/conversa").on("value", cSnap => {
                const div = document.getElementById("chat-pop-"+key);
                if(div){ div.innerHTML = ""; const d = cSnap.val(); if(d) Object.entries(d).forEach(([mk, c]) => {
                    div.innerHTML += `<div class="pop-msg"><b>${c.u}</b>: ${c.m}</div>`;
                }); div.scrollTop = div.scrollHeight; }
            });
        });
    });
}

function mandarMsgPop(key) {
    const inp = document.getElementById("in-pop-"+key);
    if(inp.value) db.ref("alertas/"+key+"/conversa").push({ u: meuNome, m: inp.value });
    inp.value = "";
}

function mandarChat() {
    const inp = document.getElementById('chat-input'); if (!inp.value) return;
    db.ref("chat").push({ u: meuNome, m: inp.value, t: Date.now() });
    inp.value = "";
}

db.ref("chat").limitToLast(30).on("value", snap => {
    const b = document.getElementById('mensagens');
    const isAberto = document.getElementById('chat-box').classList.contains('aberto');
    b.innerHTML = "";
    const dados = snap.val();
    if(dados) {
        Object.entries(dados).forEach(([key, c]) => {
            if(!isAberto && c.u !== meuNome) { notifCount++; }
            const delBtn = c.u === meuNome ? `<span onclick="db.ref('chat/${key}').remove()" style="color:red; cursor:pointer; font-weight:bold; margin-right:10px;">✕ Apagar</span>` : "";
            const dataStr = new Date(c.t).toLocaleDateString() === new Date().toLocaleDateString() ? "Hoje" : new Date(c.t).toLocaleDateString([], {day:'2-digit', month:'2-digit'});
            
            b.innerHTML += `
                <div class="balao ${c.u === meuNome ? 'balao-eu' : 'balao-outro'}">
                    <b style="color:#075e54; font-size:11px">${c.u}</b><br>${c.m.replace(/(@[A-Za-zÀ-ÖØ-öø-ÿ\s]+)(?=\s|$)/g, '<span style="color:blue;font-weight:bold">$1</span>')}
                    <div style="font-size:9px; color:#666; display:flex; justify-content:space-between; margin-top:5px;">
                        ${delBtn} <span>${dataStr} ${new Date(c.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                </div>`;
        });
        b.scrollTop = b.scrollHeight;
        if(notifCount > 0 && !isAberto) { 
            document.getElementById('notif-badge').innerText = notifCount; 
            document.getElementById('notif-badge').style.display = 'flex'; 
        }
    }
});

function fecharChat() { document.getElementById('chat-box').classList.remove('aberto'); notifCount = 0; document.getElementById('notif-badge').style.display = 'none'; }
function recentralizar() { if (meuLatLng) map.flyTo(meuLatLng, 17); }
</script>
</body>
</html>
