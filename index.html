<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | NAVEGAÇÃO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        .alertas-panel {
            position: fixed;
            top: 70px;
            left: 10px;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .alerta-item {
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: fit-content;
            backdrop-filter: blur(5px);
        }
        
        .alerta-item:hover {
            transform: translateX(5px);
            filter: brightness(1.2);
        }
        
        .alerta-acidente { background: linear-gradient(135deg, #e53935, #b71c1c); }
        .alerta-obras { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .alerta-pane { background: linear-gradient(135deg, #795548, #5d4037); }
        .alerta-animal { background: linear-gradient(135deg, #9c27b0, #7b1fa2); }
        .alerta-radar { background: linear-gradient(135deg, #607d8b, #455a64); }
        .alerta-barreira { background: linear-gradient(135deg, #8b4513, #5d3a1a); }
        .alerta-neblina { background: linear-gradient(135deg, #00acc1, #0097a7); }
        .alerta-congestionamento { background: linear-gradient(135deg, #f44336, #d32f2f); }
        .alerta-alagamento { background: linear-gradient(135deg, #2196f3, #1976d2); }
        .alerta-desvio { background: linear-gradient(135deg, #4caf50, #388e3c); }
        
        .contador-usuarios {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 9000;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ffd700;
        }
        
        /* PAINEL DE ROTAS - NOVO */
        .rotas-panel {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px;
            z-index: 9500;
            border: 2px solid #ffd700;
            display: none;
            color: white;
        }
        
        .rota-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .rota-item:hover {
            background: rgba(255,215,0,0.1);
        }
        
        .rota-item:last-child {
            border-bottom: none;
        }
        
        .rota-cor {
            width: 8px;
            height: 40px;
            border-radius: 4px;
            margin-right: 12px;
        }
        
        .rota-info {
            flex: 1;
        }
        
        .rota-tempo {
            font-weight: bold;
            font-size: 14px;
        }
        
        .rota-distancia {
            font-size: 12px;
            color: #ffd700;
        }
        
        .rota-atraso {
            font-size: 11px;
            color: #e53935;
        }
        
        .rota-instrucoes {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px;
            z-index: 9500;
            border: 2px solid #ffd700;
            display: none;
            color: white;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .instrucao-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            font-size: 12px;
        }
        
        .lupa-container {
            position: fixed;
            top: 15px;
            left: 180px;
            width: 250px;
            z-index: 10000;
            background: white;
            border-radius: 40px;
            border: 3px solid #ffd700;
            display: flex;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .lupa-container input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            font-size: 14px;
            outline: none;
        }
        
        .lupa-container button {
            background: #075e54;
            color: white;
            border: none;
            width: 45px;
            cursor: pointer;
        }
        
        .btn-iniciar-rota {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd700;
            color: #1a1a1a;
            border: none;
            border-radius: 40px;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9500;
            display: none;
            font-size: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .botoes-inferiores {
            position: fixed;
            bottom: 20px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9000;
        }
        
        .btn-acao {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            color: #ffd700;
            transition: all 0.2s;
        }
        
        #btn-px { 
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: #333;
            border: 4px solid #ffd700;
            color: #ffd700;
            font-size: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9001;
            transition: all 0.2s;
        }
        
        #btn-px.ativo { 
            background: #e53935; 
            color: white; 
            transform: translateX(-50%) scale(0.95);
        }
        
        .btn-recentrar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            z-index: 9000;
            display: none;
            border: 1px solid #ffd700;
        }
        
        .mapa-noturno {
            filter: invert(100%) hue-rotate(180deg) brightness(95%);
        }
        
        .pulse-loc { 
            width: 35px; 
            height: 35px; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
            background: rgba(255, 215, 0, 0.3); 
            border: 3px solid #ffd700; 
        }
        
        @keyframes pulse { 
            0% { transform: scale(0.8); opacity: 1; } 
            100% { transform: scale(2); opacity: 0; } 
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- PAINEL DE ALERTAS -->
<div class="alertas-panel" id="alertasLista"></div>

<!-- CONTADOR DE USUÁRIOS -->
<div class="contador-usuarios" id="contadorUsuarios">
    <i class="fas fa-users"></i>
    <span id="numUsuarios">0</span> online
</div>

<!-- LUPA -->
<div class="lupa-container">
    <input type="text" id="buscaDestino" placeholder="Digite seu destino...">
    <button onclick="buscarRota()"><i class="fas fa-search"></i></button>
</div>

<!-- PAINEL DE ROTAS -->
<div class="rotas-panel" id="rotasPanel"></div>

<!-- PAINEL DE INSTRUÇÕES -->
<div class="rota-instrucoes" id="instrucoesPanel"></div>

<!-- BOTÃO INICIAR ROTA -->
<button class="btn-iniciar-rota" id="btnIniciarRota" onclick="iniciarNavegacao()">🚗 INICIAR ROTA</button>

<!-- BOTÃO RECENTRALIZAR -->
<div class="btn-recentrar" id="btnRecenter" onclick="recentralizar()">
    <i class="fas fa-location-arrow"></i> RECENTRALIZAR
</div>

<!-- BOTÕES INFERIORES -->
<div class="botoes-inferiores">
    <div class="btn-acao" id="btn-luz" onclick="toggleModoNoturno()">💡</div>
    <div class="btn-acao btn-mudo" id="btnMudo" onclick="toggleMudo()">
        <i class="fas fa-volume-up"></i>
    </div>
</div>

<div id="btn-px">🎤</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== CONFIGURAÇÕES =====
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ORS_API_KEY = '5b3ce3597851110001cf6248c3b0e86cdb6b40ca9f5cd162698b8f07'; // Chave pública de teste

// ===== VARIÁVEIS =====
let usuario = "Motorista_" + Math.floor(Math.random() * 1000);
let minhaLocalizacao = null;
let meuMarcador = null;
let seguirLocalizacao = true;
let rotaAtual = null;
let mapa = null;
let mudo = false;
let rotasDisponiveis = [];
let rotaSelecionada = null;
let modoNavegacao = false;

// ===== 10 ALERTAS =====
const alertas = [
    { tipo: 'acidente', nome: 'ACIDENTE', cor: '#e53935' },
    { tipo: 'obras', nome: 'OBRAS', cor: '#ff9800' },
    { tipo: 'pane', nome: 'PANE', cor: '#795548' },
    { tipo: 'animal', nome: 'ANIMAL', cor: '#9c27b0' },
    { tipo: 'radar', nome: 'RADAR', cor: '#607d8b' },
    { tipo: 'barreira', nome: 'BARREIRA', cor: '#8b4513' },
    { tipo: 'neblina', nome: 'NEBLINA', cor: '#00acc1' },
    { tipo: 'congestionamento', nome: 'CONGEST.', cor: '#f44336' },
    { tipo: 'alagamento', nome: 'ALAGAMENTO', cor: '#2196f3' },
    { tipo: 'desvio', nome: 'DESVIO', cor: '#4caf50' }
];

// ===== INICIALIZAÇÃO =====
document.addEventListener('DOMContentLoaded', () => {
    criarIconesAlertas();
    iniciarMapa();
    iniciarGPS();
});

function criarIconesAlertas() {
    const lista = document.getElementById('alertasLista');
    alertas.forEach(alerta => {
        const div = document.createElement('div');
        div.className = `alerta-item alerta-${alerta.tipo}`;
        div.textContent = alerta.nome;
        div.onclick = () => alert(`⚠️ Alerta ${alerta.nome} ativado!`);
        lista.appendChild(div);
    });
}

function iniciarMapa() {
    mapa = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);
    
    mapa.on('dragstart', () => {
        seguirLocalizacao = false;
        document.getElementById('btnRecenter').style.display = 'block';
    });
}

function iniciarGPS() {
    if (!navigator.geolocation) return;
    
    navigator.geolocation.watchPosition(pos => {
        minhaLocalizacao = L.latLng(pos.coords.latitude, pos.coords.longitude);
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, {
                icon: L.divIcon({
                    html: `<div style="position:relative;">
                        <div class="pulse-loc" style="position:absolute; left:-12px; top:-12px;"></div>
                        <div style="font-size:28px;">🚗</div>
                    </div>`,
                    iconSize: [1, 1]
                })
            }).addTo(mapa);
            mapa.setView(minhaLocalizacao, 17);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
        }
        
        if (seguirLocalizacao) mapa.panTo(minhaLocalizacao);
        
    }, null, { enableHighAccuracy: true });
}

// ===== NOVA FUNÇÃO DE ROTA =====
async function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    if (!destino || !minhaLocalizacao) return;
    
    // Esconde painéis anteriores
    document.getElementById('rotasPanel').style.display = 'none';
    document.getElementById('instrucoesPanel').style.display = 'none';
    document.getElementById('btnIniciarRota').style.display = 'none';
    
    // Busca coordenadas da cidade
    const geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)}, Brasil&limit=1`);
    const dados = await geo.json();
    
    if (!dados.length) {
        alert('Cidade não encontrada');
        return;
    }
    
    const destinoLng = dados[0].lon;
    const destinoLat = dados[0].lat;
    const destinoNome = dados[0].display_name.split(',')[0];
    
    // Busca rotas com OpenRouteService
    try {
        const response = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_API_KEY}&start=${minhaLocalizacao.lng},${minhaLocalizacao.lat}&end=${destinoLng},${destinoLat}&alternatives=true`);
        const json = await response.json();
        
        if (!json.features || json.features.length === 0) {
            alert('Não foi possível calcular rota');
            return;
        }
        
        rotasDisponiveis = json.features;
        mostrarRotas(destinoNome);
        
    } catch (error) {
        console.error('Erro na rota:', error);
        alert('Erro ao calcular rota');
    }
}

function mostrarRotas(destinoNome) {
    const panel = document.getElementById('rotasPanel');
    let html = `<div style="padding:10px; font-weight:bold; border-bottom:1px solid #ffd700;">🗺️ ROTAS PARA ${destinoNome}</div>`;
    
    rotasDisponiveis.forEach((rota, index) => {
        const summary = rota.properties.summary;
        const distance = (summary.distance / 1000).toFixed(1);
        const duration = Math.round(summary.duration / 60);
        
        // Simula atraso baseado no trânsito (cores do Google)
        const atraso = Math.round(duration * 0.2); // 20% de atraso simulado
        const cor = index === 0 ? '#2196F3' : index === 1 ? '#4CAF50' : '#FF9800';
        
        html += `
            <div class="rota-item" onclick="selecionarRota(${index})">
                <div class="rota-cor" style="background:${cor};"></div>
                <div class="rota-info">
                    <div class="rota-tempo">⏱️ ${duration} min ${atraso > 0 ? `(+${atraso} min)` : ''}</div>
                    <div class="rota-distancia">📏 ${distance} km</div>
                    ${index > 0 ? '<div class="rota-atraso">🔄 Rota alternativa</div>' : ''}
                </div>
            </div>
        `;
    });
    
    panel.innerHTML = html;
    panel.style.display = 'block';
}

function selecionarRota(index) {
    rotaSelecionada = rotasDisponiveis[index];
    const summary = rotaSelecionada.properties.summary;
    const distance = (summary.distance / 1000).toFixed(1);
    const duration = Math.round(summary.duration / 60);
    
    // Desenha rota no mapa
    if (rotaAtual) mapa.removeControl(rotaAtual);
    
    const coordinates = rotaSelecionada.geometry.coordinates.map(coord => [coord[1], coord[0]]);
    rotaAtual = L.polyline(coordinates, {
        color: index === 0 ? '#2196F3' : index === 1 ? '#4CAF50' : '#FF9800',
        weight: 8,
        opacity: 0.8
    }).addTo(mapa);
    
    mapa.flyToBounds(rotaAtual.getBounds(), { padding: [50, 50] });
    
    // Mostra instruções
    const instrucoes = rotaSelecionada.properties.segments[0].steps;
    let instrucoesHtml = '<div style="padding:10px; font-weight:bold; border-bottom:1px solid #ffd700;">📢 INSTRUÇÕES</div>';
    
    instrucoes.forEach((passo, i) => {
        const dist = (passo.distance / 1000).toFixed(2);
        instrucoesHtml += `
            <div class="instrucao-item">
                ${i+1}. ${passo.instruction} (${dist} km)
            </div>
        `;
    });
    
    document.getElementById('instrucoesPanel').innerHTML = instrucoesHtml;
    document.getElementById('instrucoesPanel').style.display = 'block';
    document.getElementById('btnIniciarRota').style.display = 'block';
    document.getElementById('rotasPanel').style.display = 'none';
}

function iniciarNavegacao() {
    modoNavegacao = true;
    seguirLocalizacao = true;
    document.getElementById('btnRecenter').style.display = 'none';
    document.getElementById('btnIniciarRota').textContent = '🛑 PARAR NAVEGAÇÃO';
    
    alert('🚗 Navegação iniciada! O mapa vai acompanhar seu movimento.');
    
    // Atualiza posição constantemente
    const intervalo = setInterval(() => {
        if (!modoNavegacao) clearInterval(intervalo);
        if (minhaLocalizacao && seguirLocalizacao) {
            mapa.panTo(minhaLocalizacao);
        }
    }, 2000);
}

// ===== RÁDIO PX =====
let gravador = null;
let pedacosAudio = [];
let streamAudio = null;
let timerInterval = null;
let tempoRestante = 30;
const botaoPX = document.getElementById('btn-px');

botaoPX.addEventListener('mousedown', async function() {
    try {
        streamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
        gravador = new MediaRecorder(streamAudio);
        pedacosAudio = [];
        tempoRestante = 30;
        
        gravador.ondataavailable = e => e.data.size > 0 && pedacosAudio.push(e.data);
        
        gravador.onstop = () => {
            if (pedacosAudio.length > 0) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    db.ref('radio').push({
                        audio: reader.result,
                        usuario: usuario,
                        timestamp: Date.now()
                    });
                    setTimeout(() => {
                        db.ref('radio').orderByChild('timestamp').endAt(Date.now() - 30000).once('value', snap => {
                            snap.forEach(child => child.ref.remove());
                        });
                    }, 30000);
                };
                reader.readAsDataURL(new Blob(pedacosAudio, { type: 'audio/webm' }));
            }
            if (streamAudio) streamAudio.getTracks().forEach(t => t.stop());
        };
        
        gravador.start();
        botaoPX.classList.add('ativo');
        
    } catch(e) {
        alert('Permita acesso ao microfone');
    }
});

botaoPX.addEventListener('mouseup', () => {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        botaoPX.classList.remove('ativo');
    }
});

// ===== FUNÇÕES =====
function toggleModoNoturno() {
    document.getElementById('map').classList.toggle('mapa-noturno');
}

function toggleMudo() {
    mudo = !mudo;
    document.getElementById('btnMudo').innerHTML = mudo ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
}

function recentralizar() {
    seguirLocalizacao = true;
    document.getElementById('btnRecenter').style.display = 'none';
    if (minhaLocalizacao) mapa.flyTo(minhaLocalizacao, 17);
}

document.getElementById('buscaDestino').addEventListener('keypress', e => {
    if (e.key === 'Enter') buscarRota();
});
</script>
</body>
</html>
