<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL V10</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* 10 ALERTAS FIXOS */
        .painel-alertas { position: absolute; top: 100px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 7px; border-radius: 8px; width: 85px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-shadow: 1px 1px #000; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #1a1a1a; }

        /* BOTÕES MÓVEIS */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; border: 2px solid white; background: white; touch-action: none; }
        #chat-trigger { width: 65px; height: 65px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 30px; }
        #btn-luz { width: 45px; height: 45px; background: #ffcc00; right: 25px; top: 160px; font-size: 22px; }

        /* CHAT ESTILO ZAP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 10px; border-radius: 12px; max-width: 85%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }
        
        /* REAÇÕES */
        .reacoes { display: flex; gap: 8px; margin-top: 5px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 5px; }
        .reacoes span { cursor: pointer; font-size: 16px; transition: 0.2s; }
        .reacoes span:hover { transform: scale(1.3); }

        .btn-del { color: red; font-size: 10px; cursor: pointer; float: right; margin-left: 10px; }
        .hora { font-size: 9px; color: #666; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-luz" class="f-btn">💡</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between;">
        <b>CHAT BR-277</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:20px;">✕</span>
    </div>
    <div id="mensagens"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="chat-input" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:20px; border:1px solid #ccc;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:45px; height:45px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// MAPAS GOOGLE TRAFFIC
const camClara = L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}');
const camEscura = L.tileLayer('https://mt1.google.com/vt/lyrs=r,traffic&x={x}&y={y}&z={z}'); // Modo Road Suave

const map = L.map('map', { zoomControl: false, layers: [camClara] }).setView([-25.4284, -49.2733], 13);
let modoNoite = false;

document.getElementById('btn-luz').onclick = () => {
    if(!modoNoite) { map.removeLayer(camClara); camEscura.addTo(map); }
    else { map.removeLayer(camEscura); camClara.addTo(map); }
    modoNoite = !modoNoite;
};

let user = JSON.parse(localStorage.getItem('br277_v10')) || { n: "Danilo", id: "u123", v: "🚗" };

// LÓGICA DE MOVER + CLIQUE DUPLO
function dragAndDouble(id, onDouble) {
    const el = document.getElementById(id);
    let lastTap = 0, sX, sY, movido = false;

    el.addEventListener('touchstart', (e) => {
        movido = false;
        const now = Date.now();
        if (now - lastTap < 300) { onDouble(); return; }
        lastTap = now;
        sX = e.touches[0].clientX - el.offsetLeft;
        sY = e.touches[0].clientY - el.offsetTop;
    });

    el.addEventListener('touchmove', (e) => {
        movido = true;
        el.style.left = (e.touches[0].clientX - sX) + 'px';
        el.style.top = (e.touches[0].clientY - sY) + 'px';
        el.style.right = 'auto'; el.style.bottom = 'auto';
    });
}

dragAndDouble('chat-trigger', () => document.getElementById('chat-box').classList.toggle('aberto'));

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ uid: user.id, u: user.n, m: i.value, t: Date.now() });
    i.value = "";
}

function reagir(key, emoji) {
    db.ref(`chat/${key}/reacao`).set(emoji);
}

db.ref("chat").limitToLast(30).on("value", snap => {
    const box = document.getElementById('mensagens'); box.innerHTML = "";
    const data = snap.val();
    if(data) Object.entries(data).forEach(([key, msg]) => {
        const eu = (msg.uid === user.id);
        const hora = new Date(msg.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        box.innerHTML += `
            <div class="balao ${eu?'balao-eu':'balao-outro'}">
                <b style="font-size:11px; color:#075e54">${msg.u}</b> ${eu?`<span class="btn-del" onclick="db.ref('chat/${key}').remove()">✕</span>`:''}
                <br>${msg.m}
                ${msg.reacao ? `<div style="font-size:14px; margin-top:3px;">${msg.reacao}</div>` : ''}
                <div class="reacoes">
                    <span onclick="reagir('${key}', '👍')">👍</span>
                    <span onclick="reagir('${key}', '❤️')">❤️</span>
                    <span onclick="reagir('${key}', '⚠️')">⚠️</span>
                </div>
                <span class="hora">${hora}</span>
            </div>`;
    });
    box.scrollTop = box.scrollHeight;
});

function enviarAlerta(tipo, emoji) { alert("Alerta " + tipo + " enviado!"); }
</script>
</body>
</html>
