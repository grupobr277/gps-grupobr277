<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | GPS INTELIGENTE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        
        /* MODAL DE CADASTRO */
        .cadastro-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cadastro-content {
            background: linear-gradient(135deg, #075e54, #128C7E);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
        }
        
        .cadastro-content input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 16px;
        }
        
        .cadastro-content button {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .tipo-veiculo {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .tipo-veiculo div {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tipo-veiculo div.selecionado {
            background: #ffd700;
            color: #075e54;
            font-weight: bold;
        }
        
        /* LUPA */
        .lupa-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            z-index: 10000;
            background: white;
            border-radius: 50px;
            border: 3px solid #ffd700;
            display: flex;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .lupa-container input {
            flex: 1;
            padding: 15px;
            border: none;
            font-size: 15px;
            outline: none;
        }
        
        .lupa-container button {
            background: #075e54;
            color: white;
            border: none;
            width: 55px;
            cursor: pointer;
            font-size: 18px;
        }
        
        /* CHAT GLOBAL */
        .chat-container {
            position: fixed;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 80%;
            background: #e5ddd5;
            z-index: 20000;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            border: 2px solid #075e54;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            border-radius: 18px 18px 0 0;
            display: flex;
            justify-content: space-between;
        }
        
        .chat-mensagens {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .chat-input {
            padding: 15px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            border-radius: 0 0 18px 18px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            outline: none;
        }
        
        .chat-input button {
            background: #075e54;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
        }
        
        .mensagem {
            background: white;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            margin: 2px 0;
            align-self: flex-start;
        }
        
        .mensagem.minha {
            background: #dcf8c6;
            align-self: flex-end;
        }
        
        /* BOTÕES */
        .f-btn { 
            position: fixed; 
            z-index: 9000; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            border: 2px solid white; 
            cursor: pointer; 
            width: 55px; 
            height: 55px; 
            font-size: 24px; 
            background: white;
        }
        
        #btn-chat { right: 15px; bottom: 120px; background: #075e54; color: white; }
        #btn-mute { right: 15px; bottom: 190px; background: white; }
        #btn-luz { right: 15px; top: 130px; background: #ffcc00; }
        
        #btn-px { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 80px; 
            height: 80px; 
            background: #333; 
            border: 5px solid #ffd700; 
            border-radius: 50%; 
            z-index: 9001; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 35px; 
            color: #ffd700; 
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #btn-px.ativo { 
            background: #e53935; 
            color: white; 
            transform: translateX(-50%) scale(0.95);
        }
        
        #btn-rec { 
            position: fixed; 
            bottom: 120px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9000; 
            background: white; 
            border: 2px solid #075e54; 
            border-radius: 30px; 
            padding: 8px 20px; 
            display: none; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        .pulse-loc { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
            background: rgba(33, 150, 243, 0.3); 
            border: 3px solid #2196f3; 
        }
        
        @keyframes pulse { 
            0% { transform: scale(0.8); opacity: 1; } 
            100% { transform: scale(2); opacity: 0; } 
        }
        
        .mapa-noturno {
            filter: invert(100%) hue-rotate(180deg) brightness(95%);
        }
        
        .alerta-item {
            background: white;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            border-left: 5px solid #e53935;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="btn-rec" onclick="recentralizar()">📍 MINHA LOCALIZAÇÃO</div>

<!-- BOTÕES -->
<div id="btn-luz" class="f-btn" onclick="toggleModoNoturno()">💡</div>
<div id="btn-mute" class="f-btn" onclick="toggleMudo()">🔊</div>
<div id="btn-chat" class="f-btn" onclick="toggleChat()">💬</div>
<div id="btn-px">🎤</div>

<!-- MODAL CADASTRO -->
<div class="cadastro-modal" id="cadastroModal">
    <div class="cadastro-content">
        <h1>🚛 BR-277</h1>
        <p>Bem-vindo ao GPS Inteligente</p>
        
        <input type="text" id="nomeCadastro" placeholder="Seu nome" value="Motorista">
        
        <div style="margin:15px 0;">
            <div style="margin-bottom:10px;">Tipo de veículo:</div>
            <div class="tipo-veiculo" id="tipoVeiculo">
                <div onclick="selecionarTipo('carro')" id="tipo-carro" class="selecionado">🚗 Carro</div>
                <div onclick="selecionarTipo('caminhao')" id="tipo-caminhao">🚛 Caminhão</div>
                <div onclick="selecionarTipo('moto')" id="tipo-moto">🏍️ Moto</div>
                <div onclick="selecionarTipo('van')" id="tipo-van">🚐 Van</div>
                <div onclick="selecionarTipo('onibus')" id="tipo-onibus">🚌 Ônibus</div>
                <div onclick="selecionarTipo('pickup')" id="tipo-pickup">🛻 Pickup</div>
            </div>
        </div>
        
        <button onclick="salvarCadastro()">COMEÇAR</button>
    </div>
</div>

<!-- LUPA -->
<div class="lupa-container">
    <input type="text" id="buscaDestino" placeholder="Digite seu destino...">
    <button onclick="buscarRota()"><i class="fas fa-search"></i></button>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <span><i class="fas fa-comments"></i> CHAT GERAL</span>
        <span onclick="toggleChat()" style="cursor:pointer">✖</span>
    </div>
    <div class="chat-mensagens" id="chatMensagens"></div>
    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagem()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== CONFIGURAÇÃO FIREBASE =====
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};

try {
    firebase.initializeApp(firebaseConfig);
    console.log("✅ Firebase conectado");
} catch(e) {
    console.log("❌ Erro Firebase:", e);
}

const db = firebase.database();

// ===== VARIÁVEIS GLOBAIS =====
let usuario = null;
let tipoVeiculoUsuario = 'carro';
let minhaLocalizacao = null;
let meuMarcador = null;
let seguirLocalizacao = true;
let rotaAtual = null;
let modoNoturno = false;
let mute = false;
let mapa = null;

// ===== INICIALIZAÇÃO =====
document.addEventListener('DOMContentLoaded', function() {
    console.log("📱 Página carregada");
    
    // Verifica se já tem usuário
    const usuarioSalvo = localStorage.getItem('br277_usuario');
    const tipoSalvo = localStorage.getItem('br277_veiculo');
    
    if (usuarioSalvo) {
        usuario = usuarioSalvo;
        if (tipoSalvo) tipoVeiculoUsuario = tipoSalvo;
        document.getElementById('cadastroModal').style.display = 'none';
        iniciarMapa();
        iniciarGPS();
    }
});

function selecionarTipo(tipo) {
    tipoVeiculoUsuario = tipo;
    document.querySelectorAll('.tipo-veiculo div').forEach(el => {
        el.classList.remove('selecionado');
    });
    document.getElementById(`tipo-${tipo}`).classList.add('selecionado');
}

function salvarCadastro() {
    const nome = document.getElementById('nomeCadastro').value.trim();
    if (!nome) {
        alert('Digite seu nome!');
        return;
    }
    
    usuario = nome;
    localStorage.setItem('br277_usuario', nome);
    localStorage.setItem('br277_veiculo', tipoVeiculoUsuario);
    
    document.getElementById('cadastroModal').style.display = 'none';
    
    iniciarMapa();
    iniciarGPS();
    
    // Salva no Firebase
    try {
        db.ref('usuarios/' + Date.now()).set({
            nome: nome,
            veiculo: tipoVeiculoUsuario,
            data: new Date().toISOString()
        });
    } catch(e) {
        console.log("Erro ao salvar usuário:", e);
    }
}

function iniciarMapa() {
    console.log("🗺️ Iniciando mapa");
    
    mapa = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
        maxZoom: 20
    }).addTo(mapa);
    
    // Evento para botão de recentralizar
    mapa.on('dragstart', function() {
        seguirLocalizacao = false;
        document.getElementById('btn-rec').style.display = 'block';
    });
    
    // Carrega alertas
    carregarAlertas();
}

function iniciarGPS() {
    console.log("📍 Iniciando GPS");
    
    if (!navigator.geolocation) {
        alert("GPS não suportado!");
        return;
    }
    
    navigator.geolocation.watchPosition(function(pos) {
        minhaLocalizacao = L.latLng(pos.coords.latitude, pos.coords.longitude);
        
        const icones = {
            carro: '🚗',
            caminhao: '🚛',
            moto: '🏍️',
            van: '🚐',
            onibus: '🚌',
            pickup: '🛻'
        };
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, {
                icon: L.divIcon({
                    html: `<div class="pulse-loc"></div><div style="font-size:35px; margin-top:-15px;">${icones[tipoVeiculoUsuario]}</div>`,
                    iconSize: [1, 1]
                })
            }).addTo(mapa);
            
            mapa.setView(minhaLocalizacao, 17);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
        }
        
        if (seguirLocalizacao) {
            mapa.panTo(minhaLocalizacao);
        }
        
    }, function(error) {
        console.log("Erro GPS:", error);
    }, {
        enableHighAccuracy: true,
        timeout: 10000
    });
}

// ===== ROTA =====
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    
    if (!destino) {
        alert('Digite um destino');
        return;
    }
    
    if (!minhaLocalizacao) {
        alert('Aguardando localização GPS...');
        return;
    }
    
    console.log("🔍 Buscando:", destino);
    
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)}, Brasil&limit=1`)
        .then(response => response.json())
        .then(data => {
            if (data.length === 0) {
                alert('Local não encontrado');
                return;
            }
            
            const lugar = data[0];
            const destinoLatLng = L.latLng(parseFloat(lugar.lat), parseFloat(lugar.lon));
            
            if (rotaAtual) {
                mapa.removeControl(rotaAtual);
            }
            
            rotaAtual = L.Routing.control({
                waypoints: [minhaLocalizacao, destinoLatLng],
                lineOptions: {
                    styles: [{ color: '#2196F3', weight: 6 }]
                },
                createMarker: function() { return null; },
                show: false
            }).addTo(mapa);
            
            mapa.flyToBounds(L.latLngBounds([minhaLocalizacao, destinoLatLng]), {
                padding: [50, 50]
            });
            
            console.log("✅ Rota criada");
        })
        .catch(error => {
            console.log("Erro na busca:", error);
            alert('Erro ao buscar local');
        });
}

// ===== RÁDIO PX =====
let gravador = null;
let pedacosAudio = [];
const botaoPX = document.getElementById('btn-px');

botaoPX.addEventListener('mousedown', iniciarGravacao);
botaoPX.addEventListener('mouseup', pararGravacao);
botaoPX.addEventListener('mouseleave', pararGravacao);
botaoPX.addEventListener('touchstart', function(e) {
    e.preventDefault();
    iniciarGravacao();
});
botaoPX.addEventListener('touchend', function(e) {
    e.preventDefault();
    pararGravacao();
});

async function iniciarGravacao() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        gravador = new MediaRecorder(stream);
        pedacosAudio = [];
        
        gravador.ondataavailable = function(e) {
            if (e.data.size > 0) {
                pedacosAudio.push(e.data);
            }
        };
        
        gravador.onstop = function() {
            if (pedacosAudio.length > 0) {
                const audioBlob = new Blob(pedacosAudio, { type: 'audio/webm' });
                const reader = new FileReader();
                
                reader.onloadend = function() {
                    try {
                        db.ref('radio').push({
                            audio: reader.result,
                            usuario: usuario,
                            veiculo: tipoVeiculoUsuario,
                            timestamp: Date.now()
                        });
                        console.log("✅ Áudio enviado");
                    } catch(e) {
                        console.log("Erro ao enviar áudio:", e);
                    }
                };
                
                reader.readAsDataURL(audioBlob);
            }
            
            stream.getTracks().forEach(track => track.stop());
            pedacosAudio = [];
        };
        
        gravador.start();
        botaoPX.classList.add('ativo');
        console.log("🎤 Gravando...");
        
    } catch(e) {
        console.log("Erro microfone:", e);
        alert('Permita acesso ao microfone');
    }
}

function pararGravacao() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        botaoPX.classList.remove('ativo');
        console.log("⏹️ Gravação parada");
    }
}

// Ouvir rádio
try {
    db.ref('radio').limitToLast(1).on('child_added', function(snap) {
        const dados = snap.val();
        if (dados && dados.usuario !== usuario && !mute) {
            if (Date.now() - dados.timestamp < 5000) {
                new Audio(dados.audio).play().catch(e => {
                    console.log("Erro ao reproduzir:", e);
                });
            }
        }
    });
} catch(e) {
    console.log("Erro ao ouvir rádio:", e);
}

// ===== CHAT =====
function toggleChat() {
    const chat = document.getElementById('chatContainer');
    chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
    
    if (chat.style.display === 'flex') {
        carregarMensagens();
    }
}

function enviarMensagem() {
    const input = document.getElementById('chatInput');
    const texto = input.value.trim();
    
    if (!texto) return;
    
    try {
        db.ref('chat').push({
            usuario: usuario,
            veiculo: tipoVeiculoUsuario,
            texto: texto,
            timestamp: Date.now()
        });
        
        input.value = '';
        console.log("✅ Mensagem enviada");
    } catch(e) {
        console.log("Erro ao enviar mensagem:", e);
    }
}

function carregarMensagens() {
    try {
        db.ref('chat').limitToLast(50).on('value', function(snap) {
            const mensagens = snap.val();
            if (!mensagens) return;
            
            const container = document.getElementById('chatMensagens');
            container.innerHTML = '';
            
            Object.values(mensagens).reverse().forEach(msg => {
                const div = document.createElement('div');
                div.className = 'mensagem' + (msg.usuario === usuario ? ' minha' : '');
                div.innerHTML = `
                    <small><b>${msg.usuario}</b> ${msg.veiculo ? '🚗' : ''}</small><br>
                    ${msg.texto}<br>
                    <small style="font-size:9px;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
                `;
                container.appendChild(div);
            });
            
            container.scrollTop = container.scrollHeight;
        });
    } catch(e) {
        console.log("Erro ao carregar mensagens:", e);
    }
}

// ===== ALERTAS =====
function carregarAlertas() {
    const alertasFixos = [
        { tipo: 'ACIDENTE', local: 'km 120', cor: '#e53935', lat: -25.4284, lng: -49.2733 },
        { tipo: 'OBRAS', local: 'km 125', cor: '#ff9800', lat: -25.4384, lng: -49.2833 },
        { tipo: 'CONGESTIONAMENTO', local: 'km 115', cor: '#f44336', lat: -25.4184, lng: -49.2633 }
    ];
    
    setTimeout(function() {
        if (!mapa) return;
        
        alertasFixos.forEach(alerta => {
            L.marker([alerta.lat, alerta.lng], {
                icon: L.divIcon({
                    html: `<div style="background:${alerta.cor}; color:white; padding:5px 10px; border-radius:20px; border:2px solid white; font-size:12px; white-space:nowrap;">
                        ⚠️ ${alerta.tipo}
                    </div>`,
                    iconSize: [100, 30]
                })
            }).addTo(mapa);
        });
        
        console.log("✅ Alertas carregados");
    }, 2000);
}

// ===== FUNÇÕES =====
function toggleModoNoturno() {
    modoNoturno = !modoNoturno;
    const mapDiv = document.getElementById('map');
    if (modoNoturno) {
        mapDiv.classList.add('mapa-noturno');
        document.getElementById('btn-luz').innerHTML = '💡';
    } else {
        mapDiv.classList.remove('mapa-noturno');
        document.getElementById('btn-luz').innerHTML = '💡';
    }
}

function toggleMudo() {
    mute = !mute;
    document.getElementById('btn-mute').innerHTML = mute ? '🔇' : '🔊';
}

function recentralizar() {
    seguirLocalizacao = true;
    document.getElementById('btn-rec').style.display = 'none';
    if (minhaLocalizacao) {
        mapa.flyTo(minhaLocalizacao, 17);
    }
}

// Enter na busca
document.getElementById('buscaDestino').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        buscarRota();
    }
});

// Enter no chat
document.getElementById('chatInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        enviarMensagem();
    }
});

console.log("🚀 Aplicativo iniciado");
</script>
</body>
</html>
