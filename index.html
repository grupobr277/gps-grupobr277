<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS BR-277</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.menu{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
z-index:1000;
}

.menu button{
display:block;
width:180px;
margin:5px 0;
padding:8px;
font-size:14px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="menu">

<b>Registrar ocorrência</b>

<button onclick="registrar('🚨 Acidente')">🚨 Acidente</button>
<button onclick="registrar('🚧 Obra')">🚧 Obra</button>
<button onclick="registrar('🚓 Polícia')">🚓 Polícia</button>
<button onclick="registrar('🐄 Animal na pista')">🐄 Animal</button>
<button onclick="registrar('🌧️ Pista escorregadia')">🌧️ Perigo</button>

</div>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCjJLUgRZowkeTmpua6-uXhzOM5hqn6chI",
authDomain: "gps-br277.firebaseapp.com",
databaseURL: "https://gps-br277-default-rtdb.firebaseio.com",
projectId: "gps-br277",
storageBucket: "gps-br277.firebasestorage.app",
messagingSenderId: "459366791706",
appId: "1:459366791706:web:a8771a8981acf5d3c8afa3",
measurementId: "G-GQED5N9WM8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

var map = L.map('map').setView([-25.42,-49.27],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var minhaPosicao;

navigator.geolocation.watchPosition(function(pos){

var lat = pos.coords.latitude;
var lng = pos.coords.longitude;

minhaPosicao=[lat,lng];

map.setView([lat,lng],13);

L.marker([lat,lng]).addTo(map)
.bindPopup("Você está aqui")
.openPopup();

});

window.registrar=function(tipo){

if(!minhaPosicao){
alert("Aguardando GPS");
return;
}

push(ref(db,"ocorrencias"),{

tipo:tipo,
lat:minhaPosicao[0],
lng:minhaPosicao[1],
data:Date.now()

});

}

onChildAdded(ref(db,"ocorrencias"),function(snapshot){

var d=snapshot.val();

L.marker([d.lat,d.lng]).addTo(map)
.bindPopup(d.tipo);

});

</script>

</body>
</html>
