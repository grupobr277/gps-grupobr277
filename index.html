<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL V23 PX-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; --radio-gold: #ffd700; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* LUPA CENTRALIZADA */
        .leaflet-control-geocoder { top: 10px !important; left: 50% !important; transform: translateX(-50%); width: 80% !important; max-width: 400px; z-index: 3000; border: 2px solid var(--ws-green) !important; border-radius: 20px !important; }

        /* 10 ÍCONES FIXOS */
        .painel-alertas { position: absolute; top: 70px; left: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 95px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; background: #1a1a1a; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #333; }

        /* BOTÃO RÁDIO PX */
        #btn-px { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: #333; border: 4px solid var(--radio-gold); border-radius: 50%; z-index: 5001; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--radio-gold); box-shadow: 0 0 20px rgba(0,0,0,0.5); touch-action: none; }
        #btn-px:active { background: #b00020; transform: translateX(-50%) scale(0.9); }

        /* CHAT INTERNO DOS ÍCONES (ESTILO WHATSAPP) */
        .pop-whats { width: 260px; font-family: sans-serif; }
        .pop-msg-box { max-height: 180px; overflow-y: auto; background: #e5ddd5; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 5px; margin: 10px 0; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .balao-pop { padding: 8px; border-radius: 8px; font-size: 12px; max-width: 85%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        /* PULSANTE E RECENTRALIZAR */
        #btn-rec { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 4001; background: white; border: 2px solid var(--ws-green); border-radius: 25px; padding: 8px 15px; font-weight: bold; color: var(--ws-green); display: none; }
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }

        /* BOTÕES FLUTUANTES */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; touch-action: none; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="btn-rec" onclick="recentralizar()">🧭 RECENTRALIZAR</div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-px">🎤</div>
<div id="btn-luz" class="f-btn" style="width:50px;height:50px;right:20px;top:100px;background:#ffcc00">💡</div>
<div id="chat-principal" class="f-btn" style="width:60px;height:60px;right:20px;bottom:120px;background:#25d366;font-size:25px;color:white">💬</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
const googleTraffic = L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

let user = { n: "Danilo", id: "u_danilo" };
let meuLatLng, meuMarker, follow = true, rotaControle;

// RÁDIO PX (Efeito de Áudio)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playPxSound() {
    const osc = audioCtx.createOscillator();
    const noise = audioCtx.createBufferSource();
    // Simulação rápida de ruído de rádio
    osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

document.getElementById('btn-px').addEventListener('touchstart', () => { playPxSound(); console.log("Transmitindo..."); });
document.getElementById('btn-px').addEventListener('touchend', () => { playPxSound(); console.log("Câmbio desligo."); });

// GPS E ROTA AZUL COM RECALCULO
const geocoder = L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Destino (ex: Curitiba)..." }).on('markgeocode', function(e) {
    if(rotaControle) map.removeControl(rotaControle);
    rotaControle = L.Routing.control({
        waypoints: [meuLatLng, e.geocode.center],
        routeWhileDragging: true,
        autoRoute: true,
        lineOptions: { styles: [{ color: '#007aff', weight: 8, opacity: 0.8 }] },
        createMarker: () => null
    }).addTo(map);
}).addTo(map);

navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;">🚗</div>`, className: '', iconSize:[40,40] }) }).addTo(map);
        map.setView(meuLatLng, 17);
    } else { meuMarker.setLatLng(meuLatLng); }
    if(follow) map.panTo(meuLatLng);
    if(rotaControle) rotaControle.spliceWaypoints(0, 1, meuLatLng); // Apaga a linha azul conforme anda
});

map.on('dragstart', () => { follow = false; document.getElementById('btn-rec').style.display = 'block'; });
function recentralizar() { follow = true; document.getElementById('btn-rec').style.display = 'none'; map.flyTo(meuLatLng, 17); }

// MOVER BOTÕES FLUTUANTES
function fazerMovel(id) {
    const el = document.getElementById(id); let sX, sY;
    el.addEventListener('touchstart', e => { sX = e.touches[0].clientX - el.offsetLeft; sY = e.touches[0].clientY - el.offsetTop; });
    el.addEventListener('touchmove', e => {
        el.style.left = (e.touches[0].clientX - sX) + 'px'; el.style.top = (e.touches[0].clientY - sY) + 'px';
        el.style.right = 'auto'; el.style.bottom = 'auto';
    });
}
fazerMovel('btn-luz'); fazerMovel('chat-principal');
document.getElementById('btn-luz').onclick = () => document.getElementById('map').classList.toggle('map-dark');

// ALERTAS COM CHAT WHATSAPP INTERNO
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, u: user.n, t: Date.now() });
}

db.ref("alertas").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== meuMarker) map.removeLayer(l); });
    snap.forEach(s => {
        const a = s.val();
        const marker = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px;filter:drop-shadow(2px 2px 2px #000)">${a.emoji}</div>`, className:'' }) }).addTo(map);
        
        marker.bindPopup(`
            <div class="pop-whats">
                <div style="background:var(--ws-green);color:white;padding:5px;border-radius:5px 5px 0 0"><b>${a.tipo}</b></div>
                <div id="box-${s.key}" class="pop-msg-box"></div>
                <div style="display:flex;gap:5px;">
                    <input id="in-${s.key}" style="flex:1;border-radius:15px;padding:5px;border:1px solid #ccc" placeholder="Responder...">
                    <button onclick="enviarMsgAlerta('${s.key}')" style="background:var(--ws-green);color:white;border:none;border-radius:50%;width:30px;height:30px">➤</button>
                </div>
            </div>`);

        marker.on('click', () => {
            db.ref(`alertas/${s.key}/msgs`).on('value', ms => {
                const b = document.getElementById(`box-${s.key}`);
                if(b) {
                    b.innerHTML = "";
                    ms.forEach(m => {
                        const d = m.val(); const eu = d.u === user.n;
                        b.innerHTML += `<div class="balao-pop" style="align-self:${eu?'flex-end':'flex-start'};background:${eu? 'var(--ws-light)':'white'}">
                            <b>${d.u}:</b> ${d.m} 
                            ${eu ? `<span onclick="db.ref('alertas/${s.key}/msgs/${m.key}').remove()" style="color:red;margin-left:5px">✕</span>` : ''}
                        </div>`;
                    });
                    b.scrollTop = b.scrollHeight;
                }
            });
        });
    });
});

function enviarMsgAlerta(id) {
    const i = document.getElementById("in-"+id); if(!i.value) return;
    db.ref(`alertas/${id}/msgs`).push({ u: user.n, m: i.value }); i.value = "";
}

</script>
</body>
</html>
