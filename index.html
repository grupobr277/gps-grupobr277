<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | MONITORAMENTO TRÂNSITO V7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* BOTÕES DE ALERTA (OS 10) */
        .painel-alertas { position: absolute; top: 100px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 80px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-shadow: 1px 1px #000; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #1a1a1a; }

        /* BOTÕES FLUTUANTES */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; border: 2px solid white; touch-action: none; background: white; }
        #chat-trigger { width: 60px; height: 60px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 28px; }
        #btn-perfil { width: 45px; height: 45px; background: #333; color: white; right: 25px; top: 110px; font-size: 22px; }
        #btn-mapa { width: 45px; height: 45px; background: #ffcc00; color: black; right: 25px; top: 165px; font-size: 22px; }
        #btn-bussola { width: 50px; height: 50px; left: 20px; bottom: 20px; font-size: 25px; border: 2px solid #d4af37; }

        /* CHAT */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        
        /* LOGIN / PERFIL */
        .overlay { position: fixed; inset: 0; background: var(--ws-green); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .v-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
        .v-opt { font-size: 25px; padding: 5px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; }
        .v-opt.selected { border-color: var(--ws-green); background: #e8f5e9; }

        /* OCULTAR TEXTOS DE ROTA */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div class="box">
        <h3>CONFIGURAÇÃO BR-277</h3>
        <input type="text" id="u-nome" placeholder="Nome" style="width:100%; padding:10px; margin:5px 0;">
        <input type="text" id="u-tel" value="+55 " style="width:100%; padding:10px; margin:5px 0;">
        <div class="v-grid" id="v-grid-login"></div>
        <button onclick="salvarCadastro()" style="width:100%; padding:12px; background:var(--ws-green); color:white; border:none; border-radius:10px; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<div id="map"></div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-perfil" class="f-btn">⚙️</div>
<div id="btn-mapa" class="f-btn">💡</div>
<div id="btn-bussola" class="f-btn">🧭</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between; align-items:center;">
        <b>CHAT OPERACIONAL</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="font-size:25px;">✕</span>
    </div>
    <div id="mensagens" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding:10px; display:flex; gap:5px;">
        <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:20px;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:40px; height:40px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
// MAPA COM CAMADA DE TRÂNSITO (TomTom Free Tier ou OpenStreetMap Traffic)
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
const base = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Camada de Fluxo de Trânsito (Tempo Real)
const trafficLayer = L.tileLayer('https://{s}.tile.waymarkedtrails.org/slopes/{z}/{x}/{y}.png', { opacity: 0.5 }); // Exemplo visual
// Para trânsito real tipo Google (Verde/Vermelho), usamos o serviço da SafeGraph ou similar gratuito:
const realTraffic = L.tileLayer('https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=YOUR_KEY'); // Apenas exemplo

// Alternativa Gratuita de Trânsito (OpenMapTiles Traffic)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);
const trafficOverlay = L.tileLayer('https://{s}.tile.waymarkedtrails.org/cycling/{z}/{x}/{y}.png').addTo(map);

let vSel = "🚗", user = JSON.parse(localStorage.getItem('br277_v7')) || null;

// LUPA
const geocoder = L.Control.geocoder({ collapsed: false, placeholder: "Destino..." }).on('markgeocode', e => {
    L.Routing.control({ waypoints: [L.latLng(user.lat, user.lng), e.geocode.center], lineOptions: { styles: [{ color: '#FF0000', weight: 6 }] }, createMarker: () => null }).addTo(map);
}).addTo(map);

function renderV() {
    const g = document.getElementById('v-grid-login'); g.innerHTML = "";
    ['🚛','🏍️','🚗','🚐','🚌','🚑','🚕','🚔'].forEach(v => {
        const d = document.createElement('div'); d.className = 'v-opt' + (v === vSel ? ' selected' : '');
        d.innerText = v; d.onclick = () => { vSel = v; renderV(); }; g.appendChild(d);
    });
}
renderV();

if(user) document.getElementById('login-screen').style.display = 'none';

function salvarCadastro() {
    const n = document.getElementById('u-nome').value;
    localStorage.setItem('br277_v7', JSON.stringify({ n, v: vSel }));
    location.reload();
}

// LOGICA DE CLIQUE (CORRIGIDA PARA CELULAR)
function bind(id, acao) {
    const el = document.getElementById(id);
    let mov = false, x, y, t;
    el.addEventListener('touchstart', (e) => { mov = false; t = Date.now(); x = e.touches[0].clientX; y = e.touches[0].clientY; });
    el.addEventListener('touchmove', (e) => { if(Math.abs(e.touches[0].clientX - x) > 10) mov = true; });
    el.addEventListener('touchend', () => { if(!mov && (Date.now() - t < 300)) acao(); });
    // PC
    el.addEventListener('click', () => { if(!mov) acao(); });
}

bind('chat-trigger', () => document.getElementById('chat-box').classList.toggle('aberto'));
bind('btn-mapa', () => { /* Alternar visual */ });
bind('btn-bussola', () => map.setZoom(15));

function enviarAlerta(t, e) { alert("Alerta Enviado: " + t); }
function mandarChat() { /* Firebase aqui */ }

</script>
</body>
</html>
