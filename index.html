<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | OPERACIONAL ELITE V18</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; --ws-teal: #128c7e; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* TELA DE LOGIN/BOAS-VINDAS */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 94, 84, 0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        #login-screen input { padding: 15px; border-radius: 30px; border: none; width: 80%; max-width: 300px; margin: 15px 0; font-size: 16px; text-align: center; }
        #login-screen button { padding: 12px 40px; border-radius: 30px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer; }
        .aviso-gps { font-size: 11px; margin-top: 20px; color: #dcf8c6; opacity: 0.8; }

        /* INTERFACE E ALERTAS */
        .painel-alertas { position: absolute; top: 70px; left: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 4px; }
        .btn-a { border: 2px solid #d4af37; padding: 6px; border-radius: 8px; width: 92px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; font-size: 10px; background: #1a1a1a; }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #333; }

        /* CARRO E BOTÕES */
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.4); border: 2px solid white; position: absolute; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(0, 122, 255, 0); } }
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; background: white; }
        #chat-trigger { width: 65px; height: 65px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 30px; }
        #btn-luz { width: 45px; height: 45px; background: #ffcc00; right: 25px; top: 15px; font-size: 20px; }
        #btn-bussola { width: 50px; height: 50px; left: 20px; bottom: 20px; font-size: 25px; border: 2px solid #d4af37; }

        /* CHAT WHATSAPP PRO */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.3s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .balao { padding: 10px; border-radius: 12px; max-width: 85%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); font-size: 14px; }
        .balao-eu { background: var(--ws-light); align-self: flex-end; border-top-right-radius: 2px; }
        .balao-outro { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        .reply-box { font-size: 11px; background: rgba(0,0,0,0.05); padding: 5px; border-left: 3px solid var(--ws-green); margin-bottom: 5px; border-radius: 4px; }
        
        /* POPUP ALERTAS */
        .popup-pro { width: 220px; font-size: 12px; }
        .popup-chat-list { max-height: 100px; overflow-y: auto; background: #fdfdfd; padding: 5px; border-radius: 5px; margin: 5px 0; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="margin-bottom:0;">GRUPO BR-277</h2>
    <p>Monitoramento Operacional em Tempo Real</p>
    <input type="text" id="user-name" placeholder="Seu Nome ou Viatura">
    <button onclick="fazerLogin()">ACESSAR SISTEMA</button>
    <p class="aviso-gps">🛡️ TECNOLOGIA DE PONTA: Geolocalização ativa.<br>Sua identidade está vinculada à sua posição GPS.</p>
</div>

<div id="map"></div>

<div class="painel-alertas">
    <div class="btn-a bg-r" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a bg-o" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Buraco', '🕳️')">🕳️ BURACO</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Neblina', '🌫️')">🌫️ NEBLINA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Queda', '⛰️')">⛰️ QUEDA</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Pane', '🛠️')">🛠️ PANE</div>
    <div class="btn-a bg-b" onclick="enviarAlerta('Carga', '📦')">📦 CARGA</div>
</div>

<div id="btn-luz" class="f-btn">💡</div>
<div id="btn-bussola" class="f-btn">🧭</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; display:flex; justify-content:space-between; align-items:center;">
        <b>BR-277 WHATSAPP</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:25px;">✕</span>
    </div>
    <div id="mensagens"></div>
    <div id="reply-preview" style="display:none; padding:8px; background:#cfd8dc; border-left:4px solid var(--ws-green); font-size:11px;">
        <span id="reply-txt"></span> <span onclick="cancelarRep()" style="float:right">✕</span>
    </div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="chat-input" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:20px; border:none;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border-radius:50%; width:45px; height:45px; border:none;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);
L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

let user = { n: "", id: "", c: "#" + Math.floor(Math.random()*16777215).toString(16) };
let meuLatLng, meuMarker, replyData = null;

function fazerLogin() {
    const nome = document.getElementById('user-name').value;
    if(nome.length < 3) return alert("Por favor, digite seu nome.");
    user.n = nome; user.id = "u_" + Date.now();
    document.getElementById('login-screen').style.display = 'none';
}

// LUZ NOTURNA
document.getElementById('btn-luz').onclick = () => document.getElementById('map').classList.toggle('map-dark');

// BÚSSOLA E GPS
document.getElementById('btn-bussola').onclick = () => { if(meuLatLng) map.flyTo(meuLatLng, 17); };
navigator.geolocation.watchPosition(pos => {
    meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    const html = `<div class="pulse-loc" style="width:40px;height:40px;left:-5px;top:-5px;"></div><div style="font-size:35px;filter:drop-shadow(2px 2px 2px #000);">🚗</div>`;
    if(!meuMarker) { meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html, className: '', iconSize:[40,40] }) }).addTo(map); map.setView(meuLatLng, 16); }
    else { meuMarker.setLatLng(meuLatLng); }
});

// CHAT WHATSAPP
document.getElementById('chat-trigger').onclick = () => document.getElementById('chat-box').classList.toggle('aberto');

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: user.n, uid: user.id, m: i.value, c: user.c, t: Date.now(), rep: replyData });
    i.value = ""; cancelarRep();
}

function prepararRep(u, m) {
    replyData = { u, m };
    document.getElementById('reply-preview').style.display = 'block';
    document.getElementById('reply-txt').innerText = u + ": " + m;
}
function cancelarRep() { replyData = null; document.getElementById('reply-preview').style.display = 'none'; }

db.ref("chat").limitToLast(40).on("value", snap => {
    const box = document.getElementById('mensagens'); box.innerHTML = "";
    snap.forEach(s => {
        const d = s.val(); const eu = d.uid === user.id;
        box.innerHTML += `
            <div class="balao ${eu?'balao-eu':'balao-outro'}" onclick="prepararRep('${d.u}', '${d.m}')">
                ${d.rep ? `<div class="reply-box"><b>${d.rep.u}</b>: ${d.rep.m}</div>` : ''}
                <b style="color:${d.c}; font-size:11px;">${d.u}</b>
                ${eu ? `<span onclick="db.ref('chat/${s.key}').remove()" style="color:red; float:right; margin-left:10px;">✕</span>` : ''}
                <br>${d.m}
            </div>`;
    });
    box.scrollTop = box.scrollHeight;
});

// ALERTAS
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, u: user.n, t: Date.now() });
}

db.ref("alertas").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== meuMarker) map.removeLayer(l); });
    snap.forEach(s => {
        const a = s.val();
        const m = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: `<div style="font-size:35px; filter: drop-shadow(2px 2px 2px #000);">${a.emoji}</div>`, className:'' }), zIndexOffset: 1000 }).addTo(map);
        m.bindPopup(`
            <div class="popup-pro">
                <b>${a.tipo}</b> (Viatura: ${a.u})
                <div id="pop-${s.key}" class="popup-chat-list"></div>
                <input id="in-${s.key}" style="width:70%"><button onclick="addPopMsg('${s.key}')">➤</button>
            </div>`);
        m.on('click', () => {
            db.ref(`alertas/${s.key}/msgs`).on('value', ms => {
                const b = document.getElementById(`pop-${s.key}`);
                if(b) { b.innerHTML = ""; ms.forEach(msg => b.innerHTML += `<p style="margin:2px;"><b>${msg.val().u}:</b> ${msg.val().m}</p>`); }
            });
        });
    });
});

function addPopMsg(id) {
    const i = document.getElementById("in-"+id); if(!i.value) return;
    db.ref(`alertas/${id}/msgs`).push({ u: user.n, m: i.value }); i.value = "";
}
</script>
</body>
</html>
