<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTE - 15 Alertas no Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            background: #111;
            color: #ffd700;
            text-align: center;
            padding: 10px;
            font-size: 16px;
            border-bottom: 2px solid #00aaff;
        }
        .map-container {
            flex: 1;
            position: relative;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .alert-panel {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0,0,0,0.85);
            border-radius: 60px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            border: 1px solid #00aaff;
        }
        .alert-mini {
            background: #1f1f40;
            border-radius: 40px;
            padding: 6px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 18px;
            transition: 0.1s;
            min-width: 55px;
        }
        .alert-mini:hover {
            transform: scale(1.05);
            background: #2a2a60;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #00aaff;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <h1>📍 TESTE: 15 Alertas no Mapa (Clique no ícone)</h1>
    <div class="map-container">
        <div id="map"></div>
        <div class="alert-panel" id="alertPanel"></div>
    </div>

    <script>
        // ==================== 15 ALERTAS ====================
        const alertTypes = [
            { name: 'ACIDENTE', emoji: '💥', color: '#e53935', lat: -25.4284, lng: -49.2733 },
            { name: 'OBRAS', emoji: '🚧', color: '#ff9800', lat: -25.4384, lng: -49.2833 },
            { name: 'PANE MECÂNICA', emoji: '🔧', color: '#795548', lat: -25.4184, lng: -49.2633 },
            { name: 'ANIMAL NA PISTA', emoji: '🐂', color: '#9c27b0', lat: -25.4484, lng: -49.2933 },
            { name: 'VEÍCULO ENGUIÇADO', emoji: '🚗💨', color: '#ff5722', lat: -25.4084, lng: -49.2533 },
            { name: 'BARREIRA', emoji: '⛰️', color: '#8b4513', lat: -25.4584, lng: -49.3033 },
            { name: 'NEBLINA', emoji: '🌫️', color: '#00acc1', lat: -25.3984, lng: -49.2433 },
            { name: 'CONGESTIONAMENTO', emoji: '🔴', color: '#f44336', lat: -25.4684, lng: -49.3133 },
            { name: 'ALAGAMENTO', emoji: '💧', color: '#2196f3', lat: -25.3884, lng: -49.2333 },
            { name: 'BLOQUEIO TOTAL', emoji: '⛔', color: '#b71c1c', lat: -25.4784, lng: -49.3233 },
            { name: 'PERIGO', emoji: '⚠️', color: '#ff5722', lat: -25.3784, lng: -49.2233 },
            { name: 'DESVIO', emoji: '🔄', color: '#3f51b5', lat: -25.4884, lng: -49.3333 },
            { name: 'CARGA PERIGOSA', emoji: '📦', color: '#8bc34a', lat: -25.3684, lng: -49.2133 },
            { name: 'GRANIZO', emoji: '🧊', color: '#00bcd4', lat: -25.4984, lng: -49.3433 },
            { name: 'MANIFESTAÇÃO', emoji: '📢', color: '#ff4081', lat: -25.3584, lng: -49.2033 }
        ];

        let map;
        let markers = [];

        function showToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function initMap() {
            map = L.map('map').setView([-25.4284, -49.2733], 12);
            L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

            // Adicionar marcadores de alerta
            alertTypes.forEach(alert => {
                const iconHtml = `
                    <div style="
                        background: ${alert.color};
                        width: 42px;
                        height: 42px;
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 24px;
                        box-shadow: 0 0 10px ${alert.color};
                        animation: pulse 1.5s infinite;
                        cursor: pointer;
                    ">
                        ${alert.emoji}
                    </div>
                `;

                const marker = L.marker([alert.lat, alert.lng], {
                    icon: L.divIcon({
                        html: iconHtml,
                        iconSize: [42, 42],
                        iconAnchor: [21, 21],
                        className: ''
                    })
                }).addTo(map);

                marker.bindPopup(`
                    <div style="background: #075E54; color: white; padding: 10px; border-radius: 12px;">
                        <strong>${alert.emoji} ${alert.name}</strong><br>
                        <small>Clique para confirmar</small>
                    </div>
                `);

                marker.on('click', () => {
                    showToast(`👍 ${alert.name} confirmado!`);
                });

                markers.push(marker);
            });

            // Adicionar animação CSS
            const style = document.createElement('style');
            style.textContent = `
                @keyframes pulse {
                    0% { transform: scale(1); opacity: 1; }
                    50% { transform: scale(1.2); opacity: 0.9; }
                    100% { transform: scale(1); opacity: 1; }
                }
            `;
            document.head.appendChild(style);

            console.log(`✅ ${markers.length} alertas carregados no mapa!`);
        }

        function buildAlertPanel() {
            const panel = document.getElementById('alertPanel');
            panel.innerHTML = '';
            
            alertTypes.forEach(alert => {
                const btn = document.createElement('div');
                btn.className = 'alert-mini';
                btn.style.borderTop = `3px solid ${alert.color}`;
                btn.innerHTML = `${alert.emoji} ${alert.name.substring(0, 8)}`;
                btn.onclick = () => {
                    // Centralizar no alerta
                    map.setView([alert.lat, alert.lng], 14);
                    showToast(`📍 Centralizado em: ${alert.name}`);
                };
                panel.appendChild(btn);
            });
        }

        initMap();
        buildAlertPanel();
    </script>
</body>
</html>
