<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | MOBILE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* MODAL DE BOAS-VINDAS */
        .welcome-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .welcome-content {
            background: #111;
            padding: 25px 20px;
            border-radius: 30px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        
        .welcome-content h2 {
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .welcome-content input {
            width: 100%;
            padding: 12px 15px;
            background: #222;
            border: 2px solid #ffd700;
            border-radius: 30px;
            margin: 8px 0;
            font-size: 14px;
            color: white;
        }
        
        /* PERMISSÕES */
        .permissoes-container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ffd700;
        }
        
        .permissao-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            margin: 8px 0;
            font-size: 13px;
        }
        
        .permissao-item i {
            color: #ffd700;
            width: 20px;
        }
        
        .permissao-status {
            margin-left: auto;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            background: #333;
        }
        
        .permissao-status.checked { color: #4caf50; }
        .permissao-status.unchecked { color: #e53935; }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 12px;
            margin: 12px 0;
        }
        
        /* HEADER SUPERIOR */
        .header-mobile {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .contador-mobile {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: #ffd700;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #ffd700;
        }
        
        .logo-mobile {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: #ffd700;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 9px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #ffd700;
        }
        
        /* LUPA MOBILE */
        .lupa-mobile {
            position: fixed;
            top: 10px;
            left: 160px;
            right: 10px;
            width: auto;
            max-width: 200px;
            z-index: 9000;
            background: white;
            border-radius: 30px;
            border: 2px solid #ffd700;
            display: flex;
            overflow: hidden;
        }
        
        .lupa-mobile input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            font-size: 12px;
            outline: none;
        }
        
        .lupa-mobile button {
            background: #075e54;
            color: white;
            border: none;
            width: 40px;
            cursor: pointer;
        }
        
        /* BARRA INFERIOR MOBILE */
        .barra-mobile {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9500;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 40px;
            border: 2px solid #ffd700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        .btn-barra {
            width: 40px;
            height: 40px;
            border-radius: 30px;
            background: #222;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffd700;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .btn-barra:hover { transform: scale(1.05); }
        
        .btn-barra.ativo { border-color: #00BFFF; background: #00BFFF22; }
        .btn-barra.mudo { border-color: #e53935; }
        
        /* MICROFONE REDONDO DESTAQUE */
        .btn-microfone {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #333;
            border: 3px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffd700;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            transition: all 0.2s;
        }
        
        .btn-microfone.ativo {
            background: #e53935;
            color: white;
            border-color: white;
            animation: pulseBotao 1.5s infinite;
        }
        
        @keyframes pulseBotao {
            0% { box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(229,57,53,0); }
            100% { box-shadow: 0 0 0 0 rgba(229,57,53,0); }
        }
        
        /* REPORTE MOBILE */
        .reporte-mobile {
            position: fixed;
            bottom: 90px;
            left: 10px;
            z-index: 9300;
        }
        
        .reporte-btn-mobile {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #ffd700;
            border-radius: 30px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #ffd700;
        }
        
        .reporte-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
            animation: ledPulse 1.5s infinite;
        }
        
        @keyframes ledPulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* PAINEL DE ALERTAS */
        .alertas-panel-mobile {
            position: fixed;
            bottom: 140px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 12px;
            display: none;
            width: 200px;
            z-index: 9400;
        }
        
        .alertas-panel-mobile.visivel { display: block; }
        
        .alertas-grid-mobile {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .alerta-item-mobile {
            aspect-ratio: 1/1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: white;
            font-weight: 600;
            text-shadow: 0 1px 2px black;
        }
        
        .alerta-item-mobile span { font-size: 9px; margin-top: 2px; }
        
        .btn-fechar-mobile {
            width: 30px;
            height: 30px;
            background: #e53935;
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }
        
        /* LEGENDA MOBILE (tamanho reduzido) */
        .legenda-mobile {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #ffd700;
            border-radius: 30px;
            padding: 4px 12px;
            z-index: 9200;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 10px;
            font-weight: 600;
            color: white;
        }
        
        .legenda-item-mobile {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .legenda-cor-mobile {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .legenda-verde-mobile { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        .legenda-amarelo-mobile { background: #ffff00; box-shadow: 0 0 5px #ffff00; }
        .legenda-vermelho-mobile { background: #ff0000; box-shadow: 0 0 5px #ff0000; }
        
        .legenda-fechar-mobile {
            width: 18px;
            height: 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffd700;
            font-size: 11px;
        }
        
        /* RECENTRALIZAR MOBILE */
        .recentrar-mobile {
            position: fixed;
            bottom: 90px;
            right: 10px;
            z-index: 9300;
            display: none;
        }
        
        .recentrar-btn-mobile {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border: 2px solid #00BFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #00BFFF;
            font-size: 20px;
            animation: pulseBlue 2s infinite;
        }
        
        @keyframes pulseBlue {
            0% { box-shadow: 0 0 0 0 rgba(0,191,255,0.5); }
            70% { box-shadow: 0 0 0 12px rgba(0,191,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,191,255,0); }
        }
        
        /* BOTÃO ENCERRAR ROTA */
        .btn-encerrar-rota {
            position: fixed;
            top: 60px;
            right: 10px;
            background: #e53935;
            color: white;
            border: 2px solid #ffd700;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9400;
            font-size: 16px;
        }
        
        /* PAINEL DE ROTA */
        .rota-info-panel {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: none;
            align-items: center;
            gap: 20px;
            border: 2px solid #ffd700;
            z-index: 9400;
            font-size: 12px;
        }
        
        /* CHAT MOBILE */
        .chat-mobile {
            position: fixed;
            top: 5%;
            left: 2.5%;
            width: 95%;
            height: 90%;
            background: #0a0a0a;
            z-index: 99999;
            border-radius: 25px;
            display: none;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        .chat-header-mobile {
            background: #075e54;
            color: white;
            padding: 12px 15px;
            border-radius: 23px 23px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }
        
        .chat-mensagens-mobile {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #111;
        }
        
        .mensagem-wrapper-mobile {
            display: flex;
            flex-direction: column;
            margin: 6px 0;
            max-width: 80%;
        }
        
        .mensagem-wrapper-mobile.minha { align-self: flex-end; }
        .mensagem-wrapper-mobile.outra { align-self: flex-start; }
        
        .mensagem-mobile {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 13px;
        }
        
        .mensagem-mobile.minha {
            background: #075e54;
            color: white;
        }
        
        .mensagem-mobile.outra {
            background: #222;
            color: white;
            border: 1px solid #ffd700;
        }
        
        .chat-input-mobile {
            padding: 12px;
            background: #0a0a0a;
            display: flex;
            gap: 8px;
            border-top: 2px solid #ffd700;
        }
        
        .chat-input-mobile input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            background: #222;
            color: white;
            font-size: 13px;
        }
        
        .chat-input-mobile button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #ffd700;
            color: #000;
            cursor: pointer;
            font-size: 18px;
        }
        
        /* POPUP ALERTA */
        .popup-mobile {
            background: #111;
            border: 2px solid #ffd700;
            border-radius: 20px;
            overflow: hidden;
            max-width: 300px;
        }
        
        .popup-header-mobile {
            padding: 10px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ffd700;
        }
        
        .popup-imagem-mobile {
            padding: 10px;
            background: #000;
            text-align: center;
        }
        
        .popup-imagem-mobile img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 12px;
            border: 2px solid #ffd700;
        }
        
        .popup-stats-mobile {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            background: #1a1a1a;
            font-size: 11px;
        }
        
        /* INDICADORES */
        .gravando-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #e53935;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 10000;
            display: none;
            border: 2px solid #ffd700;
            font-size: 12px;
            font-weight: 600;
        }
        
        .audio-notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd700;
            color: #000;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 10000;
            display: none;
            font-size: 12px;
            font-weight: 600;
        }
        
        .confirmacao-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 2px solid #ffd700;
            border-radius: 25px;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100000;
            color: white;
            min-width: 260px;
        }
        
        .mapa-noturno { filter: invert(100%) hue-rotate(180deg) brightness(95%); }
        
        /* OCULTAR INTERFACE */
        .interface-oculta .header-mobile,
        .interface-oculta .lupa-mobile,
        .interface-oculta .barra-mobile,
        .interface-oculta .reporte-mobile,
        .interface-oculta .legenda-mobile,
        .interface-oculta .btn-encerrar-rota,
        .interface-oculta .rota-info-panel,
        .interface-oculta .gravando-indicator,
        .interface-oculta .audio-notification,
        .interface-oculta .confirmacao-popup,
        .interface-oculta .alertas-panel-mobile {
            display: none !important;
        }
        
        .interface-oculta .recentrar-mobile { display: flex !important; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- MODAL DE BOAS-VINDAS -->
<div class="welcome-modal" id="welcomeModal">
    <div class="welcome-content">
        <h2>🏁 BR-277</h2>
        <p style="color:#00BFFF; font-size:12px; margin-bottom:15px;">MOBILE EDITION</p>
        
        <input type="text" id="nomeUsuario" placeholder="Seu nome" value="Piloto">
        <input type="text" id="telefoneUsuario" placeholder="WhatsApp" value="">
        
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin:15px 0;">
            <div style="background:#222; padding:8px; border-radius:12px; cursor:pointer; border:2px solid transparent; text-align:center;" onclick="selecionarVeiculo('carro')" id="veiculo-carro">
                <div style="font-size:24px;">🚗</div>
            </div>
            <div style="background:#222; padding:8px; border-radius:12px; cursor:pointer; border:2px solid transparent; text-align:center;" onclick="selecionarVeiculo('caminhao')" id="veiculo-caminhao">
                <div style="font-size:24px;">🚛</div>
            </div>
            <div style="background:#222; padding:8px; border-radius:12px; cursor:pointer; border:2px solid transparent; text-align:center;" onclick="selecionarVeiculo('moto')" id="veiculo-moto">
                <div style="font-size:24px;">🏍️</div>
            </div>
        </div>
        
        <!-- PERMISSÕES -->
        <div class="permissoes-container">
            <div class="permissao-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Localização</span>
                <span class="permissao-status unchecked" id="statusLocalizacao">⏳</span>
            </div>
            <div class="permissao-item">
                <i class="fas fa-microphone"></i>
                <span>Microfone</span>
                <span class="permissao-status unchecked" id="statusMicrofone">⏳</span>
            </div>
        </div>
        
        <label class="checkbox-container">
            <input type="checkbox" id="aceitePrivacidade">
            <span>Aceito os termos</span>
        </label>
        
        <button onclick="solicitarPermissoes()" style="width:100%; padding:12px; background:#ffd700; border:none; border-radius:30px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px;">
            🔓 ATIVAR
        </button>
        
        <button onclick="salvarCadastro()" id="btnEntrar" disabled style="width:100%; padding:12px; background:#444; border:none; border-radius:30px; font-size:14px; cursor:not-allowed; color:#999;">
            🔒 ENTRAR
        </button>
    </div>
</div>

<!-- HEADER SUPERIOR -->
<div class="header-mobile">
    <div class="contador-mobile" id="contadorUsuarios">
        <i class="fas fa-users"></i>
        <span id="numUsuarios">0</span> online
    </div>
    <div class="logo-mobile" onclick="window.open('https://instagram.com/grupobr277', '_blank')">
        <span>BR-277</span>
        <i class="fab fa-instagram"></i>
    </div>
</div>

<!-- LUPA MOBILE -->
<div class="lupa-mobile">
    <input type="text" id="buscaDestino" placeholder="Destino...">
    <button onclick="buscarRota()"><i class="fas fa-search"></i></button>
</div>

<!-- BARRA INFERIOR MOBILE -->
<div class="barra-mobile">
    <div class="btn-barra" onclick="toggleInterface()" title="Ocultar">
        <i class="fas fa-chevron-up" id="iconeSeta"></i>
    </div>
    <div class="btn-barra" onclick="toggleChatGeral()" title="Chat">
        <i class="fas fa-comment"></i>
    </div>
    <div class="btn-microfone" id="btn-px-mobile" title="Rádio PX">🎤</div>
    <div class="btn-barra" id="btn-luz-mobile" onclick="toggleModoNoturno()" title="Modo Noturno">
        💡
    </div>
    <div class="btn-barra" id="btn-mudo-mobile" onclick="toggleMudo()" title="Mudo">
        <i class="fas fa-volume-up"></i>
    </div>
</div>

<!-- REPORTE MOBILE -->
<div class="reporte-mobile">
    <div class="reporte-btn-mobile" onclick="toggleReporteMobile()">
        <span class="reporte-led"></span>
        <span>REPORTE</span>
    </div>
    <div class="alertas-panel-mobile" id="alertasPanelMobile">
        <div class="alertas-grid-mobile" id="alertasGridMobile"></div>
        <div class="btn-fechar-mobile" onclick="toggleReporteMobile()">✕</div>
    </div>
</div>

<!-- RECENTRALIZAR MOBILE -->
<div class="recentrar-mobile" id="btnRecentrarMobile">
    <div class="recentrar-btn-mobile" onclick="recentralizar()">
        <i class="fas fa-location-arrow"></i>
    </div>
</div>

<!-- LEGENDA MOBILE (sem texto "trânsito") -->
<div class="legenda-mobile" id="legendaMobile">
    <div class="legenda-item-mobile">
        <div class="legenda-cor-mobile legenda-verde-mobile"></div>
        <span>Normal</span>
    </div>
    <div class="legenda-item-mobile">
        <div class="legenda-cor-mobile legenda-amarelo-mobile"></div>
        <span>Intenso</span>
    </div>
    <div class="legenda-item-mobile">
        <div class="legenda-cor-mobile legenda-vermelho-mobile"></div>
        <span>Lento</span>
    </div>
    <div class="legenda-fechar-mobile" onclick="fecharLegenda()">✕</div>
</div>

<!-- PAINEL DE ROTA -->
<div class="rota-info-panel" id="rotaInfoPanel">
    <div><i class="fas fa-clock"></i> <span id="rotaTempo">--</span></div>
    <div><i class="fas fa-road"></i> <span id="rotaDistancia">--</span></div>
    <div><i class="fas fa-exclamation-triangle"></i> <span id="rotaAtraso">--</span></div>
</div>

<!-- BOTÃO ENCERRAR ROTA -->
<div class="btn-encerrar-rota" id="btnEncerrarRota" onclick="encerrarRota()">✕</div>

<!-- POPUP CONFIRMAÇÃO -->
<div class="confirmacao-popup" id="confirmacaoPopup">
    <div id="confirmacaoTexto">ALERTA A 300m?</div>
    <div id="confirmacaoSubtexto">Confirme</div>
    <div style="display:flex; gap:15px;">
        <button class="btn-confirmar" onclick="confirmarAlerta()">✅ SIM</button>

<script>
// ===== CONFIGURAÇÕES =====
const SCALABLE_CONFIG = {
    POSITION_UPDATE_INTERVAL: 15000,
    TILE_SIZE: 0.05,
    VEHICLE_TIMEOUT: 30000,
    CLUSTER_MAX_ZOOM: 16,

// ===== FIREBASE =====
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== VARIÁVEIS =====
let usuario = null;
let telefone = '';
let veiculoUsuario = 'carro';
let minhaLocalizacao = null;
let meuMarcador = null;
let seguirLocalizacao = true;
let rotaAtual = null;
let mapa = null;
let mudo = false;
let ultimaAtualizacaoGPS = 0;
let zoomAtual = 13;
let alertasMapa = {};
let pulsantesAlertas = {};
let alertasConfirmados = {};
let confirmacoesStorage = JSON.parse(localStorage.getItem('br277_confirmacoes')) || {};
let ultimoAlertaExibido = {};
let popupTimeout = null;
let alertaAtual = null;
let ultimoHeading = 0;
let wakeLock = null;
let interfaceVisivel = true;
let permissoes = { localizacao: false, microfone: false };
let clusterSystem = null;
let tileSystem = null;

alertasConfirmados = { ...confirmacoesStorage };

// ===== 10 ALERTAS =====
const alertasMobile = [
    { tipo: 'acidente', nome: 'ACID', icone: '💥', cor: '#e53935', bg: 'linear-gradient(145deg, #e53935, #b71c1c)' },

    { tipo: 'pane', nome: 'PANE', icone: '🔧', cor: '#795548', bg: 'linear-gradient(145deg, #795548, #5d4037)' },
    { tipo: 'animal', nome: 'ANIM', icone: '🐂', cor: '#9c27b0', bg: 'linear-gradient(145deg, #9c27b0, #7b1fa2)' },
    { tipo: 'radar', nome: 'RADAR', icone: '📷', cor: '#607d8b', bg: 'linear-gradient(145deg, #607d8b, #455a64)' },
    { tipo: 'barreira', nome: 'BARR', icone: '⛰️', cor: '#8b4513', bg: 'linear-gradient(145deg, #8b4513, #5d3a1a)' },
    { tipo: 'neblina', nome: 'NEBL', icone: '🌫️', cor: '#00acc1', bg: 'linear-gradient(145deg, #00acc1, #0097a7)' },

// ===== FUNÇÕES DO MODAL =====
function selecionarVeiculo(tipo) {

    document.getElementById(`veiculo-${tipo}`).style.borderColor = '#ffd700';
}

async function solicitarPermissoes() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            () => { 
                permissoes.localizacao = true; 
                document.getElementById('statusLocalizacao').textContent = '✅';
                document.getElementById('statusLocalizacao').className = 'permissao-status checked';
                verificarPermissoes();
            },
            () => { 
                document.getElementById('statusLocalizacao').textContent = '❌';
                document.getElementById('statusLocalizacao').className = 'permissao-status unchecked';
            }
        );
    }
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        permissoes.microfone = true;
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('statusMicrofone').textContent = '✅';
        document.getElementById('statusMicrofone').className = 'permissao-status checked';
        verificarPermissoes();
    } catch(e) {
        document.getElementById('statusMicrofone').textContent = '❌';
        document.getElementById('statusMicrofone').className = 'permissao-status unchecked';
    }
}

function verificarPermissoes() {
    const btn = document.getElementById('btnEntrar');
    const aceite = document.getElementById('aceitePrivacidade').checked;
    if (permissoes.localizacao && permissoes.microfone && aceite) {
        btn.disabled = false;
        btn.style.background = '#ffd700';
        btn.style.color = '#000';
        btn.textContent = '🚀 ENTRAR';
    }
}

document.getElementById('aceitePrivacidade').addEventListener('change', verificarPermissoes);

function salvarCadastro() {
    const nome = document.getElementById('nomeUsuario').value.trim();
    if (!nome) { alert('Digite seu nome!'); return; }
    usuario = nome;
    telefone = document.getElementById('telefoneUsuario').value.trim();
    localStorage.setItem('br277_usuario', nome);
    localStorage.setItem('br277_telefone', telefone);
    localStorage.setItem('br277_veiculo', veiculoUsuario);
    document.getElementById('welcomeModal').style.display = 'none';
    iniciarMapa();
    iniciarGPS();
    carregarUsuarios();
    carregarAlertas();
    carregarChat();
    criarIconesAlertas();
}

// ===== MAPA =====
function iniciarMapa() {
    mapa = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);
    
    tileSystem = { adicionarVeiculo: () => {} };
    clusterSystem = { 
        clusterGroup: L.markerClusterGroup({ maxClusterRadius: 50 }),
        adicionarMarcador: (id, lat, lng, dados) => {
            const marcador = L.marker([lat, lng], {
                icon: L.divIcon({ html: `<div style="font-size:22px;">🚗</div>`, className: '', iconSize: [22,22] })
            });
            clusterSystem.clusterGroup.addLayer(marcador);
        },
        limpar: () => clusterSystem.clusterGroup.clearLayers()
    };
    mapa.addLayer(clusterSystem.clusterGroup);
    
    mapa.on('dragstart', () => { 
        seguirLocalizacao = false; 
        document.getElementById('btnRecentrarMobile').style.display = 'flex'; 
    });
}

// ===== GPS =====
function iniciarGPS() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(pos => {
        minhaLocalizacao = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (pos.coords.heading) ultimoHeading = pos.coords.heading;
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, { icon: criarIconeCarro(true, ultimoHeading) }).addTo(mapa);
            mapa.setView(minhaLocalizacao, 17);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
            meuMarcador.setIcon(criarIconeCarro(true, ultimoHeading));
        }
        
        db.ref('usuarios_ativos/' + usuario).set({
            lat: minhaLocalizacao.lat,
            lng: minhaLocalizacao.lng,
            veiculo: veiculoUsuario,
            timestamp: Date.now()
        });
        
        if (seguirLocalizacao) mapa.panTo(minhaLocalizacao);
        verificarAlertasProximos();
    }, null, { enableHighAccuracy: true });
}

function criarIconeCarro(ehMeu, direcao) {
    return L.divIcon({
        html: `<div style="font-size:28px; transform:rotate(${direcao}deg);">🚗</div>`,
        className: '', iconSize: [28,28], iconAnchor: [14,14]
    });
}

// ===== USUÁRIOS =====
function carregarUsuarios() {
    db.ref('usuarios_ativos').on('value', snap => {
        const usuarios = snap.val();
        let total = 0;
        if (usuarios) {
            total = Object.keys(usuarios).length;
            clusterSystem.clusterGroup.clearLayers();
            Object.entries(usuarios).forEach(([id, d]) => {
                if (id !== usuario) {
                    L.marker([d.lat, d.lng], {
                        icon: L.divIcon({ html: `<div style="font-size:20px;">🚗</div>`, className: '', iconSize: [20,20] })
                    }).addTo(clusterSystem.clusterGroup);
                }
            });
        }
        document.getElementById('numUsuarios').textContent = total;
    });
}

// ===== ALERTAS =====
function criarIconesAlertas() {
    const grid = document.getElementById('alertasGridMobile');
    alertasMobile.forEach(a => {
        const div = document.createElement('div');
        div.className = 'alerta-item-mobile';
        div.style.background = a.bg;
        div.innerHTML = `<div>${a.icone}</div><span>${a.nome}</span>`;
        div.onclick = () => ativarAlerta(a);
        grid.appendChild(div);
    });
}

function ativarAlerta(alerta) {
    if (!minhaLocalizacao) return;
    const id = Date.now();
    db.ref('alertas_fixos/' + id).set({
        ...alerta,
        lat: minhaLocalizacao.lat,
        lng: minhaLocalizacao.lng,
        timestamp: id,
        criador: usuario,
        confirmacoes: 0
    });
    mostrarNotificacao('✅ Alerta enviado!');
}

function carregarAlertas() {
    db.ref('alertas_fixos').on('child_added', snap => {
        const a = snap.val();
        const id = snap.key;
        alertasMapa[id] = a;
        
        const marcador = L.marker([a.lat, a.lng], {
            icon: L.divIcon({
                html: `<div style="background:${a.cor}; width:30px; height:30px; border-radius:50%; border:3px solid white; display:flex; align-items:center; justify-content:center; font-size:16px;">${a.icone}</div>`,
                className: '', iconSize: [30,30], iconAnchor: [15,15]
            })
        });
        marcador.on('click', () => abrirPopupAlerta(a, id));
        marcador.addTo(clusterSystem.clusterGroup);
        pulsantesAlertas[id] = marcador;
    });
}

function abrirPopupAlerta(alerta, id) {
    const popup = document.createElement('div');
    popup.className = 'popup-mobile';
    popup.innerHTML = `
        <div class="popup-header-mobile" style="background:${alerta.cor}">
            <span>${alerta.icone} ${alerta.nome}</span>
            <span>✅ ${alerta.confirmacoes||0}</span>
        </div>
        ${alerta.imagem ? `<div class="popup-imagem-mobile"><img src="${alerta.imagem.thumbnail}" onclick="window.open('${alerta.imagem.thumbnail}')"></div>` : ''}
        <div class="popup-stats-mobile">
            <span><i class="far fa-thumbs-up"></i> ${alerta.confirmacoes||0}</span>
            <span><i class="far fa-clock"></i> ${new Date(alerta.timestamp).toLocaleTimeString()}</span>
        </div>
        <div style="padding:8px; max-height:120px; overflow-y:auto; background:#1a1a1a;" id="chat-${id}"></div>
        <div style="display:flex; padding:8px; gap:5px; background:#000;">
            <input type="text" id="input-${id}" style="flex:1; padding:6px; border-radius:20px; border:1px solid #ffd700; background:#222; color:white; font-size:12px;">
            <button onclick="enviarMsgAlerta('${id}')" style="width:32px; height:32px; border-radius:50%; background:${alerta.cor}; border:none; color:white;">➔</button>
        </div>
    `;
    L.popup({ maxWidth: 280 }).setLatLng([alerta.lat, alerta.lng]).setContent(popup).openOn(mapa);
    
    carregarChatAlerta(id);
}

function carregarChatAlerta(id) {
    db.ref(`chats/alerta_${id}`).on('value', snap => {
        const chatDiv = document.getElementById(`chat-${id}`);
        if (!chatDiv) return;
        const msgs = snap.val();
        if (!msgs) { chatDiv.innerHTML = '<div style="text-align:center; color:#999;">...</div>'; return; }
        let html = '';
        Object.values(msgs).forEach(m => {
            html += `<div style="background:${m.usuario===usuario?'#075e54':'#333'}; margin:4px 0; padding:4px 8px; border-radius:10px; font-size:11px;">
                <b>${m.usuario}</b><br>${m.texto}<br><small>${m.hora}</small>
            </div>`;
        });
        chatDiv.innerHTML = html;
    });
}

function enviarMsgAlerta(id) {
    const input = document.getElementById(`input-${id}`);
    if (!input.value.trim()) return;
    db.ref(`chats/alerta_${id}`).push({
        usuario, texto: input.value.trim(), hora: new Date().toLocaleTimeString(), timestamp: Date.now()
    });
    input.value = '';
}

// ===== VERIFICAÇÃO DE ALERTAS PRÓXIMOS =====
function verificarAlertasProximos() {
    if (!minhaLocalizacao) return;
    Object.keys(alertasMapa).forEach(id => {
        const a = alertasMapa[id];
        if (!a || a.criador === usuario) return;
        const chave = `${usuario}_${id}`;
        if (alertasConfirmados[chave]) return;
        
        const dist = calcularDistancia(minhaLocalizacao.lat, minhaLocalizacao.lng, a.lat, a.lng);
        if (dist < 0.3) {
            alertaAtual = { id, ...a };
            document.getElementById('confirmacaoPopup').style.display = 'flex';
            setTimeout(() => document.getElementById('confirmacaoPopup').style.display = 'none', 8000);
        }
    });
}

function confirmarAlerta() {
    if (!alertaAtual) return;
    const chave = `${usuario}_${alertaAtual.id}`;
    alertasConfirmados[chave] = true;
    localStorage.setItem('br277_confirmacoes', JSON.stringify(alertasConfirmados));
    db.ref('alertas_fixos/' + alertaAtual.id + '/confirmacoes').transaction(c => (c||0)+1);
    document.getElementById('confirmacaoPopup').style.display = 'none';
    alertaAtual = null;
}

function negarAlerta() {
    alertaAtual = null;
    document.getElementById('confirmacaoPopup').style.display = 'none';
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

// ===== CHAT GERAL =====
function toggleChatGeral() {

        chatDiv.innerHTML = html;
    });
}

// ===== RÁDIO PX =====
let gravador, pedacosAudio, streamAudio, timerInterval, tempoRestante = 20;
document.getElementById('btn-px-mobile').addEventListener('click', async function() {
    if (gravador && gravador.state === 'recording') { pararGravacao(); return; }
    try {
        streamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
        gravador = new MediaRecorder(streamAudio);
        pedacosAudio = [];
        tempoRestante = 20;
        
        gravador.ondataavailable = e => e.data.size > 0 && pedacosAudio.push(e.data);
        gravador.onstop = () => {
            if (pedacosAudio.length > 0) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    db.ref('radio').push({ audio: reader.result, usuario, timestamp: Date.now() });
                    setTimeout(() => db.ref('radio').orderByChild('timestamp').endAt(Date.now()-20000).once('value', snap => snap.forEach(c => c.ref.remove())), 20000);
                };
                reader.readAsDataURL(new Blob(pedacosAudio, { type: 'audio/webm' }));
            }
            streamAudio.getTracks().forEach(t => t.stop());
            document.getElementById('gravandoIndicator').style.display = 'none';
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('btn-px-mobile').classList.remove('ativo');
        };
        
        gravador.start();
        document.getElementById('btn-px-mobile').classList.add('ativo');
        document.getElementById('gravandoIndicator').style.display = 'flex';
        const timer = document.getElementById('gravandoTimer');
        
        timerInterval = setInterval(() => {
            tempoRestante--;
            timer.textContent = tempoRestante + 's';
            if (tempoRestante <= 1) pararGravacao();
        }, 1000);
        setTimeout(() => pararGravacao(), 19500);
    } catch(e) { alert('Permita acesso ao microfone'); }
});

function pararGravacao() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        document.getElementById('btn-px-mobile').classList.remove('ativo');
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('gravandoIndicator').style.display = 'none';
    }
}

db.ref('radio').limitToLast(1).on('child_added', snap => {
    const d = snap.val();
    if (d && d.usuario !== usuario && !mudo) {
        new Audio(d.audio).play().catch(() => {});
        document.getElementById('audioNotification').style.display = 'flex';
        setTimeout(() => document.getElementById('audioNotification').style.display = 'none', 2000);
    }
});

// ===== ROTA =====
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    if (!destino || !minhaLocalizacao) return;
    
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)},Brasil&limit=1`)
        .then(r => r.json())
        .then(data => {
            if (!data.length) { alert('Não encontrado'); return; }
            const dest = L.latLng(data[0].lat, data[0].lon);
            
            L.marker(dest, { icon: L.divIcon({ html: '<div style="font-size:30px;">📍</div>', className: '', iconSize: [30,30] }) }).addTo(mapa);
            
            if (rotaAtual) mapa.removeControl(rotaAtual);
            rotaAtual = L.Routing.control({
                waypoints: [minhaLocalizacao, dest],
                lineOptions: { styles: [{ color: '#4169E1', weight: 4, opacity: 0.7 }] },
                createMarker: () => null,
                show: false
            }).addTo(mapa);
            
            mapa.flyToBounds(L.latLngBounds([minhaLocalizacao, dest]));
            document.getElementById('rotaInfoPanel').style.display = 'flex';
            document.getElementById('btnEncerrarRota').style.display = 'flex';
            
            const dist = calcularDistancia(minhaLocalizacao.lat, minhaLocalizacao.lng, dest.lat, dest.lng);
            document.getElementById('rotaTempo').textContent = Math.round(dist * 1.2) + 'min';
            document.getElementById('rotaDistancia').textContent = dist + ' km';
            document.getElementById('rotaAtraso').textContent = '+' + Math.round(dist * 0.24) + 'min';
        });
}

function encerrarRota() {
    if (rotaAtual) { mapa.removeControl(rotaAtual); rotaAtual = null; }
    document.getElementById('rotaInfoPanel').style.display = 'none';
    document.getElementById('btnEncerrarRota').style.display = 'none';
}

// ===== INICIALIZAÇÃO =====
const userSalvo = localStorage.getItem('br277_usuario');
if (userSalvo) {
    usuario = userSalvo;
    telefone = localStorage.getItem('br277_telefone') || '';
    veiculoUsuario = localStorage.getItem('br277_veiculo') || 'carro';
    alertasConfirmados = JSON.parse(localStorage.getItem('br277_confirmacoes')) || {};
    document.getElementById('welcomeModal').style.display = 'none';
    iniciarMapa();
    iniciarGPS();
    carregarUsuarios();
    carregarAlertas();
    carregarChat();
    criarIconesAlertas();
}
