<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | GPS OPERACIONAL V16</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

    <style>
        :root { --ws-green: #075e54; --ws-light: #dcf8c6; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        
        /* MODO NOTURNO INTELIGENTE */
        .map-dark { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* PAINEL ALERTAS - Z-INDEX ALTO */
        .painel-alertas { position: absolute; top: 10px; right: 10px; z-index: 2000; display: flex; flex-direction: column; gap: 5px; pointer-events: auto; }
        .btn-a { background: rgba(26,26,26,0.9); border: 2px solid #d4af37; padding: 8px; border-radius: 10px; width: 90px; color: white; font-weight: bold; font-size: 10px; cursor: pointer; text-align: center; }

        /* CARRO PULSANTE */
        .pulse-loc { border-radius: 50%; animation: pulse-blue 2s infinite; background: rgba(0, 122, 255, 0.5); border: 2px solid white; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0px rgba(0, 122, 255, 0.8); } 100% { box-shadow: 0 0 0 25px rgba(0, 122, 255, 0); } }

        /* CHAT WHATSAPP */
        #chat-box { position: fixed; left: -100%; bottom: 0; width: 100%; max-width: 400px; height: 70%; background: #e5ddd5; z-index: 5000; transition: 0.4s; display: flex; flex-direction: column; border-radius: 20px 20px 0 0; }
        #chat-box.aberto { left: 0; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .balao { padding: 12px; border-radius: 15px; max-width: 80%; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 14px; }
        .balao-eu { background: var(--ws-light); align-self: flex-end; }
        .balao-outro { background: white; align-self: flex-start; }

        /* BOTÕES */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; cursor: pointer; }
        #chat-trigger { width: 60px; height: 60px; background: #25d366; bottom: 20px; right: 20px; font-size: 30px; color: white; }
        #btn-luz { width: 45px; height: 45px; background: #ffcc00; top: 15px; left: 15px; font-size: 20px; }
        #btn-bussola { width: 50px; height: 50px; background: white; bottom: 20px; left: 20px; font-size: 25px; }
        
        /* LUPA */
        .leaflet-control-geocoder { top: 60px !important; left: 10px !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="painel-alertas">
    <div class="btn-a" onclick="enviarAlerta('Acidente', '⚠️')">⚠️ ACIDENTE</div>
    <div class="btn-a" onclick="enviarAlerta('Obra', '🚧')">🚧 OBRA</div>
    <div class="btn-a" onclick="enviarAlerta('Bloqueio', '🚫')">🚫 BLOQUEIO</div>
    <div class="btn-a" onclick="enviarAlerta('Lentidão', '🚗')">🚗 LENTIDÃO</div>
    <div class="btn-a" onclick="enviarAlerta('Animal', '🐕')">🐕 ANIMAL</div>
</div>

<div id="btn-luz" class="f-btn">💡</div>
<div id="btn-bussola" class="f-btn">🧭</div>
<div id="chat-trigger" class="f-btn">💬</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--ws-green); color:white; font-weight:bold; border-radius:20px 20px 0 0;">
        CHAT OPERACIONAL
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="float:right">✕</span>
    </div>
    <div id="mensagens"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="chat-input" style="flex:1; border-radius:20px; border:1px solid #ccc; padding:10px;">
        <button onclick="mandarChat()" style="background:var(--ws-green); color:white; border:none; border-radius:50%; width:40px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 15);
const googleTraffic = L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(map);

let meuLatLng, meuMarker, rota, isNight = false;
let user = { n: "Danilo", id: "u1", c: "#075e54" };

// BUSCA E ROTA INTELIGENTE
const geocoder = L.Control.geocoder({ defaultMarkGeocode: false })
    .on('markgeocode', function(e) {
        const dest = e.geocode.center;
        if (rota) map.removeControl(rota);
        rota = L.Routing.control({
            waypoints: [meuLatLng, dest],
            lineOptions: { styles: [{ color: '#34b7f1', opacity: 0.8, weight: 8 }] },
            createMarker: () => null,
            addWaypoints: false
        }).addTo(map);
        map.fitBounds(e.geocode.bbox);
    }).addTo(map);

// LUZ NOTURNA
document.getElementById('btn-luz').onclick = () => {
    isNight = !isNight;
    document.getElementById('map').classList.toggle('map-dark', isNight);
};

// BÚSSOLA
document.getElementById('btn-bussola').onclick = () => map.flyTo(meuLatLng, 17);

// RASTREAMENTO E AUTO-ZOOM
navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude, heading, speed } = pos.coords;
    meuLatLng = L.latLng(latitude, longitude);
    
    const iconHtml = `<div class="pulse-loc" style="width:40px;height:40px;transform:rotate(${heading || 0}deg)">🚗</div>`;
    
    if(!meuMarker) {
        meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html: iconHtml, className: '', iconSize:[40,40] }) }).addTo(map);
    } else {
        meuMarker.setLatLng(meuLatLng);
        meuMarker.setIcon(L.divIcon({ html: iconHtml, className: '', iconSize:[40,40] }));
    }

    // AUTO-ZOOM CONFORME VELOCIDADE
    const zoomLevel = speed > 15 ? 14 : 17;
    map.flyTo(meuLatLng, zoomLevel, { animate: true, duration: 1 });
    
    // ATUALIZA ROTA (APAGA O QUE FICOU PRA TRÁS)
    if(rota) rota.setWaypoints([meuLatLng, rota.getWaypoints()[1].latLng]);
}, null, { enableHighAccuracy: true });

// ALERTAS VISÍVEIS
function enviarAlerta(tipo, emoji) {
    if(!meuLatLng) return;
    db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, t: Date.now() });
}

db.ref("alertas").on("value", snap => {
    snap.forEach(s => {
        const a = s.val();
        L.marker([a.lat, a.lng], { 
            icon: L.divIcon({ html: `<div style="font-size:30px; filter: drop-shadow(0 0 5px gold)">${a.emoji}</div>`, className: '' }),
            zIndexOffset: 1000 
        }).addTo(map).bindPopup(`<b>${a.tipo}</b>`);
    });
});

// CHAT DUPLO CLIQUE
let lastTap = 0;
document.getElementById('chat-trigger').addEventListener('touchstart', e => {
    const now = Date.now();
    if(now - lastTap < 300) document.getElementById('chat-box').classList.toggle('aberto');
    lastTap = now;
});

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: user.n, m: i.value, uid: user.id, t: Date.now() });
    i.value = "";
}

db.ref("chat").limitToLast(20).on("value", snap => {
    const box = document.getElementById('mensagens'); box.innerHTML = "";
    snap.forEach(s => {
        const m = s.val(); const eu = m.uid === user.id;
        box.innerHTML += `<div class="balao ${eu?'balao-eu':'balao-outro'}">
            <b>${m.u}</b>: ${m.m} ${eu ? `<span onclick="db.ref('chat/${s.key}').remove()" style="color:red; cursor:pointer">✕</span>` : ''}
        </div>`;
    });
    box.scrollTop = box.scrollHeight;
});
</script>
</body>
</html>
