<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RÁDIO PX 277 - STREAMING AO VIVO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #050510);
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .radio-live {
            max-width: 550px;
            width: 100%;
            background: linear-gradient(145deg, #13132a, #0c0c1f);
            border-radius: 60px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid rgba(0, 191, 255, 0.3);
        }

        .live-header {
            background: linear-gradient(135deg, #0f0f25, #0a0a1a);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #00BFFF;
        }

        .live-header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .live-badge {
            display: inline-block;
            background: #e53935;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 8px;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .station-selector {
            padding: 16px 20px;
        }

        .selector-btn {
            width: 100%;
            background: #1a1a35;
            border: 2px solid #2a2a55;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .city-dropdown {
            position: absolute;
            background: #151530;
            border: 2px solid #00BFFF;
            border-radius: 25px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            width: calc(100% - 40px);
        }

        .city-dropdown.open { display: block; }
        .city-option { padding: 12px 20px; color: #ccc; cursor: pointer; border-bottom: 1px solid #252550; }
        .city-option:hover { background: #202050; color: #00BFFF; }

        .current-station {
            background: #0f0f25;
            margin: 0 20px 15px;
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #00BFFF;
        }

        .mic-panel {
            text-align: center;
            padding: 20px;
            margin: 10px 20px;
            background: linear-gradient(145deg, #0f0f25, #0a0a1a);
            border-radius: 80px;
        }

        .px-live-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #2a2a4a, #1a1a35);
            border: 4px solid #3a3a6a;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .px-live-btn.active {
            background: radial-gradient(circle at 35% 35%, #e53935, #8b0000);
            border-color: #ffd700;
            color: white;
            animation: mic-pulse 1.2s infinite;
        }

        @keyframes mic-pulse {
            0% { box-shadow: 0 0 0 0 #e53935; }
            70% { box-shadow: 0 0 0 20px rgba(229,57,53,0); }
        }

        .live-status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .live-status.on { color: #e53935; }
        .live-status.off { color: #888; }

        .listening-status {
            background: #1a1a35;
            margin: 10px 20px;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            color: #00ff88;
            font-size: 13px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            padding: 15px 20px 25px;
        }

        .action-btn {
            flex: 1;
            background: #151530;
            border: 1px solid #2a2a55;
            border-radius: 50px;
            padding: 12px;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .action-btn i { color: #00BFFF; margin-right: 5px; }
    </style>
</head>
<body>

<div class="radio-live">
    <div class="live-header">
        <h1><i class="fas fa-microphone-alt"></i> RÁDIO PX 277 <i class="fas fa-broadcast-tower"></i></h1>
        <div class="live-badge">🔴 AO VIVO - STREAMING</div>
    </div>

    <div class="station-selector">
        <div class="selector-btn" id="selectorBtn">
            <span id="selectedCity">Curitiba</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div class="city-dropdown" id="cityDropdown"></div>
    </div>

    <div class="current-station">
        <span><i class="fas fa-radio"></i> <span id="currentCity">Curitiba</span></span>
        <span id="roomStats">0 online</span>
    </div>

    <div class="mic-panel">
        <button class="px-live-btn" id="pxBtn">
            <i class="fas fa-microphone-slash"></i><br>
            <span style="font-size: 14px;">PX (FALAR)</span>
        </button>
        <div class="live-status off" id="liveStatus">🔴 MICROFONE DESLIGADO</div>
    </div>

    <div class="listening-status" id="listeningStatus">
        🎧 Modo ouvinte - Aguardando transmissão...
    </div>

    <div class="action-buttons">
        <div class="action-btn" id="mapBtn"><i class="fas fa-map"></i> MAPA</div>
        <div class="action-btn" id="chatBtn"><i class="fas fa-comment"></i> CHAT</div>
    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
// ==================== CONFIGURAÇÕES ====================
const SERVER_URL = window.location.hostname === 'localhost' 
    ? 'http://localhost:3001' 
    : 'https://seu-servidor.onrender.com'; // Mude para seu servidor

const socket = io(SERVER_URL);

// ==================== CIDADES ====================
const cities = [
    "Guarapuava", "Palmeira", "Porto Amazonas", "Ponta Grossa", "São Luiz",
    "Campo Largo", "Curitiba", "Alm. Tamandaré", "Fazenda Rio Grande", "Tijucas do Sul",
    "Guaratuba", "Morretes", "Paranaguá", "São José", "Colombo",
    "Araucária", "Piraquara", "Campina Grande", "Quatro Barras", "Cajati"
];

// ==================== VARIÁVEIS ====================
let userName = localStorage.getItem('px_user');
if (!userName) {
    userName = prompt("🎙️ Digite seu nome:", "Motorista");
    localStorage.setItem('px_user', userName);
}

let currentCity = localStorage.getItem('px_city') || 'curitiba';
let isBroadcasting = false;
let peerConnection = null;
let localStream = null;

// Elementos
const pxBtn = document.getElementById('pxBtn');
const liveStatus = document.getElementById('liveStatus');
const listeningStatus = document.getElementById('listeningStatus');
const roomStats = document.getElementById('roomStats');
const selectorBtn = document.getElementById('selectorBtn');
const cityDropdown = document.getElementById('cityDropdown');
const selectedCitySpan = document.getElementById('selectedCity');
const currentCitySpan = document.getElementById('currentCity');

// ==================== DROPDOWN ====================
function buildDropdown() {
    cityDropdown.innerHTML = '';
    cities.forEach(city => {
        const id = city.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c');
        const option = document.createElement('div');
        option.className = 'city-option';
        option.textContent = city;
        option.onclick = () => changeCity(id, city);
        cityDropdown.appendChild(option);
    });
}

selectorBtn.onclick = () => cityDropdown.classList.toggle('open');
document.addEventListener('click', (e) => {
    if (!e.target.closest('.station-selector')) cityDropdown.classList.remove('open');
});

function changeCity(id, name) {
    currentCity = id;
    localStorage.setItem('px_city', id);
    selectedCitySpan.textContent = name;
    currentCitySpan.textContent = name;
    cityDropdown.classList.remove('open');
    
    // Sair da sala atual e entrar na nova
    if (isBroadcasting) stopBroadcasting();
    socket.emit('leave-room');
    socket.emit('join-room', { roomId: id, userName, isBroadcaster: false });
}

// ==================== WEbRTC ====================
const configuration = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
    ]
};

async function startBroadcasting() {
    if (isBroadcasting) return;
    
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peerConnection = new RTCPeerConnection(configuration);
        
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });
        
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('ice-candidate', { targetId: 'broadcast', candidate: event.candidate });
            }
        };
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        socket.emit('offer', { targetId: 'broadcast', offer });
        
        isBroadcasting = true;
        socket.emit('join-room', { roomId: currentCity, userName, isBroadcaster: true });
        
        pxBtn.classList.add('active');
        pxBtn.innerHTML = '<i class="fas fa-microphone"></i><br><span style="font-size: 14px;">TRANSMITINDO</span>';
        liveStatus.className = 'live-status on';
        liveStatus.innerHTML = '🎤 TRANSMITINDO AO VIVO...';
        
    } catch(e) {
        alert("🎤 Permita o acesso ao microfone!");
    }
}

function stopBroadcasting() {
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }
    
    isBroadcasting = false;
    socket.emit('leave-room');
    socket.emit('join-room', { roomId: currentCity, userName, isBroadcaster: false });
    
    pxBtn.classList.remove('active');
    pxBtn.innerHTML = '<i class="fas fa-microphone-slash"></i><br><span style="font-size: 14px;">PX (FALAR)</span>';
    liveStatus.className = 'live-status off';
    liveStatus.innerHTML = '🔴 MICROFONE DESLIGADO';
}

pxBtn.onclick = () => {
    if (isBroadcasting) {
        stopBroadcasting();
    } else {
        startBroadcasting();
    }
};

// ==================== SOCKET EVENTOS ====================
socket.on('connect', () => {
    console.log('✅ Conectado ao servidor');
    socket.emit('join-room', { roomId: currentCity, userName, isBroadcaster: false });
});

socket.on('room-update', (data) => {
    if (data.broadcaster) {
        roomStats.innerHTML = `🎙️ Transmitindo | 👂 ${data.listeners} ouvindo`;
    } else {
        roomStats.innerHTML = `⏸️ Aguardando transmissão | ${data.listeners} online`;
    }
});

socket.on('broadcaster-joined', ({ userName }) => {
    listeningStatus.innerHTML = `🎤 ${userName} começou a transmitir! Conectando...`;
    listeningStatus.style.color = '#00ff88';
});

socket.on('broadcaster-left', () => {
    listeningStatus.innerHTML = `🔴 Transmissão encerrada. Aguardando...`;
    listeningStatus.style.color = '#888';
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
});

socket.on('broadcaster-active', ({ broadcasterId }) => {
    listeningStatus.innerHTML = `🎧 Transmissão ativa! Conectando...`;
    createReceiverConnection();
});

async function createReceiverConnection() {
    if (peerConnection) return;
    
    peerConnection = new RTCPeerConnection(configuration);
    
    peerConnection.ontrack = (event) => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play().catch(e => console.log);
        listeningStatus.innerHTML = `🎧 Ouvindo transmissão ao vivo!`;
    };
    
    peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit('ice-candidate', { targetId: 'broadcast', candidate: event.candidate });
        }
    };
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit('offer', { targetId: 'broadcast', offer });
}

// WebRTC Signaling
socket.on('offer', async ({ fromId, offer }) => {
    if (!peerConnection) {
        peerConnection = new RTCPeerConnection(configuration);
        peerConnection.ontrack = (event) => {
            const audio = new Audio();
            audio.srcObject = event.streams[0];
            audio.play();
        };
    }
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('answer', { targetId: fromId, answer });
});

socket.on('answer', async ({ answer }) => {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
});

socket.on('ice-candidate', async ({ candidate }) => {
    if (peerConnection) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    }
});

// ==================== INICIAR ====================
buildDropdown();
changeCity(currentCity, cities.find(c => c.toLowerCase().replace(/ /g, '_').replace(/ã/g, 'a').replace(/ç/g, 'c') === currentCity) || 'Curitiba');
</script>
</body>
</html>
