<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 GPS Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --warning: #f1c40f; --success: #27ae60; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; }

        /* Barra de Busca de Destino */
        .search-container {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px; display: flex; gap: 5px;
        }
        #destination-input {
            flex: 1; padding: 12px; border-radius: 25px; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none;
        }

        /* Grade de Alertas Lateral */
        .alert-sidebar {
            position: absolute; top: 70px; left: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px;
        }
        .btn-mini {
            border: none; border-radius: 50%; width: 45px; height: 45px;
            color: white; font-size: 20px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="destination-input" placeholder="Para onde vamos? (Ex: Curitiba)">
    <button onclick="buscarRota()" style="border:none; background:var(--success); color:white; border-radius:50%; width:45px; cursor:pointer">Go</button>
</div>

<div class="alert-sidebar">
    <button title="Acidente" class="btn-mini" style="background:var(--danger)" onclick="enviarAlerta('acidente')">⚠️</button>
    <button title="Pane Mecânica" class="btn-mini" style="background:#9b59b6" onclick="enviarAlerta('pane')">🚛</button>
    <button title="Obras" class="btn-mini" style="background:#e67e22" onclick="enviarAlerta('obra')">🚧</button>
    <button title="Bloqueio" class="btn-mini" style="background:#000" onclick="enviarAlerta('bloqueio')">🚫</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// CONFIGURAÇÕES
const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://SEU-PROJETO.firebaseio.com", projectId: "SEU-PROJETO" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Mapeamento de Ícones Profissionais
const iconesModerna = {
    'acidente': '⚠️',
    'pane': '🚛',
    'obra': '🚧',
    'bloqueio': '🚫'
};

let meuMarker;
let meuID = "Drive_" + Math.random().toString(36).substr(2, 4).toUpperCase();

// INICIAR GPS COM MOVIMENTO REAL
function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        const latlng = [pos.coords.latitude, pos.coords.longitude];
        
        if (!meuMarker) {
            meuMarker = L.marker(latlng).addTo(map);
            map.setView(latlng, 15);
        } else {
            meuMarker.setLatLng(latlng);
            map.panTo(latlng); // Segue o carro em tempo real
        }

        db.ref("usuarios/" + meuID).set({ lat: latlng[0], lon: latlng[1], time: Date.now() });
    }, null, { enableHighAccuracy: true });
}

// REGISTRAR COM ÍCONES INTELIGENTES
function enviarAlerta(tipo) {
    if (!meuMarker) return;
    const pos = meuMarker.getLatLng();
    db.ref("ocorrencias").push({ 
        tipo: tipo, 
        icone: iconesModerna[tipo],
        lat: pos.lat, 
        lng: pos.lng, 
        time: Date.now() 
    });
}

// EXIBIR OCORRÊNCIAS COM ÍCONES ESPECÍFICOS
db.ref("ocorrencias").on("child_added", snap => {
    const o = snap.val();
    const customIcon = L.divIcon({
        html: `<div style="font-size:24px; background:white; border-radius:50%; padding:5px; border:2px solid red; box-shadow:0 2px 5px rgba(0,0,0,0.3)">${o.icone}</div>`,
        className: 'custom-div-icon',
        iconSize: [40, 40]
    });

    L.marker([o.lat, o.lng], { icon: customIcon }).addTo(map).bindPopup(`<b>${o.tipo.toUpperCase()}</b>`);
});

// SIMULAÇÃO DE BUSCA E ROTA (Para Curitiba)
function buscarRota() {
    const destino = document.getElementById("destination-input").value;
    if (destino.toLowerCase().includes("curitiba")) {
        alert("Traçando rota para Curitiba via BR-277...");
        map.flyTo([-25.4269, -49.2652], 14); // Coordenadas de Curitiba
        // Aqui integraria a API de Directions do Google no futuro
    }
}

iniciarGPS();
</script>
</body>
</html>
