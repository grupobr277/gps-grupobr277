<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | TECNOLOGIA ELITE V3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        :root { --whatsapp-green: #075e54; --whatsapp-light: #dcf8c6; --danger: #ff3b30; }
        html, body, #map { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #000; }
        
        /* LOGIN REFORГ‡ADO */
        .overlay { position: fixed; inset: 0; background: var(--whatsapp-green); z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; }
        .box { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; color: #333; text-align: center; border: 5px solid #d4af37; }
        .box input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; }
        
        /* SELEГ‡ГѓO DE VEГЌCULO GRANDE */
        .veiculos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 15px 0; }
        .v-opt { font-size: 35px; padding: 10px; border: 3px solid #f0f0f0; border-radius: 15px; cursor: pointer; transition: 0.2s; background: #fafafa; }
        .v-opt.selected { border-color: var(--whatsapp-green); background: #e8f5e9; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* ALERTAS LADO ESQUERDO */
        .painel-alertas { position: absolute; top: 110px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        .btn-a { border: 2px solid #d4af37; padding: 8px; border-radius: 10px; width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .bg-r { background: #b00020; } .bg-o { background: #ff6d00; } .bg-b { background: #1a1a1a; }

        /* PULSAГ‡ГѓO PARA ALERTAS CRГЌTICOS */
        .pulse-danger { border-radius: 50%; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0px rgba(255, 59, 48, 0.7); } 100% { box-shadow: 0 0 0 25px rgba(255, 59, 48, 0); } }

        /* BOTГ•ES FLUTUANTES */
        .f-btn { position: fixed; z-index: 4001; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); touch-action: none; cursor: move; border: 2px solid white; }
        #chat-trigger { width: 70px; height: 70px; background: #25d366; color: white; right: 20px; bottom: 20px; font-size: 35px; }
        #btn-perfil { width: 55px; height: 55px; background: #333; color: white; right: 25px; top: 125px; font-size: 28px; }
        #btn-bussola { width: 60px; height: 60px; background: white; border: 3px solid #d4af37; left: 20px; bottom: 20px; font-size: 32px; }

        /* CHAT PADRГѓO WHATSAPP */
        #chat-box { position: fixed; right: -100%; top: 0; width: 100%; max-width: 450px; height: 100%; background: #e5ddd5; z-index: 5000; transition: 0.4s; display: flex; flex-direction: column; }
        #chat-box.aberto { right: 0; }
        .mensagens-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .balao { padding: 8px 12px; border-radius: 12px; max-width: 85%; position: relative; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .balao-eu { background: var(--whatsapp-light); align-self: flex-end; border-top-right-radius: 2px; }
        .balao-outro { background: white; align-self: flex-start; border-top-left-radius: 2px; }
        .balao-info { font-size: 11px; display: flex; justify-content: space-between; margin-top: 4px; color: #666; }
        
        /* FOOTER CHAT (ГЃUDIO + TEXTO) */
        .chat-footer { padding: 10px; background: #f0f0f0; display: flex; align-items: center; gap: 8px; }
        .input-msg { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn-send { background: var(--whatsapp-green); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 20px; }
        .btn-mic { background: #333; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 20px; }

        #painel-rota { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 4000; background: rgba(0,0,0,0.9); padding: 10px 25px; border-radius: 35px; border: 2px solid #d4af37; color: white; display: none; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay">
    <div class="box">
        <h2 style="margin:0 0 5px 0;">TECNOLOGIA BR-277</h2>
        <p style="font-size:12px; color: #666; margin-bottom:15px;">SEGURANГ‡A E MONITORAMENTO EM TEMPO REAL</p>
        <input type="text" id="u-nome" placeholder="Nome Completo">
        <input type="tel" id="u-tel" placeholder="WhatsApp (VerificaГ§ГЈo)">
        <input type="text" id="u-cidade" placeholder="Cidade">
        <p style="font-size:14px; font-weight:bold; margin:10px 0;">Selecione seu VeГ­culo:</p>
        <div class="veiculos-grid" id="v-grid-login"></div>
        <button onclick="verificarESalvar()" style="width:100%; padding:16px; background:var(--whatsapp-green); color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px; cursor:pointer;">VERIFICAR E ACESSAR</button>
    </div>
</div>

<div id="map"></div>

<div id="btn-perfil" class="f-btn" title="Editar Perfil">вљ™пёЏ</div>
<div id="btn-bussola" class="f-btn" title="Recentralizar">рџ§­</div>
<div id="chat-trigger" class="f-btn">рџ’¬</div>

<div id="painel-rota">
    <span>Navegando pela BR-277</span>
    <b onclick="limparRota()" style="color:red; cursor:pointer; font-size:22px;">вњ•</b>
</div>

<div class="painel-alertas">
    <button class="btn-a bg-r" onclick="enviarAlerta('Acidente', 'вљ пёЏ')"><span>вљ пёЏ</span><b>Acidente</b></button>
    <button class="btn-a bg-r" onclick="enviarAlerta('Bloqueio', 'рџљ«')"><span>рџљ«</span><b>Bloqueio</b></button>
    <button class="btn-a bg-o" onclick="enviarAlerta('Obra', 'рџљ§')"><span>рџљ§</span><b>Obra</b></button>
    <button class="btn-a bg-o" onclick="enviarAlerta('LentidГЈo', 'рџљ—')"><span>рџљ—</span><b>LentidГЈo</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Animal', 'рџђ•')"><span>рџђ•</span><b>Animal</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Buraco', 'рџ•іпёЏ')"><span>рџ•іпёЏ</span><b>Buraco</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Neblina', 'рџЊ«пёЏ')"><span>рџЊ«пёЏ</span><b>Neblina</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Queda', 'в›°пёЏ')"><span>в›°пёЏ</span><b>Queda</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Pane', 'рџ› пёЏ')"><span>рџ› пёЏ</span><b>Pane</b></button>
    <button class="btn-a bg-b" onclick="enviarAlerta('Carga', 'рџ“¦')"><span>рџ“¦</span><b>Carga</b></button>
</div>

<div id="chat-box">
    <div style="padding:15px; background:var(--whatsapp-green); color:white; display:flex; justify-content:space-between; align-items:center;">
        <b>BR-277 | GRUPO OFICIAL</b>
        <span onclick="document.getElementById('chat-box').classList.remove('aberto')" style="cursor:pointer; font-size:30px;">вњ•</span>
    </div>
    <div id="mensagens" class="mensagens-area"></div>
    <div class="chat-footer">
        <button class="btn-mic" onclick="alert('Gravando ГЃudio...')">рџЋ¤</button>
        <input type="text" id="chat-input" class="input-msg" placeholder="Mensagem">
        <button class="btn-send" onclick="mandarChat()">вћ¤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

let meuLatLng, meuMarker, rMachine, vSel = "рџљ—";
let user = JSON.parse(localStorage.getItem('br277_v3')) || null;

// BUSCA
const geocoder = L.Control.geocoder({ defaultMarkGeocode: false, collapsed: false, placeholder: "Buscar Destino..." })
.on('markgeocode', function(e) {
    if (rMachine) map.removeControl(rMachine);
    rMachine = L.Routing.control({ waypoints: [meuLatLng, e.geocode.center], lineOptions: { styles: [{ color: '#1a73e8', weight: 7 }] }, createMarker: () => null }).addTo(map);
    document.getElementById('painel-rota').style.display = 'flex';
}).addTo(map);

function limparRota() { if(rMachine) map.removeControl(rMachine); document.getElementById('painel-rota').style.display = 'none'; }

// VEICULOS GRID GRANDE
const veiculos = ['рџљ›','рџЏЌпёЏ','рџљ—','рџљђ','рџљЊ','рџљ‘','рџљ•','рџљ”'];
function renderV() {
    const grid = document.getElementById('v-grid-login'); grid.innerHTML = "";
    veiculos.forEach(v => {
        const d = document.createElement('div'); d.className = 'v-opt' + (v === vSel ? ' selected' : '');
        d.innerText = v; d.onclick = () => { vSel = v; renderV(); }; grid.appendChild(d);
    });
}
renderV();

if(user) { document.getElementById('login-screen').style.display = 'none'; iniciarApp(); }

function verificarESalvar() {
    const n = document.getElementById('u-nome').value.trim();
    const t = document.getElementById('u-tel').value.trim();
    if(!n || !t) return alert("Preencha Nome e Telefone!");
    
    // SimulaГ§ГЈo de verificaГ§ГЈo de seguranГ§a
    const token = Math.floor(1000 + Math.random() * 9000);
    const valid = prompt("SEGURANГ‡A: Enviamos um cГіdigo para seu WhatsApp. Digite os 4 dГ­gitos para validar seu acesso:");
    
    if(valid) {
        user = { n, t, v: vSel, adm: n.toLowerCase().includes("danilo") };
        localStorage.setItem('br277_v3', JSON.stringify(user));
        location.reload();
    }
}

function iniciarApp() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        const html = `<div class="pulse-danger" style="background:rgba(0,123,255,0.5);width:25px;height:25px;position:absolute;left:-2px;top:-2px;"></div><div style="font-size:32px;position:relative;">${user.v}</div>`;
        if(!meuMarker) { meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ html, className: '', iconSize:[35,35] }) }).addTo(map); map.setView(meuLatLng, 17); }
        else { meuMarker.setLatLng(meuLatLng); }
        db.ref("vivos/" + user.n).set({ lat: pos.coords.latitude, lng: pos.coords.longitude, v: user.v, t: Date.now() });
    });
    carregarAlertas();
}

function tornarMovel(id, func) {
    const el = document.getElementById(id);
    let isD = false, sX, sY;
    el.ontouchstart = (e) => { isD = false; sX = e.touches[0].clientX - el.offsetLeft; sY = e.touches[0].clientY - el.offsetTop; };
    el.ontouchmove = (e) => { isD = true; el.style.left = (e.touches[0].clientX - sX) + 'px'; el.style.top = (e.touches[0].clientY - sY) + 'px'; el.style.right='auto'; el.style.bottom='auto'; };
    el.ontouchend = () => { if(!isD) func(); };
}

tornarMovel('chat-trigger', () => document.getElementById('chat-box').classList.toggle('aberto'));
tornarMovel('btn-bussola', () => { if(meuLatLng) map.flyTo(meuLatLng, 17); });
tornarMovel('btn-perfil', () => { if(confirm("Deseja editar seu perfil?")) { localStorage.removeItem('br277_v3'); location.reload(); } });

function enviarAlerta(tipo, emoji) { if(meuLatLng) db.ref("alertas").push({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng, autor: user.n, t: Date.now() }); }

function carregarAlertas() {
    db.ref("alertas").on("child_added", snap => {
        const a = snap.val(); const k = snap.key;
        const isPerigo = (a.tipo === 'Acidente' || a.tipo === 'Bloqueio');
        const iconHtml = `<div class="${isPerigo?'pulse-danger':''}" style="font-size:35px; text-align:center;">${a.emoji}</div>`;
        const m = L.marker([a.lat, a.lng], { icon: L.divIcon({ html: iconHtml, className: '', iconSize:[40,40] }) }).addTo(map);
        
        m.on('click', () => {
            const html = `
                <div style="width:260px; font-family:sans-serif;">
                    <div style="background:var(--whatsapp-green);color:white;padding:10px;text-align:center;border-radius:10px 10px 0 0;"><b>${a.tipo}</b></div>
                    <div id="p-chat-${k}" style="background:#e5ddd5; padding:10px; max-height:150px; overflow-y:auto; display:flex; flex-direction:column; gap:5px;"></div>
                    <div style="display:flex;padding:8px;background:#eee;">
                        <input id="p-in-${k}" style="flex:1;padding:8px;border-radius:10px;border:1px solid #ccc;">
                        <button onclick="mandarPop('${k}')" style="background:var(--whatsapp-green);color:white;border:none;margin-left:5px;border-radius:50%;width:35px;height:35px;">вћ¤</button>
                    </div>
                </div>`;
            m.bindPopup(html).openPopup();
            db.ref("alertas/"+k+"/conversa").on("value", s => {
                const dv = document.getElementById("p-chat-"+k);
                if(dv){ dv.innerHTML = ""; const val = s.val(); if(val) Object.entries(val).forEach(([mk, v]) => {
                    const eu = v.u === user.n;
                    dv.innerHTML += `<div class="balao ${eu?'balao-eu':'balao-outro'}" style="font-size:12px; padding:5px 8px;"><b style="font-size:10px; color:${eu?'#075e54':'#1a73e8'}">${v.u}</b><br>${v.m}</div>`;
                }); dv.scrollTop = dv.scrollHeight; }
            });
        });
    });
}

function mandarPop(k) { const i = document.getElementById("p-in-"+k); if(i.value) db.ref("alertas/"+k+"/conversa").push({u:user.n, m:i.value}); i.value=""; }

function mandarChat() {
    const i = document.getElementById('chat-input'); if(!i.value) return;
    db.ref("chat").push({ u: user.n, m: i.value, t: Date.now(), adm: user.adm }); i.value = "";
}

db.ref("chat").limitToLast(40).on("value", snap => {
    const b = document.getElementById('mensagens'); b.innerHTML = "";
    const d = snap.val();
    if(d) Object.entries(d).forEach(([k, c]) => {
        const eu = c.u === user.n;
        const time = new Date(c.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const date = new Date(c.t).toLocaleDateString([], {day:'2-digit', month:'2-digit'});
        const del = (eu || user.adm) ? `<span onclick="db.ref('chat/${k}').remove()" style="color:red; cursor:pointer;">вњ•</span>` : "";
        const resp = !eu ? `<span onclick="document.getElementById('chat-input').value='@${c.u} '; document.getElementById('chat-input').focus();" style="color:blue; cursor:pointer;">в¤є</span>` : "";
        
        b.innerHTML += `
            <div class="balao ${eu?'balao-eu':'balao-outro'}">
                <b style="font-size:12px; color:${eu?'#075e54':'#1a73e8'}">${c.u} ${c.adm?'(ADM)':''}</b><br>${c.m}
                <div class="balao-info">
                    <span>${resp} ${del}</span>
                    <span>${date} ${time}</span>
                </div>
            </div>`;
    }); b.scrollTop = b.scrollHeight;
});
</script>
</body>
</html>
