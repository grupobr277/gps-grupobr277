<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BR-277 | ALERTAS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #map { height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        
        /* PAINEL DE ALERTAS - COMPACTO */
        .alertas-panel {
            position: fixed;
            top: 70px;
            left: 8px;
            width: 45px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 9000;
            border: 2px solid #075e54;
            overflow: hidden;
        }
        
        .alertas-header {
            background: #075e54;
            color: white;
            padding: 8px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .alertas-lista {
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .alerta-icone {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .alerta-icone:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* CORES DOS ÍCONES */
        .acidente { background: #e53935; }
        .obras { background: #ff9800; }
        .pane { background: #795548; }
        .animal { background: #9c27b0; }
        .radar { background: #607d8b; }
        .barreira { background: #8b4513; }
        .neblina { background: #00acc1; }
        .congestionamento { background: #f44336; }
        .alagamento { background: #2196f3; }
        .desvio { background: #4caf50; }
        
        /* BOTÃO RECENTRALIZAR */
        .btn-recentrar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 2px solid #075e54;
            border-radius: 40px;
            padding: 10px 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 9000;
            display: none;
            font-weight: bold;
            color: #075e54;
        }
        
        .btn-recentrar i {
            margin-right: 5px;
        }
        
        /* BALÃO DO ALERTA - WHATSAPP STYLE */
        .balao-alerta {
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid #075e54;
            min-width: 280px;
            overflow: hidden;
        }
        
        .balao-header {
            background: #075e54;
            color: white;
            padding: 10px 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .balao-chat {
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: #e5ddd5;
        }
        
        .balao-mensagem {
            background: white;
            padding: 8px 12px;
            border-radius: 15px;
            margin: 5px 0;
            max-width: 85%;
            position: relative;
            font-size: 13px;
        }
        
        .balao-mensagem.minha {
            background: #dcf8c6;
            margin-left: auto;
        }
        
        .balao-mensagem .hora {
            font-size: 9px;
            color: #999;
            float: right;
            margin-left: 10px;
            margin-top: 3px;
        }
        
        .balao-input {
            display: flex;
            padding: 8px;
            background: #f0f0f0;
            gap: 5px;
        }
        
        .balao-input input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 13px;
        }
        
        .balao-input button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #075e54;
            color: white;
            cursor: pointer;
        }
        
        /* LUPA */
        .lupa-container {
            position: fixed;
            top: 15px;
            left: 60px;
            right: 60px;
            z-index: 10000;
            background: white;
            border-radius: 40px;
            border: 3px solid #ffd700;
            display: flex;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            max-width: 300px;
            margin: 0 auto;
        }
        
        .lupa-container input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            font-size: 14px;
            outline: none;
        }
        
        .lupa-container button {
            background: #075e54;
            color: white;
            border: none;
            width: 45px;
            cursor: pointer;
        }
        
        /* RÁDIO PX */
        #btn-px { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 70px; 
            height: 70px; 
            background: #333; 
            border: 4px solid #ffd700; 
            border-radius: 50%; 
            z-index: 9001; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            color: #ffd700; 
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        #btn-px.ativo { 
            background: #e53935; 
            color: white; 
            transform: translateX(-50%) scale(0.95);
        }
        
        #btn-px.ouvindo {
            background: #2196f3;
            color: white;
            animation: pulse-blue 1s infinite;
        }
        
        /* MODO NOTURNO */
        .btn-luz {
            position: fixed;
            right: 15px;
            top: 130px;
            width: 45px;
            height: 45px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid white;
            cursor: pointer;
            z-index: 9000;
            font-size: 20px;
        }
        
        .mapa-noturno {
            filter: invert(100%) hue-rotate(180deg) brightness(95%);
        }
        
        /* MARCADOR DE CONGESTIONAMENTO - BOLA PULSANTE */
        .marcador-congestionamento {
            width: 20px;
            height: 20px;
            background: #e53935;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(229, 57, 53, 0.4);
            animation: pulse 2s infinite;
            border: 3px solid white;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }
        
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }
        
        .pulse-loc { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
            background: rgba(33, 150, 243, 0.3); 
            border: 3px solid #2196f3; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- PAINEL DE ALERTAS - COMPACTO -->
<div class="alertas-panel">
    <div class="alertas-header">🚨 ALERTA</div>
    <div class="alertas-lista" id="alertasLista"></div>
</div>

<!-- LUPA -->
<div class="lupa-container">
    <input type="text" id="buscaDestino" placeholder="Digite seu destino...">
    <button onclick="buscarRota()"><i class="fas fa-search"></i></button>
</div>

<!-- BOTÃO RECENTRALIZAR -->
<div class="btn-recentrar" id="btnRecenter" onclick="recentralizar()">
    <i class="fas fa-location-arrow"></i> MINHA LOCALIZAÇÃO
</div>

<!-- BOTÃO LUZ -->
<div class="btn-luz" onclick="toggleModoNoturno()">💡</div>

<!-- RÁDIO PX -->
<div id="btn-px">🎤</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== FIREBASE =====
try {
    firebase.initializeApp({
        databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
    });
    console.log("✅ Firebase OK");
} catch(e) {
    console.log("❌ Firebase erro:", e);
}
const db = firebase.database();

// ===== VARIÁVEIS =====
let usuario = "Motorista_" + Math.floor(Math.random() * 1000);
let minhaLocalizacao = null;
let meuMarcador = null;
let seguirLocalizacao = true;
let rotaAtual = null;
let modoNoturno = false;
let mapa = null;

// ===== 10 ALERTAS =====
const alertas = [
    { id: 1, tipo: 'acidente', icone: '💥', cor: '#e53935' },
    { id: 2, tipo: 'obras', icone: '🚧', cor: '#ff9800' },
    { id: 3, tipo: 'pane', icone: '🔧', cor: '#795548' },
    { id: 4, tipo: 'animal', icone: '🐂', cor: '#9c27b0' },
    { id: 5, tipo: 'radar', icone: '📷', cor: '#607d8b' },
    { id: 6, tipo: 'barreira', icone: '⛰️', cor: '#8b4513' },
    { id: 7, tipo: 'neblina', icone: '🌫️', cor: '#00acc1' },
    { id: 8, tipo: 'congestionamento', icone: '⚫', cor: '#f44336' },
    { id: 9, tipo: 'alagamento', icone: '💧', cor: '#2196f3' },
    { id: 10, tipo: 'desvio', icone: '↩️', cor: '#4caf50' }
];

// ===== INICIALIZAÇÃO =====
document.addEventListener('DOMContentLoaded', function() {
    console.log("📱 Iniciando app...");
    criarBotoesAlertas();
    iniciarMapa();
    iniciarGPS();
});

function criarBotoesAlertas() {
    const lista = document.getElementById('alertasLista');
    lista.innerHTML = '';
    
    alertas.forEach(alerta => {
        const div = document.createElement('div');
        div.className = `alerta-icone ${alerta.tipo}`;
        div.innerHTML = alerta.icone;
        div.onclick = () => ativarAlerta(alerta);
        lista.appendChild(div);
    });
}

function ativarAlerta(alerta) {
    if (!minhaLocalizacao) {
        alert('Aguardando localização GPS...');
        return;
    }
    
    console.log(`⚠️ Ativando alerta: ${alerta.tipo}`);
    
    const id = `alerta_${Date.now()}`;
    
    // Se for congestionamento, usa bola pulsante
    let htmlIcone = '';
    if (alerta.tipo === 'congestionamento') {
        htmlIcone = `<div class="marcador-congestionamento"></div>`;
    } else {
        htmlIcone = `<div style="background:${alerta.cor}; color:white; padding:6px 10px; border-radius:30px; border:2px solid white; font-size:14px; display:flex; align-items:center; gap:5px; box-shadow:0 3px 10px rgba(0,0,0,0.3);">
            <span>${alerta.icone}</span>
        </div>`;
    }
    
    const marcador = L.marker(minhaLocalizacao, {
        icon: L.divIcon({
            html: htmlIcone,
            className: '',
            iconSize: alerta.tipo === 'congestionamento' ? [26, 26] : [50, 30]
        })
    }).addTo(mapa);
    
    marcador.on('click', () => {
        abrirBalaoAlerta(alerta, minhaLocalizacao, id);
    });
    
    // Abre balão automaticamente
    setTimeout(() => {
        abrirBalaoAlerta(alerta, minhaLocalizacao, id);
    }, 200);
    
    // Salva no Firebase
    try {
        db.ref(`alertas/${id}`).set({
            tipo: alerta.tipo,
            lat: minhaLocalizacao.lat,
            lng: minhaLocalizacao.lng,
            usuario: usuario,
            timestamp: Date.now()
        });
    } catch(e) {
        console.log("Erro ao salvar alerta:", e);
    }
}

function abrirBalaoAlerta(alerta, posicao, id) {
    const conteudo = document.createElement('div');
    conteudo.className = 'balao-alerta';
    conteudo.innerHTML = `
        <div class="balao-header">
            <span>${alerta.icone} ${alerta.tipo}</span>
            <span style="font-size:11px;">${new Date().toLocaleTimeString()}</span>
        </div>
        <div class="balao-chat" id="chat-${id}">
            <div style="text-align:center; color:#999; padding:10px;">Carregando...</div>
        </div>
        <div class="balao-input">
            <input type="text" id="input-${id}" placeholder="Digite sua mensagem...">
            <button onclick="enviarMsgAlerta('${id}')"><i class="fas fa-paper-plane"></i></button>
        </div>
    `;
    
    L.popup({
        maxWidth: 300,
        minWidth: 260,
        className: 'custom-popup'
    })
    .setLatLng(posicao)
    .setContent(conteudo)
    .openOn(mapa);
    
    carregarMsgsAlerta(id);
}

function carregarMsgsAlerta(id) {
    try {
        db.ref(`chats/${id}`).limitToLast(50).on('value', snap => {
            const msgs = snap.val();
            const chatDiv = document.getElementById(`chat-${id}`);
            if (!chatDiv) return;
            
            if (!msgs) {
                chatDiv.innerHTML = '<div style="text-align:center; color:#999; padding:10px;">Nenhuma mensagem</div>';
                return;
            }
            
            let html = '';
            const msgsArray = Object.values(msgs).reverse();
            
            msgsArray.forEach(msg => {
                html += `
                    <div class="balao-mensagem ${msg.usuario === usuario ? 'minha' : ''}">
                        <small><b>${msg.usuario}</b></small><br>
                        ${msg.texto}
                        <span class="hora">${msg.hora}</span>
                    </div>
                `;
            });
            
            chatDiv.innerHTML = html;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });
    } catch(e) {
        console.log("Erro ao carregar msgs:", e);
    }
}

function enviarMsgAlerta(id) {
    const input = document.getElementById(`input-${id}`);
    const texto = input.value.trim();
    
    if (!texto) return;
    
    try {
        db.ref(`chats/${id}`).push({
            usuario: usuario,
            texto: texto,
            hora: new Date().toLocaleTimeString(),
            timestamp: Date.now()
        });
        input.value = '';
    } catch(e) {
        console.log("Erro ao enviar msg:", e);
    }
}

// ===== MAPA =====
function iniciarMapa() {
    mapa = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
    
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
        maxZoom: 20
    }).addTo(mapa);
    
    mapa.on('dragstart', () => {
        seguirLocalizacao = false;
        document.getElementById('btnRecenter').style.display = 'block';
    });
}

// ===== GPS =====
function iniciarGPS() {
    if (!navigator.geolocation) {
        alert("GPS não suportado!");
        return;
    }
    
    navigator.geolocation.watchPosition(pos => {
        minhaLocalizacao = L.latLng(pos.coords.latitude, pos.coords.longitude);
        
        if (!meuMarcador) {
            meuMarcador = L.marker(minhaLocalizacao, {
                icon: L.divIcon({
                    html: `<div class="pulse-loc"></div><div style="font-size:35px; margin-top:-15px;">🚗</div>`,
                    iconSize: [1, 1]
                })
            }).addTo(mapa);
            
            mapa.setView(minhaLocalizacao, 17);
        } else {
            meuMarcador.setLatLng(minhaLocalizacao);
        }
        
        if (seguirLocalizacao) {
            mapa.panTo(minhaLocalizacao);
        }
        
    }, erro => {
        console.log("Erro GPS:", erro);
    }, {
        enableHighAccuracy: true,
        timeout: 10000
    });
}

// ===== ROTA =====
function buscarRota() {
    const destino = document.getElementById('buscaDestino').value;
    
    if (!destino) {
        alert('Digite um destino');
        return;
    }
    
    if (!minhaLocalizacao) {
        alert('Aguardando GPS...');
        return;
    }
    
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destino)}, Brasil&limit=1`)
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) {
                alert('Local não encontrado');
                return;
            }
            
            const lugar = data[0];
            const destinoLatLng = L.latLng(parseFloat(lugar.lat), parseFloat(lugar.lon));
            
            if (rotaAtual) {
                mapa.removeControl(rotaAtual);
            }
            
            rotaAtual = L.Routing.control({
                waypoints: [minhaLocalizacao, destinoLatLng],
                lineOptions: { styles: [{ color: '#2196F3', weight: 6 }] },
                createMarker: () => null,
                show: false
            }).addTo(mapa);
            
            mapa.flyToBounds(L.latLngBounds([minhaLocalizacao, destinoLatLng]), {
                padding: [50, 50]
            });
        })
        .catch(erro => {
            console.log("Erro na busca:", erro);
            alert('Erro ao buscar local');
        });
}

// ===== RÁDIO PX =====
let gravador = null;
let pedacosAudio = [];
let streamAudio = null;
const botaoPX = document.getElementById('btn-px');

async function pedirPermissaoMicrofone() {
    try {
        streamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log("✅ Microfone liberado");
        streamAudio.getTracks().forEach(track => track.stop());
        streamAudio = null;
    } catch(e) {
        console.log("❌ Microfone negado:", e);
    }
}

pedirPermissaoMicrofone();

botaoPX.addEventListener('mousedown', async function() {
    try {
        if (!streamAudio) {
            streamAudio = await navigator.mediaDevices.getUserMedia({ audio: true });
        }
        
        gravador = new MediaRecorder(streamAudio);
        pedacosAudio = [];
        
        gravador.ondataavailable = function(e) {
            if (e.data.size > 0) {
                pedacosAudio.push(e.data);
            }
        };
        
        gravador.onstop = function() {
            if (pedacosAudio.length > 0) {
                const audioBlob = new Blob(pedacosAudio, { type: 'audio/webm' });
                const reader = new FileReader();
                
                reader.onloadend = function() {
                    try {
                        db.ref('radio').push({
                            audio: reader.result,
                            usuario: usuario,
                            timestamp: Date.now()
                        });
                    } catch(e) {
                        console.log("Erro ao enviar áudio:", e);
                    }
                };
                
                reader.readAsDataURL(audioBlob);
            }
        };
        
        gravador.start();
        botaoPX.classList.add('ativo');
        
    } catch(e) {
        console.log("Erro microfone:", e);
        alert('Permita acesso ao microfone');
    }
});

botaoPX.addEventListener('mouseup', function() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        botaoPX.classList.remove('ativo');
    }
});

botaoPX.addEventListener('mouseleave', function() {
    if (gravador && gravador.state === 'recording') {
        gravador.stop();
        botaoPX.classList.remove('ativo');
    }
});

// Eventos touch
botaoPX.addEventListener('touchstart', function(e) {
    e.preventDefault();
    botaoPX.dispatchEvent(new Event('mousedown'));
});

botaoPX.addEventListener('touchend', function(e) {
    e.preventDefault();
    botaoPX.dispatchEvent(new Event('mouseup'));
});

// Receber áudio
try {
    db.ref('radio').limitToLast(1).on('child_added', snap => {
        const dados = snap.val();
        if (dados && dados.usuario !== usuario) {
            if (Date.now() - dados.timestamp < 5000) {
                const audio = new Audio(dados.audio);
                audio.play().catch(e => console.log("Erro ao reproduzir:", e));
                
                botaoPX.classList.add('ouvindo');
                setTimeout(() => {
                    botaoPX.classList.remove('ouvindo');
                }, 1000);
            }
        }
    });
} catch(e) {
    console.log("Erro ao ouvir rádio:", e);
}

// ===== FUNÇÕES =====
function toggleModoNoturno() {
    modoNoturno = !modoNoturno;
    const mapDiv = document.getElementById('map');
    mapDiv.classList.toggle('mapa-noturno');
}

function recentralizar() {
    seguirLocalizacao = true;
    document.getElementById('btnRecenter').style.display = 'none';
    if (minhaLocalizacao) {
        mapa.flyTo(minhaLocalizacao, 17);
    }
}

// Enter na busca
document.getElementById('buscaDestino').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        buscarRota();
    }
});
</script>
</body>
</html>
