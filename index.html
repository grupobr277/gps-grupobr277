<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÁDIO BR-277 | Studio de Comunicação</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0c29, #1a1a2e);
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== RÁDIO STUDIO ===== */
        .radio-studio {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #1e1e35, #14142a);
            border-radius: 50px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
            border: 1px solid rgba(0, 191, 255, 0.3);
            position: relative;
        }

        /* ===== CABEÇALHO DO STUDIO ===== */
        .studio-header {
            background: linear-gradient(135deg, #1a1a2e, #0f0f23);
            padding: 20px 20px 15px;
            text-align: center;
            border-bottom: 3px solid #00BFFF;
            position: relative;
        }

        .studio-header h1 {
            font-size: 24px;
            color: #ffd700;
            letter-spacing: 3px;
        }

        .studio-header h1 i {
            color: #00BFFF;
            margin: 0 8px;
        }

        .studio-sub {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
        }

        .freq {
            background: #0a0a15;
            padding: 4px 15px;
            border-radius: 30px;
        }

        .freq span {
            color: #00ff88;
            font-family: monospace;
            font-size: 12px;
        }

        .online-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-left: 6px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== DROPDOWN ESTAÇÃO ===== */
        .station-selector {
            position: relative;
            margin: 15px 20px;
            z-index: 100;
        }

        .selector-btn {
            width: 100%;
            background: #252542;
            border: 2px solid #00BFFF;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .selector-btn i {
            color: #ffd700;
            transition: transform 0.3s;
        }

        .selector-btn.open i {
            transform: rotate(180deg);
        }

        .dropdown-stations {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a2e;
            border: 2px solid #00BFFF;
            border-radius: 25px;
            margin-top: 8px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 200;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dropdown-stations.open {
            display: block;
        }

        .station-item {
            padding: 12px 18px;
            color: #ccc;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4a;
            transition: all 0.2s;
        }

        .station-item:hover {
            background: #252542;
            color: #00BFFF;
        }

        .station-item.active {
            background: linear-gradient(145deg, #00BFFF, #0066cc);
            color: white;
        }

        .station-badge {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
        }

        .station-item.active .station-badge {
            background: #ffd700;
            color: #1a1a2e;
        }

        /* ===== ESTAÇÃO ATUAL ===== */
        .current-info {
            background: #0f0f23;
            margin: 0 20px 15px;
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffd700;
        }

        .current-city {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .current-city i {
            font-size: 22px;
            color: #00BFFF;
        }

        .current-city span {
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        .current-count {
            background: #00BFFF;
            border-radius: 30px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: bold;
        }

        /* ===== PAINEL DO MICROFONE ===== */
        .mic-panel {
            text-align: center;
            padding: 20px;
            background: linear-gradient(145deg, #14142a, #0f0f23);
            margin: 10px 20px;
            border-radius: 60px;
        }

        .ptt-button {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #e53935, #8b0000);
            border: 4px solid #ffd700;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .ptt-button:active {
            transform: scale(0.96);
        }

        .ptt-button.recording {
            animation: mic-pulse 0.6s infinite;
        }

        @keyframes mic-pulse {
            0% { box-shadow: 0 0 0 0 #e53935; }
            70% { box-shadow: 0 0 0 18px rgba(229,57,53,0); }
        }

        .timer-display {
            margin-top: 12px;
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            font-family: monospace;
        }

        /* ===== BOTÕES DE AÇÃO ===== */
        .action-buttons {
            display: flex;
            gap: 15px;
            padding: 15px 20px 25px;
        }

        .action-btn {
            flex: 1;
            background: #252542;
            border: 1px solid #3a3a5a;
            border-radius: 50px;
            padding: 12px;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #2f2f4a;
            border-color: #00BFFF;
        }

        .action-btn i {
            color: #00BFFF;
            font-size: 16px;
        }

        /* ===== MODAL MAPA ===== */
        .modal-mapa {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .modal-mapa.visible {
            display: flex;
        }

        .modal-header {
            background: #1a1a2e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid #00BFFF;
        }

        .modal-header h3 i {
            color: #00BFFF;
        }

        .close-modal {
            background: #e53935;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* ===== MODAL ALERTAS ===== */
        .modal-alertas {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-alertas.visible {
            display: flex;
        }

        .alertas-card {
            background: #1a1a2e;
            border-radius: 35px;
            width: 100%;
            max-width: 380px;
            max-height: 85vh;
            overflow: hidden;
            border: 2px solid #00BFFF;
        }

        .alertas-header {
            background: #00BFFF;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
        }

        .alertas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
        }

        .alerta-card {
            background: #252542;
            border-radius: 18px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a5a;
        }

        .alerta-card:hover {
            transform: scale(1.05);
            border-color: #ffd700;
        }

        .alerta-emoji {
            font-size: 32px;
        }

        .alerta-nome {
            font-size: 10px;
            color: white;
            margin-top: 5px;
            font-weight: 600;
        }

        /* ===== MODAL CHAT ===== */
        .modal-chat {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a15;
            z-index: 1200;
            display: none;
            flex-direction: column;
        }

        .modal-chat.visible {
            display: flex;
        }

        .chat-header {
            background: #075e54;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #e5ddd5;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: white;
        }

        .chat-input-area button {
            background: #075e54;
            border: none;
            width: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        .msg {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 13px;
        }

        .msg.me {
            background: #dcf8c6;
            margin-left: auto;
        }

        .msg.other {
            background: white;
        }

        /* ===== POPUP ALERTA COM FOTO ===== */
        .popup-alerta {
            background: #1a1a2e;
            border-radius: 16px;
            max-width: 280px;
            overflow: hidden;
            border: 2px solid #00BFFF;
        }
        .popup-alerta-img { width: 100%; height: 120px; object-fit: cover; }
        .popup-header { padding: 8px 12px; background: #00BFFF; color: white; display: flex; justify-content: space-between; }
        .popup-chat { padding: 10px; max-height: 150px; overflow-y: auto; background: #0f0f23; }
        .popup-chat-msg { margin: 5px 0; padding: 6px 10px; border-radius: 12px; font-size: 11px; }
        .popup-chat-msg.me { background: #00BFFF; margin-left: auto; text-align: right; }
        .popup-chat-msg.other { background: #252542; }
        .popup-input { display: flex; padding: 8px; gap: 5px; border-top: 1px solid #2a2a4a; }
        .popup-input input { flex: 1; padding: 8px; border-radius: 20px; border: none; background: #252542; color: white; }
        .popup-input button { background: #00BFFF; border: none; width: 32px; border-radius: 50%; cursor: pointer; }

        /* ===== NOTIFICAÇÃO ===== */
        .audio-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00BFFF;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            z-index: 2000;
            display: none;
            font-weight: bold;
            border: 2px solid gold;
            font-size: 13px;
            white-space: nowrap;
        }

        /* SCROLL DROPDOWN */
        .dropdown-stations::-webkit-scrollbar { width: 3px; }
        .dropdown-stations::-webkit-scrollbar-track { background: #1a1a2e; }
        .dropdown-stations::-webkit-scrollbar-thumb { background: #00BFFF; border-radius: 10px; }
    </style>
</head>
<body>

<div class="radio-studio">
    <!-- CABEÇALHO DO STUDIO -->
    <div class="studio-header">
        <h1><i class="fas fa-microphone-alt"></i> RÁDIO BR-277 <i class="fas fa-broadcast-tower"></i></h1>
        <div class="studio-sub">
            <div class="freq"><span>📡 27.7 MHz</span><span class="online-dot"></span></div>
        </div>
    </div>

    <!-- SELETOR DE ESTAÇÃO (DROPDOWN) -->
    <div class="station-selector">
        <div class="selector-btn" id="selectorBtn">
            <span id="selectedStationText">Curitiba</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div class="dropdown-stations" id="dropdownStations"></div>
    </div>

    <!-- ESTAÇÃO ATUAL -->
    <div class="current-info">
        <div class="current-city">
            <i class="fas fa-radio"></i>
            <span id="currentStationName">Curitiba</span>
        </div>
        <div class="current-count" id="currentStationCount">0 online</div>
    </div>

    <!-- PAINEL DO MICROFONE (PTT) -->
    <div class="mic-panel">
        <button class="ptt-button" id="pttBtn">
            🎤<br>FALAR
        </button>
        <div class="timer-display" id="timerDisplay" style="display: none;">20s</div>
    </div>

    <!-- BOTÕES DE AÇÃO -->
    <div class="action-buttons">
        <div class="action-btn" onclick="openMapa()"><i class="fas fa-map-marked-alt"></i> MAPA</div>
        <div class="action-btn" onclick="openAlertas()"><i class="fas fa-exclamation-triangle"></i> REPORTE</div>
        <div class="action-btn" onclick="openChat()"><i class="fas fa-comment-dots"></i> CHAT</div>
    </div>
</div>

<!-- MODAL MAPA -->
<div class="modal-mapa" id="modalMapa">
    <div class="modal-header">
        <h3><i class="fas fa-map"></i> MAPA BR-277 - TRÂNSITO EM TEMPO REAL</h3>
        <button class="close-modal" onclick="closeMapa()">✕</button>
    </div>
    <div class="map-container">
        <div id="map"></div>
    </div>
</div>

<!-- MODAL ALERTAS -->
<div class="modal-alertas" id="modalAlertas">
    <div class="alertas-card">
        <div class="alertas-header">
            <span><i class="fas fa-exclamation-triangle"></i> REPORTAR OCORRÊNCIA</span>
            <span onclick="closeAlertas()" style="cursor:pointer;">✕</span>
        </div>
        <div class="alertas-grid" id="alertasGrid"></div>
    </div>
</div>

<!-- MODAL CHAT -->
<div class="modal-chat" id="modalChat">
    <div class="chat-header">
        <span><i class="fas fa-comments"></i> GRUPO BR-277</span>
        <span onclick="closeChat()" style="cursor:pointer; font-size:22px;">✕</span>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
        <button onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- NOTIFICAÇÃO ÁUDIO -->
<div class="audio-toast" id="audioToast">🎙️ ÁUDIO RECEBIDO</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
    databaseURL: "https://gps-br277-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==================== 20 CIDADES ====================
const cities = [
    "Guarapuava", "Palmeira", "Porto Amazonas", "Ponta Grossa", "São Luiz",
    "Campo Largo", "Curitiba", "Alm. Tamandaré", "Fazenda Rio Grande", "Tijucas do Sul",
    "Guaratuba", "Morretes", "Paranaguá", "São José", "Colombo",
    "Araucária", "Piraquara", "Campina Grande", "Quatro Barras", "Cajati"
];

// ==================== 15 ALERTAS ====================
const alertasLista = [
    { nome: 'ACIDENTE', icone: '💥', cor: '#e53935', bg: 'linear-gradient(145deg, #e53935, #b71c1c)' },
    { nome: 'OBRAS', icone: '🚧', cor: '#ff9800', bg: 'linear-gradient(145deg, #ff9800, #f57c00)' },
    { nome: 'PANE', icone: '🔧', cor: '#795548', bg: 'linear-gradient(145deg, #795548, #5d4037)' },
    { nome: 'ANIMAL', icone: '🐂', cor: '#9c27b0', bg: 'linear-gradient(145deg, #9c27b0, #7b1fa2)' },
    { nome: 'RADAR', icone: '📷', cor: '#607d8b', bg: 'linear-gradient(145deg, #607d8b, #455a64)' },
    { nome: 'BARREIRA', icone: '⛰️', cor: '#8b4513', bg: 'linear-gradient(145deg, #8b4513, #5d3a1a)' },
    { nome: 'NEBLINA', icone: '🌫️', cor: '#00acc1', bg: 'linear-gradient(145deg, #00acc1, #0097a7)' },
    { nome: 'CONGEST', icone: '🔴', cor: '#f44336', bg: 'linear-gradient(145deg, #f44336, #d32f2f)' },
    { nome: 'ALAGAMENTO', icone: '💧', cor: '#2196f3', bg: 'linear-gradient(145deg, #2196f3, #1976d2)' },
    { nome: 'BLOQUEIO', icone: '⛔', cor: '#b71c1c', bg: 'linear-gradient(145deg, #b71c1c, #8B0000)' },
    { nome: 'PERIGO', icone: '⚠️', cor: '#ff5722', bg: 'linear-gradient(145deg, #ff5722, #e64a19)' },
    { nome: 'DESVIO', icone: '🔄', cor: '#3f51b5', bg: 'linear-gradient(145deg, #3f51b5, #303f9f)' },
    { nome: 'CARGA', icone: '📦', cor: '#8bc34a', bg: 'linear-gradient(145deg, #8bc34a, #689f38)' },
    { nome: 'GRANIZO', icone: '🧊', cor: '#00bcd4', bg: 'linear-gradient(145deg, #00bcd4, #0097a7)' },
    { nome: 'MANIFEST', icone: '📢', cor: '#ff4081', bg: 'linear-gradient(145deg, #ff4081, #f50057)' }
];

// ==================== VARIÁVEIS ====================
let usuario = localStorage.getItem('radio_user');
if (!usuario) {
    usuario = prompt("🎙️ Digite seu nome para entrar no Rádio BR-277:", "Motorista");
    if (!usuario) usuario = "Motorista";
    localStorage.setItem('radio_user', usuario);
}

let estacaoAtual = localStorage.getItem('current_station') || 'curitiba';
let mediaRecorder = null;
let recording = false;
let audioChunks = [];
let timerInterval = null;
let secondsLeft = 20;
let mapa = null;
let userLocation = null;
let userMarker = null;
let alertasMapa = {};
let audioListenerRef = null;

// ==================== NORMALIZAR ID ====================
function normalizeId(str) {
    return str.toLowerCase()
        .replace(/ /g, '_')
        .replace(/ã/g, 'a')
        .replace(/ç/g, 'c')
        .replace(/á/g, 'a')
        .replace(/â/g, 'a')
        .replace(/é/g, 'e')
        .replace(/ê/g, 'e')
        .replace(/í/g, 'i')
        .replace(/ó/g, 'o')
        .replace(/ô/g, 'o')
        .replace(/ú/g, 'u')
        .replace(/\./g, '');
}

// ==================== DROPDOWN ====================
function criarDropdown() {
    const menu = document.getElementById('dropdownStations');
    menu.innerHTML = '';
    
    cities.forEach(cidade => {
        const id = normalizeId(cidade);
        const item = document.createElement('div');
        item.className = 'station-item';
        if (id === estacaoAtual) item.classList.add('active');
        item.innerHTML = `
            <span>${cidade}</span>
            <span class="station-badge" id="badge-${id}">0</span>
        `;
        item.onclick = () => {
            trocarEstacao(id, cidade);
            fecharDropdown();
        };
        menu.appendChild(item);
    });
}

function abrirDropdown() {
    document.getElementById('dropdownStations').classList.add('open');
    document.getElementById('selectorBtn').classList.add('open');
}

function fecharDropdown() {
    document.getElementById('dropdownStations').classList.remove('open');
    document.getElementById('selectorBtn').classList.remove('open');
}

document.getElementById('selectorBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const menu = document.getElementById('dropdownStations');
    if (menu.classList.contains('open')) {
        fecharDropdown();
    } else {
        abrirDropdown();
    }
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('.station-selector')) {
        fecharDropdown();
    }
});

// ==================== TROCAR ESTAÇÃO ====================
function trocarEstacao(id, nome) {
    estacaoAtual = id;
    localStorage.setItem('current_station', id);
    
    document.querySelectorAll('.station-item').forEach(item => item.classList.remove('active'));
    event.target.closest('.station-item').classList.add('active');
    
    document.getElementById('selectedStationText').innerText = nome;
    document.getElementById('currentStationName').innerText = nome;
    
    db.ref(`estacoes/${id}/users/${usuario}`).set({ nome: usuario, timestamp: Date.now() });
    
    cities.forEach(c => {
        const outroId = normalizeId(c);
        if (outroId !== id) {
            db.ref(`estacoes/${outroId}/users/${usuario}`).remove();
        }
    });
    
    setupAudioListener();
    showToast(`📻 Você sintonizou ${nome}`);
}

// ==================== CONTAGEM DE USUÁRIOS ====================
function carregarContagens() {
    cities.forEach(cidade => {
        const id = normalizeId(cidade);
        db.ref(`estacoes/${id}/users`).on('value', (snap) => {
            const users = snap.val();
            const count = users ? Object.keys(users).length : 0;
            const badge = document.getElementById(`badge-${id}`);
            if (badge) badge.innerText = count;
            if (id === estacaoAtual) {
                document.getElementById('currentStationCount').innerText = `${count} online`;
            }
        });
    });
}

// ==================== ÁUDIO ====================
function setupAudioListener() {
    if (audioListenerRef) {
        db.ref(`estacoes/${estacaoAtual}/audios`).off('child_added', audioListenerRef);
    }
    
    audioListenerRef = db.ref(`estacoes/${estacaoAtual}/audios`).on('child_added', (snap) => {
        const data = snap.val();
        if (data && data.sender !== usuario) {
            const audio = new Audio(data.audio);
            audio.play().catch(e => console.log);
            const toast = document.getElementById('audioToast');
            toast.style.display = 'block';
            toast.innerHTML = `🎙️ ${data.sender} falou em ${data.station}`;
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    });
}

const pttBtn = document.getElementById('pttBtn');
const timerDisplay = document.getElementById('timerDisplay');

async function startRecording() {
    if (recording) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        secondsLeft = 20;
        
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            if (audioChunks.length) {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const cidadeNome = cities.find(c => normalizeId(c) === estacaoAtual);
                    await db.ref(`estacoes/${estacaoAtual}/audios`).push({
                        sender: usuario,
                        station: cidadeNome,
                        audio: reader.result,
                        timestamp: Date.now()
                    });
                    const snap = await db.ref(`estacoes/${estacaoAtual}/audios`).once('value');
                    const audios = snap.val();
                    if (audios) {
                        const keys = Object.keys(audios);
                        if (keys.length > 30) {
                            keys.slice(0, keys.length - 30).forEach(k => db.ref(`estacoes/${estacaoAtual}/audios/${k}`).remove());
                        }
                    }
                };
                reader.readAsDataURL(blob);
            }
            stream.getTracks().forEach(t => t.stop());
        };
        
        mediaRecorder.start(100);
        recording = true;
        pttBtn.classList.add('recording');
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = '20s';
        
        timerInterval = setInterval(() => {
            secondsLeft--;
            timerDisplay.innerText = `${secondsLeft}s`;
            if (secondsLeft <= 0) stopRecording();
        }, 1000);
        
        setTimeout(() => { if (recording) stopRecording(); }, 20000);
    } catch(e) { alert("🎤 Permita o acesso ao microfone!"); }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    if (timerInterval) clearInterval(timerInterval);
    recording = false;
    pttBtn.classList.remove('recording');
    timerDisplay.style.display = 'none';
}

pttBtn.addEventListener('mousedown', startRecording);
pttBtn.addEventListener('mouseup', stopRecording);
pttBtn.addEventListener('mouseleave', stopRecording);
pttBtn.addEventListener('touchstart', startRecording);
pttBtn.addEventListener('touchend', stopRecording);

// ==================== MAPA ====================
function initMap() {
    mapa = L.map('map').setView([-25.4284, -49.2733], 12);
    L.tileLayer('https://mt1.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}').addTo(mapa);
    
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            userLocation = [pos.coords.latitude, pos.coords.longitude];
            if (!userMarker) {
                userMarker = L.marker(userLocation, {
                    icon: L.divIcon({ html: '<div style="font-size:28px;">🚗</div>', iconSize: [28, 28], iconAnchor: [14, 14], className: '' })
                }).addTo(mapa);
                mapa.setView(userLocation, 13);
            } else {
                userMarker.setLatLng(userLocation);
            }
        });
    }
    
    carregarAlertasMapa();
}

function carregarAlertasMapa() {
    db.ref('alertas').on('child_added', (snap) => {
        const a = snap.val();
        const id = snap.key;
        if (alertasMapa[id] || !mapa) return;
        
        const marker = L.marker([a.lat, a.lng], {
            icon: L.divIcon({
                html: `<div style="background:${a.cor}; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; border:2px solid white;">${a.icone}</div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            })
        }).addTo(mapa);
        
        let imgHtml = '';
        if (a.imagem) imgHtml = `<img src="${a.imagem}" class="popup-alerta-img">`;
        
        const popupDiv = document.createElement('div');
        popupDiv.className = 'popup-alerta';
        popupDiv.innerHTML = `
            ${imgHtml}
            <div class="popup-header">
                <span>${a.icone} ${a.nome}</span>
                <span>👍 ${a.confirmacoes || 0}</span>
            </div>
            <div class="popup-chat" id="chat-${id}"></div>
            <div class="popup-input">
                <input type="text" id="input-${id}" placeholder="Comentar...">
                <button onclick="sendMsgAlerta('${id}')">➔</button>
            </div>
        `;
        
        marker.bindPopup(popupDiv);
        marker.on('popupopen', () => carregarChatAlerta(id));
        alertasMapa[id] = marker;
    });
}

function carregarChatAlerta(id) {
    db.ref(`chats/alerta_${id}`).on('value', (snap) => {
        const chatDiv = document.getElementById(`chat-${id}`);
        if (!chatDiv) return;
        const msgs = snap.val();
        if (!msgs) { chatDiv.innerHTML = '<div style="text-align:center; color:#888;">Nenhum comentário</div>'; return; }
        
        let html = '';
        Object.values(msgs).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
            const isMe = msg.usuario === usuario;
            html += `<div class="popup-chat-msg ${isMe ? 'me' : 'other'}"><strong>${msg.usuario}</strong><br>${msg.texto}<br><small>${new Date(msg.timestamp).toLocaleTimeString()}</small></div>`;
        });
        chatDiv.innerHTML = html;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}

function sendMsgAlerta(id) {
    const input = document.getElementById(`input-${id}`);
    if (!input.value.trim()) return;
    db.ref(`chats/alerta_${id}`).push({ usuario: usuario, texto: input.value.trim(), timestamp: Date.now() });
    input.value = '';
}

function openMapa() {
    document.getElementById('modalMapa').classList.add('visible');
    setTimeout(() => {
        if (mapa) mapa.invalidateSize();
        else initMap();
    }, 100);
}

function closeMapa() {
    document.getElementById('modalMapa').classList.remove('visible');
}

// ==================== ALERTAS COM FOTO ====================
function criarAlertasGrid() {
    const grid = document.getElementById('alertasGrid');
    grid.innerHTML = '';
    alertasLista.forEach(alerta => {
        const div = document.createElement('div');
        div.className = 'alerta-card';
        div.style.background = alerta.bg;
        div.innerHTML = `<div class="alerta-emoji">${alerta.icone}</div><div class="alerta-nome">${alerta.nome}</div>`;
        div.onclick = () => abrirCameraParaAlerta(alerta);
        grid.appendChild(div);
    });
}

async function abrirCameraParaAlerta(alerta) {
    if (!userLocation) { showToast("📍 Aguardando localização..."); return; }
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;';
        
        const video = document.createElement('video');
        video.style.cssText = 'width:90%; max-width:350px; border-radius:20px;';
        video.autoplay = true;
        video.srcObject = stream;
        
        const btnFoto = document.createElement('button');
        btnFoto.style.cssText = 'margin:15px; padding:12px 25px; background:#ffd700; border:none; border-radius:40px; font-size:16px; font-weight:700; cursor:pointer;';
        btnFoto.innerHTML = '📷 TIRAR FOTO';
        
        const btnPular = document.createElement('button');
        btnPular.style.cssText = 'margin:15px; padding:12px 25px; background:#444; border:none; border-radius:40px; font-size:16px; font-weight:700; cursor:pointer; color:white;';
        btnPular.innerHTML = '⏭️ PULAR';
        
        const btnFechar = document.createElement('button');
        btnFechar.style.cssText = 'position:absolute; top:15px; right:15px; width:40px; height:40px; background:#e53935; border:none; border-radius:50%; color:white; font-size:18px; cursor:pointer;';
        btnFechar.innerHTML = '✕';
        
        overlay.appendChild(video);
        overlay.appendChild(btnFoto);
        overlay.appendChild(btnPular);
        overlay.appendChild(btnFechar);
        document.body.appendChild(overlay);
        
        btnFoto.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const id = Date.now();
                    await db.ref(`alertas/${id}`).set({
                        ...alerta,
                        lat: userLocation[0],
                        lng: userLocation[1],
                        timestamp: id,
                        criador: usuario,
                        confirmacoes: 1,
                        imagem: reader.result
                    });
                    stream.getTracks().forEach(t => t.stop());
                    document.body.removeChild(overlay);
                    showToast('✅ Alerta com foto enviado!');
                    closeAlertas();
                };
                reader.readAsDataURL(blob);
            }, 'image/jpeg', 0.6);
        };
        
        btnPular.onclick = async () => {
            const id = Date.now();
            await db.ref(`alertas/${id}`).set({
                ...alerta,
                lat: userLocation[0],
                lng: userLocation[1],
                timestamp: id,
                criador: usuario,
                confirmacoes: 1
            });
            stream.getTracks().forEach(t => t.stop());
            document.body.removeChild(overlay);
            showToast(`⚠️ ${alerta.nome} reportado!`);
            closeAlertas();
        };
        
        btnFechar.onclick = () => {
            stream.getTracks().forEach(t => t.stop());
            document.body.removeChild(overlay);
        };
        
    } catch(e) {
        const id = Date.now();
        await db.ref(`alertas/${id}`).set({
            ...alerta,
            lat: userLocation[0],
            lng: userLocation[1],
            timestamp: id,
            criador: usuario,
            confirmacoes: 1
        });
        showToast(`⚠️ ${alerta.nome} reportado!`);
        closeAlertas();
    }
}

function openAlertas() { document.getElementById('modalAlertas').classList.add('visible'); }
function closeAlertas() { document.getElementById('modalAlertas').classList.remove('visible'); }

// ==================== CHAT GERAL ====================

function closeChat() { document.getElementById('modalChat').classList.remove('visible'); }

    db.ref('chat_geral').on('value', (snap) => {

        });

function sendChatMessage() {

    db.ref('chat_geral').push({ usuario: usuario, texto: input.value.trim(), timestamp: Date.now() });

}

// ==================== UTILIDADES ====================
function showToast(msg) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#00BFFF; color:white; padding:8px 20px; border-radius:40px; z-index:13000; font-weight:bold; border:2px solid gold; font-size:12px; white-space:nowrap;';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

window.addEventListener('beforeunload', () => {
    if (usuario) db.ref(`estacoes/${estacaoAtual}/users/${usuario}`).remove();
});

function init() {
    criarDropdown();
    carregarContagens();
    setupAudioListener();
    criarAlertasGrid();
    carregarChatGeral();
    showToast(`🎙️ Bem-vindo, ${usuario}!`);
}

init();
