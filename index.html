<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | MONITORAMENTO GPS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue-waze: #33a1ff; --blue-maps: #1a73e8; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* Estilo da Barra de Pesquisa (Lupa) no Topo Centro */
        .leaflet-top.leaflet-center {
            left: 50%;
            transform: translateX(-50%);
            top: 15px;
            width: 90%;
            max-width: 400px;
        }
        .leaflet-control-geocoder {
            border: none !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25) !important;
            border-radius: 30px !important;
            width: 100% !important;
            height: 45px !important;
            overflow: hidden;
            background: white !important;
        }
        .leaflet-control-geocoder-form input {
            height: 45px !important;
            font-size: 16px !important;
            padding-left: 20px !important;
        }

        /* Ponto Azul Pulsante */
        .ponto-gps-pulsante {
            width: 14px; height: 14px;
            background: var(--blue-maps);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }
        .ponto-gps-pulsante::after {
            content: '';
            position: absolute;
            top: -3px; left: -3px;
            width: 14px; height: 14px;
            border: 6px solid var(--blue-maps);
            border-radius: 50%;
            animation: pulsar 1.5s infinite;
            opacity: 0;
        }
        @keyframes pulsar {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Botões de Alerta Laterais */
        .menu-alertas {
            position: absolute; top: 80px; left: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .btn-acao {
            background: white; border: none; padding: 10px 5px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 85px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
        .btn-acao b { font-size: 8px; text-transform: uppercase; margin-top: 3px; }

        /* Chat e Outros */
        .leaflet-routing-container { display: none !important; }
        #online-tag { position: absolute; top: 75px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 15px; font-size: 11px; }
    </style>
</head>
<body>

<div id="online-tag">🟢 <span id="num-online">1</span> Online</div>
<div id="map"></div>

<div class="menu-alertas">
    <button class="btn-acao" onclick="salvarAlerta('Acidente', '⚠️')"><span>⚠️</span><b>Acidente</b></button>
    <button class="btn-acao" onclick="salvarAlerta('Obras', '🚧')"><span>🚧</span><b>Obras</b></button>
    <button class="btn-acao" onclick="salvarAlerta('Lentidão', '🚗')"><span>🚗</span><b>Lentidão</b></button>
    <button class="btn-acao" onclick="salvarAlerta('Animal', '🐕')"><span>🐕</span><b>Animal</b></button>
    <button class="btn-acao" onclick="salvarAlerta('Bloqueio', '🚫')"><span>🚫</span><b>Bloqueio</b></button>
    <button class="btn-acao" onclick="salvarAlerta('Buraco', '🕳️')"><span>🕳️</span><b>Buraco</b></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE (Link do seu banco) ---
const firebaseConfig = { databaseURL: "https://gps-br277-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- INICIAR MAPA ---
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 12);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);

// Criar posição para a barra de pesquisa
L.Control.Center = L.Control.extend({ onAdd: function(map) { return L.DomUtil.create('div', 'leaflet-center'); } });
new L.Control.Center({ position: 'topleft' }).addTo(map);

let meuLatLng, meuMarker, controleRota;
const idSessao = "D_" + Math.random().toString(36).substr(2, 4).toUpperCase();

// --- GPS COM ZOOM AUTOMÁTICO ---
function ativarGPS() {
    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude } = pos.coords;
        meuLatLng = L.latLng(latitude, longitude);

        if (!meuMarker) {
            // Na primeira vez, cria o marcador e dá ZOOM DE APROXIMAÇÃO
            meuMarker = L.marker(meuLatLng, { 
                icon: L.divIcon({ className: 'ponto-gps-pulsante', iconSize: [20, 20] }) 
            }).addTo(map);
            map.setView(meuLatLng, 16); // ZOOM 16 = Perto o suficiente para dirigir
        } else {
            meuMarker.setLatLng(meuLatLng);
        }

        // Salva localização para os outros usuários verem
        db.ref("ativos/" + idSessao).set({ lat: latitude, lng: longitude, t: Date.now() });
        db.ref("ativos/" + idSessao).onDisconnect().remove();
    }, e => alert("Ative o GPS do seu celular!"), { enableHighAccuracy: true });
}

// --- BARRA DE PESQUISA (LUPA) ---
const buscador = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Pra onde vamos motorista?",
    collapsed: false
}).on('markgeocode', function(e) {
    const destino = e.geocode.center;
    
    if (controleRota) map.removeControl(controleRota);

    controleRota = L.Routing.control({
        waypoints: [meuLatLng, destino],
        lineOptions: { styles: [{ color: '#1a73e8', opacity: 0.8, weight: 10 }] },
        createMarker: (i, wp) => i === 1 ? L.marker(wp.latLng).bindPopup("Chegada") : null,
        addWaypoints: false
    }).addTo(map);

    // Ajusta o mapa para mostrar a rota do início ao fim
    map.fitBounds(L.latLngBounds([meuLatLng, destino]), { padding: [80, 80] });
}).addTo(document.querySelector('.leaflet-center'));

// --- SALVAR ALERTAS ---
function salvarAlerta(tipo, emoji) {
    if (!meuLatLng) return;
    const ref = db.ref("ocorrencias").push();
    ref.set({ tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng });
}

// MOSTRAR ALERTAS QUE JÁ ESTÃO NO BANCO
db.ref("ocorrencias").on("child_added", snap => {
    const a = snap.val();
    const iconHTML = `<div style="text-align:center"><span style="font-size:26px">${a.emoji}</span></div>`;
    L.marker([a.lat, a.lng], { icon: L.divIcon({ html: iconHTML, iconSize: [40, 40], className: '' }) })
    .addTo(map).bindPopup("<b>" + a.tipo + "</b>");
});

// CONTADOR
db.ref("ativos").on("value", snap => {
    const val = snap.val() ? Object.keys(snap.val()).length : 1;
    document.getElementById("num-online").innerText = val;
});

ativarGPS();
</script>
</body>
</html>
