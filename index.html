<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>BR-277 | COMUNIDADE PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        :root { --blue: #1a73e8; --dark: #202124; }
        
        /* Reset de Tela */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* Marcador de Posição */
        .meu-gps { width: 20px; height: 20px; background: var(--blue); border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(26,115,232, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(26,115,232, 0); } 100% { box-shadow: 0 0 0 0 rgba(26,115,232, 0); } }

        /* Menu de Alertas */
        .menu-alertas { position: absolute; top: 70px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .btn-alerta { background: white; border: none; padding: 12px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); width: 65px; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; }

        /* Chat Lateral Corrigido */
        #chat-lateral { 
            position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; 
            height: 100dvh; background: white; z-index: 2000; transition: 0.3s ease-in-out; 
            display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,0.2); 
        }
        #chat-lateral.aberto { right: 0; }
        .chat-header { padding: 15px; background: var(--dark); color: white; font-weight: bold; display: flex; justify-content: space-between; }
        #mensagens { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 10px; border-radius: 10px; font-size: 13px; max-width: 85%; }
        .balao-ia { background: #e7f3ff; align-self: flex-start; border-left: 4px solid var(--blue); }
        .balao-user { background: #eee; align-self: flex-end; }

        /* Busca e Rota */
        .leaflet-control-geocoder { margin-top: 10px !important; border-radius: 20px !important; }
        .leaflet-routing-container { display: none; } /* Esconde o texto para virar GPS real */
    </style>
</head>
<body>

<div id="map"></div>

<div class="menu-alertas">
    <button class="btn-alerta" onclick="registrar('Acidente', '⚠️')">⚠️<br>ACIDENTE</button>
    <button class="btn-alerta" onclick="registrar('Polícia', '🚔')">🚔<br>POLÍCIA</button>
    <button class="btn-alerta" onclick="registrar('Obras', '🚧')">🚧<br>OBRAS</button>
</div>

<button onclick="toggleChat()" style="position:fixed; bottom:20px; right:20px; z-index:1001; width:60px; height:60px; border-radius:50%; background:var(--blue); color:white; border:none; font-size:25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">💬</button>

<div id="chat-lateral">
    <div class="chat-header"><span>ASSISTENTE</span><span onclick="toggleChat()" style="cursor:pointer">✕</span></div>
    <div id="mensagens"></div>
    <div style="padding:10px; border-top:1px solid #eee; display:flex;">
        <input type="text" id="input-chat" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:20px; outline:none;" placeholder="Diga algo...">
        <button onclick="enviarChat()" style="background:var(--blue); color:white; border:none; border-radius:50%; width:40px; height:40px; margin-left:8px;">➤</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// CONFIG FIREBASE (Substitua pelos seus dados)
const firebaseConfig = { 
    apiKey: "SUA_API_KEY", 
    databaseURL: "https://SEU-PROJETO.firebaseio.com", 
    projectId: "SEU-PROJETO" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// INICIAR MAPA
const map = L.map('map', { zoomControl: false }).setView([-25.4284, -49.2733], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let meuLatLng, meuMarker, routingControl;
let marcadoresAtivos = {};

// GPS REALTIME
function iniciarGPS() {
    navigator.geolocation.watchPosition(pos => {
        meuLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
        if (!meuMarker) {
            meuMarker = L.marker(meuLatLng, { icon: L.divIcon({ className: 'meu-gps' }) }).addTo(map);
            map.setView(meuLatLng, 15);
        } else {
            meuMarker.setLatLng(meuLatLng);
        }
    }, null, { enableHighAccuracy: true });
}

// BUSCA E ROTA (ESTILO GOOGLE)
const geocoder = L.Control.geocoder({
    defaultMarkGeocode: false,
    placeholder: "Pesquisar destino..."
}).on('markgeocode', function(e) {
    const dest = e.geocode.center;
    if (routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
        waypoints: [meuLatLng, dest],
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', language: 'pt' }),
        formatter: new L.Routing.Formatter({ language: 'pt', units: 'metric' }),
        lineOptions: { styles: [{ color: '#1a73e8', opacity: 0.8, weight: 8 }], extendToWaypoints: true },
        createMarker: (i, wp) => i === 1 ? L.marker(wp.latLng) : null
    }).addTo(map);
    map.flyTo(dest, 14);
}).addTo(map);

// REGISTRAR OCORRÊNCIA (FIREBASE)
function registrar(tipo, emoji) {
    if (!meuLatLng) return alert("Aguardando GPS...");
    const id = "ID_" + Date.now();
    const novaOcorrencia = { id, tipo, emoji, lat: meuLatLng.lat, lng: meuLatLng.lng };
    
    db.ref("ocorrencias/" + id).set(novaOcorrencia).then(() => {
        alert("Enviado: " + tipo);
    });
}

// CARREGAR OCORRÊNCIAS (DO FIREBASE PARA O MAPA)
db.ref("ocorrencias").on("value", snap => {
    const data = snap.val();
    if (!data) return;
    Object.values(data).forEach(o => {
        if (!marcadoresAtivos[o.id]) {
            const iconHTML = `<div style="text-align:center"><span style="font-size:24px">${o.emoji}</span><br><b style="background:white;padding:2px;border:1px solid #000;border-radius:4px;font-size:9px">${o.tipo}</b></div>`;
            marcadoresAtivos[o.id] = L.marker([o.lat, o.lng], {
                icon: L.divIcon({ html: iconHTML, iconSize: [60, 40], className: '' })
            }).addTo(map);
        }
    });
});

// CHAT IA
function toggleChat() { document.getElementById('chat-lateral').classList.toggle('aberto'); }
function enviarChat() {
    const input = document.getElementById('input-chat');
    if (!input.value) return;
    addBalao(input.value, 'balao-user');
    
    setTimeout(() => {
        addBalao("Estou verificando os alertas da BR-277 para você.", "balao-ia");
    }, 600);
    input.value = "";
}
function addBalao(txt, cls) {
    const box = document.getElementById('mensagens');
    const div = document.createElement('div');
    div.className = "balao " + cls; div.innerText = txt;
    box.appendChild(div); box.scrollTop = box.scrollHeight;
}

iniciarGPS();
</script>
</body>
</html>
