<!DOCTYPE html>
<html>
<head>
<title>GPS Grupo BR 277</title>
<meta charset="utf-8" />

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map {
height: 100vh;
}

.menu {
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button{
display:block;
margin:5px 0;
width:160px;
padding:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="menu">

<button onclick="tipoOcorrencia='Acidente'">🚨 Acidente</button>

<button onclick="tipoOcorrencia='Obra'">🚧 Obra</button>

<button onclick="tipoOcorrencia='Animal na pista'">🐄 Animal</button>

<button onclick="tipoOcorrencia='Veículo quebrado'">🚗 Veículo quebrado</button>

</div>

<div id="map"></div>

<script>

var tipoOcorrencia = "";

var map = L.map('map').setView([-25.4284, -49.2733], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'Mapa OpenStreetMap'
}).addTo(map);

map.on('click', function(e){

if(tipoOcorrencia == ""){
alert("Escolha um tipo de ocorrência primeiro.");
return;
}

var marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);

marker.bindPopup(tipoOcorrencia).openPopup();

});

</script>

</body>
</html>
